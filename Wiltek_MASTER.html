<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wiltek Portal</title>
<script>
  // V2 takeover (silent, 2026-05-25): all MASTER (V1) traffic redirects to V2.
  // No banner, no prompt — users land on V2 directly. Query string + hash are
  // preserved so old bookmarks resolve to the matching V2 view.
  // The full V1 dashboard lives in git history (commit before this rewrite).
  (function () {
    try {
      var params = new URLSearchParams(window.location.search || '');
      // Old MASTER view names → V2 view names (mirror index.html VIEW_ALIAS_MAP).
      var VIEW_ALIAS = { gtd: 'gtd', kpi: 'overview', stock: 'inventory', purchasing: 'inventory' };
      var view = params.get('view');
      if (view && VIEW_ALIAS[view]) params.set('view', VIEW_ALIAS[view]);
      params.delete('period');  // MASTER-only param, not used by V2
      var qs = params.toString();
      window.location.replace('/Wiltek_V2.html' + (qs ? '?' + qs : '') + (window.location.hash || ''));
    } catch (e) {
      window.location.replace('/Wiltek_V2.html');
    }
  })();
</script>
</head>
<body>
  <!-- Redirect happens in the script above; this is a no-flash fallback only. -->
  <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:24px;text-align:center;color:#888;">
    <a href="/Wiltek_V2.html">Wiltek Portal →</a>
  </div>
</body>
</html>
