<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Wiltek Portal V2</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   Wiltek V2 — Stage A
   Single state object · single fetch (AbortController) · single render entry.
   V1 残留 (SNAPSHOT/wpCache/WP_SALES_LIVE/sbm/refreshLiveData/_kpiInflight/
   setSnapshot/rerenderActiveView/v18HydrateFromCache) 全部禁用。
═══════════════════════════════════════════════════════════════════ */

:root {
  --bg:           #FFFFFF;
  --surface:      #FAFAFA;
  --border:       #E5E5E5;
  --text-primary: #1A1A1A;
  --text-meta:    #6B6B6B;
  --text-light:   #9B9B9B;
  --brand:        #1F5F4A;
  --brand-soft:   #E8F0EC;
  --ok:           #2E7D5B;
  --warn:         #B8860B;
  --warn-soft:    #D4A845;
  --danger:       #A03030;
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04);
  --radius:       8px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 14px; line-height: 1.6;
  color: var(--text-primary); background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
.num { font-family: 'SF Mono', Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
button { font: inherit; cursor: pointer; }
input, select { font: inherit; color: inherit; }

/* ── Login overlay ────────────────────────────────────────────────── */
#login {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
#login .card {
  width: 360px; max-width: calc(100% - 32px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 28px;
}
#login h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; color: var(--brand); }
#login .sub { color: var(--text-meta); font-size: 13px; margin-bottom: 24px; }
#login label { display: block; font-size: 12px; color: var(--text-meta); margin: 12px 0 6px; }
#login input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg);
}
#login input:focus { outline: none; border-color: var(--brand); }
#login button {
  width: 100%; margin-top: 20px; padding: 11px 14px;
  background: var(--brand); color: #fff; border: 0; border-radius: 6px;
  font-weight: 500; font-size: 14px;
}
#login button:hover { background: #19503e; }
#login .err { color: var(--danger); font-size: 12px; min-height: 18px; margin-top: 10px; }

/* ── App shell ────────────────────────────────────────────────────── */
#app { display: none; }
#app.ready { display: block; }

header.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand .logo {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--brand); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
}
.brand-name { font-weight: 600; font-size: 16px; }
.brand-tag {
  font-size: 11px; color: var(--brand); background: var(--brand-soft);
  padding: 2px 8px; border-radius: 10px; margin-left: 4px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.header-right { display: flex; align-items: center; gap: 18px; }
.role-chip { font-size: 13px; color: var(--text-meta); }
.role-chip strong { color: var(--text-primary); font-weight: 600; }
.picker {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text-primary); font-size: 13px;
}
.picker:focus { outline: none; border-color: var(--brand); }
.logout-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; color: var(--text-meta); font-size: 13px;
}
.logout-btn:hover { color: var(--brand); border-color: var(--brand); }

/* ── Layout: sidebar + main ───────────────────────────────────────── */
main.app-main {
  display: grid; grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 65px);
}
nav.menu {
  border-right: 1px solid var(--border); padding: 24px 16px;
  background: var(--bg);
}
nav.menu .menu-section {
  font-size: 11px; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin: 0 8px 8px;
}
nav.menu a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 6px;
  color: var(--text-meta); text-decoration: none;
  font-size: 14px; margin-bottom: 2px;
}
nav.menu a:hover { background: var(--surface); color: var(--text-primary); }
nav.menu a.active {
  background: var(--brand-soft); color: var(--brand); font-weight: 600;
}
nav.menu a .icon { font-size: 16px; }
nav.menu a .stub {
  margin-left: auto; font-size: 10px; color: var(--text-light);
  background: var(--surface); padding: 1px 6px; border-radius: 8px;
}

section.app-content { padding: 32px 36px; min-width: 0; }

/* ── Page header ──────────────────────────────────────────────────── */
.page-title { font-size: 28px; font-weight: 600; margin: 0 0 4px; }
.page-sub { color: var(--text-meta); font-size: 14px; margin: 0 0 24px; }

/* ── Cards grid ───────────────────────────────────────────────────── */
.cards-grid {
  display: grid; gap: 16px; margin-bottom: 28px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card .label { font-size: 13px; color: var(--text-meta); margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 500; line-height: 1.2; }
.card .value .unit { font-size: 16px; color: var(--text-meta); margin-left: 4px; }
.card .month-tag {
  font-size: 12px; color: var(--text-light); margin-top: 4px;
}
.card .compare {
  margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border);
  font-size: 12px; color: var(--text-meta); line-height: 1.7;
}
.card .compare .row { display: flex; justify-content: space-between; gap: 8px; }
.card .compare .delta-pos { color: var(--ok); }
.card .compare .delta-neg { color: var(--danger); }
.card .compare .delta-flat { color: var(--text-light); }
.card.wide { grid-column: 1 / -1; }
.card.placeholder {
  background: var(--surface); color: var(--text-light); font-style: italic;
}
.card.placeholder .value { color: var(--text-light); font-size: 18px; }

/* progress bar */
.progress-bar {
  margin-top: 12px; height: 6px; background: var(--surface);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--brand); transition: width .25s ease;
}
.progress-fill.over { background: var(--ok); }
.progress-fill.under { background: var(--warn-soft); }
.progress-meta {
  font-size: 11px; color: var(--text-meta); margin-top: 6px;
  display: flex; justify-content: space-between;
}

/* branch table */
table.branch-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
table.branch-table th, table.branch-table td {
  text-align: right; padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
table.branch-table th:first-child, table.branch-table td:first-child {
  text-align: left;
}
table.branch-table th {
  font-weight: 600; color: var(--text-meta);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
}
table.branch-table tr.total-row {
  font-weight: 600; background: var(--brand-soft);
}
table.branch-table tr.total-row td { border-bottom: 0; }
table.branch-table .progress-cell {
  width: 100px;
}
table.branch-table .mini-bar {
  display: inline-block; width: 60px; height: 6px;
  background: var(--surface); border-radius: 3px; overflow: hidden;
  vertical-align: middle; margin-right: 6px;
}
table.branch-table .mini-bar-fill {
  display: block; height: 100%; background: var(--brand);
}

/* ── KPI card with detail rows (inventory/products/customers) ─────── */
.kpi-rows {
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
  font-size: 12px;
}
.kpi-rows .kpi-row {
  display: flex; justify-content: space-between; gap: 8px;
  padding: 3px 0; color: var(--text-meta);
}
.kpi-rows .kpi-row .name { color: var(--text-meta); }
.kpi-rows .kpi-row .val  { color: var(--text-primary); font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }
.kpi-rows .kpi-row .val .pos { color: var(--ok); }
.kpi-rows .kpi-row .val .neg { color: var(--danger); }
.kpi-rows .kpi-row .val .flat { color: var(--text-light); }
.card .as-of { font-size: 10px; color: var(--text-light); margin-top: 8px; font-style: italic; }
.card .value.danger { color: var(--danger); }
.card .value.warn   { color: var(--warn); }
.card .value.ok     { color: var(--ok); }

/* ── Alert cards (smaller, tonal border) ─────────────────────────── */
.alert-card {
  background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--text-light);
  border-radius: var(--radius); padding: 14px 16px;
}
.alert-card.tone-ok   { border-left-color: var(--ok); }
.alert-card.tone-warn { border-left-color: var(--warn); }
.alert-card.tone-bad  { border-left-color: var(--danger); }
.alert-card.tone-na   { border-left-color: var(--text-light); background: var(--surface); }
.alert-card .a-title { font-size: 13px; color: var(--text-primary); font-weight: 600; margin-bottom: 4px; }
.alert-card .a-value { font-size: 20px; font-weight: 500; line-height: 1.2; font-family: 'SF Mono', Menlo, monospace; }
.alert-card .a-sub   { font-size: 12px; color: var(--text-meta); margin-top: 4px; }
.alert-card .a-rows  { margin-top: 8px; font-size: 11px; }
.alert-card .a-rows .a-row { display: flex; justify-content: space-between; padding: 2px 0; }
.alert-card .a-rows .name { color: var(--text-meta); }
.alert-card .a-rows .val  { color: var(--text-primary); font-family: 'SF Mono', Menlo, monospace; }
.alert-card.tone-na .a-value { color: var(--text-light); font-style: italic; font-size: 13px; }

/* ── Today: status light + cash runway + sections ─────────────────── */
.today-banner {
  display: grid; gap: 16px; margin-bottom: 24px;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 22px;
}
.today-light {
  width: 56px; height: 56px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.today-light.tone-ok   { background: rgba(46,125,91,0.12); }
.today-light.tone-warn { background: rgba(184,134,11,0.12); }
.today-light.tone-bad  { background: rgba(160,48,48,0.12); }
.today-light.tone-unknown { background: var(--surface); }
.today-summary .headline { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.today-summary .headline.ok   { color: var(--ok); }
.today-summary .headline.warn { color: var(--warn); }
.today-summary .headline.bad  { color: var(--danger); }
.today-summary .sub { font-size: 12px; color: var(--text-meta); margin-top: 4px; }
.today-runway { text-align: right; }
.today-runway .r-label { font-size: 11px; color: var(--text-meta); text-transform: uppercase; letter-spacing: 0.04em; }
.today-runway .r-value { font-size: 22px; font-weight: 600; margin-top: 2px; }
.today-runway .r-value.ok   { color: var(--ok); }
.today-runway .r-value.warn { color: var(--warn); }
.today-runway .r-value.bad  { color: var(--danger); }
.today-runway .r-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-light); margin: 24px 0 10px;
}

/* Today: store table */
table.store-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
table.store-table th, table.store-table td {
  text-align: right; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
table.store-table th:first-child, table.store-table th:nth-child(2),
table.store-table td:first-child, table.store-table td:nth-child(2) {
  text-align: left;
}
table.store-table tr:last-child td { border-bottom: 0; }
table.store-table th {
  font-size: 11px; color: var(--text-meta); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--surface);
}
table.store-table .anom-ok   { color: var(--ok); }
table.store-table .anom-mid  { color: var(--warn); }
table.store-table .anom-bad  { color: var(--danger); }

/* Today: 6-domain grid */
.domain-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
}
.domain-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; text-align: center;
}
.domain-card.tone-ok   { border-left: 3px solid var(--ok); }
.domain-card.tone-warn { border-left: 3px solid var(--warn); }
.domain-card.tone-bad  { border-left: 3px solid var(--danger); }
.domain-card.tone-na   { border-left: 3px solid var(--text-light); background: var(--surface); }
.domain-card .d-icon { font-size: 24px; line-height: 1; }
.domain-card .d-name { font-size: 13px; font-weight: 600; margin-top: 4px; color: var(--text-primary); }
.domain-card .d-sub  { font-size: 11px; color: var(--text-meta); margin-top: 2px; }
.domain-card.tone-na .d-sub { font-style: italic; color: var(--text-light); }

/* Today: Action Plan empty / placeholder */
.action-plan {
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 18px 22px;
  color: var(--text-meta); font-size: 13px;
}
.action-plan strong { color: var(--text-primary); }

/* ── Skeleton (loading) ───────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -200px 0; }
  100% { background-position: calc(200px + 100%) 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface) 0px, #f0f0f0 40px, var(--surface) 80px);
  background-size: 200px 100%; background-repeat: no-repeat;
  animation: shimmer 1.2s linear infinite;
  border-radius: 4px; display: inline-block;
}
.skeleton.h-value { height: 32px; width: 60%; margin: 4px 0; }
.skeleton.h-line  { height: 12px; width: 100%; margin: 4px 0; }
.skeleton.h-row   { height: 28px; width: 100%; margin: 4px 0; }

/* ── Error + Retry ────────────────────────────────────────────────── */
.error-panel {
  background: #fdf3f3; border: 1px solid #f0c8c8;
  border-left: 4px solid var(--danger);
  border-radius: var(--radius); padding: 16px 20px;
  color: var(--danger); display: flex; align-items: center; gap: 16px;
}
.error-panel .msg { flex: 1; }
.error-panel .retry-btn {
  background: var(--danger); color: #fff; border: 0; border-radius: 6px;
  padding: 8px 14px; font-size: 13px;
}
.error-panel .retry-btn:hover { background: #842525; }

/* ── Helpers ──────────────────────────────────────────────────────── */
.hidden { display: none !important; }
.flex { display: flex; align-items: center; gap: 12px; }
.muted { color: var(--text-light); font-size: 12px; }
.tag-warn { background: #fff8e1; color: var(--warn); padding: 2px 8px; border-radius: 10px; font-size: 11px; }

/* dev byte-match badge */
.dev-badge {
  position: fixed; bottom: 12px; right: 12px;
  background: var(--brand); color: #fff; font-size: 11px;
  padding: 4px 10px; border-radius: 4px; opacity: 0.85;
  font-family: 'SF Mono', Menlo, monospace; z-index: 999;
}
.dev-badge.fail { background: var(--danger); }
</style>
</head>
<body>

<!-- ─── Login ─── -->
<div id="login">
  <form class="card" autocomplete="off" onsubmit="return doLogin(event)">
    <h1>Wiltek Portal <span class="brand-tag">V2</span></h1>
    <div class="sub">Sign in to continue</div>
    <label for="loginUser">Username</label>
    <input id="loginUser" type="text" autocapitalize="none" autocomplete="off" spellcheck="false" required>
    <label for="loginPw">Password</label>
    <input id="loginPw" type="password" autocomplete="current-password" required>
    <button type="submit" id="loginBtn">Sign in</button>
    <div class="err" id="loginErr">&nbsp;</div>
  </form>
</div>

<!-- ─── App shell ─── -->
<div id="app" aria-hidden="true">
  <header class="app-header">
    <div class="brand">
      <span class="logo">W</span>
      <span class="brand-name">Wiltek Portal</span>
      <span class="brand-tag">V2</span>
    </div>
    <div class="header-right">
      <div class="role-chip"><strong id="userName">—</strong> · <span id="userRole">—</span></div>
      <!-- Branch picker — options injected by populateBranchPicker().
           Wiltek has 13 stores (5 active + WLO + WCO/WEX/WL1 + W10/W11/W12).
           List built dynamically from API by_branch keys; metadata
           (name + category) comes from STORE_META. No hard-coded
           white-list per Notion 3610a2d3110081d89059df97099213a5 -->
      <select id="branchPicker" class="picker" title="Branch (owner only)">
        <option value="">All stores</option>
      </select>
      <select id="monthPicker" class="picker" title="Snapshot month"></select>
      <button class="logout-btn" type="button" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main class="app-main">
    <nav class="menu">
      <div class="menu-section">Dashboards</div>
      <a href="#" data-view="sales"     onclick="return onViewChange('sales')"><span class="icon">📊</span>Sales</a>
      <a href="#" data-view="inventory" onclick="return onViewChange('inventory')"><span class="icon">📦</span>Inventory</a>
      <a href="#" data-view="customers" onclick="return onViewChange('customers')"><span class="icon">👥</span>Customers</a>
      <a href="#" data-view="products"  onclick="return onViewChange('products')"><span class="icon">🏷️</span>Products</a>
      <a href="#" data-view="today"     onclick="return onViewChange('today')"><span class="icon">🏠</span>Today</a>
      <a href="#" data-view="finance"   onclick="return onViewChange('finance')"><span class="icon">💰</span>Finance<span class="stub">…</span></a>
    </nav>
    <section class="app-content" id="main"></section>
  </main>
</div>

<div id="devBadge" class="dev-badge hidden"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   Wiltek V2 — single source of truth.

   NO V1 残留:
     - 不用 window.SNAPSHOT / WP_SALES_LIVE / WP_DEADSTOCK / sbm
     - 不用 wpCache / localStorage cache (除 wp_session_v2)
     - 不用 refreshLiveData / fetchSalesLive / setSnapshot / rerenderActiveView
     - 不用 _kpiInflight flag (用 AbortController)
     - 不用 v18HydrateFromCache
═══════════════════════════════════════════════════════════════════ */

'use strict';

/* ── State (single source of truth) ─────────────────────────────── */
const state = {
  month:   '2026-04',
  branch:  null,        // null = all stores (owner only)
  view:    'sales',
  role:    'owner',     // 'owner' | 'manager' | 'warehouse'
  user:    null,        // { username, display_name, role, store }
  loading: false,
  error:   null,        // { message, retry: () => void }
  data:    null,
  // Bug 2 fix (2026-05-15): store list NOT hard-coded. Union of store codes
  // seen across loadView responses (by_branch keys). Picker rebuilt from this.
  knownStores: new Set(),
};

// STORE_META — descriptive metadata, NOT a gatekeeper / white-list.
// A store code not in this map still works: it shows with code as name
// and group='other'. Per Notion 3610a2d3110081d89059df97099213a5 the
// list of stores comes from data (sales / inventory_snapshots / floatation
// distinct values), not from this constant.
//   group order = pickup display order: active → warehouse → cust-order → closed
const STORE_META = {
  // Active retail (5)
  W01: { name: 'W01 · Pandan Indah',         group: 'active' },
  W02: { name: 'W02 · Ampang Waterfront',    group: 'active' },
  W03: { name: 'W03 · Wangsa Maju',          group: 'active' },
  W05: { name: 'W05 · Bangi Seksyen 7',      group: 'active' },
  W07: { name: 'W07 · Pandan Jaya',          group: 'active' },
  // Warehouse (1) — all POs flow through here
  WLO: { name: 'WLO · Warehouse',            group: 'warehouse' },
  // Customer-order holds (3) — inventory + some sales
  WCO: { name: 'WCO · Customer Order',       group: 'custord' },
  WEX: { name: 'WEX · Customer Order Extra', group: 'custord' },
  WL1: { name: 'WL1 · Customer Order L1',    group: 'custord' },
  // Closed historical (3) — still have sales history; Jym can still view
  W10: { name: 'W10 · (closed)',             group: 'closed' },
  W11: { name: 'W11 · (closed)',             group: 'closed' },
  W12: { name: 'W12 · (closed)',             group: 'closed' },
  // Reserved fallback name for any other code that appears in API by_branch
  // (e.g. WSR). Picker renders them under group='other'.
};
const STORE_GROUP_LABEL = {
  active:    'Active retail',
  warehouse: 'Warehouse',
  custord:   'Customer order',
  closed:    'Closed historical',
  other:     'Other',
};
const STORE_GROUP_ORDER = ['active', 'warehouse', 'custord', 'closed', 'other'];

/* Add codes from a response (by_branch keys / stores[].store) to knownStores.
   Returns true if anything new appeared. */
function harvestStores(view, data) {
  if (!data) return false;
  let added = 0;
  const add = (code) => {
    if (!code) return;
    const up = String(code).toUpperCase();
    if (!state.knownStores.has(up)) { state.knownStores.add(up); added++; }
  };
  // /api/kpi (sales / inventory / customers / products) → data.by_branch
  if (data.by_branch && typeof data.by_branch === 'object') {
    Object.keys(data.by_branch).forEach(add);
  }
  // /api/inventory_dashboard → kpis.{health,stockout,oem_vs_agency}.by_branch?
  // — these aggregates don't expose stores; only the sync side does.
  if (data.kpis && data.kpis.by_branch) Object.keys(data.kpis.by_branch).forEach(add);
  // /api/today → stores[].store
  if (Array.isArray(data.stores)) {
    data.stores.forEach(s => add(s && s.store));
  }
  // /api/products → no by_branch by default. Skip.
  return added > 0;
}

/* Build the branch <select> options grouped by category, preserving the
   current state.branch selection. Uses STORE_META for names + group; any
   code in knownStores without STORE_META entry falls under group='other'. */
function populateBranchPicker() {
  const sel = document.getElementById('branchPicker');
  if (!sel) return;
  // Union: every known store from API responses + every store in STORE_META
  // (so picker is populated immediately on boot before any fetch resolves).
  const all = new Set([...state.knownStores, ...Object.keys(STORE_META)]);
  if (!all.size) return;

  const buckets = {};
  STORE_GROUP_ORDER.forEach(g => buckets[g] = []);
  for (const code of all) {
    const meta = STORE_META[code] || { name: code, group: 'other' };
    (buckets[meta.group] || buckets.other).push({ code, name: meta.name });
  }
  for (const g of STORE_GROUP_ORDER) buckets[g].sort((a, b) => a.code.localeCompare(b.code));

  let html = '<option value="">All stores</option>';
  for (const g of STORE_GROUP_ORDER) {
    if (!buckets[g].length) continue;
    html += '<optgroup label="' + STORE_GROUP_LABEL[g] + '">';
    for (const s of buckets[g]) {
      html += '<option value="' + s.code + '">' + escapeHtml(s.name) + '</option>';
    }
    html += '</optgroup>';
  }
  // Preserve selection (state.branch); fall back to empty (all stores).
  const want = state.branch || '';
  sel.innerHTML = html;
  // The selected option may now live inside an <optgroup> — set value
  // explicitly so the browser shows the right label.
  sel.value = want;
  if (sel.value !== want) {
    // selection not in list — likely a manager whose store got hidden. Add it.
    const opt = document.createElement('option');
    opt.value = want; opt.textContent = want; opt.selected = true;
    sel.appendChild(opt);
  }
}

/* ── Constants ──────────────────────────────────────────────────── */
const ALLOWED_VIEWS = ['sales', 'inventory', 'customers', 'products', 'today', 'finance'];

/* Generate 28 months 2024-01..2026-04 — matches sales table range.
   When sync extends the table, append new months here. */
function buildMonthList() {
  const months = [];
  for (let y = 2024; y <= 2026; y++) {
    const maxM = (y === 2026) ? 4 : 12;
    for (let m = 1; m <= maxM; m++) {
      months.push(y + '-' + String(m).padStart(2, '0'));
    }
  }
  return months.reverse(); // newest first
}
const ALL_MONTHS = buildMonthList();

/* SQL truth for byte-match assertion (DEV mode).
   These come from Sprint 5 Stage 1 PR #30 byte-match verification. */
const BYTE_MATCH_TRUTH = {
  '2026-04': { sales: 425108.92, units: 2340, aov: 181.67 },
  '2026-03': { sales: 372608.31, units: 2236, aov: 167   },
  '2025-11': { sales: 410343.71, units: 2623, aov: 156   },
  '2024-11': { sales: 504012.13, units: 2965, aov: 170   },

/* ── Session (sessionStorage, V2-namespaced) ────────────────────── */
const SESSION_KEY = 'wp_session_v2';
function readSession() {
  try { const s = sessionStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; }
  catch (_) { return null; }
}
function writeSession(u) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch (_) {}
}
function clearSession() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
}

/* ── URL sync ───────────────────────────────────────────────────── */
function readUrlState() {
  const p = new URL(window.location.href).searchParams;
  const v = p.get('view');
  const m = p.get('month');
  const b = p.get('branch');
  return {
    view:   ALLOWED_VIEWS.includes(v) ? v : null,
    month:  /^\d{4}-(0[1-9]|1[0-2])$/.test(m || '') ? m : null,
    branch: b && /^[Ww][A-Za-z0-9]{1,3}$/.test(b) ? b.toUpperCase() : null,
  };
}
function syncUrl() {
  const u = new URL(window.location.href);
  u.searchParams.set('view', state.view);
  u.searchParams.set('month', state.month);
  if (state.branch) u.searchParams.set('branch', state.branch);
  else              u.searchParams.delete('branch');
  history.replaceState(null, '', u.toString());
}

/* ── Auth header (V2 trusted header — same as V1 /api/sales pattern) */
function authHeaders() {
  const u = state.user || readSession();
  return u && u.username ? { 'x-wp-user': u.username } : {};
}

/* ── Per-view fetchers (each returns the renderer's expected shape) ─ */
async function getJSON(url, signal) {
  const r = await fetch(url, { signal, cache: 'no-store', headers: authHeaders() });
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error('HTTP ' + r.status + ' ' + t.slice(0, 200));
  }
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'API returned ok:false');
  return j;
}

function kpiQuery() {
  const p = new URLSearchParams({ view: state.view, month: state.month });
  if (state.branch) p.set('branch', state.branch);
  return p.toString();
}
// monthBranchQuery — '?month=YYYY-MM[&branch=W0X]' for the non-/api/kpi
// endpoints (inventory_dashboard / products / today). Bug 3 fix
// (2026-05-15): threading state.branch through every fetcher so the
// owner branch picker scopes ALL views, not just Sales/Customers.
function monthBranchQuery() {
  const p = new URLSearchParams();
  if (state.month)  p.set('month', state.month);
  if (state.branch) p.set('branch', state.branch);
  const s = p.toString();
  return s ? '?' + s : '';
}
function monthQuery() {
  return state.month ? '?month=' + encodeURIComponent(state.month) : '';
}

async function fetchSales(signal) {
  const j = await getJSON('/api/kpi?' + kpiQuery(), signal);
  state.role = j.session_role || state.role;
  return j.data;
}
async function fetchCustomers(signal) {
  const j = await getJSON('/api/kpi?' + kpiQuery(), signal);
  state.role = j.session_role || state.role;
  return j.data;
}
async function fetchProducts(signal) {
  const j = await getJSON('/api/products' + monthBranchQuery(), signal);
  state.role = j.session_role || state.role;
  return j;
}
async function fetchToday(signal) {
  const j = await getJSON('/api/today' + monthBranchQuery(), signal);
  state.role = j.session_role || state.role;
  return j;
}
async function fetchInventory(signal) {
  // 2 calls in parallel — /api/inventory_dashboard KPIs + alerts.
  // Bug 3 fix (2026-05-15): branch threaded so owner picker scopes Inventory.
  const baseQ = new URLSearchParams();
  if (state.month)  baseQ.set('month', state.month);
  if (state.branch) baseQ.set('branch', state.branch);
  const base = baseQ.toString();
  const sep = base ? '&' : '';
  const [k, a] = await Promise.all([
    getJSON('/api/inventory_dashboard?' + base + sep + '_=k', signal),
    getJSON('/api/inventory_dashboard?' + base + sep + 'section=alerts', signal),
  ]);
  state.role = k.session_role || state.role;
  return { kpis: k, alerts: a };
}

const FETCHERS = {
  sales:     fetchSales,
  inventory: fetchInventory,
  customers: fetchCustomers,
  products:  fetchProducts,
  today:     fetchToday,
  finance:   null, // backlog: waits on multi-month financial sync
};

/* ── Single fetch (AbortController, no in-flight flag) ──────────── */
let activeFetch = null;

async function loadView() {
  if (activeFetch) { try { activeFetch.abort(); } catch (_) {} }
  activeFetch = new AbortController();
  const myCtl = activeFetch;

  state.loading = true;
  state.error = null;
  state.data = null;
  renderView();

  const fn = FETCHERS[state.view];
  if (!fn) {
    state.loading = false;
    renderView();
    return;
  }

  const t0 = performance.now();
  try {
    const data = await fn(myCtl.signal);
    if (myCtl.signal.aborted) return;
    state.data = data;
    state.loading = false;
    state.error = null;

    const dur = Math.round(performance.now() - t0);
    console.log('[V2] loadView ' + state.view + ' ' + state.month + (state.branch || '') + ' OK ' + dur + 'ms');
    // Bug 2 fix: pick up any new store codes from the response and refresh
    // the branch picker if anything was added. Picker stays sorted/grouped.
    if (harvestStores(state.view, data)) populateBranchPicker();
    runByteMatchAssertion();
    renderView();
  } catch (e) {
    if (e.name === 'AbortError' || myCtl.signal.aborted) {
      console.log('[V2] loadView aborted (superseded)');
      return;
    }
    state.error = { message: e.message || String(e), retry: () => loadView() };
    state.loading = false;
    state.data = null;
    console.error('[V2] loadView error:', e);
    renderView();
  }
}

/* ── DEV byte-match assertion ──────────────────────────────────── */
function runByteMatchAssertion() {
  if (state.view !== 'sales' || state.branch) return;
  const expect = BYTE_MATCH_TRUTH[state.month];
  if (!expect || !state.data) return;
  const got = {
    sales: round2(state.data.sales),
    units: state.data.units,
    aov:   round2(state.data.aov),
  };
  const ok = (got.sales === round2(expect.sales))
          && (got.units === expect.units)
          && (Math.abs(got.aov - expect.aov) < 1);
  const badge = document.getElementById('devBadge');
  if (badge) {
    badge.classList.remove('hidden', 'fail');
    if (ok) {
      badge.textContent = '✓ byte-match ' + state.month;
    } else {
      badge.classList.add('fail');
      badge.textContent = '✗ byte-match ' + state.month + ' got ' + got.sales + '/' + got.units;
    }
  }
  if (ok) {
    console.log('%c[V2 byte-match] ' + state.month + ' PASS', 'color:#2E7D5B;font-weight:600', got);
  } else {
    console.warn('[V2 byte-match] ' + state.month + ' FAIL — expected', expect, 'got', got);
  }
}

/* ── Single render entry ────────────────────────────────────────── */
function renderView() {
  // sidebar active state
  document.querySelectorAll('nav.menu a[data-view]').forEach(a => {
    a.classList.toggle('active', a.getAttribute('data-view') === state.view);
  });
  // branch picker visible only for owner
  const bp = document.getElementById('branchPicker');
  if (bp) {
    bp.value = state.branch || '';
    bp.disabled = (state.role !== 'owner');
  }
  // month picker keeps state in sync
  const mp = document.getElementById('monthPicker');
  if (mp && mp.value !== state.month) mp.value = state.month;

  const renderers = {
    sales:     renderSales,
    inventory: renderInventory,
    customers: renderCustomers,
    products:  renderProducts,
    today:     renderToday,
    finance:   renderStubView,
  };
  const main = document.getElementById('main');
  if (!main) return;

  if (state.error) {
    main.innerHTML = renderError(state.error);
    // wire retry
    const btn = main.querySelector('.retry-btn');
    if (btn) btn.onclick = () => { if (state.error) state.error.retry(); };
    return;
  }

  main.innerHTML = (renderers[state.view] || renderStubView)(state);
}

/* ── User actions ───────────────────────────────────────────────── */
function onMonthChange(ym) {
  if (!ym || ym === state.month) return;
  state.month = ym;
  syncUrl();
  loadView();
}
function onViewChange(v) {
  if (!ALLOWED_VIEWS.includes(v) || v === state.view) return false;
  state.view = v;
  syncUrl();
  loadView();
  return false; // anchor onclick swallow
}
function onBranchChange(b) {
  const next = b || null;
  if (next === state.branch) return;
  state.branch = next;
  syncUrl();
  loadView();
}

/* ── Formatters ─────────────────────────────────────────────────── */
function round2(n) { return Math.round(Number(n) * 100) / 100; }
function fmtRM(n) {
  if (n == null || isNaN(n)) return '—';
  return 'RM ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtRMpr(n) {
  if (n == null || isNaN(n)) return '—';
  return 'RM ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US');
}
function fmtPct(n, digits = 1) {
  if (n == null || isNaN(n)) return '—';
  return (Number(n) * 100).toFixed(digits) + '%';
}
function deltaPct(curr, base) {
  if (curr == null || base == null || base === 0) return null;
  return (curr - base) / base;
}
function deltaCell(curr, base, label, formatter) {
  const fmt = formatter || fmtRM;
  if (base == null || base === 0) {
    return '<div class="row"><span>' + label + '</span><span class="delta-flat">— no data</span></div>';
  }
  const pct = deltaPct(curr, base);
  const arrow = pct > 0.005 ? '↑' : (pct < -0.005 ? '↓' : '→');
  const cls   = pct > 0.005 ? 'delta-pos' : (pct < -0.005 ? 'delta-neg' : 'delta-flat');
  return '<div class="row"><span>' + label + ' ' + fmt(base) + '</span>'
       + '<span class="' + cls + '">' + arrow + ' ' + (pct * 100).toFixed(1) + '%</span></div>';
}
function ymLastMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  if (m === 1) return (y - 1) + '-12';
  return y + '-' + String(m - 1).padStart(2, '0');
}
function ymLastYear(ym) {
  const [y, m] = ym.split('-').map(Number);
  return (y - 1) + '-' + String(m).padStart(2, '0');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · SALES (Stage A)
   5 张卡 per Notion 设计 (2026-05-12 修正):
     1. 本月销售 vs 目标
     2. 单数 + AOV
     3. 今日销售 + 5 店分布   ← /api/kpi 只给月, 暂占位 (Stage B/C 补 daily endpoint)
     4. 本周进度 vs 周目标     ← 同上占位
     5. 5 店月进度对照表
═══════════════════════════════════════════════════════════════════ */
function renderSales(s) {
  const title = '<h1 class="page-title">Sales</h1>'
              + '<p class="page-sub">'
              +   'Snapshot ' + s.month
              +   (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · All stores')
              +   ' · KPI vs last-month / last-year / 6-month avg'
              + '</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="cards-grid">'
      +   skeletonCard('Sales vs target')
      +   skeletonCard('Invoices · AOV')
      +   skeletonCard('Today · 5 stores')
      +   skeletonCard('Week-to-date')
      +   '<div class="card wide"><div class="label">5-store progress</div><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>'
      + '</div>';
  }

  const d = s.data;
  const target = (d.last_month_sales != null) ? d.last_month_sales * 1.05 : null;
  const progressPct = (target && target > 0) ? (d.sales / target) : null;
  const ymPrev = ymLastMonth(s.month);
  const ymPrevYr = ymLastYear(s.month);

  // Card 1 — Sales vs target
  const c1 = ''
    + '<div class="card">'
    +   '<div class="label">📈 Sales vs target</div>'
    +   '<div class="value num">' + fmtRM(d.sales) + '</div>'
    +   '<div class="month-tag">in ' + s.month + (s.branch ? ' · ' + s.branch : '') + '</div>'
    +   (target != null ? (
          '<div class="progress-bar"><div class="progress-fill ' + ((progressPct||0) >= 1 ? 'over' : (progressPct < 0.85 ? 'under' : '')) + '" style="width:' + Math.min(100, (progressPct || 0) * 100) + '%"></div></div>'
        + '<div class="progress-meta"><span>vs implied target ' + fmtRM(target) + '</span><span>' + fmtPct(progressPct) + '</span></div>'
        + '<div class="muted" style="font-size:10px;margin-top:4px">target = last-month × 1.05 (no GTD yet)</div>'
        ) : '')
    +   '<div class="compare">'
    +     deltaCell(d.sales, d.last_month_sales,  'vs ' + ymPrev,    fmtRM)
    +     deltaCell(d.sales, d.last_year_sales,   'vs ' + ymPrevYr,  fmtRM)
    +     deltaCell(d.sales, d.six_m_avg_sales,   'vs 6-mo avg',     fmtRM)
    +   '</div>'
    + '</div>';

  // Card 2 — Invoices + AOV
  const c2 = ''
    + '<div class="card">'
    +   '<div class="label">🧾 Invoices · AOV</div>'
    +   '<div class="value num">' + fmtInt(d.invoices) + ' <span class="unit">invoices</span></div>'
    +   '<div class="month-tag">' + fmtInt(d.units) + ' units sold · AOV ' + fmtRMpr(d.aov) + '</div>'
    +   '<div class="compare">'
    +     deltaCell(d.units, d.last_month_units, 'units vs ' + ymPrev,   fmtInt)
    +     deltaCell(d.units, d.last_year_units,  'units vs ' + ymPrevYr, fmtInt)
    +     deltaCell(d.units, d.six_m_avg_units,  'units vs 6-mo avg',    fmtInt)
    +   '</div>'
    + '</div>';

  // Card 3 — Today + 5 stores (placeholder, no daily endpoint yet)
  const c3 = ''
    + '<div class="card placeholder">'
    +   '<div class="label">🌅 Today · 5 stores</div>'
    +   '<div class="value">Daily endpoint pending</div>'
    +   '<div class="month-tag">Stage A: /api/kpi only returns monthly aggregates.<br>Stage B/C will add /api/today daily breakdown.</div>'
    + '</div>';

  // Card 4 — WTD (placeholder)
  const c4 = ''
    + '<div class="card placeholder">'
    +   '<div class="label">📅 Week-to-date vs weekly target</div>'
    +   '<div class="value">Weekly endpoint pending</div>'
    +   '<div class="month-tag">Stage B will compute WTD from daily sales + (monthly_target ÷ 4).</div>'
    + '</div>';

  // Card 5 — 5-store table (wide)
  const c5 = renderBranchTable(d);

  return title + '<div class="cards-grid">' + c1 + c2 + c3 + c4 + c5 + '</div>';
}

function renderBranchTable(d) {
  const ALL_BRANCHES = ['W01','W02','W03','W05','W07','W11','WCO'];
  const byBranch = d.by_branch || {};
  const totalSales = d.sales || 0;

  // Use last-month total × 1.05 as implied company target, then distribute by share
  // of branch in current month. (Per Notion: "no real GTD yet, last-month × 1.05".)
  const implTargetCompany = (d.last_month_sales || 0) * 1.05;

  const rows = ALL_BRANCHES.map(b => {
    const row = byBranch[b];
    if (!row) return null;
    const share = totalSales > 0 ? (row.sales / totalSales) : 0;
    const targetForBranch = implTargetCompany * share || 0;
    const progress = targetForBranch > 0 ? (row.sales / targetForBranch) : null;
    const progressClass = progress == null ? 'delta-flat'
                        : (progress >= 1 ? 'delta-pos'
                        : (progress < 0.85 ? 'delta-neg' : 'delta-flat'));
    const barWidth = Math.min(100, (progress || 0) * 100);
    return ''
      + '<tr>'
      +   '<td><strong>' + b + '</strong></td>'
      +   '<td class="num">' + fmtRM(row.sales) + '</td>'
      +   '<td class="num">' + fmtInt(row.invoices) + '</td>'
      +   '<td class="num">' + fmtInt(row.units) + '</td>'
      +   '<td class="num">' + fmtInt(row.distinct_customers) + '</td>'
      +   '<td class="num">' + fmtRM(targetForBranch) + '</td>'
      +   '<td class="progress-cell"><span class="mini-bar"><span class="mini-bar-fill" style="width:' + barWidth + '%"></span></span><span class="' + progressClass + '">' + (progress != null ? fmtPct(progress) : '—') + '</span></td>'
      + '</tr>';
  }).filter(Boolean).join('');

  const totalRow = ''
    + '<tr class="total-row">'
    +   '<td>Total</td>'
    +   '<td class="num">' + fmtRM(d.sales) + '</td>'
    +   '<td class="num">' + fmtInt(d.invoices) + '</td>'
    +   '<td class="num">' + fmtInt(d.units) + '</td>'
    +   '<td class="num">' + fmtInt(d.distinct_customers) + '</td>'
    +   '<td class="num">' + fmtRM(implTargetCompany) + '</td>'
    +   '<td class="progress-cell">' + (implTargetCompany > 0 ? fmtPct(d.sales / implTargetCompany) : '—') + '</td>'
    + '</tr>';

  return ''
    + '<div class="card wide">'
    +   '<div class="label">🏪 5-store monthly progress</div>'
    +   '<table class="branch-table">'
    +     '<thead><tr>'
    +       '<th>Store</th>'
    +       '<th>Sales</th>'
    +       '<th>Invoices</th>'
    +       '<th>Units</th>'
    +       '<th>Customers</th>'
    +       '<th>Implied target</th>'
    +       '<th>Progress</th>'
    +     '</tr></thead>'
    +     '<tbody>' + rows + totalRow + '</tbody>'
    +   '</table>'
    +   '<div class="muted" style="margin-top:8px;font-size:11px">'
    +     'Implied target = last-month company total × 1.05, distributed by this month\'s branch share. Real GTD planned Sprint 6.'
    +   '</div>'
    + '</div>';
}

/* ── Shared helpers for KPI cards with sub-rows ───────────────── */
function fmtMoneyShort(n) {
  if (n == null || isNaN(n)) return '—';
  const v = +n;
  if (Math.abs(v) >= 1e6) return 'RM ' + (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return 'RM ' + (v / 1e3).toFixed(0) + 'k';
  return 'RM ' + v.toFixed(0);
}
function fmtPctSign(n, digits) {
  if (n == null || isNaN(n)) return '—';
  digits = digits == null ? 1 : digits;
  return (+n).toFixed(digits) + '%';
}
function momBadge(amt, pct) {
  if (amt == null) return '';
  const dir = amt > 0 ? 'pos' : (amt < 0 ? 'neg' : 'flat');
  const sign = amt > 0 ? '↑' : (amt < 0 ? '↓' : '→');
  const pctStr = pct == null ? '—' : Math.abs(pct).toFixed(1) + '%';
  return ' <span class="' + dir + '">' + sign + ' ' + pctStr + '</span>';
}
function kpiRow(name, val) {
  return '<div class="kpi-row"><span class="name">' + name + '</span><span class="val">' + val + '</span></div>';
}
function kpiCard(label, value, sub, rows, asOf, valueClass) {
  return ''
    + '<div class="card">'
    +   '<div class="label">' + label + '</div>'
    +   '<div class="value num' + (valueClass ? ' ' + valueClass : '') + '">' + value + '</div>'
    +   (sub ? '<div class="month-tag">' + sub + '</div>' : '')
    +   (rows ? '<div class="kpi-rows">' + rows + '</div>' : '')
    +   (asOf ? '<div class="as-of">' + asOf + '</div>' : '')
    + '</div>';
}
function alertCard(title, value, sub, tone, rows) {
  const t = tone || 'na';
  return ''
    + '<div class="alert-card tone-' + t + '">'
    +   '<div class="a-title">' + title + '</div>'
    +   '<div class="a-value">' + (value || (t === 'na' ? 'pending' : '—')) + '</div>'
    +   (sub ? '<div class="a-sub">' + sub + '</div>' : '')
    +   (rows ? '<div class="a-rows">' + rows + '</div>' : '')
    + '</div>';
}
function aRow(name, val) {
  return '<div class="a-row"><span class="name">' + name + '</span><span class="val">' + val + '</span></div>';
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · INVENTORY  (Stage B)
   8 cards = 4 KPI (health/order_gap/stockout/oem-vs-agency)
            + 4 alerts (po_calendar/transfer/liquidation/po_anomalies).
   Data: /api/inventory_dashboard (kpis + alerts in parallel).
   byte-match V1 Stage 3 + Stage 4 — same endpoint, same numbers.
═══════════════════════════════════════════════════════════════════ */
function renderInventory(s) {
  const title = '<h1 class="page-title">Inventory</h1>'
              + '<p class="page-sub">Snapshot ' + s.month
              + (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · Company-wide')
              + ' · 4 KPI + 4 alerts · /api/inventory_dashboard</p>';

  if (s.loading || !s.data) {
    return title + '<div class="cards-grid">'
      + skeletonCard('① Inventory health')
      + skeletonCard('② Order gap')
      + skeletonCard('③ Stockout risk')
      + skeletonCard('④ OEM vs Agency')
      + '</div>'
      + '<div class="section-title">Action alerts</div>'
      + '<div class="cards-grid">'
      + skeletonCard('① OEM PO calendar')
      + skeletonCard('② Transfer engine')
      + skeletonCard('③ Liquidation')
      + skeletonCard('④ PO anomalies')
      + '</div>';
  }

  const k = s.data.kpis || {};
  const a = s.data.alerts || {};
  const asOf = k.snapshot_date ? 'snapshot ' + k.snapshot_date : '';
  const ymPrev = k.ym_prev || '—';

  // ── KPI 1: Inventory health (5-class breakdown + MoM) ─────────
  const h = k.health || {};
  const hClasses = h.classes || {};
  const order = ['Active', 'Slow', 'Misplaced', 'Dead', 'Discontinued'];
  const hRows = order.map(cls => {
    const r = hClasses[cls] || { amount: 0, pct: 0, mom_amount: 0, mom_pct: null };
    return kpiRow(cls,
      fmtMoneyShort(r.amount) + ' (' + fmtPctSign(r.pct) + ')' + momBadge(r.mom_amount, r.mom_pct));
  }).join('');
  const deadAmt = ((hClasses.Dead && hClasses.Dead.amount) || 0) + ((hClasses.Discontinued && hClasses.Discontinued.amount) || 0);
  const deadPct = h.total_stock ? (deadAmt / h.total_stock * 100) : 0;
  const k1Class = deadPct > 30 ? 'danger' : deadPct > 20 ? 'warn' : '';
  const c1 = kpiCard('① Inventory health',
    fmtMoneyShort(h.total_stock || 0),
    '5-class distribution (MoM vs ' + ymPrev + ')',
    hRows, asOf, k1Class);

  // ── KPI 2: Order gap (PO vs Sales consumed) ───────────────────
  const og = k.order_gap || {};
  const gapNum = +(og.gap || 0);
  const gapStr = (gapNum >= 0 ? '+' : '-') + fmtMoneyShort(Math.abs(gapNum));
  const gapClass = gapNum < 0 ? 'danger' : 'ok';
  const abcd = og.abcd_distribution || {};
  const abcdStr = ['A', 'B', 'C', 'D'].map(g => g + '=' + (abcd[g] || 0)).join(' / ');
  const c2 = kpiCard('② Order gap (' + (k.ym_curr || '—') + ')',
    gapStr,
    'PO ' + fmtMoneyShort(og.po_curr_amt) + ' · Sales ' + fmtMoneyShort(og.sales_consumed_curr),
    kpiRow('Next-month projection', fmtMoneyShort(og.next_month_projection)) +
    kpiRow('ABCD distribution', abcdStr),
    'baseline: last-month sales × 1.05',
    gapClass);

  // ── KPI 3: Stockout SKU alert (OEM/Agency split) ──────────────
  const so = k.stockout || {};
  const oemSo = so.OEM || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 51 };
  const agcSo = so.Agency || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 8 };
  const soTotal = (oemSo.already_out || 0) + (agcSo.already_out || 0);
  const soClass = soTotal > 0 ? 'danger' : '';
  const c3 = kpiCard('③ Stockout SKU alert',
    soTotal + ' SKU out',
    'split by source · lead-time differs OEM/Agency',
    kpiRow('OEM (China · ' + oemSo.lead_days + 'd)',
      oemSo.already_out + ' out / ' + oemSo.at_risk_14d + ' 14d / ' + oemSo.at_risk_30d + ' 30d') +
    kpiRow('Agency (MY · ' + agcSo.lead_days + 'd)',
      agcSo.already_out + ' out / ' + agcSo.at_risk_14d + ' 14d / ' + agcSo.at_risk_30d + ' 30d'),
    asOf, soClass);

  // ── KPI 4: OEM vs Agency ──────────────────────────────────────
  const ova = k.oem_vs_agency || {};
  const oem = ova.OEM || {};
  const agc = ova.Agency || {};
  const totVal = (oem.stock_value || 0) + (agc.stock_value || 0);
  const c4 = kpiCard('④ OEM vs Agency',
    fmtMoneyShort(totVal),
    'Stock value + dead-rate by source',
    kpiRow('OEM stock', fmtMoneyShort(oem.stock_value) + ' · dead ' + fmtPctSign(oem.dead_rate_pct)) +
    kpiRow('Agency stock', fmtMoneyShort(agc.stock_value) + ' · dead ' + fmtPctSign(agc.dead_rate_pct)) +
    kpiRow('Lead time', 'OEM ' + (oem.lead_days || 51) + 'd · Agency ' + (agc.lead_days || 8) + 'd'),
    'hard-coded lead · per-SKU pending po_grn multi-mo history');

  // ── Alert 1: OEM PO calendar ──────────────────────────────────
  const po = a.po_calendar || {};
  const poRows = (po.by_eta_month || []).slice(0, 4).map(m =>
    aRow(escapeHtml(m.eta_ym) + ' (' + escapeHtml(m.source || '—') + ')',
      (m.open_pos || 0) + ' POs · ' + fmtMoneyShort(m.po_amt))
  ).join('') || aRow('No open POs', '');
  const a1Tone = (po.open_total || 0) > 0 ? 'warn' : 'ok';
  const al1 = alertCard('① OEM PO calendar',
    (po.open_total || 0) + ' open',
    fmtMoneyShort(po.open_amt) + ' in-transit · lead OEM=51d / Agency=8d',
    a1Tone, poRows);

  // ── Alert 2: Transfer engine (Misplaced) ──────────────────────
  const xfer = a.transfer_engine || {};
  const xferRows = (xfer.top20 || []).slice(0, 5).map(t =>
    aRow(escapeHtml(t.item_code) + ' ' + t.from_store + '→' + t.to_store,
      (t.transfer_qty_est || 0) + ' pcs · ' + fmtMoneyShort(t.transfer_value_est))
  ).join('') || aRow('No transfer opportunities', '');
  const a2Tone = (xfer.total_opportunities || 0) > 0 ? 'ok' : 'na';
  const al2 = alertCard('② Transfer engine (Misplaced)',
    (xfer.total_opportunities || 0) + ' opps',
    'Release est. ' + fmtMoneyShort(xfer.total_value_est) + ' · top 5 ↓',
    a2Tone, xferRows);

  // ── Alert 3: Liquidation ──────────────────────────────────────
  const liq = a.liquidation || {};
  const tier = liq.by_tier || {};
  const tier365 = tier.tier_365_plus || { n: 0, amt: 0 };
  const tier180 = tier.tier_180_365 || { n: 0 };
  const tier90 = tier.tier_90_180 || { n: 0 };
  const a3Tone = (liq.total_locked_value || 0) > 100000 ? 'bad'
              : (liq.total_locked_value || 0) > 10000  ? 'warn' : 'ok';
  const al3 = alertCard('③ Liquidation candidates (Dead/Disc)',
    (liq.total_candidates || 0) + ' SKU',
    'Capital locked ' + fmtMoneyShort(liq.total_locked_value),
    a3Tone,
    aRow('365d+', tier365.n + ' (' + fmtMoneyShort(tier365.amt) + ')') +
    aRow('180-365d', tier180.n + '') +
    aRow('90-180d', tier90.n + '') +
    aRow('Discount rec.', '365d+ 50% · 180-365 25% · 90-180 10%'));

  // ── Alert 4: PO anomalies ─────────────────────────────────────
  const anom = a.po_anomalies || {};
  const overd = anom.overdue_po || { count: 0 };
  const deficit = anom.grn_deficit || { count: 0 };
  const drift = anom.price_drift || { count: 0 };
  const anomTotal = (overd.count || 0) + (deficit.count || 0) + (drift.count || 0);
  const a4Tone = anomTotal > 0 ? 'warn' : 'ok';
  const al4 = alertCard('④ Purchase anomalies',
    anomTotal + ' issues',
    null, a4Tone,
    aRow('Overdue PO (>60d)', overd.count || 0) +
    aRow('GRN < PO', deficit.count || 0) +
    aRow('Unit price drift >20%', drift.count || 0));

  return title
    + '<div class="cards-grid">' + c1 + c2 + c3 + c4 + '</div>'
    + '<div class="section-title">Action alerts · ' + (a.snapshot_date || asOf) + '</div>'
    + '<div class="cards-grid">' + al1 + al2 + al3 + al4 + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TODAY  (Stage B — 4-layer briefing)
   Layer 1: status light + Cash Runway
   Layer 2: Action Plan (placeholder until Stage C cross-view integration)
   Layer 3: 5-store snapshot table (mtd_amount / closing_rate / walk-in / basket)
   Layer 4: 6-domain health grid (placeholder — needs cross-view aggregation)
   Data: /api/today (status + stores).
═══════════════════════════════════════════════════════════════════ */
function renderToday(s) {
  const title = '<h1 class="page-title">Today</h1>'
              + '<p class="page-sub">Snapshot ' + s.month + ' · 4-layer briefing · /api/today</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="today-banner"><div class="today-light tone-unknown">…</div>'
      + '<div class="today-summary"><div class="skeleton h-line"></div><div class="skeleton h-line"></div></div>'
      + '<div class="today-runway"><div class="skeleton h-value"></div></div></div>'
      + '<div class="section-title">5-store snapshot</div>'
      + '<div class="card"><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>';
  }

  const j = s.data;
  const st = j.status || {};
  const stores = Array.isArray(j.stores) ? j.stores : [];
  const lightCls = st.light || 'unknown';
  const missing = Array.isArray(st.data_missing) ? st.data_missing : [];

  // ── Layer 1: Status light + Cash Runway ──────────────────────────
  const lightIcon = { ok: '🟢', warn: '🟡', bad: '🔴', unknown: '⚪' }[lightCls] || '⚪';
  const headlineMap = {
    ok:     ['Wiltek today: healthy', 'ok'],
    warn:   ['Wiltek today: heads up', 'warn'],
    bad:    ['Wiltek today: critical', 'bad'],
    unknown:['Wiltek today: data partial', ''],
  };
  const [headline, headlineCls] = headlineMap[lightCls] || headlineMap.unknown;
  const summarySub = missing.length
    ? 'Missing data: ' + missing.map(escapeHtml).join(', ')
    : 'All sources synced · status from /api/today';

  let runwayVal = 'pending', runwaySub = 'FMM cash data not yet loaded', runwayCls = '';
  if (st.cash_runway_months != null) {
    const m = +st.cash_runway_months;
    runwayVal = m.toFixed(1) + ' months';
    runwayCls = m > 6 ? 'ok' : m > 3 ? 'warn' : 'bad';
    runwaySub = 'Cash ' + fmtMoneyShort(st.cash_total) +
      (st.financial_balance_sheet_as_of ? ' · as of ' + st.financial_balance_sheet_as_of.slice(0, 10) : '');
  } else if (st.cash_total != null) {
    runwayVal = fmtMoneyShort(st.cash_total);
    runwaySub = 'Cash on hand · monthly burn pending';
  }

  const banner = ''
    + '<div class="today-banner">'
    +   '<div class="today-light tone-' + lightCls + '">' + lightIcon + '</div>'
    +   '<div class="today-summary">'
    +     '<div class="headline ' + headlineCls + '">' + headline + '</div>'
    +     '<div class="sub">' + summarySub + '</div>'
    +   '</div>'
    +   '<div class="today-runway">'
    +     '<div class="r-label">Cash runway</div>'
    +     '<div class="r-value ' + runwayCls + '">' + runwayVal + '</div>'
    +     '<div class="r-sub">' + runwaySub + '</div>'
    +   '</div>'
    + '</div>';

  // ── Layer 2: Action Plan (placeholder — needs cross-view aggregation) ─
  const actionPlan = ''
    + '<div class="section-title">Action Plan · top 3 today</div>'
    + '<div class="action-plan">'
    +   '<strong>Stage C feature.</strong> '
    +   'Action Plan derives the top 3 actions today from cross-view aggregation '
    +   '(receivables aging · stockout list · slow-mover spikes · ABCD migrations · churn risk). '
    +   'Each card needs problem + impact + jump-link. '
    +   'Skeleton lives here once the cross-view selector lands.'
    + '</div>';

  // ── Layer 3: 5-store snapshot ────────────────────────────────────
  const sortedStores = stores.slice().sort((a, b) => (a.store || '').localeCompare(b.store || ''));
  let storeRows = sortedStores.map(b => {
    const cr = b.closing_rate != null ? (+b.closing_rate).toFixed(1) + '%' : '—';
    const walk = b.walk_in_total != null ? fmtInt(b.walk_in_total) : '—';
    const basket = b.basket_estimate != null ? fmtRM(b.basket_estimate) : '—';
    const mtd = b.mtd_amount != null ? fmtRM(b.mtd_amount) : '—';
    const inv = b.mtd_invoices != null ? fmtInt(b.mtd_invoices) : '—';
    const anomCls = (b.closing_rate != null && b.closing_rate < 25) ? 'anom-bad'
                  : (b.closing_rate != null && b.closing_rate < 50) ? 'anom-mid' : 'anom-ok';
    const anomLbl = (b.closing_rate != null && b.closing_rate < 25) ? '🔴 low CR'
                  : (b.closing_rate != null && b.closing_rate < 50) ? '🟡 CR' : '✓';
    return '<tr>'
      + '<td><strong>' + escapeHtml(b.store || '') + '</strong></td>'
      + '<td>' + escapeHtml(b.name || '') + '</td>'
      + '<td class="num">' + mtd + '</td>'
      + '<td class="num">' + inv + '</td>'
      + '<td class="num">' + walk + '</td>'
      + '<td class="num">' + cr + '</td>'
      + '<td class="num">' + basket + '</td>'
      + '<td class="' + anomCls + '">' + anomLbl + '</td>'
      + '</tr>';
  }).join('');
  if (!storeRows) storeRows = '<tr><td colspan="8" class="muted" style="text-align:center;padding:14px">No store data in /api/today response</td></tr>';

  const storeTable = ''
    + '<div class="section-title">5-store snapshot · ' + s.month + (stores[0]?.floatation_as_of ? ' · floatation ' + stores[0].floatation_as_of : '') + '</div>'
    + '<table class="store-table">'
    +   '<thead><tr>'
    +     '<th>Store</th><th>Name</th>'
    +     '<th>MTD sales</th><th>Invoices</th>'
    +     '<th>Walk-in</th><th>Closing rate</th><th>Basket est.</th>'
    +     '<th>Anom</th>'
    +   '</tr></thead>'
    +   '<tbody>' + storeRows + '</tbody>'
    + '</table>';

  // ── Layer 4: 6-domain health (placeholder) ─────────────────────
  const domains = [
    { key: 'sales',     icon: '📊', name: 'Sales',     status: 'unknown', sub: 'Stage C: pull from /api/kpi sales' },
    { key: 'inventory', icon: '📦', name: 'Inventory', status: 'unknown', sub: 'Stage C: dead% from /api/inventory_dashboard' },
    { key: 'customers', icon: '👥', name: 'Customers', status: 'unknown', sub: 'Stage C: member churn from /api/kpi customers' },
    { key: 'products',  icon: '🏷️', name: 'Products',  status: 'unknown', sub: 'Stage C: ABCD migrations from /api/products' },
    { key: 'finance',   icon: '💰', name: 'Finance',   status: 'unknown', sub: 'Stage C: GP% from /api/today.status' },
    { key: 'hr',        icon: '👷', name: 'HR',        status: 'unknown', sub: 'Backlog: HR payroll sync pending' },
  ];
  const domainGrid = ''
    + '<div class="section-title">6-domain health (placeholder · Stage C)</div>'
    + '<div class="domain-grid">'
    +   domains.map(d => ''
        + '<div class="domain-card tone-na">'
        +   '<div class="d-icon">' + d.icon + '</div>'
        +   '<div class="d-name">' + d.name + '</div>'
        +   '<div class="d-sub">' + d.sub + '</div>'
        + '</div>').join('')
    + '</div>';

  return title + banner + actionPlan + storeTable + domainGrid;
}

/* ── Stub view (Finance) ─────────────────────────────────────────── */
function renderStubView(s) {
  return ''
    + '<h1 class="page-title">' + viewTitle(s.view) + '</h1>'
    + '<p class="page-sub">' + s.month + (s.branch ? ' · ' + s.branch : ' · All stores') + '</p>'
    + '<div class="error-panel" style="background:var(--surface);color:var(--text-meta);border-color:var(--border);border-left-color:var(--warn-soft)">'
    +   '<div class="msg"><strong>Stage A only ships Sales.</strong><br>'
    +     '<span class="muted">' + viewTitle(s.view) + ' lands in Stage B (Inventory/Customers/Products) or Stage C (Today). Finance waits on multi-month financial_monthly sync.</span></div>'
    + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   Login flow — talks to /api/login (same endpoint V1 uses)
═══════════════════════════════════════════════════════════════════ */
async function doLogin(ev) {
  ev.preventDefault();
  const userEl = document.getElementById('loginUser');
  const pwEl   = document.getElementById('loginPw');
  const errEl  = document.getElementById('loginErr');
  const btnEl  = document.getElementById('loginBtn');
  const username = (userEl.value || '').trim().toLowerCase();
  const password = pwEl.value || '';
  if (!username || !password) { errEl.textContent = 'Username and password required.'; return false; }

  errEl.textContent = '';
  btnEl.disabled = true; btnEl.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ username, password }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok || !j.user) {
      errEl.textContent = (j && j.error === 'inactive')
        ? 'Account inactive — contact admin.'
        : 'Invalid username or password.';
      return false;
    }
    state.user = {
      username:     j.user.username,
      display_name: j.user.display_name || j.user.username,
      role:         j.user.role,
      store:        j.user.store,
    };
    state.role = (j.user.role === 'owner') ? 'owner'
              : (/_mgr$/.test(j.user.role) ? 'manager' : (j.user.role || 'manager'));
    if (state.role !== 'owner' && j.user.store) state.branch = j.user.store;
    writeSession(state.user);
    enterApp();
    return false;
  } catch (e) {
    console.error('[V2] login error:', e);
    errEl.textContent = 'Network error — retry.';
    return false;
  } finally {
    btnEl.disabled = false; btnEl.textContent = 'Sign in';
  }
}

function doLogout() {
  clearSession();
  state.user = null;
  document.getElementById('app').classList.remove('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'true');
  document.getElementById('login').style.display = 'flex';
}

function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'false');
  document.getElementById('userName').textContent = state.user.display_name;
  document.getElementById('userRole').textContent = state.user.role;
  // hide branch picker for non-owners
  document.getElementById('branchPicker').style.display = (state.role === 'owner') ? '' : 'none';
  populateMonthPicker();
  // Bug 2 fix: populate branch picker immediately (from STORE_META + any
  // seeded codes) so it's visible before the first fetch resolves.
  populateBranchPicker();
  syncUrl();
  loadView();
}

/* ── Month picker ───────────────────────────────────────────────── */
function populateMonthPicker() {
  const sel = document.getElementById('monthPicker');
  if (!sel) return;
  sel.innerHTML = ALL_MONTHS.map(m => '<option value="' + m + '">' + m + '</option>').join('');
  if (!ALL_MONTHS.includes(state.month)) state.month = ALL_MONTHS[0];
  sel.value = state.month;
  sel.onchange = () => onMonthChange(sel.value);
}

/* ── Boot ──────────────────────────────────────────────────────── */
function boot() {
  // Wire branch picker
  const bp = document.getElementById('branchPicker');
  if (bp) bp.onchange = () => onBranchChange(bp.value);

  // Hydrate state from URL (overrides defaults)
  const u = readUrlState();
  if (u.view)   state.view   = u.view;
  if (u.month)  state.month  = u.month;
  if (u.branch) state.branch = u.branch;

  // Resume session if present
  const sess = readSession();
  if (sess && sess.username) {
    state.user = sess;
    state.role = (sess.role === 'owner') ? 'owner'
              : (/_mgr$/.test(sess.role || '') ? 'manager' : (sess.role || 'manager'));
    if (state.role !== 'owner' && sess.store) state.branch = sess.store;
    enterApp();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
