<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Wiltek Portal V2</title>
<style>
/* ═══════════════════════════════════════════════════════════════════
   Wiltek V2 — Stage A
   Single state object · single fetch (AbortController) · single render entry.
   V1 残留 (SNAPSHOT/wpCache/WP_SALES_LIVE/sbm/refreshLiveData/_kpiInflight/
   setSnapshot/rerenderActiveView/v18HydrateFromCache) 全部禁用。
═══════════════════════════════════════════════════════════════════ */

:root {
  --bg:           #FFFFFF;
  --surface:      #FAFAFA;
  --border:       #E5E5E5;
  --text-primary: #1A1A1A;
  --text-meta:    #6B6B6B;
  --text-light:   #9B9B9B;
  --brand:        #1F5F4A;
  --brand-soft:   #E8F0EC;
  --ok:           #2E7D5B;
  --warn:         #B8860B;
  --warn-soft:    #D4A845;
  --danger:       #A03030;
  --shadow-sm:    0 1px 2px rgba(0,0,0,0.04);
  --radius:       8px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  font-size: 14px; line-height: 1.6;
  color: var(--text-primary); background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
.num { font-family: 'SF Mono', Menlo, Consolas, monospace; font-variant-numeric: tabular-nums; }
button { font: inherit; cursor: pointer; }
input, select { font: inherit; color: inherit; }

/* ── Login overlay ────────────────────────────────────────────────── */
#login {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
#login .card {
  width: 360px; max-width: calc(100% - 32px);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 32px 28px;
}
#login h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px; color: var(--brand); }
#login .sub { color: var(--text-meta); font-size: 13px; margin-bottom: 24px; }
#login label { display: block; font-size: 12px; color: var(--text-meta); margin: 12px 0 6px; }
#login input {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg);
}
#login input:focus { outline: none; border-color: var(--brand); }
#login button {
  width: 100%; margin-top: 20px; padding: 11px 14px;
  background: var(--brand); color: #fff; border: 0; border-radius: 6px;
  font-weight: 500; font-size: 14px;
}
#login button:hover { background: #19503e; }
#login .err { color: var(--danger); font-size: 12px; min-height: 18px; margin-top: 10px; }

/* ── App shell ────────────────────────────────────────────────────── */
#app { display: none; }
#app.ready { display: block; }

header.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px; border-bottom: 1px solid var(--border);
  background: var(--bg); position: sticky; top: 0; z-index: 50;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand .logo {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--brand); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
}
.brand-name { font-weight: 600; font-size: 16px; }
.brand-tag {
  font-size: 11px; color: var(--brand); background: var(--brand-soft);
  padding: 2px 8px; border-radius: 10px; margin-left: 4px;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.header-right { display: flex; align-items: center; gap: 18px; }
.role-chip { font-size: 13px; color: var(--text-meta); }
.role-chip strong { color: var(--text-primary); font-weight: 600; }
.picker {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text-primary); font-size: 13px;
}
.picker:focus { outline: none; border-color: var(--brand); }
.logout-btn {
  background: transparent; border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; color: var(--text-meta); font-size: 13px;
}
.logout-btn:hover { color: var(--brand); border-color: var(--brand); }

/* ── Layout: sidebar + main ───────────────────────────────────────── */
main.app-main {
  display: grid; grid-template-columns: 220px 1fr;
  min-height: calc(100vh - 65px);
}
nav.menu {
  border-right: 1px solid var(--border); padding: 24px 16px;
  background: var(--bg);
}
nav.menu .menu-section {
  font-size: 11px; color: var(--text-light);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin: 0 8px 8px;
}
nav.menu a {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; border-radius: 6px;
  color: var(--text-meta); text-decoration: none;
  font-size: 14px; margin-bottom: 2px;
}
nav.menu a:hover { background: var(--surface); color: var(--text-primary); }
nav.menu a.active {
  background: var(--brand-soft); color: var(--brand); font-weight: 600;
}
nav.menu a .icon { font-size: 16px; }
nav.menu a .stub {
  margin-left: auto; font-size: 10px; color: var(--text-light);
  background: var(--surface); padding: 1px 6px; border-radius: 8px;
}

section.app-content { padding: 32px 36px; min-width: 0; }

/* ── Page header ──────────────────────────────────────────────────── */
.page-title { font-size: 28px; font-weight: 600; margin: 0 0 4px; }
.page-sub { color: var(--text-meta); font-size: 14px; margin: 0 0 24px; }

/* ── Cards grid ───────────────────────────────────────────────────── */
.cards-grid {
  display: grid; gap: 16px; margin-bottom: 28px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}
.card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card .label { font-size: 13px; color: var(--text-meta); margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 500; line-height: 1.2; }
.card .value .unit { font-size: 16px; color: var(--text-meta); margin-left: 4px; }
.card .month-tag {
  font-size: 12px; color: var(--text-light); margin-top: 4px;
}
.card .compare {
  margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--border);
  font-size: 12px; color: var(--text-meta); line-height: 1.7;
}
.card .compare .row { display: flex; justify-content: space-between; gap: 8px; }
.card .compare .delta-pos { color: var(--ok); }
.card .compare .delta-neg { color: var(--danger); }
.card .compare .delta-flat { color: var(--text-light); }
.card.wide { grid-column: 1 / -1; }
.card.placeholder {
  background: var(--surface); color: var(--text-light); font-style: italic;
}
.card.placeholder .value { color: var(--text-light); font-size: 18px; }

/* progress bar */
.progress-bar {
  margin-top: 12px; height: 6px; background: var(--surface);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--brand); transition: width .25s ease;
}
.progress-fill.over { background: var(--ok); }
.progress-fill.under { background: var(--warn-soft); }
.progress-meta {
  font-size: 11px; color: var(--text-meta); margin-top: 6px;
  display: flex; justify-content: space-between;
}

/* branch table */
table.branch-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
table.branch-table th, table.branch-table td {
  text-align: right; padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
table.branch-table th:first-child, table.branch-table td:first-child {
  text-align: left;
}
table.branch-table th {
  font-weight: 600; color: var(--text-meta);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
}
table.branch-table tr.total-row {
  font-weight: 600; background: var(--brand-soft);
}
table.branch-table tr.total-row td { border-bottom: 0; }
table.branch-table .progress-cell {
  width: 100px;
}
table.branch-table .mini-bar {
  display: inline-block; width: 60px; height: 6px;
  background: var(--surface); border-radius: 3px; overflow: hidden;
  vertical-align: middle; margin-right: 6px;
}
table.branch-table .mini-bar-fill {
  display: block; height: 100%; background: var(--brand);
}

/* ── KPI card with detail rows (inventory/products/customers) ─────── */
.kpi-rows {
  margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
  font-size: 12px;
}
.kpi-rows .kpi-row {
  display: flex; justify-content: space-between; gap: 8px;
  padding: 3px 0; color: var(--text-meta);
}
.kpi-rows .kpi-row .name { color: var(--text-meta); }
.kpi-rows .kpi-row .val  { color: var(--text-primary); font-family: 'SF Mono', Menlo, monospace; font-size: 11px; }
.kpi-rows .kpi-row .val .pos { color: var(--ok); }
.kpi-rows .kpi-row .val .neg { color: var(--danger); }
.kpi-rows .kpi-row .val .flat { color: var(--text-light); }
.card .as-of { font-size: 10px; color: var(--text-light); margin-top: 8px; font-style: italic; }
/* Honest "this is not a real month-end snapshot" notice. Stage C-synth
   2026-05-16 — kept deliberately gray + plain so it reads as a caveat,
   not a status badge. Never use ok/warn/bad tones here. */
.synthetic-banner {
  margin-top: 6px; padding: 6px 10px;
  background: #F2F2F2; color: var(--text-meta);
  border-left: 2px solid var(--text-light);
  border-radius: 4px;
  font-size: 11px; line-height: 1.4;
}

/* Orphan SKU alert — amber/warn tone, NOT gray. This demands Jym action
   (add the codes to Sheet SM master), unlike the synthetic baseline
   notice which is passive. Click → opens drill-down modal. Stage C-orphan
   2026-05-16 per Notion 3620a2d3110081c7a7a0c0173eab6780. */
.orphan-banner {
  margin: 0 0 18px; padding: 12px 18px;
  background: #FFF7E0;
  border: 1px solid var(--warn-soft);
  border-left: 4px solid var(--warn);
  border-radius: var(--radius);
  color: var(--text-primary);
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  transition: background .15s;
}
.orphan-banner:hover { background: #FFEFB8; }
.orphan-banner .ob-icon { font-size: 20px; flex-shrink: 0; }
.orphan-banner .ob-text { flex: 1; font-size: 13px; line-height: 1.5; }
.orphan-banner .ob-text strong { color: var(--warn); font-weight: 600; }
.orphan-banner .ob-cta {
  font-size: 12px; color: var(--warn); font-weight: 600;
  border: 1px solid var(--warn); padding: 4px 10px; border-radius: 4px;
  white-space: nowrap;
}

/* Modal — shown when orphan banner clicked or other drill-downs land. */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center; z-index: 2000;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg); border-radius: var(--radius);
  width: min(720px, 92vw); max-height: 86vh;
  display: flex; flex-direction: column;
  box-shadow: 0 10px 40px rgba(0,0,0,0.18);
}
.modal-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.modal-head h2 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
.modal-head .modal-close {
  background: transparent; border: 0; font-size: 22px; line-height: 1;
  color: var(--text-meta); cursor: pointer; padding: 0 4px;
}
.modal-head .modal-close:hover { color: var(--text-primary); }
.modal-body { padding: 16px 20px; overflow: auto; flex: 1; }
.modal-body .modal-sub { font-size: 13px; color: var(--text-meta); margin: 0 0 12px; }
.modal-body .modal-sub a {
  color: var(--brand); text-decoration: none; font-weight: 500;
}
.modal-body .modal-sub a:hover { text-decoration: underline; }
.modal-body table.orphan-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.modal-body table.orphan-table th, .modal-body table.orphan-table td {
  text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border);
}
.modal-body table.orphan-table th {
  font-size: 11px; color: var(--text-meta); font-weight: 600;
  text-transform: uppercase; background: var(--surface);
}
.modal-body table.orphan-table td.num {
  text-align: right; font-family: 'SF Mono', Menlo, monospace;
}
.modal-foot {
  display: flex; justify-content: flex-end; gap: 10px;
  padding: 12px 20px; border-top: 1px solid var(--border);
}
.modal-foot button {
  background: var(--brand); color: #fff; border: 0; border-radius: 6px;
  padding: 8px 14px; font-size: 13px; font-weight: 500;
}
.modal-foot button.secondary {
  background: transparent; color: var(--text-meta); border: 1px solid var(--border);
}
.modal-foot button:hover { background: #19503e; }
.modal-foot button.secondary:hover { color: var(--text-primary); }
.card .value.danger { color: var(--danger); }
.card .value.warn   { color: var(--warn); }
.card .value.ok     { color: var(--ok); }

/* ── Alert cards (smaller, tonal border) ─────────────────────────── */
.alert-card {
  background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--text-light);
  border-radius: var(--radius); padding: 14px 16px;
}
.alert-card.tone-ok   { border-left-color: var(--ok); }
.alert-card.tone-warn { border-left-color: var(--warn); }
.alert-card.tone-bad  { border-left-color: var(--danger); }
.alert-card.tone-na   { border-left-color: var(--text-light); background: var(--surface); }
.alert-card .a-title { font-size: 13px; color: var(--text-primary); font-weight: 600; margin-bottom: 4px; }
.alert-card .a-value { font-size: 20px; font-weight: 500; line-height: 1.2; font-family: 'SF Mono', Menlo, monospace; }
.alert-card .a-sub   { font-size: 12px; color: var(--text-meta); margin-top: 4px; }
.alert-card .a-rows  { margin-top: 8px; font-size: 11px; }
.alert-card .a-rows .a-row { display: flex; justify-content: space-between; padding: 2px 0; }
.alert-card .a-rows .name { color: var(--text-meta); }
.alert-card .a-rows .val  { color: var(--text-primary); font-family: 'SF Mono', Menlo, monospace; }
.alert-card.tone-na .a-value { color: var(--text-light); font-style: italic; font-size: 13px; }

/* ── Today: status light + cash runway + sections ─────────────────── */
.today-banner {
  display: grid; gap: 16px; margin-bottom: 24px;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 22px;
}
.today-light {
  width: 56px; height: 56px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.today-light.tone-ok   { background: rgba(46,125,91,0.12); }
.today-light.tone-warn { background: rgba(184,134,11,0.12); }
.today-light.tone-bad  { background: rgba(160,48,48,0.12); }
.today-light.tone-unknown { background: var(--surface); }
.today-summary .headline { font-size: 16px; font-weight: 600; color: var(--text-primary); }
.today-summary .headline.ok   { color: var(--ok); }
.today-summary .headline.warn { color: var(--warn); }
.today-summary .headline.bad  { color: var(--danger); }
.today-summary .sub { font-size: 12px; color: var(--text-meta); margin-top: 4px; }
.today-runway { text-align: right; }
.today-runway .r-label { font-size: 11px; color: var(--text-meta); text-transform: uppercase; letter-spacing: 0.04em; }
.today-runway .r-value { font-size: 22px; font-weight: 600; margin-top: 2px; }
.today-runway .r-value.ok   { color: var(--ok); }
.today-runway .r-value.warn { color: var(--warn); }
.today-runway .r-value.bad  { color: var(--danger); }
.today-runway .r-sub { font-size: 11px; color: var(--text-light); margin-top: 2px; }

.section-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--text-light); margin: 24px 0 10px;
}

/* Today: store table */
table.store-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
table.store-table th, table.store-table td {
  text-align: right; padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
table.store-table th:first-child, table.store-table th:nth-child(2),
table.store-table td:first-child, table.store-table td:nth-child(2) {
  text-align: left;
}
table.store-table tr:last-child td { border-bottom: 0; }
table.store-table th {
  font-size: 11px; color: var(--text-meta); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--surface);
}
table.store-table .anom-ok   { color: var(--ok); }
table.store-table .anom-mid  { color: var(--warn); }
table.store-table .anom-bad  { color: var(--danger); }

/* Today: 6-domain grid */
.domain-grid {
  display: grid; gap: 12px;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
}
.domain-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; text-align: center;
}
.domain-card.tone-ok   { border-left: 3px solid var(--ok); }
.domain-card.tone-warn { border-left: 3px solid var(--warn); }
.domain-card.tone-bad  { border-left: 3px solid var(--danger); }
.domain-card.tone-na   { border-left: 3px solid var(--text-light); background: var(--surface); }
.domain-card .d-icon { font-size: 24px; line-height: 1; }
.domain-card .d-name { font-size: 13px; font-weight: 600; margin-top: 4px; color: var(--text-primary); }
.domain-card .d-sub  { font-size: 11px; color: var(--text-meta); margin-top: 2px; }
.domain-card.tone-na .d-sub { font-style: italic; color: var(--text-light); }

/* Today: Action Plan empty / placeholder */
.action-plan {
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 18px 22px;
  color: var(--text-meta); font-size: 13px;
}
.action-plan strong { color: var(--text-primary); }

/* ═════════════════════════════════════════════════════════════════════
   Phase 2 Sales Optimization (2026-05-16)
   - Sales Layer 1 expanded cards · Layer 2 alerts · Layer 3 charts ·
     Layer 4 Action Plan
   - ⚙️ Targets page (owner-only)
═══════════════════════════════════════════════════════════════════════ */

/* Targets editor grid */
.targets-toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px; flex-wrap: wrap;
}
.targets-toolbar button {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-primary); border-radius: 6px;
  padding: 7px 12px; font-size: 13px;
}
.targets-toolbar button:hover { border-color: var(--brand); color: var(--brand); }
.targets-toolbar button.primary {
  background: var(--brand); border-color: var(--brand); color: #fff;
}
.targets-toolbar button.primary:hover { background: #19503e; }
.targets-toolbar button.primary:disabled {
  background: var(--text-light); border-color: var(--text-light); cursor: not-allowed;
}
.targets-toolbar .group-label {
  font-size: 12px; color: var(--text-meta); margin-right: 6px;
}
.targets-fallback-note {
  background: var(--surface); border-left: 3px solid var(--warn-soft);
  padding: 8px 12px; border-radius: 4px; font-size: 12px;
  color: var(--text-meta); margin-bottom: 14px;
}
table.targets-grid {
  width: 100%; border-collapse: collapse; font-size: 13px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
table.targets-grid th, table.targets-grid td {
  padding: 9px 12px; border-bottom: 1px solid var(--border);
  text-align: left;
}
table.targets-grid tr:last-child td { border-bottom: 0; }
table.targets-grid th {
  font-size: 11px; color: var(--text-meta); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
  background: var(--surface);
}
table.targets-grid td.store-cell { font-weight: 600; width: 200px; }
table.targets-grid tr.historical td.store-cell { color: var(--text-light); }
table.targets-grid tr.historical { background: rgba(0,0,0,0.015); }
table.targets-grid input.target-input {
  width: 130px; padding: 5px 8px;
  border: 1px solid var(--border); border-radius: 4px;
  font-family: 'SF Mono', Menlo, monospace; font-size: 13px;
  text-align: right; background: var(--bg);
}
table.targets-grid input.target-input:focus { outline: none; border-color: var(--brand); }
table.targets-grid input.target-input.dirty { border-color: var(--warn); background: #FFFCEC; }
table.targets-grid td.note { font-size: 11px; color: var(--text-light); }
.targets-summary {
  display: grid; gap: 10px; margin-top: 18px;
  grid-template-columns: 1fr 1fr;
}
.targets-summary .summary-cell {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 14px;
}
.targets-summary .summary-cell .label { font-size: 12px; color: var(--text-meta); }
.targets-summary .summary-cell .value { font-size: 22px; font-weight: 500; margin-top: 2px; }
.targets-save-status {
  font-size: 12px; color: var(--text-meta); margin-left: auto;
}
.targets-save-status.ok   { color: var(--ok); }
.targets-save-status.bad  { color: var(--danger); }

/* "Targets missing" banner inside Sales Layer 1 cards */
.no-target-banner {
  background: #FFF8E1; border-left: 3px solid var(--warn-soft);
  border-radius: 4px; padding: 8px 10px; margin: 8px 0;
  font-size: 11px; color: var(--text-meta); line-height: 1.4;
}
.no-target-banner a { color: var(--brand); text-decoration: none; font-weight: 500; cursor: pointer; }
.no-target-banner a:hover { text-decoration: underline; }

/* Layer 1 store progress table (extends existing branch-table) */
table.branch-table tr.progress-over    .progress-cell { color: var(--ok); }
table.branch-table tr.progress-under   .progress-cell { color: var(--warn); }
table.branch-table tr.progress-far     .progress-cell { color: var(--danger); }

/* Layer 2 + sales-specific data-gap banner */
.data-gap-banner {
  background: #FFF8E1; border-left: 3px solid var(--warn);
  padding: 10px 14px; border-radius: 4px; margin: 14px 0;
  font-size: 13px; color: var(--text-meta);
}
.data-gap-banner strong { color: var(--text-primary); }

/* Layer 3 charts */
.charts-grid {
  display: grid; gap: 16px; margin-top: 8px;
  grid-template-columns: 1fr 1fr;
}
.chart-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  box-shadow: var(--shadow-sm);
}
.chart-card.wide { grid-column: 1 / -1; }
.chart-card .label { font-size: 13px; color: var(--text-meta); margin-bottom: 8px; }
.chart-card .meta  { font-size: 11px; color: var(--text-light); margin-top: 6px; }
.chart-card svg { display: block; width: 100%; height: auto; }

/* Chart axes + gridlines */
.chart-svg .grid-line { stroke: #EEE; stroke-width: 1; }
.chart-svg .axis-text { font-size: 10px; fill: var(--text-meta); font-family: 'SF Mono', Menlo, monospace; }
.chart-svg .axis-line { stroke: var(--border); stroke-width: 1; }
.chart-svg .data-line { fill: none; stroke-width: 2; }
.chart-svg .data-dot  { fill: var(--brand); }
.chart-svg .data-area { fill-opacity: 0.08; }
.chart-svg .data-bar  { fill: var(--brand); }
.chart-svg .legend-text { font-size: 11px; fill: var(--text-meta); }

/* Heatmap */
.heatmap-cell { stroke: #fff; stroke-width: 1; }
.heatmap-tooltip {
  position: absolute; pointer-events: none;
  background: rgba(0,0,0,0.85); color: #fff;
  font-size: 11px; padding: 4px 8px; border-radius: 4px;
  z-index: 10; transform: translate(-50%, -120%);
  white-space: nowrap; display: none;
}

/* Layer 4 — Action Plan */
.action-plan-list {
  display: grid; gap: 12px; margin-top: 8px;
}
.action-plan-card {
  display: grid; grid-template-columns: 48px 1fr auto; gap: 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  align-items: start;
}
.action-plan-card.severity-red    { border-left: 4px solid var(--danger); background: #fdf3f3; }
.action-plan-card.severity-amber  { border-left: 4px solid var(--warn); background: #FFFCEC; }
.action-plan-card.severity-green  { border-left: 4px solid var(--ok); }
.action-plan-card.done {
  opacity: 0.5; text-decoration: line-through;
}
.action-plan-card .icon  { font-size: 28px; line-height: 1; }
.action-plan-card .title { font-weight: 600; font-size: 14px; color: var(--text-primary); }
.action-plan-card .desc  { color: var(--text-meta); font-size: 12px; margin-top: 4px; }
.action-plan-card .action-text {
  font-size: 12px; color: var(--text-primary); margin-top: 6px;
  background: rgba(0,0,0,0.04); padding: 4px 8px; border-radius: 4px; display: inline-block;
}
.action-plan-card .controls { display: flex; flex-direction: column; gap: 6px; }
.action-plan-card .controls button {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 10px; font-size: 12px; color: var(--text-meta);
  white-space: nowrap;
}
.action-plan-card .controls button:hover { color: var(--brand); border-color: var(--brand); }
.action-plan-card .controls .bubble-flag {
  font-size: 10px; color: var(--text-light); text-align: center;
}
.action-plan-empty {
  background: var(--surface); border: 1px dashed var(--border);
  border-radius: var(--radius); padding: 16px 22px;
  text-align: center; color: var(--text-meta); font-size: 13px;
}

/* ── Skeleton (loading) ───────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -200px 0; }
  100% { background-position: calc(200px + 100%) 0; }
}
.skeleton {
  background: linear-gradient(90deg, var(--surface) 0px, #f0f0f0 40px, var(--surface) 80px);
  background-size: 200px 100%; background-repeat: no-repeat;
  animation: shimmer 1.2s linear infinite;
  border-radius: 4px; display: inline-block;
}
.skeleton.h-value { height: 32px; width: 60%; margin: 4px 0; }
.skeleton.h-line  { height: 12px; width: 100%; margin: 4px 0; }
.skeleton.h-row   { height: 28px; width: 100%; margin: 4px 0; }

/* ── Error + Retry ────────────────────────────────────────────────── */
.error-panel {
  background: #fdf3f3; border: 1px solid #f0c8c8;
  border-left: 4px solid var(--danger);
  border-radius: var(--radius); padding: 16px 20px;
  color: var(--danger); display: flex; align-items: center; gap: 16px;
}
.error-panel .msg { flex: 1; }
.error-panel .retry-btn {
  background: var(--danger); color: #fff; border: 0; border-radius: 6px;
  padding: 8px 14px; font-size: 13px;
}
.error-panel .retry-btn:hover { background: #842525; }

/* ── Helpers ──────────────────────────────────────────────────────── */
.hidden { display: none !important; }
.flex { display: flex; align-items: center; gap: 12px; }
.muted { color: var(--text-light); font-size: 12px; }
.tag-warn { background: #fff8e1; color: var(--warn); padding: 2px 8px; border-radius: 10px; font-size: 11px; }

/* dev byte-match badge */
.dev-badge {
  position: fixed; bottom: 12px; right: 12px;
  background: var(--brand); color: #fff; font-size: 11px;
  padding: 4px 10px; border-radius: 4px; opacity: 0.85;
  font-family: 'SF Mono', Menlo, monospace; z-index: 999;
}
.dev-badge.fail { background: var(--danger); }
</style>
</head>

<!-- ─── App shell ─── -->

           Wiltek has 13 stores (5 active + WLO + WCO/WEX/WL1 + W10/W11/W12).
           List built dynamically from API by_branch keys; metadata

      <select id="branchPicker" class="picker" title="Branch (owner only)">

      <a href="#" data-view="inventory" onclick="return onViewChange('inventory')"><span class="icon">📦</span>Inventory</a>
      <a href="#" data-view="customers" onclick="return onViewChange('customers')"><span class="icon">👥</span>Customers</a>
      <a href="#" data-view="products"  onclick="return onViewChange('products')"><span class="icon">🏷️</span>Products</a>

      <a href="#" data-view="finance"   onclick="return onViewChange('finance')"><span class="icon">💰</span>Finance<span class="stub">…</span></a>
      <!-- Phase 2 (2026-05-16) ⚙️ Targets page — owner only.
           hidden by default; populateMenu() shows it after enterApp() if role==='owner'. -->

<div id="devBadge" class="dev-badge hidden"></div>

<!-- Orphan SKU modal — populated by openOrphanModal() when banner clicked.
     Stage C-orphan (2026-05-16) per Notion 3620a2d3110081c7a7a0c0173eab6780. -->
<div id="orphanModal" class="modal-overlay" role="dialog" aria-labelledby="orphanModalTitle" aria-hidden="true">
  <div class="modal">
    <div class="modal-head">
      <h2 id="orphanModalTitle">⚠️ Orphan SKUs — missing master metadata</h2>
      <button type="button" class="modal-close" onclick="closeOrphanModal()" aria-label="Close">×</button>

    <div class="modal-foot">

      <button type="button" onclick="exportOrphanCSV()">Export CSV</button>
    </div>
  </div>
