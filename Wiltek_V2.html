<script>
/* ═══════════════════════════════════════════════════════════════════
   Wiltek V2 — single source of truth.

   NO V1 残留:
     - 不用 window.SNAPSHOT / WP_SALES_LIVE / WP_DEADSTOCK / sbm
     - 不用 wpCache / localStorage cache (除 wp_session_v2)
     - 不用 refreshLiveData / fetchSalesLive / setSnapshot / rerenderActiveView
     - 不用 _kpiInflight flag (用 AbortController)
     - 不用 v18HydrateFromCache
═══════════════════════════════════════════════════════════════════ */

'use strict';

/* ── State (single source of truth) ─────────────────────────────── */
const state = {
  month:   '2026-04',
  branch:  null,        // null = all stores (owner only)
  view:    'sales',
  role:    'owner',     // 'owner' | 'manager' | 'warehouse'
  user:    null,        // { username, display_name, role, store }
  loading: false,
  error:   null,        // { message, retry: () => void }
  data:    null,
  // Bug 2 fix (2026-05-15): store list NOT hard-coded. Union of store codes
  // seen across loadView responses (by_branch keys). Picker rebuilt from this.
  knownStores: new Set(),
};

// STORE_META — descriptive metadata, NOT a gatekeeper / white-list.
// A store code not in this map still works: it shows with code as name
// and group='other'. Per Notion 3610a2d3110081d89059df97099213a5 the
// list of stores comes from data (sales / inventory_snapshots / floatation
// distinct values), not from this constant.
//   group order = pickup display order: active → warehouse → cust-order → closed
const STORE_META = {
  // Active retail (5)
  W01: { name: 'W01 · Pandan Indah',         group: 'active' },
  W02: { name: 'W02 · Ampang Waterfront',    group: 'active' },
  W03: { name: 'W03 · Wangsa Maju',          group: 'active' },
  W05: { name: 'W05 · Bangi Seksyen 7',      group: 'active' },
  W07: { name: 'W07 · Pandan Jaya',          group: 'active' },
  // Warehouse (1) — all POs flow through here
  WLO: { name: 'WLO · Warehouse',            group: 'warehouse' },
  // Customer-order holds (3) — inventory + some sales
  WCO: { name: 'WCO · Customer Order',       group: 'custord' },
  WEX: { name: 'WEX · Customer Order Extra', group: 'custord' },
  WL1: { name: 'WL1 · Customer Order L1',    group: 'custord' },
  // Closed historical (3) — still have sales history; Jym can still view
  W10: { name: 'W10 · (closed)',             group: 'closed' },
  W11: { name: 'W11 · (closed)',             group: 'closed' },
  W12: { name: 'W12 · (closed)',             group: 'closed' },
  // Reserved fallback name for any other code that appears in API by_branch
  // (e.g. WSR). Picker renders them under group='other'.
};
const STORE_GROUP_LABEL = {
  active:    'Active retail',
  warehouse: 'Warehouse',
  custord:   'Customer order',
  closed:    'Closed historical',
  other:     'Other',
};
const STORE_GROUP_ORDER = ['active', 'warehouse', 'custord', 'closed', 'other'];

/* Add codes from a response (by_branch keys / stores[].store) to knownStores.
   Returns true if anything new appeared. */
function harvestStores(view, data) {
  if (!data) return false;
  let added = 0;
  const add = (code) => {
    if (!code) return;
    const up = String(code).toUpperCase();
    if (!state.knownStores.has(up)) { state.knownStores.add(up); added++; }
  };
  // /api/kpi (sales / inventory / customers / products) → data.by_branch
  if (data.by_branch && typeof data.by_branch === 'object') {
    Object.keys(data.by_branch).forEach(add);
  }
  // /api/inventory_dashboard → kpis.{health,stockout,oem_vs_agency}.by_branch?
  // — these aggregates don't expose stores; only the sync side does.
  if (data.kpis && data.kpis.by_branch) Object.keys(data.kpis.by_branch).forEach(add);
  // /api/today → stores[].store
  if (Array.isArray(data.stores)) {
    data.stores.forEach(s => add(s && s.store));
  }
  // /api/products → no by_branch by default. Skip.
  return added > 0;
}

/* Build the branch <select> options grouped by category, preserving the
   current state.branch selection. Uses STORE_META for names + group; any
   code in knownStores without STORE_META entry falls under group='other'. */
function populateBranchPicker() {
  const sel = document.getElementById('branchPicker');
  if (!sel) return;
  // Union: every known store from API responses + every store in STORE_META
  // (so picker is populated immediately on boot before any fetch resolves).
  const all = new Set([...state.knownStores, ...Object.keys(STORE_META)]);
  if (!all.size) return;

  const buckets = {};
  STORE_GROUP_ORDER.forEach(g => buckets[g] = []);
  for (const code of all) {
    const meta = STORE_META[code] || { name: code, group: 'other' };
    (buckets[meta.group] || buckets.other).push({ code, name: meta.name });
  }
  for (const g of STORE_GROUP_ORDER) buckets[g].sort((a, b) => a.code.localeCompare(b.code));

  let html = '<option value="">All stores</option>';
  for (const g of STORE_GROUP_ORDER) {
    if (!buckets[g].length) continue;
    html += '<optgroup label="' + STORE_GROUP_LABEL[g] + '">';
    for (const s of buckets[g]) {
      html += '<option value="' + s.code + '">' + escapeHtml(s.name) + '</option>';
    }
    html += '</optgroup>';
  }
  // Preserve selection (state.branch); fall back to empty (all stores).
  const want = state.branch || '';
  sel.innerHTML = html;
  // The selected option may now live inside an <optgroup> — set value
  // explicitly so the browser shows the right label.
  sel.value = want;
  if (sel.value !== want) {
    // selection not in list — likely a manager whose store got hidden. Add it.
    const opt = document.createElement('option');
    opt.value = want; opt.textContent = want; opt.selected = true;
    sel.appendChild(opt);
  }
}

/* ── Constants ──────────────────────────────────────────────────── */
const ALLOWED_VIEWS = ['sales', 'inventory', 'customers', 'products', 'today', 'finance', 'targets'];
const OWNER_ONLY_VIEWS = new Set(['targets']);

// Phase 2: monthly_targets store list (10 stores per Notion + schema CHECK).
// Active 5 + WCO can be set; W10/W11/W12/WEX shown but greyed (historical).
const TARGET_STORES = {
  W01: { name: 'W01 · Pandan Indah',         group: 'active' },
  W02: { name: 'W02 · Ampang Water Front',   group: 'active' },
  W03: { name: 'W03 · Wangsa Maju',          group: 'active' },
  W05: { name: 'W05 · Bangi Seksyen 7',      group: 'active' },
  W07: { name: 'W07 · Pandan Jaya',          group: 'active' },
  WCO: { name: 'WCO · HQ 开单',              group: 'active' },
  W10: { name: 'W10 · (closed/historical)',  group: 'historical' },
  W11: { name: 'W11 · Taman Midah Cheras (closed)', group: 'historical' },
  W12: { name: 'W12 · Bandar Seri Putra (closed)',  group: 'historical' },
  WEX: { name: 'WEX · 展览/特殊',             group: 'historical' },
};
const TARGET_STORE_ORDER = ['W01','W02','W03','W05','W07','WCO','W10','W11','W12','WEX'];

// Phase 2 Sales: store list used by the Layer-1 5-store progress table.
// (Targets are tracked for active+WCO; we display non-target stores too if
// they have sales in by_branch, but mark them "no target".)
const SALES_PROGRESS_STORES = ['W01','W02','W03','W05','W07','WCO'];

/* Generate 28 months 2024-01..2026-04 — matches sales table range.
   When sync extends the table, append new months here. */
function buildMonthList() {
  const months = [];
  for (let y = 2024; y <= 2026; y++) {
    const maxM = (y === 2026) ? 4 : 12;
    for (let m = 1; m <= maxM; m++) {
      months.push(y + '-' + String(m).padStart(2, '0'));
    }
  }
  return months.reverse(); // newest first
}
const ALL_MONTHS = buildMonthList();

/* SQL truth for byte-match assertion (DEV mode).
   These come from Sprint 5 Stage 1 PR #30 byte-match verification. */
const BYTE_MATCH_TRUTH = {
  '2026-04': { sales: 425108.92, units: 2340, aov: 181.67 },
  '2026-03': { sales: 372608.31, units: 2236, aov: 167   },
  '2025-11': { sales: 410343.71, units: 2623, aov: 156   },
  '2024-11': { sales: 504012.13, units: 2965, aov: 170   },
};

/* ── Session (sessionStorage, V2-namespaced) ────────────────────── */
const SESSION_KEY = 'wp_session_v2';
function readSession() {
  try { const s = sessionStorage.getItem(SESSION_KEY); return s ? JSON.parse(s) : null; }
  catch (_) { return null; }
}
function writeSession(u) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch (_) {}
}
function clearSession() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
}

/* ── URL sync ───────────────────────────────────────────────────── */
function readUrlState() {
  const p = new URL(window.location.href).searchParams;
  const v = p.get('view');
  const m = p.get('month');
  const b = p.get('branch');
  return {
    view:   ALLOWED_VIEWS.includes(v) ? v : null,
    month:  /^\d{4}-(0[1-9]|1[0-2])$/.test(m || '') ? m : null,
    branch: b && /^[Ww][A-Za-z0-9]{1,3}$/.test(b) ? b.toUpperCase() : null,
  };
}
function syncUrl() {
  const u = new URL(window.location.href);
  u.searchParams.set('view', state.view);
  u.searchParams.set('month', state.month);
  if (state.branch) u.searchParams.set('branch', state.branch);
  else              u.searchParams.delete('branch');
  history.replaceState(null, '', u.toString());
}

/* ── Auth header (V2 trusted header — same as V1 /api/sales pattern) */
function authHeaders() {
  const u = state.user || readSession();
  return u && u.username ? { 'x-wp-user': u.username } : {};
}

/* ── Per-view fetchers (each returns the renderer's expected shape) ─ */
async function getJSON(url, signal) {
  const r = await fetch(url, { signal, cache: 'no-store', headers: authHeaders() });
  if (!r.ok) {
    const t = await r.text().catch(() => '');
    throw new Error('HTTP ' + r.status + ' ' + t.slice(0, 200));
  }
  const j = await r.json();
  if (!j.ok) throw new Error(j.error || 'API returned ok:false');
  return j;
}

function kpiQuery() {
  const p = new URLSearchParams({ view: state.view, month: state.month });
  if (state.branch) p.set('branch', state.branch);
  return p.toString();
}
// monthBranchQuery — '?month=YYYY-MM[&branch=W0X]' for the non-/api/kpi
// endpoints (inventory_dashboard / products / today). Bug 3 fix
// (2026-05-15): threading state.branch through every fetcher so the
// owner branch picker scopes ALL views, not just Sales/Customers.
function monthBranchQuery() {
  const p = new URLSearchParams();
  if (state.month)  p.set('month', state.month);
  if (state.branch) p.set('branch', state.branch);
  const s = p.toString();
  return s ? '?' + s : '';
}
function monthQuery() {
  return state.month ? '?month=' + encodeURIComponent(state.month) : '';
}

async function fetchSales(signal) {
  // Phase 2 (2026-05-16): Sales view now needs 4 data sources in parallel —
  // monthly KPI, this month's daily breakdown, 12M trend (for Layer-3
  // charts), and monthly_targets (for Layer-1 progress + Action Plan).
  // Hard-rule § "切月份 < 0.5s": KPI/targets/daily resolve fast (~300ms
  // total via mview + small selects); 12M trend is the slow leg (~1-2s
  // — full sales table scan paginated). We Promise.all all four so the
  // first paint can use kpi/targets/daily; trend renders into Layer 3
  // when it lands.
  const baseQ  = kpiQuery();
  const trendQ = baseQ.replace('view=sales', 'view=sales-trend');
  const dailyQ = baseQ.replace('view=sales', 'view=sales-daily');
  const targetsQ = new URLSearchParams({ view: 'targets', month: state.month }).toString();
  const [kpi, targets, daily, trend] = await Promise.all([
    getJSON('/api/kpi?' + baseQ,     signal),
    getJSON('/api/kpi?' + targetsQ,  signal),
    getJSON('/api/kpi?' + dailyQ,    signal),
    getJSON('/api/kpi?' + trendQ,    signal).catch(e => ({ ok: false, error: e.message, series: [], branch_series: {} })),
  ]);
  state.role = kpi.session_role || state.role;
  return {
    kpi:     kpi.data,
    targets: targets,
    daily:   daily,
    trend:   trend,
  };
}

async function fetchTargets(signal) {
  // ⚙️ Targets page is owner-only; the API also enforces. Manager
  // landing on this view will see a 403 banner via the error path.
  const q = new URLSearchParams({ view: 'targets', month: state.month }).toString();
  const j = await getJSON('/api/kpi?' + q, signal);
  state.role = j.session_role || state.role;
  return j;
}
async function fetchCustomers(signal) {
  const j = await getJSON('/api/kpi?' + kpiQuery(), signal);
  state.role = j.session_role || state.role;
  return j.data;
}
async function fetchProducts(signal) {
  const j = await getJSON('/api/products' + monthBranchQuery(), signal);
  state.role = j.session_role || state.role;
  return j;
}
async function fetchToday(signal) {
  const j = await getJSON('/api/today' + monthBranchQuery(), signal);
  state.role = j.session_role || state.role;
  return j;
}
async function fetchInventory(signal) {
  // 2 calls in parallel — /api/inventory_dashboard KPIs + alerts.
  // Bug 3 fix (2026-05-15): branch threaded so owner picker scopes Inventory.
  const baseQ = new URLSearchParams();
  if (state.month)  baseQ.set('month', state.month);
  if (state.branch) baseQ.set('branch', state.branch);
  const base = baseQ.toString();
  const sep = base ? '&' : '';
  const [k, a] = await Promise.all([
    getJSON('/api/inventory_dashboard?' + base + sep + '_=k', signal),
    getJSON('/api/inventory_dashboard?' + base + sep + 'section=alerts', signal),
  ]);
  state.role = k.session_role || state.role;
  return { kpis: k, alerts: a };
}

const FETCHERS = {
  sales:     fetchSales,
  inventory: fetchInventory,
  customers: fetchCustomers,
  products:  fetchProducts,
  today:     fetchToday,
  finance:   null, // backlog: waits on multi-month financial sync
  targets:   fetchTargets,
};

/* ── Single fetch (AbortController, no in-flight flag) ──────────── */
let activeFetch = null;

async function loadView() {
  if (activeFetch) { try { activeFetch.abort(); } catch (_) {} }
  activeFetch = new AbortController();
  const myCtl = activeFetch;

  state.loading = true;
  state.error = null;
  state.data = null;
  renderView();

  const fn = FETCHERS[state.view];
  if (!fn) {
    state.loading = false;
    renderView();
    return;
  }

  const t0 = performance.now();
  try {
    const data = await fn(myCtl.signal);
    if (myCtl.signal.aborted) return;
    state.data = data;
    state.loading = false;
    state.error = null;

    const dur = Math.round(performance.now() - t0);
    console.log('[V2] loadView ' + state.view + ' ' + state.month + (state.branch || '') + ' OK ' + dur + 'ms');
    // Bug 2 fix: pick up any new store codes from the response and refresh
    // the branch picker if anything was added. Picker stays sorted/grouped.
    if (harvestStores(state.view, data)) populateBranchPicker();
    runByteMatchAssertion();
    renderView();
  } catch (e) {
    if (e.name === 'AbortError' || myCtl.signal.aborted) {
      console.log('[V2] loadView aborted (superseded)');
      return;
    }
    state.error = { message: e.message || String(e), retry: () => loadView() };
    state.loading = false;
    state.data = null;
    console.error('[V2] loadView error:', e);
    renderView();
  }
}

/* ── DEV byte-match assertion ──────────────────────────────────── */
function runByteMatchAssertion() {
  if (state.view !== 'sales' || state.branch) return;
  const expect = BYTE_MATCH_TRUTH[state.month];
  if (!expect || !state.data) return;
  const got = {
    sales: round2(state.data.sales),
    units: state.data.units,
    aov:   round2(state.data.aov),
  };
  const ok = (got.sales === round2(expect.sales))
          && (got.units === expect.units)
          && (Math.abs(got.aov - expect.aov) < 1);
  const badge = document.getElementById('devBadge');
  if (badge) {
    badge.classList.remove('hidden', 'fail');
    if (ok) {
      badge.textContent = '✓ byte-match ' + state.month;
    } else {
      badge.classList.add('fail');
      badge.textContent = '✗ byte-match ' + state.month + ' got ' + got.sales + '/' + got.units;
    }
  }
  if (ok) {
    console.log('%c[V2 byte-match] ' + state.month + ' PASS', 'color:#2E7D5B;font-weight:600', got);
  } else {
    console.warn('[V2 byte-match] ' + state.month + ' FAIL — expected', expect, 'got', got);
  }
}

/* ── Single render entry ────────────────────────────────────────── */
function renderView() {
  // sidebar active state
  document.querySelectorAll('nav.menu a[data-view]').forEach(a => {
    a.classList.toggle('active', a.getAttribute('data-view') === state.view);
  });
  // branch picker visible only for owner
  const bp = document.getElementById('branchPicker');
  if (bp) {
    bp.value = state.branch || '';
    bp.disabled = (state.role !== 'owner');
  }
  // month picker keeps state in sync
  const mp = document.getElementById('monthPicker');
  if (mp && mp.value !== state.month) mp.value = state.month;

  const renderers = {
    sales:     renderSales,
    inventory: renderInventory,
    customers: renderCustomers,
    products:  renderProducts,
    today:     renderToday,
    finance:   renderStubView,
    targets:   renderTargets,
  };
  const main = document.getElementById('main');
  if (!main) return;

  if (state.error) {
    main.innerHTML = renderError(state.error);
    // wire retry
    const btn = main.querySelector('.retry-btn');
    if (btn) btn.onclick = () => { if (state.error) state.error.retry(); };
    return;
  }

  main.innerHTML = (renderers[state.view] || renderStubView)(state);
}

/* ── User actions ───────────────────────────────────────────────── */
function onMonthChange(ym) {
  if (!ym || ym === state.month) return;
  state.month = ym;
  syncUrl();
  loadView();
}
function onViewChange(v) {
  if (!ALLOWED_VIEWS.includes(v) || v === state.view) return false;
  // Phase 2: owner-only views (e.g. ⚙️ targets) — silently block.
  if (OWNER_ONLY_VIEWS.has(v) && state.role !== 'owner') return false;
  state.view = v;
  syncUrl();
  loadView();
  return false; // anchor onclick swallow
}
function onBranchChange(b) {
  const next = b || null;
  if (next === state.branch) return;
  state.branch = next;
  syncUrl();
  loadView();
}

/* ── Formatters ─────────────────────────────────────────────────── */
function round2(n) { return Math.round(Number(n) * 100) / 100; }
function fmtRM(n) {
  if (n == null || isNaN(n)) return '—';
  return 'RM ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtRMpr(n) {
  if (n == null || isNaN(n)) return '—';
  return 'RM ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtInt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US');
}
function fmtPct(n, digits = 1) {
  if (n == null || isNaN(n)) return '—';
  return (Number(n) * 100).toFixed(digits) + '%';
}
function deltaPct(curr, base) {
  if (curr == null || base == null || base === 0) return null;
  return (curr - base) / base;
}
function deltaCell(curr, base, label, formatter) {
  const fmt = formatter || fmtRM;
  if (base == null || base === 0) {
    return '<div class="row"><span>' + label + '</span><span class="delta-flat">— no data</span></div>';
  }
  const pct = deltaPct(curr, base);
  const arrow = pct > 0.005 ? '↑' : (pct < -0.005 ? '↓' : '→');
  const cls   = pct > 0.005 ? 'delta-pos' : (pct < -0.005 ? 'delta-neg' : 'delta-flat');
  return '<div class="row"><span>' + label + ' ' + fmt(base) + '</span>'
       + '<span class="' + cls + '">' + arrow + ' ' + (pct * 100).toFixed(1) + '%</span></div>';
}
function ymLastMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  if (m === 1) return (y - 1) + '-12';
  return y + '-' + String(m - 1).padStart(2, '0');
}
function ymLastYear(ym) {
  const [y, m] = ym.split('-').map(Number);
  return (y - 1) + '-' + String(m).padStart(2, '0');
}

/* ── Render: Loading skeleton for cards ─────────────────────────── */
function skeletonCard(label) {
  return ''
    + '<div class="card">'
    +   '<div class="label">' + label + '</div>'
    +   '<div class="skeleton h-value"></div>'
    +   '<div class="muted">loading…</div>'
    +   '<div class="compare">'
    +     '<div class="skeleton h-line"></div>'
    +     '<div class="skeleton h-line"></div>'
    +     '<div class="skeleton h-line"></div>'
    +   '</div>'
    + '</div>';
}

/* ── Render: Error panel ────────────────────────────────────────── */
function renderError(err) {
  return ''
    + '<h1 class="page-title">' + viewTitle(state.view) + '</h1>'
    + '<p class="page-sub">' + state.month + (state.branch ? ' · ' + state.branch : ' · All stores') + '</p>'
    + '<div class="error-panel">'
    +   '<div class="msg"><strong>Failed to load.</strong><br><span class="muted">'
    +     escapeHtml(err.message)
    +   '</span></div>'
    +   '<button class="retry-btn" type="button">Retry</button>'
    + '</div>';
}

function viewTitle(v) {
  return {
    sales:     'Sales',
    inventory: 'Inventory',
    customers: 'Customers',
    products:  'Products',
    today:     'Today',
    finance:   'Finance',
  }[v] || v;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · SALES — Phase 2 Optimization (2026-05-16)
   Notion 5/12 4-layer spec:
     Layer 1: 5 顶部 KPI 卡 (本月 vs 目标 / 单数+AOV / 今日 / WTD / 5店表)
     Layer 2: 4 预警卡
     Layer 3: 5 趋势图 (12M line / 每周热力图 / 单数+AOV 双坐标 / 月内爬坡 /
              品类×门市矩阵)
     Layer 4: Action Plan · 本周 3-5 件事 (severity-sorted, bubble_to_today)
   术语锁定 (Notion brief): 单数 = invoices, 件数 = units, AOV = sales/invoices
═══════════════════════════════════════════════════════════════════ */
function renderSales(s) {
  const title = '<h1 class="page-title">Sales</h1>'
              + '<p class="page-sub">'
              +   'Snapshot ' + s.month
              +   (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · 全公司')
              +   ' · KPI 默认单月 + 3 行对比 · 12M 趋势 · Action Plan'
              + '</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="section-title">Layer 1 · 顶部 KPI</div>'
      + '<div class="cards-grid">'
      +   skeletonCard('① 本月销售 vs 目标')
      +   skeletonCard('② 本月单数 · AOV')
      +   skeletonCard('③ 今日销售 · 5 店分布')
      +   skeletonCard('④ 本周进度 vs 周目标')
      +   '<div class="card wide"><div class="label">⑤ 5 店月进度对照表</div><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>'
      + '</div>';
  }

  const d           = s.data.kpi     || {};
  const targetsResp = s.data.targets || {};
  const daily       = s.data.daily   || {};
  const trend       = s.data.trend   || {};

  return title
    + '<div class="section-title">Layer 1 · 顶部 KPI</div>'
    + renderSalesLayer1(s, d, targetsResp, daily, trend)
    + '<div class="section-title">Layer 2 · 预警 (alerts)</div>'
    + renderSalesLayer2(s, d, daily)
    + '<div class="section-title">Layer 3 · 趋势图</div>'
    + renderSalesLayer3(s, d, daily, trend)
    + '<div class="section-title">Layer 4 · Action Plan · 本周该做的事</div>'
    + renderSalesLayer4(s, d, targetsResp, daily);
}

/* ── Sales target helpers ─────────────────────────────────────────── */
function salesTargetTotal(targetsResp, branch) {
  // Returns the sales target for the requested scope:
  //   branch == null  → sum of all sales-type targets in monthly_targets
  //   branch == 'W0X' → that single store's sales target
  if (!targetsResp || !Array.isArray(targetsResp.targets)) return null;
  if (branch) {
    const row = targetsResp.targets.find(t => t.store === branch && t.target_type === 'sales');
    return row ? +row.target_value : null;
  }
  // company-wide = sum of all sales-type entries (rows with target_value > 0)
  let total = 0; let any = false;
  for (const t of targetsResp.targets) {
    if (t.target_type === 'sales' && +t.target_value > 0) {
      total += +t.target_value; any = true;
    }
  }
  return any ? total : null;
}
function targetsLink() {
  // Returns the <a> markup for "go to ⚙️ Targets" link in no-target banners.
  return '<a onclick="onViewChange(\'targets\');return false">⚙️ 目标设定 →</a>';
}
function noTargetBanner() {
  return '<div class="no-target-banner">'
       +   '<strong>目标未设定</strong> · 在 ' + targetsLink() + ' 填本月销售目标后此卡会显进度条 + RM 差距。'
       + '</div>';
}

/* ── Layer 1: 5 顶部 KPI 卡 ───────────────────────────────────────── */
function renderSalesLayer1(s, d, targetsResp, daily, trend) {
  const ymPrev   = ymLastMonth(s.month);
  const ymPrevYr = ymLastYear(s.month);
  // /api/kpi sales doesn't return last_month_invoices; derive it (and
  // 6-month avg invoices) from trend.series so we can show AOV-by-invoice
  // comparisons honestly without proxying via units.
  const series = Array.isArray(trend?.series) ? trend.series : [];
  const prev   = series.length >= 2 ? series[series.length - 2] : null;
  const last_month_invoices = prev ? prev.invoices : null;
  const last_month_aov_inv  = (prev && prev.invoices > 0) ? prev.sales / prev.invoices : null;
  const six_m = series.slice(-6);
  const six_m_invoices_avg = six_m.length > 0
    ? six_m.reduce((a, p) => a + (p.invoices || 0), 0) / six_m.length : null;

  // Card 1: 本月销售 vs 目标 (real target if set)
  const tgtTotal = salesTargetTotal(targetsResp, s.branch);
  const progPct  = (tgtTotal && tgtTotal > 0) ? (d.sales / tgtTotal) : null;
  const gap      = (tgtTotal != null) ? (d.sales - tgtTotal) : null;
  const c1 = ''
    + '<div class="card">'
    +   '<div class="label">① 本月销售 vs 目标</div>'
    +   '<div class="value num">' + fmtRM(d.sales) + '</div>'
    +   '<div class="month-tag">in ' + s.month + (s.branch ? ' · ' + s.branch : '') + '</div>'
    +   (tgtTotal != null ? (
          '<div class="progress-bar"><div class="progress-fill '
            + ((progPct||0) >= 1 ? 'over' : ((progPct||0) < 0.85 ? 'under' : ''))
            + '" style="width:' + Math.min(100, (progPct || 0) * 100) + '%"></div></div>'
        + '<div class="progress-meta"><span>vs target ' + fmtRM(tgtTotal) + '</span><span>' + fmtPct(progPct) + '</span></div>'
        + (targetsResp.fallback_used
            ? '<div class="muted" style="font-size:10px;margin-top:4px">目标延用 ' + targetsResp.fallback_from + ' (本月未设)</div>'
            : '<div class="muted" style="font-size:10px;margin-top:4px">差距: ' + (gap >= 0 ? '+' : '') + fmtRM(gap) + '</div>')
        ) : noTargetBanner())
    +   '<div class="compare">'
    +     deltaCell(d.sales, d.last_month_sales,  'vs ' + ymPrev,    fmtRM)
    +     deltaCell(d.sales, d.last_year_sales,   'vs ' + ymPrevYr,  fmtRM)
    +     deltaCell(d.sales, d.six_m_avg_sales,   'vs 6-mo avg',     fmtRM)
    +   '</div>'
    + '</div>';

  // Card 2: 本月单数 + AOV (AOV = sales / invoices, BY INVOICE per Notion)
  const aov_per_invoice = (d.invoices > 0) ? (d.sales / d.invoices) : null;
  const c2 = ''
    + '<div class="card">'
    +   '<div class="label">② 本月单数 · AOV (按单)</div>'
    +   '<div class="value num">' + fmtInt(d.invoices) + ' <span class="unit">单</span></div>'
    +   '<div class="month-tag">' + fmtInt(d.units) + ' 件 · AOV ' + fmtRMpr(aov_per_invoice) + ' / 单</div>'
    +   '<div class="compare">'
    +     deltaCell(d.invoices, last_month_invoices, '单数 vs ' + ymPrev,   fmtInt)
    +     deltaCell(d.invoices, six_m_invoices_avg, '单数 vs 6-mo avg',   fmtInt)
    +     '<div class="row"><span>AOV (按单) vs ' + ymPrev + '</span>'
    +       '<span class="' + (last_month_aov_inv != null && aov_per_invoice >= last_month_aov_inv ? 'delta-pos' : 'delta-neg') + '">'
    +       (last_month_aov_inv != null ? fmtRMpr(last_month_aov_inv) : '—')
    +       '</span></div>'
    +   '</div>'
    + '</div>';

  // Card 3: 今日销售 + 5 店分布 — from daily.today
  const today = daily.today || null;
  let c3;
  if (today && today.sales != null) {
    const stores = Object.entries(today.by_branch || {}).map(([st, v]) => ({ st, sales: v.sales || 0 }))
      .sort((a, b) => b.sales - a.sales).slice(0, 6);
    const storeRows = stores.length === 0
      ? '<div class="muted" style="font-size:11px">该日无销售</div>'
      : stores.map(b => '<div class="kpi-row"><span class="name">' + b.st + '</span><span class="val">' + fmtRM(b.sales) + '</span></div>').join('');
    c3 = ''
      + '<div class="card">'
      +   '<div class="label">③ 今日销售 · 5 店分布</div>'
      +   '<div class="value num">' + fmtRM(today.sales) + '</div>'
      +   '<div class="month-tag">' + today.date + ' · ' + fmtInt(today.invoices) + ' 单 · ' + fmtInt(today.units) + ' 件</div>'
      +   '<div class="kpi-rows">' + storeRows + '</div>'
      + '</div>';
  } else {
    c3 = ''
      + '<div class="card placeholder">'
      +   '<div class="label">③ 今日销售 · 5 店分布</div>'
      +   '<div class="value">该月暂无数据</div>'
      +   '<div class="month-tag">/api/kpi?view=sales-daily 返空 — sales 表该月份无 row</div>'
      + '</div>';
  }

  // Card 4: 本周进度 vs 周目标 = (月目标 / 4)
  const weekTarget = (tgtTotal != null) ? (tgtTotal / 4) : null;
  const wtd = daily.wtd || null;
  let c4;
  if (wtd && weekTarget != null) {
    const wtdProgPct = weekTarget > 0 ? (wtd.sales / weekTarget) : null;
    c4 = ''
      + '<div class="card">'
      +   '<div class="label">④ 本周进度 vs 周目标</div>'
      +   '<div class="value num">' + fmtRM(wtd.sales) + '</div>'
      +   '<div class="month-tag">WTD ' + wtd.week_start + '..' + wtd.week_end + ' · ' + fmtInt(wtd.invoices) + ' 单</div>'
      +   '<div class="progress-bar"><div class="progress-fill '
      +       ((wtdProgPct||0) >= 1 ? 'over' : ((wtdProgPct||0) < 0.7 ? 'under' : ''))
      +       '" style="width:' + Math.min(100, (wtdProgPct || 0) * 100) + '%"></div></div>'
      +   '<div class="progress-meta"><span>周目标 ' + fmtRM(weekTarget) + ' (月 ÷ 4)</span><span>' + fmtPct(wtdProgPct) + '</span></div>'
      + '</div>';
  } else if (wtd) {
    c4 = ''
      + '<div class="card">'
      +   '<div class="label">④ 本周进度 vs 周目标</div>'
      +   '<div class="value num">' + fmtRM(wtd.sales) + '</div>'
      +   '<div class="month-tag">WTD ' + wtd.week_start + '..' + wtd.week_end + ' · ' + fmtInt(wtd.invoices) + ' 单</div>'
      +   noTargetBanner()
      + '</div>';
  } else {
    c4 = ''
      + '<div class="card placeholder">'
      +   '<div class="label">④ 本周进度 vs 周目标</div>'
      +   '<div class="value">无 WTD 数据</div>'
      +   '<div class="month-tag">/api/kpi?view=sales-daily 该月空</div>'
      + '</div>';
  }

  // Card 5: wide 5-store progress table
  const c5 = renderSalesProgressTable(s, d, targetsResp);

  return '<div class="cards-grid">' + c1 + c2 + c3 + c4 + c5 + '</div>';
}

/* Wide 5-store progress table with real targets from monthly_targets. */
function renderSalesProgressTable(s, d, targetsResp) {
  const byBranch = d.by_branch || {};
  const summaryByStore = (targetsResp && targetsResp.summary && targetsResp.summary.by_store) || {};

  const rows = SALES_PROGRESS_STORES.map(b => {
    const row = byBranch[b] || { sales: 0, invoices: 0, units: 0, distinct_customers: 0 };
    const tgt = (summaryByStore[b] && summaryByStore[b].sales) || null;
    const progress = (tgt && tgt > 0) ? (row.sales / tgt) : null;
    const progressClass = progress == null ? ''
                        : (progress >= 1 ? 'progress-over'
                        : (progress < 0.7 ? 'progress-far' : 'progress-under'));
    const barWidth = Math.min(100, (progress || 0) * 100);
    const progressInner = (progress == null)
      ? '<span class="muted">未设</span>'
      : ('<span class="mini-bar"><span class="mini-bar-fill" style="width:' + barWidth + '%"></span></span>' + fmtPct(progress));
    const aov_inv = row.invoices > 0 ? (row.sales / row.invoices) : 0;
    return ''
      + '<tr class="' + progressClass + '">'
      +   '<td><strong>' + b + '</strong></td>'
      +   '<td class="num">' + fmtRM(row.sales) + '</td>'
      +   '<td class="num">' + fmtInt(row.invoices) + '</td>'
      +   '<td class="num">' + fmtRMpr(aov_inv) + '</td>'
      +   '<td class="num">' + fmtInt(row.units) + '</td>'
      +   '<td class="num">' + (tgt != null ? fmtRM(tgt) : '<span class="muted">未设</span>') + '</td>'
      +   '<td class="progress-cell">' + progressInner + '</td>'
      + '</tr>';
  }).join('');

  const totalSales = SALES_PROGRESS_STORES.reduce((a, b) => a + ((byBranch[b]?.sales) || 0), 0);
  const totalInv   = SALES_PROGRESS_STORES.reduce((a, b) => a + ((byBranch[b]?.invoices) || 0), 0);
  const totalUnits = SALES_PROGRESS_STORES.reduce((a, b) => a + ((byBranch[b]?.units) || 0), 0);
  const totalTgt   = SALES_PROGRESS_STORES.reduce((a, b) => a + ((summaryByStore[b]?.sales) || 0), 0);
  const totalProg  = totalTgt > 0 ? (totalSales / totalTgt) : null;
  const totalAov   = totalInv > 0 ? (totalSales / totalInv) : 0;

  const totalRow = ''
    + '<tr class="total-row">'
    +   '<td>5 店合计</td>'
    +   '<td class="num">' + fmtRM(totalSales) + '</td>'
    +   '<td class="num">' + fmtInt(totalInv) + '</td>'
    +   '<td class="num">' + fmtRMpr(totalAov) + '</td>'
    +   '<td class="num">' + fmtInt(totalUnits) + '</td>'
    +   '<td class="num">' + (totalTgt > 0 ? fmtRM(totalTgt) : '<span class="muted">未设</span>') + '</td>'
    +   '<td class="progress-cell">' + (totalProg != null ? fmtPct(totalProg) : '—') + '</td>'
    + '</tr>';

  const note = (targetsResp && targetsResp.fallback_used)
    ? '目标延用 ' + targetsResp.fallback_from + ' (本月未设)'
    : ((targetsResp && targetsResp.targets && targetsResp.targets.length > 0)
        ? '目标来自 monthly_targets (本月)'
        : '目标未设 · ' + targetsLink());

  return ''
    + '<div class="card wide">'
    +   '<div class="label">⑤ 5 店月进度对照表 · 实际 / 目标 / 进度%</div>'
    +   '<table class="branch-table">'
    +     '<thead><tr>'
    +       '<th>店</th>'
    +       '<th>本月销售</th>'
    +       '<th>本月单数</th>'
    +       '<th>AOV (按单)</th>'
    +       '<th>本月件数</th>'
    +       '<th>月目标</th>'
    +       '<th>进度</th>'
    +     '</tr></thead>'
    +     '<tbody>' + rows + totalRow + '</tbody>'
    +   '</table>'
    +   '<div class="muted" style="margin-top:8px;font-size:11px">' + note + '</div>'
    + '</div>';
}

/* ── Layer 2: 4 预警卡 ────────────────────────────────────────────── */
function renderSalesLayer2(s, d, daily) {
  const cards = [];
  // (1) 5 家店今日 vs 月日均 — anomaly detection on today's sales per store
  const today = daily.today;
  if (today && d.by_branch) {
    // Compute month-to-date day index (today.date day-of-month vs days seen so far)
    const daysSeen = Array.isArray(daily.days) ? daily.days.length : 1;
    const rows = SALES_PROGRESS_STORES.map(b => {
      const monthSales = (d.by_branch[b]?.sales) || 0;
      const monthAvg   = daysSeen > 0 ? monthSales / daysSeen : 0;
      const todaySales = (today.by_branch && today.by_branch[b]?.sales) || 0;
      const ratio      = monthAvg > 0 ? todaySales / monthAvg : null;
      const tone = (ratio != null && ratio < 0.7) ? 'bad'
                 : (ratio != null && ratio < 0.85) ? 'warn' : 'ok';
      const arrow = (ratio == null) ? '—' : (ratio >= 1 ? '↑' : '↓');
      return aRow(b + ' · 今日 ' + fmtRM(todaySales),
        arrow + ' 月日均 ' + fmtRM(monthAvg) + (ratio != null ? ' (' + (ratio*100).toFixed(0) + '%)' : ''));
    }).join('');
    const anomCount = SALES_PROGRESS_STORES.filter(b => {
      const ma = ((d.by_branch[b]?.sales) || 0) / Math.max(1, daysSeen);
      const ts = (today.by_branch && today.by_branch[b]?.sales) || 0;
      return ma > 0 && ts < ma * 0.85;
    }).length;
    cards.push(alertCard('① 5 家店今日 vs 月日均',
      anomCount + ' 家偏低',
      '今日 ' + today.date + ' · ' + daysSeen + ' 天月日均参照',
      anomCount > 2 ? 'bad' : anomCount > 0 ? 'warn' : 'ok',
      rows));
  } else {
    cards.push(alertCard('① 5 家店今日 vs 月日均', null,
      'sales-daily 该月无数据', 'na', null));
  }

  // (2) 每家店成交单数 + AOV (按单) — 第 3 个 alert per Notion spec
  if (d.by_branch) {
    const lastMo = d.last_month_invoices || 0;
    const rows = SALES_PROGRESS_STORES.map(b => {
      const inv  = (d.by_branch[b]?.invoices) || 0;
      const sales = (d.by_branch[b]?.sales) || 0;
      const aov  = inv > 0 ? sales / inv : 0;
      return aRow(b, fmtInt(inv) + ' 单 · AOV ' + fmtRMpr(aov));
    }).join('');
    cards.push(alertCard('② 每店单数 · AOV (按单)',
      fmtInt(d.invoices || 0) + ' 单合计',
      '量 (单数) 与 价 (AOV) 关系',
      'ok', rows));
  } else {
    cards.push(alertCard('② 每店单数 · AOV', null, '无 by_branch', 'na', null));
  }

  // (3) 每家店 Top 3 SKU 当月 — needs sales × items category. /api/kpi
  // doesn't return SKU-per-store. Data-gap banner per hard rule #13.
  cards.push(alertCard('③ 每店 Top 3 SKU (当月)', null,
    'SKU-per-store breakdown needs a join we don\'t expose yet · backlog',
    'na', null));

  // (4) 退货/取消订单率 — sales table has no return_flag. Data gap banner.
  cards.push(alertCard('④ 退货 / 取消订单率', null,
    'sales 表无 return_flag · 等 POS 字段接入 (Sheet 26 / Notion 数据源 backlog)',
    'na', null));

  return '<div class="cards-grid">' + cards.join('') + '</div>';
}

/* ── Layer 3: 5 趋势图 (inline SVG) ───────────────────────────────── */
function renderSalesLayer3(s, d, daily, trend) {
  // Chart 1 — 12M 5 店销售线图 (multi-series)
  let chart1;
  if (Array.isArray(trend.series) && trend.series.length > 0) {
    const series = [{
      name: '全公司',
      color: '#1F5F4A',
      points: trend.series.map(p => ({ x: p.ym, y: p.sales })),
    }];
    if (trend.branch_series && !s.branch) {
      const colors = ['#3B82F6','#F59E0B','#EF4444','#A855F7','#10B981','#8B5CF6'];
      let i = 0;
      for (const st of ['W01','W02','W03','W05','W07','WCO']) {
        if (trend.branch_series[st]) {
          series.push({
            name: st, color: colors[i++ % colors.length],
            points: trend.branch_series[st].map(p => ({ x: p.ym, y: p.sales })),
          });
        }
      }
    }
    chart1 = '<div class="chart-card wide"><div class="label">① 12M 销售线图 · 全公司 + 5 店</div>'
           + svgLineChart({ series, width: 880, height: 240, yFmt: fmtMoneyShort })
           + '<div class="meta">数据源 /api/kpi?view=sales-trend</div></div>';
  } else {
    chart1 = '<div class="chart-card wide"><div class="label">① 12M 销售线图</div>'
           + '<div class="data-gap-banner">/api/kpi?view=sales-trend 返空 · 可能 sales 表月份范围内无 row</div></div>';
  }

  // Chart 2 — 每店每周热力图 (current month, per-week × per-store)
  let chart2;
  if (Array.isArray(daily.days) && daily.days.length > 0) {
    const weeks = {}; // weekIdx -> store -> sum
    for (const day of daily.days) {
      const d2 = new Date(day.date + 'T00:00:00Z');
      const dayOfMo = d2.getUTCDate();
      const weekIdx = Math.floor((dayOfMo - 1) / 7); // 0..4
      for (const [st, v] of Object.entries(day.by_branch || {})) {
        if (!weeks[weekIdx]) weeks[weekIdx] = {};
        weeks[weekIdx][st] = (weeks[weekIdx][st] || 0) + (v.sales || 0);
      }
    }
    const weekLabels = Object.keys(weeks).map(Number).sort((a, b) => a - b).map(w => 'Week ' + (w + 1));
    const stores = SALES_PROGRESS_STORES;
    const matrix = weekLabels.map((_, wi) =>
      stores.map(st => (weeks[wi] && weeks[wi][st]) || 0));
    chart2 = '<div class="chart-card"><div class="label">② 每店每周热力图 · ' + s.month + '</div>'
           + svgHeatmap({ rowLabels: weekLabels, colLabels: stores, matrix, width: 430, height: 220 })
           + '<div class="meta">深绿 = 高销售周 · 浅 = 低</div></div>';
  } else {
    chart2 = '<div class="chart-card"><div class="label">② 每店每周热力图</div>'
           + '<div class="data-gap-banner">sales-daily 该月无 row</div></div>';
  }

  // Chart 3 — 每店每月单数 (bar) + AOV (line) 双坐标 — uses trend series totals,
  // limited to last 6 months for legibility
  let chart3;
  if (Array.isArray(trend.series) && trend.series.length > 0) {
    const last6 = trend.series.slice(-6);
    chart3 = '<div class="chart-card"><div class="label">③ 单数 + AOV (按单) 双坐标 · 近 6 月</div>'
           + svgBarLine({
               labels:  last6.map(p => p.ym),
               bars:    last6.map(p => p.invoices),
               line:    last6.map(p => p.invoices > 0 ? p.sales / p.invoices : 0),
               barLabel: '单数', lineLabel: 'AOV (按单)',
               width: 430, height: 220,
             })
           + '<div class="meta">柱 = 单数 / 折线 = AOV (RM)</div></div>';
  } else {
    chart3 = '<div class="chart-card"><div class="label">③ 单数 + AOV 双坐标</div>'
           + '<div class="data-gap-banner">trend series 空</div></div>';
  }

  // Chart 4 — 当月每天销售爬坡线 + 月日均参照
  let chart4;
  if (Array.isArray(daily.days) && daily.days.length > 0) {
    let cum = 0;
    const points = daily.days.map(d2 => { cum += d2.sales; return { x: d2.date.slice(-2), y: cum }; });
    const finalSales = (d.sales || 0);
    chart4 = '<div class="chart-card"><div class="label">④ 当月每天销售爬坡线 · ' + s.month + '</div>'
           + svgLineChart({
               series: [{ name: 'cumulative', color: '#1F5F4A',
                 points }],
               width: 430, height: 220, yFmt: fmtMoneyShort,
             })
           + '<div class="meta">累计销售 (RM) · 月底 = ' + fmtRM(finalSales) + '</div></div>';
  } else {
    chart4 = '<div class="chart-card"><div class="label">④ 当月爬坡线</div>'
           + '<div class="data-gap-banner">该月无 daily 数据</div></div>';
  }

  // Chart 5 — 品类 × 门市矩阵 — needs items.main_group JOIN. Data-gap banner.
  const chart5 = '<div class="chart-card wide"><div class="label">⑤ 品类 × 门市矩阵</div>'
       + '<div class="data-gap-banner">品类拆分 (items.main_group JOIN sales) · backlog: 需 mview cross-tab (per Sprint 6+). 当前 endpoint 不返 SKU-per-store-per-category.</div></div>';

  return '<div class="charts-grid">' + chart1 + chart2 + chart3 + chart4 + chart5 + '</div>';
}

/* ── Layer 4: Action Plan · 自动 severity 排序 ────────────────────── */
function renderSalesLayer4(s, d, targetsResp, daily) {
  const actions = computeSalesActions(s, d, targetsResp, daily);
  if (!actions.length) {
    return '<div class="action-plan-empty">本周 Sales 暂无 high-severity 异常 ✓</div>';
  }
  const cards = actions.map(a => {
    const done = isActionDone(a.id);
    const cls  = 'action-plan-card severity-' + a.severity + (done ? ' done' : '');
    const icon = a.severity === 'red' ? '🔴' : a.severity === 'amber' ? '🟡' : '🟢';
    return ''
      + '<div class="' + cls + '" data-action-id="' + escapeHtml(a.id) + '">'
      +   '<div class="icon">' + icon + '</div>'
      +   '<div>'
      +     '<div class="title">' + escapeHtml(a.title) + '</div>'
      +     '<div class="desc">' + escapeHtml(a.description) + '</div>'
      +     '<div class="action-text">👉 ' + escapeHtml(a.action) + '</div>'
      +   '</div>'
      +   '<div class="controls">'
      +     '<button type="button" onclick="markSalesActionDone(\'' + escapeHtml(a.id) + '\', ' + (!done) + ')">'
      +       (done ? 'Restore' : 'Mark done') + '</button>'
      +     (a.bubble_to_today ? '<div class="bubble-flag">↑ Today</div>' : '')
      +   '</div>'
      + '</div>';
  }).join('');
  return '<div class="action-plan-list">' + cards + '</div>';
}

function computeSalesActions(s, d, targetsResp, daily) {
  const actions = [];
  const summaryByStore = (targetsResp && targetsResp.summary && targetsResp.summary.by_store) || {};
  const daysSeen   = Array.isArray(daily?.days) ? daily.days.length : 0;
  const today      = daily?.today;

  // Heuristic: month_progress = days seen / 30 (rough). Use a softer
  // benchmark "store at-pace" = target × month_progress.
  const monthProgress = daysSeen > 0 ? Math.min(1, daysSeen / 30) : 0;

  // 1. 进度落后店: actual < target × monthProgress × 0.85
  for (const b of SALES_PROGRESS_STORES) {
    const tgt = (summaryByStore[b] && summaryByStore[b].sales) || 0;
    if (tgt <= 0) continue;
    const actual = (d.by_branch && d.by_branch[b] && d.by_branch[b].sales) || 0;
    const expected = tgt * monthProgress;
    if (expected <= 0) continue;
    const ratio = actual / expected;
    if (ratio < 0.85) {
      actions.push({
        id: 'sales-lag-' + b + '-' + s.month,
        severity: ratio < 0.7 ? 'red' : 'amber',
        title: b + ' 月进度落后 (' + (ratio * 100).toFixed(0) + '% of pace)',
        description: '实际 RM ' + fmtMoneyShort(actual) + ' · 应至 RM ' + fmtMoneyShort(expected)
                     + ' · 月目标 RM ' + fmtMoneyShort(tgt),
        action: '本周对 ' + b + ' 加大推广 / 检视价格 / 联系老客',
        link:   '?view=sales&month=' + s.month + '&branch=' + b,
        bubble_to_today: ratio < 0.7,
        mark_done_ts: null,
      });
    }
  }

  // 2. 异常单数店: invoices vs last_month_invoices < -25% — derive
  // last_month_invoices from trend.series (kpi response doesn't carry it).
  const trendSeries = Array.isArray(s.data?.trend?.series) ? s.data.trend.series : [];
  const prevTrend = trendSeries.length >= 2 ? trendSeries[trendSeries.length - 2] : null;
  if (prevTrend && prevTrend.invoices > 0) {
    const companyDropPct = (d.invoices - prevTrend.invoices) / prevTrend.invoices;
    if (companyDropPct < -0.25) {
      actions.push({
        id: 'sales-invoice-drop-' + s.month,
        severity: 'amber',
        title: '全公司单数环比 ' + (companyDropPct * 100).toFixed(0) + '%',
        description: '本月 ' + fmtInt(d.invoices) + ' 单 · 上月 ' + fmtInt(prevTrend.invoices) + ' 单',
        action: '排查是哪几个店流失客户 (Layer 2 alert #2 单数列表)',
        link:   '?view=sales&month=' + s.month,
        bubble_to_today: true,
        mark_done_ts: null,
      });
    }
  }

  // 3. 急跌品类 — data gap action (no category data yet)
  if (d.sales > 0 && d.last_month_sales > 0 && (d.sales - d.last_month_sales) / d.last_month_sales < -0.10) {
    actions.push({
      id: 'sales-month-drop-' + s.month,
      severity: 'red',
      title: '本月销售环比 -' + ((d.last_month_sales - d.sales) / d.last_month_sales * 100).toFixed(0) + '%',
      description: '本月 ' + fmtRM(d.sales) + ' · 上月 ' + fmtRM(d.last_month_sales) + ' · 6M avg ' + fmtRM(d.six_m_avg_sales),
      action: '与上月比对 — 品类拆分待 backlog (Layer 3 chart 5)',
      link:   '?view=sales&month=' + s.month,
      bubble_to_today: true,
      mark_done_ts: null,
    });
  }

  // 4. 今日全公司销售 vs 月日均
  if (today && daysSeen > 0) {
    const ma = (d.sales || 0) / daysSeen;
    const ratio = ma > 0 ? today.sales / ma : null;
    if (ratio != null && ratio < 0.7) {
      actions.push({
        id: 'sales-today-low-' + today.date,
        severity: 'amber',
        title: '今日销售低于月日均 (' + (ratio * 100).toFixed(0) + '%)',
        description: '今日 ' + fmtRM(today.sales) + ' · 月日均 ' + fmtRM(ma),
        action: '检视今天人流 / 排班 / 突发情况',
        link:   '?view=sales&month=' + s.month,
        bubble_to_today: false,
        mark_done_ts: null,
      });
    }
  }

  // Sort by severity (red > amber > green) then by title
  const order = { red: 0, amber: 1, green: 2 };
  actions.sort((a, b) => (order[a.severity] - order[b.severity]) || a.title.localeCompare(b.title));
  // Filter done from view but keep in DOM if user wants restore — show all,
  // CSS strikes done out. Cap at 5 visible.
  return actions.slice(0, 5);
}

/* Action Plan persistence via localStorage. Best-effort sync to
   /api/sync mode=action_done is fire-and-forget so the user gets instant UI. */
const ACTION_DONE_KEY = 'wp_action_done_v2';
function readActionDone() {
  try { return JSON.parse(localStorage.getItem(ACTION_DONE_KEY) || '{}'); }
  catch (_) { return {}; }
}
function writeActionDone(map) {
  try { localStorage.setItem(ACTION_DONE_KEY, JSON.stringify(map)); } catch (_) {}
}
function isActionDone(id) {
  const m = readActionDone();
  return !!m[id];
}
function markSalesActionDone(id, done) {
  const m = readActionDone();
  if (done) m[id] = new Date().toISOString();
  else delete m[id];
  writeActionDone(m);
  // Fire-and-forget backend sync (table may not exist; degrades gracefully)
  try {
    fetch('/api/sync', {
      method: 'POST', cache: 'no-store',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ mode: 'action_done', action_id: id, done }),
    }).catch(() => {});
  } catch (_) {}
  renderView();
}
window.markSalesActionDone = markSalesActionDone;

/* ── Shared helpers for KPI cards with sub-rows ───────────────── */
function fmtMoneyShort(n) {
  if (n == null || isNaN(n)) return '—';
  const v = +n;
  if (Math.abs(v) >= 1e6) return 'RM ' + (v / 1e6).toFixed(1) + 'M';
  if (Math.abs(v) >= 1e3) return 'RM ' + (v / 1e3).toFixed(0) + 'k';
  return 'RM ' + v.toFixed(0);
}
function fmtPctSign(n, digits) {
  if (n == null || isNaN(n)) return '—';
  digits = digits == null ? 1 : digits;
  return (+n).toFixed(digits) + '%';
}
function momBadge(amt, pct) {
  if (amt == null) return '';
  const dir = amt > 0 ? 'pos' : (amt < 0 ? 'neg' : 'flat');
  const sign = amt > 0 ? '↑' : (amt < 0 ? '↓' : '→');
  const pctStr = pct == null ? '—' : Math.abs(pct).toFixed(1) + '%';
  return ' <span class="' + dir + '">' + sign + ' ' + pctStr + '</span>';
}
function kpiRow(name, val) {
  return '<div class="kpi-row"><span class="name">' + name + '</span><span class="val">' + val + '</span></div>';
}
function kpiCard(label, value, sub, rows, asOf, valueClass) {
  return ''
    + '<div class="card">'
    +   '<div class="label">' + label + '</div>'
    +   '<div class="value num' + (valueClass ? ' ' + valueClass : '') + '">' + value + '</div>'
    +   (sub ? '<div class="month-tag">' + sub + '</div>' : '')
    +   (rows ? '<div class="kpi-rows">' + rows + '</div>' : '')
    +   (asOf ? '<div class="as-of">' + asOf + '</div>' : '')
    + '</div>';
}
function alertCard(title, value, sub, tone, rows) {
  const t = tone || 'na';
  return ''
    + '<div class="alert-card tone-' + t + '">'
    +   '<div class="a-title">' + title + '</div>'
    +   '<div class="a-value">' + (value || (t === 'na' ? 'pending' : '—')) + '</div>'
    +   (sub ? '<div class="a-sub">' + sub + '</div>' : '')
    +   (rows ? '<div class="a-rows">' + rows + '</div>' : '')
    + '</div>';
}
function aRow(name, val) {
  return '<div class="a-row"><span class="name">' + name + '</span><span class="val">' + val + '</span></div>';
}

/* ═══════════════════════════════════════════════════════════════════
   Phase 2 Sales: inline SVG chart helpers (no external lib)
   All charts are responsive — width is set by .chart-card grid, but the
   SVG uses fixed internal viewBox so labels stay sharp.
═══════════════════════════════════════════════════════════════════ */

function svgEscape(s) { return String(s).replace(/[<>&"']/g, c => ({
  '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])); }

function svgLineChart(opts) {
  // opts: { series: [{name, color, points:[{x,y}]}, ...], width, height, yFmt }
  const W = opts.width || 600, H = opts.height || 200;
  const padL = 50, padR = 80, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const series = (opts.series || []).filter(s => s.points && s.points.length > 0);
  if (series.length === 0) return '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '"></svg>';
  // Collect all x labels (use first series' x as canonical)
  const xs = series[0].points.map(p => p.x);
  // y-range across all series
  let yMin = Infinity, yMax = -Infinity;
  for (const s of series) for (const p of s.points) {
    if (p.y < yMin) yMin = p.y;
    if (p.y > yMax) yMax = p.y;
  }
  if (yMin === Infinity) { yMin = 0; yMax = 1; }
  if (yMin === yMax) { yMin -= 1; yMax += 1; }
  // Pad y-range slightly
  const range = yMax - yMin;
  yMin = Math.max(0, yMin - range * 0.05);
  yMax = yMax + range * 0.05;

  const xToPx = i => padL + (xs.length > 1 ? (i / (xs.length - 1)) * plotW : plotW / 2);
  const yToPx = y => padT + plotH - ((y - yMin) / (yMax - yMin)) * plotH;

  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  // y-axis gridlines (5 steps)
  for (let i = 0; i <= 4; i++) {
    const y = padT + (plotH / 4) * i;
    const v = yMax - ((yMax - yMin) * i / 4);
    svg += '<line class="grid-line" x1="' + padL + '" x2="' + (padL + plotW) + '" y1="' + y + '" y2="' + y + '"/>';
    svg += '<text class="axis-text" x="' + (padL - 6) + '" y="' + (y + 3) + '" text-anchor="end">' + (opts.yFmt ? opts.yFmt(v) : Math.round(v)) + '</text>';
  }
  // x-axis labels (every 2nd or so to avoid overlap)
  const step = Math.max(1, Math.ceil(xs.length / 8));
  for (let i = 0; i < xs.length; i++) {
    if (i % step !== 0 && i !== xs.length - 1) continue;
    const x = xToPx(i);
    svg += '<text class="axis-text" x="' + x + '" y="' + (H - 8) + '" text-anchor="middle">' + svgEscape(xs[i]) + '</text>';
  }
  // axis lines
  svg += '<line class="axis-line" x1="' + padL + '" x2="' + (padL + plotW) + '" y1="' + (padT + plotH) + '" y2="' + (padT + plotH) + '"/>';

  // data lines
  for (const s of series) {
    const pts = s.points.map((p, i) => xToPx(i) + ',' + yToPx(p.y)).join(' ');
    svg += '<polyline class="data-line" points="' + pts + '" stroke="' + s.color + '"/>';
    for (let i = 0; i < s.points.length; i++) {
      svg += '<circle class="data-dot" cx="' + xToPx(i) + '" cy="' + yToPx(s.points[i].y) + '" r="2.5" fill="' + s.color + '"/>';
    }
  }
  // legend (right side stacked)
  for (let i = 0; i < series.length; i++) {
    const y = padT + 10 + i * 16;
    svg += '<rect x="' + (padL + plotW + 6) + '" y="' + (y - 7) + '" width="10" height="3" fill="' + series[i].color + '"/>';
    svg += '<text class="legend-text" x="' + (padL + plotW + 20) + '" y="' + (y - 2) + '">' + svgEscape(series[i].name) + '</text>';
  }
  svg += '</svg>';
  return svg;
}

function svgHeatmap(opts) {
  // opts: { rowLabels, colLabels, matrix:[[..]], width, height }
  const W = opts.width || 400, H = opts.height || 200;
  const padL = 70, padR = 10, padT = 14, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const rows = opts.rowLabels || [];
  const cols = opts.colLabels || [];
  const m    = opts.matrix    || [];
  if (rows.length === 0 || cols.length === 0) {
    return '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '"></svg>';
  }
  let vMax = 0;
  for (const r of m) for (const v of r) if (v > vMax) vMax = v;
  if (vMax === 0) vMax = 1;
  const cellW = plotW / cols.length;
  const cellH = plotH / rows.length;
  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  for (let ri = 0; ri < rows.length; ri++) {
    svg += '<text class="axis-text" x="' + (padL - 6) + '" y="' + (padT + cellH * ri + cellH / 2 + 3) + '" text-anchor="end">' + svgEscape(rows[ri]) + '</text>';
    for (let ci = 0; ci < cols.length; ci++) {
      const v = (m[ri] && m[ri][ci]) || 0;
      const ratio = v / vMax;
      // green ramp: light → brand
      const r = Math.round(232 - ratio * (232 - 31));
      const g = Math.round(240 - ratio * (240 - 95));
      const b2 = Math.round(236 - ratio * (236 - 74));
      const fill = 'rgb(' + r + ',' + g + ',' + b2 + ')';
      svg += '<rect class="heatmap-cell" x="' + (padL + ci * cellW) + '" y="' + (padT + ri * cellH) + '" width="' + cellW + '" height="' + cellH + '" fill="' + fill + '"><title>' + svgEscape(rows[ri]) + ' × ' + svgEscape(cols[ci]) + ': ' + (opts.cellFmt ? opts.cellFmt(v) : Math.round(v)) + '</title></rect>';
    }
  }
  for (let ci = 0; ci < cols.length; ci++) {
    svg += '<text class="axis-text" x="' + (padL + cellW * ci + cellW / 2) + '" y="' + (H - 8) + '" text-anchor="middle">' + svgEscape(cols[ci]) + '</text>';
  }
  svg += '</svg>';
  return svg;
}

function svgBarLine(opts) {
  // opts: { labels:[], bars:[], line:[], barLabel, lineLabel, width, height }
  const W = opts.width || 400, H = opts.height || 200;
  const padL = 50, padR = 60, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const labels = opts.labels || [];
  const bars   = opts.bars   || [];
  const line   = opts.line   || [];
  if (labels.length === 0) return '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '"></svg>';
  const barMax  = Math.max(1, ...bars);
  const lineMax = Math.max(1, ...line);
  const cellW = plotW / labels.length;
  const yBar  = v => padT + plotH - (v / barMax)  * plotH;
  const yLine = v => padT + plotH - (v / lineMax) * plotH;
  let svg = '<svg class="chart-svg" viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">';
  // gridlines (4 steps on left axis)
  for (let i = 0; i <= 4; i++) {
    const y = padT + (plotH / 4) * i;
    const v = barMax - (barMax * i / 4);
    svg += '<line class="grid-line" x1="' + padL + '" x2="' + (padL + plotW) + '" y1="' + y + '" y2="' + y + '"/>';
    svg += '<text class="axis-text" x="' + (padL - 6) + '" y="' + (y + 3) + '" text-anchor="end">' + Math.round(v) + '</text>';
    // right axis label
    const v2 = lineMax - (lineMax * i / 4);
    svg += '<text class="axis-text" x="' + (padL + plotW + 6) + '" y="' + (y + 3) + '" text-anchor="start">' + (Math.abs(v2) >= 1000 ? (v2/1000).toFixed(1)+'k' : Math.round(v2)) + '</text>';
  }
  // bars
  for (let i = 0; i < labels.length; i++) {
    const bx = padL + i * cellW + cellW * 0.2;
    const bw = cellW * 0.6;
    const by = yBar(bars[i] || 0);
    svg += '<rect class="data-bar" x="' + bx + '" y="' + by + '" width="' + bw + '" height="' + ((padT + plotH) - by) + '"/>';
    svg += '<text class="axis-text" x="' + (padL + i * cellW + cellW / 2) + '" y="' + (H - 8) + '" text-anchor="middle">' + svgEscape(labels[i]) + '</text>';
  }
  // line
  const linePts = line.map((v, i) => (padL + i * cellW + cellW / 2) + ',' + yLine(v)).join(' ');
  svg += '<polyline class="data-line" points="' + linePts + '" stroke="#F59E0B"/>';
  for (let i = 0; i < line.length; i++) {
    svg += '<circle cx="' + (padL + i * cellW + cellW / 2) + '" cy="' + yLine(line[i]) + '" r="3" fill="#F59E0B"/>';
  }
  // legend
  svg += '<rect x="' + (padL + 6) + '" y="' + (padT - 4) + '" width="10" height="3" fill="#1F5F4A"/>';
  svg += '<text class="legend-text" x="' + (padL + 20) + '" y="' + (padT + 0) + '">' + svgEscape(opts.barLabel || 'bar') + '</text>';
  svg += '<rect x="' + (padL + 90) + '" y="' + (padT - 4) + '" width="10" height="3" fill="#F59E0B"/>';
  svg += '<text class="legend-text" x="' + (padL + 104) + '" y="' + (padT + 0) + '">' + svgEscape(opts.lineLabel || 'line') + '</text>';
  svg += '</svg>';
  return svg;
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TARGETS · ⚙️ 目标设定 (owner only)
   - month picker (uses global state.month, updated via header picker)
   - 10 × 2 grid: store × (sales / footfall) target_value editable
   - auto-fill buttons: copy last month / last × 1.05
   - save → POST /api/targets/upsert (sync.js mode=targets_upsert, owner)
═══════════════════════════════════════════════════════════════════ */

// Editor state — mutable in-memory until save. Resets on data load.
const targetsEditor = {
  ymLoaded: null,
  dirty: false,
  byStore: {},  // store -> { sales: number|null, footfall: number|null }
  saving: false,
  lastSaveStatus: null, // { ok: bool, message: string }
};

function loadTargetsIntoEditor(targetsResp) {
  targetsEditor.ymLoaded = targetsResp.ym;
  targetsEditor.dirty = false;
  targetsEditor.byStore = {};
  for (const code of TARGET_STORE_ORDER) {
    targetsEditor.byStore[code] = { sales: null, footfall: null };
  }
  const summary = (targetsResp && targetsResp.summary && targetsResp.summary.by_store) || {};
  for (const code of Object.keys(summary)) {
    if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = { sales: null, footfall: null };
    if (summary[code].sales    != null) targetsEditor.byStore[code].sales    = +summary[code].sales || 0;
    if (summary[code].footfall != null) targetsEditor.byStore[code].footfall = +summary[code].footfall || 0;
  }
}

function renderTargets(s) {
  // Owner-only gate (also enforced backend-side; UI hides the link from non-owners).
  if (s.role !== 'owner') {
    return '<h1 class="page-title">⚙️ 目标设定</h1>'
         + '<div class="error-panel"><div class="msg"><strong>店长无权限</strong>。owner only.</div></div>';
  }
  if (s.loading || !s.data) {
    return '<h1 class="page-title">⚙️ 目标设定</h1>'
         + '<p class="page-sub">' + s.month + ' · 加载中…</p>'
         + '<div class="skeleton h-row"></div><div class="skeleton h-row"></div>';
  }
  // Sync editor with loaded data (if we've switched months or first load)
  if (targetsEditor.ymLoaded !== s.data.ym) {
    loadTargetsIntoEditor(s.data);
  }

  const fallback = s.data.fallback_used
    ? '<div class="targets-fallback-note">本月 (' + s.data.ym + ') 未设目标 · 表中显 <strong>' + s.data.fallback_from + '</strong> 的目标作为参照 · 编辑保存后会建立 ' + s.data.ym + ' 自己的目标</div>'
    : (s.data.targets.length === 0
       ? '<div class="targets-fallback-note">本月 (' + s.data.ym + ') 未设目标 · 上月也未设 · 表全空, 填入数字后保存</div>'
       : '');

  // Build grid rows
  const rows = TARGET_STORE_ORDER.map(code => {
    const meta = TARGET_STORES[code];
    const cur  = targetsEditor.byStore[code] || { sales: null, footfall: null };
    const histClass = meta.group === 'historical' ? 'historical' : '';
    const note = meta.group === 'historical'
      ? '历史店 — 通常填 0' : (code === 'WCO' ? 'HQ 开单' : '主力店');
    return ''
      + '<tr class="' + histClass + '">'
      +   '<td class="store-cell">' + escapeHtml(meta.name) + '</td>'
      +   '<td><input type="number" min="0" step="100" class="target-input" '
      +       'data-store="' + code + '" data-type="sales" '
      +       'value="' + (cur.sales != null ? cur.sales : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td><input type="number" min="0" step="1" class="target-input" '
      +       'data-store="' + code + '" data-type="footfall" '
      +       'value="' + (cur.footfall != null ? cur.footfall : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td class="note">' + note + '</td>'
      + '</tr>';
  }).join('');

  // Summary computations
  const salesTot = Object.values(targetsEditor.byStore)
    .reduce((a, v) => a + (+v.sales || 0), 0);
  const footTot = Object.values(targetsEditor.byStore)
    .reduce((a, v) => a + (+v.footfall || 0), 0);

  const saveLabel = targetsEditor.saving ? 'Saving…' : (targetsEditor.dirty ? 'Save changes' : 'No unsaved changes');
  const saveStatus = targetsEditor.lastSaveStatus
    ? '<span class="targets-save-status ' + (targetsEditor.lastSaveStatus.ok ? 'ok' : 'bad') + '">'
        + escapeHtml(targetsEditor.lastSaveStatus.message) + '</span>'
    : '';

  return ''
    + '<h1 class="page-title">⚙️ 目标设定</h1>'
    + '<p class="page-sub">月份 ' + s.data.ym
    + ' · 10 店 × 2 类型 (销售 / 客流) · 默认 (没设) 自动延用上月</p>'
    + fallback
    + '<div class="targets-toolbar">'
    +   '<span class="group-label">快速填充:</span>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'copy_last\')">复制上月目标</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'last_x_105\')">上月 × 1.05</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'clear\')">清空</button>'
    +   '<button type="button" class="primary" '
    +     'onclick="saveTargets()" '
    +     (targetsEditor.dirty && !targetsEditor.saving ? '' : 'disabled')
    +     '>' + saveLabel + '</button>'
    +   saveStatus
    + '</div>'
    + '<table class="targets-grid">'
    +   '<thead><tr><th>店</th><th>销售目标 (RM)</th><th>客流目标 (人)</th><th>备注</th></tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '<div class="targets-summary">'
    +   '<div class="summary-cell"><div class="label">销售目标合计 (10 店)</div>'
    +     '<div class="value">' + fmtRM(salesTot) + '</div></div>'
    +   '<div class="summary-cell"><div class="label">客流目标合计 (10 店)</div>'
    +     '<div class="value">' + fmtInt(footTot) + ' 人</div></div>'
    + '</div>';
}

function onTargetEdit(input) {
  const store = input.getAttribute('data-store');
  const type  = input.getAttribute('data-type');
  const val   = input.value === '' ? null : Number(input.value);
  if (!targetsEditor.byStore[store]) targetsEditor.byStore[store] = { sales: null, footfall: null };
  targetsEditor.byStore[store][type] = (val == null || isNaN(val)) ? null : val;
  if (!input.classList.contains('dirty')) input.classList.add('dirty');
  if (!targetsEditor.dirty) {
    targetsEditor.dirty = true;
    targetsEditor.lastSaveStatus = null;
    // Re-enable save button without full re-render (cheap toggle)
    const btn = document.querySelector('.targets-toolbar button.primary');
    if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
  }
  // Update summary values inline (cheap reach)
  const summaryCells = document.querySelectorAll('.targets-summary .summary-cell .value');
  if (summaryCells.length >= 2) {
    const salesTot = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.sales || 0), 0);
    const footTot  = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.footfall || 0), 0);
    summaryCells[0].textContent = fmtRM(salesTot);
    summaryCells[1].textContent = fmtInt(footTot) + ' 人';
  }
}
window.onTargetEdit = onTargetEdit;

function applyTargetsTemplate(kind) {
  // Need last-month targets for "copy_last" / "last_x_105". We have them
  // either as s.data.targets (when fallback_used=true) or via a fresh fetch.
  // Simpler: always re-fetch last month's targets via /api/kpi?view=targets.
  const ymPrev = ymLastMonth(state.month);
  if (kind === 'clear') {
    for (const code of TARGET_STORE_ORDER) {
      targetsEditor.byStore[code] = { sales: null, footfall: null };
    }
    targetsEditor.dirty = true;
    renderView();
    return;
  }
  fetch('/api/kpi?' + new URLSearchParams({ view: 'targets', month: ymPrev }).toString(), {
    cache: 'no-store', headers: authHeaders(),
  })
    .then(r => r.json())
    .then(j => {
      const by = (j && j.summary && j.summary.by_store) || {};
      const factor = (kind === 'last_x_105') ? 1.05 : 1.0;
      for (const code of TARGET_STORE_ORDER) {
        const meta = TARGET_STORES[code];
        if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = { sales: null, footfall: null };
        const src = by[code] || {};
        // Historical stores stay 0 if Jym originally set 0 last month.
        targetsEditor.byStore[code].sales    = (src.sales    != null) ? Math.round(src.sales    * factor) : (meta.group === 'historical' ? 0 : null);
        targetsEditor.byStore[code].footfall = (src.footfall != null) ? Math.round(src.footfall * factor) : (meta.group === 'historical' ? 0 : null);
      }
      targetsEditor.dirty = true;
      renderView();
    })
    .catch(e => {
      targetsEditor.lastSaveStatus = { ok: false, message: '上月目标载入失败: ' + e.message };
      renderView();
    });
}
window.applyTargetsTemplate = applyTargetsTemplate;

async function saveTargets() {
  if (targetsEditor.saving) return;
  targetsEditor.saving = true;
  targetsEditor.lastSaveStatus = { ok: true, message: 'Saving…' };
  renderView();
  // Build payload — skip nulls (don't write blank rows).
  const targets = [];
  for (const code of TARGET_STORE_ORDER) {
    const v = targetsEditor.byStore[code] || {};
    if (v.sales    != null) targets.push({ store: code, target_type: 'sales',    target_value: +v.sales });
    if (v.footfall != null) targets.push({ store: code, target_type: 'footfall', target_value: +v.footfall });
  }
  if (targets.length === 0) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: '没数字可保存 — 至少填一格' };
    renderView();
    return;
  }
  try {
    const r = await fetch('/api/sync', {
      method: 'POST', cache: 'no-store',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        mode: 'targets_upsert',
        ym: state.month,
        targets,
      }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) {
      throw new Error(j.error || ('HTTP ' + r.status));
    }
    targetsEditor.saving = false;
    targetsEditor.dirty  = false;
    targetsEditor.lastSaveStatus = {
      ok: true,
      message: 'Saved ' + j.rows_upserted + ' rows' + (j.rows_skipped ? ' · ' + j.rows_skipped + ' skipped' : ''),
    };
    // Reload from server to confirm.
    loadView();
  } catch (e) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: 'Save failed: ' + e.message };
    renderView();
  }
}
window.saveTargets = saveTargets;

/* ═══════════════════════════════════════════════════════════════════
   RENDER · INVENTORY  (Stage B)
   8 cards = 4 KPI (health/order_gap/stockout/oem-vs-agency)
            + 4 alerts (po_calendar/transfer/liquidation/po_anomalies).
   Data: /api/inventory_dashboard (kpis + alerts in parallel).
   byte-match V1 Stage 3 + Stage 4 — same endpoint, same numbers.
═══════════════════════════════════════════════════════════════════ */
function renderInventory(s) {
  // Stage C-orphan (2026-05-16): top-of-page banner when Sheet has SKUs
  // missing from items master. Click → modal with full list + CSV export.
  // Per Notion 3620a2d3110081c7a7a0c0173eab6780 — never silent, always
  // amber tone (not gray — this is an action item, not a passive caveat).
  const orphan = (s.data && s.data.kpis && s.data.kpis.orphan_alert) || null;
  const orphanBanner = (orphan && orphan.count > 0)
    ? '<div class="orphan-banner" onclick="openOrphanModal()" role="button" tabindex="0">'
    +   '<div class="ob-icon">⚠️</div>'
    +   '<div class="ob-text">'
    +     '<strong>' + orphan.count + ' SKU</strong> missing master data'
    +     ' · 影响 RM ' + (orphan.value_rm || 0).toLocaleString('en-US', { minimumFractionDigits: 2 })
    +     ' · Sheet Raw CS 有这些 code 但 SM master 没有, items 表已 placeholder'
    +     ' · 添加到 Sheet SM tab 后 cron 自动 propagate'
    +   '</div>'
    +   '<div class="ob-cta">查看明细 →</div>'
    + '</div>'
    : '';

  const title = orphanBanner
              + '<h1 class="page-title">Inventory</h1>'
              + '<p class="page-sub">Snapshot ' + s.month
              + (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · Company-wide')
              + ' · 4 KPI + 4 alerts · /api/inventory_dashboard</p>';

  if (s.loading || !s.data) {
    return title + '<div class="cards-grid">'
      + skeletonCard('① Inventory health')
      + skeletonCard('② Order gap')
      + skeletonCard('③ Stockout risk')
      + skeletonCard('④ OEM vs Agency')
      + '</div>'
      + '<div class="section-title">Action alerts</div>'
      + '<div class="cards-grid">'
      + skeletonCard('① OEM PO calendar')
      + skeletonCard('② Transfer engine')
      + skeletonCard('③ Liquidation')
      + skeletonCard('④ PO anomalies')
      + '</div>';
  }

  const k = s.data.kpis || {};
  const a = s.data.alerts || {};
  const asOf = k.snapshot_date ? 'snapshot ' + k.snapshot_date : '';
  const ymPrev = k.ym_prev || '—';
  // Stage C-synth (2026-05-16): when the snapshot is flagged synthetic in
  // inventory_snapshots.is_synthetic, hide MoM comparisons (no real prior
  // month to compare against) and surface a clear honest label per Notion
  // SOP 3620a2d3110081bc8deef3944a4b8fe4. First real month-end snapshot
  // expected 2026-05-31; until then the 2026-03-31 / 2026-04-30 rows are
  // synthetic baselines.
  const isSynthetic = !!k.is_synthetic;

  // ── KPI 1: Inventory health (5-class breakdown + MoM) ─────────
  const h = k.health || {};
  const hClasses = h.classes || {};
  const order = ['Active', 'Slow', 'Misplaced', 'Dead', 'Discontinued'];
  // Class rows: hide MoM badge when synthetic (no comparable prior month).
  const hRows = order.map(cls => {
    const r = hClasses[cls] || { amount: 0, pct: 0, mom_amount: 0, mom_pct: null };
    const trailer = isSynthetic ? '' : momBadge(r.mom_amount, r.mom_pct);
    return kpiRow(cls,
      fmtMoneyShort(r.amount) + ' (' + fmtPctSign(r.pct) + ')' + trailer);
  }).join('');
  const deadAmt = ((hClasses.Dead && hClasses.Dead.amount) || 0) + ((hClasses.Discontinued && hClasses.Discontinued.amount) || 0);
  const deadPct = h.total_stock ? (deadAmt / h.total_stock * 100) : 0;
  const k1Class = deadPct > 30 ? 'danger' : deadPct > 20 ? 'warn' : '';
  const k1Sub = isSynthetic
    ? '5-class distribution · MoM hidden (synthetic baseline)'
    : '5-class distribution (MoM vs ' + ymPrev + ')';
  // K1 wrapper — when synthetic, append a gray honest banner directly
  // below the headline number, before the 5-class breakdown.
  const syntheticBanner = isSynthetic
    ? '<div class="synthetic-banner">⚠️ synthetic baseline · 真月底快照从 2026-05-31 起</div>'
    : '';
  const c1 = ''
    + '<div class="card">'
    +   '<div class="label">① Inventory health</div>'
    +   '<div class="value num' + (k1Class ? ' ' + k1Class : '') + '">' + fmtMoneyShort(h.total_stock || 0) + '</div>'
    +   syntheticBanner
    +   '<div class="month-tag">' + k1Sub + '</div>'
    +   '<div class="kpi-rows">' + hRows + '</div>'
    +   (asOf ? '<div class="as-of">' + asOf + '</div>' : '')
    + '</div>';

  // ── KPI 2: Order gap (PO vs Sales consumed) ───────────────────
  const og = k.order_gap || {};
  const gapNum = +(og.gap || 0);
  const gapStr = (gapNum >= 0 ? '+' : '-') + fmtMoneyShort(Math.abs(gapNum));
  const gapClass = gapNum < 0 ? 'danger' : 'ok';
  const abcd = og.abcd_distribution || {};
  const abcdStr = ['A', 'B', 'C', 'D'].map(g => g + '=' + (abcd[g] || 0)).join(' / ');
  const c2 = kpiCard('② Order gap (' + (k.ym_curr || '—') + ')',
    gapStr,
    'PO ' + fmtMoneyShort(og.po_curr_amt) + ' · Sales ' + fmtMoneyShort(og.sales_consumed_curr),
    kpiRow('Next-month projection', fmtMoneyShort(og.next_month_projection)) +
    kpiRow('ABCD distribution', abcdStr),
    'baseline: last-month sales × 1.05',
    gapClass);

  // ── KPI 3: Stockout SKU alert (OEM/Agency split) ──────────────
  const so = k.stockout || {};
  const oemSo = so.OEM || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 51 };
  const agcSo = so.Agency || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 8 };
  const soTotal = (oemSo.already_out || 0) + (agcSo.already_out || 0);
  const soClass = soTotal > 0 ? 'danger' : '';
  const c3 = kpiCard('③ Stockout SKU alert',
    soTotal + ' SKU out',
    'split by source · lead-time differs OEM/Agency',
    kpiRow('OEM (China · ' + oemSo.lead_days + 'd)',
      oemSo.already_out + ' out / ' + oemSo.at_risk_14d + ' 14d / ' + oemSo.at_risk_30d + ' 30d') +
    kpiRow('Agency (MY · ' + agcSo.lead_days + 'd)',
      agcSo.already_out + ' out / ' + agcSo.at_risk_14d + ' 14d / ' + agcSo.at_risk_30d + ' 30d'),
    asOf, soClass);

  // ── KPI 4: OEM vs Agency ──────────────────────────────────────
  const ova = k.oem_vs_agency || {};
  const oem = ova.OEM || {};
  const agc = ova.Agency || {};
  const totVal = (oem.stock_value || 0) + (agc.stock_value || 0);
  const c4 = kpiCard('④ OEM vs Agency',
    fmtMoneyShort(totVal),
    'Stock value + dead-rate by source',
    kpiRow('OEM stock', fmtMoneyShort(oem.stock_value) + ' · dead ' + fmtPctSign(oem.dead_rate_pct)) +
    kpiRow('Agency stock', fmtMoneyShort(agc.stock_value) + ' · dead ' + fmtPctSign(agc.dead_rate_pct)) +
    kpiRow('Lead time', 'OEM ' + (oem.lead_days || 51) + 'd · Agency ' + (agc.lead_days || 8) + 'd'),
    'hard-coded lead · per-SKU pending po_grn multi-mo history');

  // ── Alert 1: OEM PO calendar ──────────────────────────────────
  const po = a.po_calendar || {};
  const poRows = (po.by_eta_month || []).slice(0, 4).map(m =>
    aRow(escapeHtml(m.eta_ym) + ' (' + escapeHtml(m.source || '—') + ')',
      (m.open_pos || 0) + ' POs · ' + fmtMoneyShort(m.po_amt))
  ).join('') || aRow('No open POs', '');
  const a1Tone = (po.open_total || 0) > 0 ? 'warn' : 'ok';
  const al1 = alertCard('① OEM PO calendar',
    (po.open_total || 0) + ' open',
    fmtMoneyShort(po.open_amt) + ' in-transit · lead OEM=51d / Agency=8d',
    a1Tone, poRows);

  // ── Alert 2: Transfer engine (Misplaced) ──────────────────────
  const xfer = a.transfer_engine || {};
  const xferRows = (xfer.top20 || []).slice(0, 5).map(t =>
    aRow(escapeHtml(t.item_code) + ' ' + t.from_store + '→' + t.to_store,
      (t.transfer_qty_est || 0) + ' pcs · ' + fmtMoneyShort(t.transfer_value_est))
  ).join('') || aRow('No transfer opportunities', '');
  const a2Tone = (xfer.total_opportunities || 0) > 0 ? 'ok' : 'na';
  const al2 = alertCard('② Transfer engine (Misplaced)',
    (xfer.total_opportunities || 0) + ' opps',
    'Release est. ' + fmtMoneyShort(xfer.total_value_est) + ' · top 5 ↓',
    a2Tone, xferRows);

  // ── Alert 3: Liquidation ──────────────────────────────────────
  const liq = a.liquidation || {};
  const tier = liq.by_tier || {};
  const tier365 = tier.tier_365_plus || { n: 0, amt: 0 };
  const tier180 = tier.tier_180_365 || { n: 0 };
  const tier90 = tier.tier_90_180 || { n: 0 };
  const a3Tone = (liq.total_locked_value || 0) > 100000 ? 'bad'
              : (liq.total_locked_value || 0) > 10000  ? 'warn' : 'ok';
  const al3 = alertCard('③ Liquidation candidates (Dead/Disc)',
    (liq.total_candidates || 0) + ' SKU',
    'Capital locked ' + fmtMoneyShort(liq.total_locked_value),
    a3Tone,
    aRow('365d+', tier365.n + ' (' + fmtMoneyShort(tier365.amt) + ')') +
    aRow('180-365d', tier180.n + '') +
    aRow('90-180d', tier90.n + '') +
    aRow('Discount rec.', '365d+ 50% · 180-365 25% · 90-180 10%'));

  // ── Alert 4: PO anomalies ─────────────────────────────────────
  const anom = a.po_anomalies || {};
  const overd = anom.overdue_po || { count: 0 };
  const deficit = anom.grn_deficit || { count: 0 };
  const drift = anom.price_drift || { count: 0 };
  const anomTotal = (overd.count || 0) + (deficit.count || 0) + (drift.count || 0);
  const a4Tone = anomTotal > 0 ? 'warn' : 'ok';
  const al4 = alertCard('④ Purchase anomalies',
    anomTotal + ' issues',
    null, a4Tone,
    aRow('Overdue PO (>60d)', overd.count || 0) +
    aRow('GRN < PO', deficit.count || 0) +
    aRow('Unit price drift >20%', drift.count || 0));

  return title
    + '<div class="cards-grid">' + c1 + c2 + c3 + c4 + '</div>'
    + '<div class="section-title">Action alerts · ' + (a.snapshot_date || asOf) + '</div>'
    + '<div class="cards-grid">' + al1 + al2 + al3 + al4 + '</div>';
}
