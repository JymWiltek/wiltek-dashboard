    +     '<div class="s4-sub">' + t('page.sub.month_scope') + ' ' + s.month + ' · ' + t('customer.header.sub') + ' (customers_payload + floatation)</div></div>'
    +   '<button class="s4-btn primary" onclick="openAssignModal({module:\'customer\'})">⊕ ' + t('overview.btn.assign') + '</button>'
    + '</div>';

  if (s.loading || !s.data) {
    return '<div class="sales-v3">' + header
      + '<div class="kpi-hero-row">'
      +   '<div class="kpi-card"><div class="skeleton h-value" style="height:32px"></div></div>'.repeat(4)
      + '</div></div>';
  }

  // Phase 6c 6+1 层链路: 谁来 → 多忠 → 买什么 → 哪店哪族 → 具体人 → 趋势 → 行动。
  return '<div class="sales-v3">'
    + header
    // 第 1 层 — 种族 (谁来)
    + '<div class="s4-section-title">' + t('customer.section.race') + ' <span class="s4-section-aux">' + t('customer.aux.race') + '</span></div>'
    + renderCustomerRaceCards(s)
    // 第 2 层 — 会员年龄分段 (这群人多忠)
    + '<div class="s4-section-title">' + t('customer.section.age') + ' <span class="s4-section-aux">' + t('customer.aux.age') + '</span></div>'
    + renderCustomerAgeTiers(s)
    // 第 3 层 — 年龄段 × 品类 (他们买什么) — NEW
    + '<div class="s4-section-title">' + t('customer.section.age_cat') + ' <span class="s4-section-aux">' + t('customer.aux.age_cat') + '</span></div>'
    + renderCustomerAgeCategoryCrosstab(s)
    // 第 4 层 — 6 店 × 种族 (哪店哪族表现好)
    + renderCustomerCharts(s)
    + '<div class="s4-section-title">' + t('customer.section.matrix') + ' <span class="s4-section-aux">' + t('customer.aux.matrix') + '</span></div>'
    + renderCustomerStoreRaceMatrix(s)
    // 第 5 层 — 客户名单 (具体到人)
    + '<div class="s4-section-title">' + t('customer.section.vip') + ' <span class="s4-section-aux">' + t('customer.aux.vip') + '</span></div>'
    + renderCustomerLists(s)
    // 12M 趋势 (背景趋势, 保留)
    + '<div class="s4-section-title">' + t('customer.section.trend') + '</div>'
    + renderCustomerTrend(s)
    // 第 6 层 — Action Plan (该做什么 · 收尾) — NEW
    + '<div class="s4-section-title">' + t('customer.section.action') + ' <span class="s4-section-aux">' + t('customer.aux.action') + '</span></div>'
    + renderCustomerActionPlan(s);
}

// 会员年龄分段 4 cards — replaces PR#55 4-KPI hero. From customers_payload
// buckets_by_window: 12m → 会员数/复购率/12M 客单价; 1m → 本月消费.
function renderCustomerAgeTiers(s) {
  const resp = s.data.payload || {};
  const pd = resp.data;
  if (resp.degraded || !pd) {
    return '<div class="s4-data-gap">' + t('customer.agetier.gap') + escapeHtml(resp.degraded_reason || '') + '</div>';
  }
  const b12 = (pd.buckets_by_window && pd.buckets_by_window['12m']) || [];
  const b1  = (pd.buckets_by_window && pd.buckets_by_window['1m'])  || [];
  const by12 = {}; b12.forEach(x => by12[x.key] = x);
  const by1  = {}; b1.forEach(x => by1[x.key] = x);
  const total = (pd.summary && pd.summary.total_members) || b12.reduce((a, x) => a + (x.n || 0), 0);
  const cards = AGE_TIER_ORDER.map(k => {
    const r = by12[k] || { n: 0, amt: 0, aov: 0, repeat_pct: null };
    const m = by1[k]  || { amt: 0 };
    const sharePct = total > 0 ? (r.n / total * 100) : 0;
    return ''
      + '<div class="kpi-card" style="border-top-color:var(--brand)">'
      +   '<div class="kpi-icon">' + AGE_TIER_ICON[k] + '</div>'
      +   '<div class="kpi-title">' + t('customer.agetier.title', { tier: k }) + '</div>'
      +   '<div class="kpi-actual">' + fmtInt(r.n) + ' <span style="font-size:14px;color:#6B7280;font-weight:400">' + t('customer.unit.ppl') + '</span></div>'
      +   '<div class="kpi-status-row"><span class="kpi-pct" style="color:var(--s4-text-primary);font-size:16px">' + t('customer.share_member', { pct: sharePct.toFixed(1) }) + '</span></div>'
      +   '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + Math.min(100, sharePct) + '%;background:var(--brand)"></div></div>'
      +   '<div class="kpi-meta">'
      +     t('customer.agetier.spend') + ' <strong>' + fmtRM(m.amt) + '</strong><br>'
      +     t('customer.agetier.repeat') + ' <strong>' + (r.repeat_pct != null ? Number(r.repeat_pct).toFixed(1) + '%' : '—') + '</strong> ' + t('customer.agetier.repeat_note') + '<br>'
      +     t('customer.agetier.aov') + ' <strong>' + (r.aov != null ? fmtRM(r.aov) : '—') + '</strong>'
      +   '</div>'
      + '</div>';
  }).join('');
  return '<div class="kpi-hero-row">' + cards + '</div>';
}

// Customer Action Plan (第 6 层 · 收尾) — 5 个异常自动检测 + 归因 + 派派。
// 复用 Sales/Overview 框架 (.s4-action-card + openAssignModal seed +
// renderS4SentActionCard)。数据全来自已 fetch 的 payload / race / matrix / agecat,
// 不需新 RPC。
function buildCustomerAnomalies(s) {
  const pd = (s.data.payload && s.data.payload.data) || null;
  const rd = (s.data.race    && s.data.race.data)    || null;
  const md = (s.data.matrix  && s.data.matrix.data)  || null;
  const ad = (s.data.agecat  && s.data.agecat.data)  || null;
  const RACE_LABEL = { chinese: 'Chinese', malay: 'Malay', indian: 'Indian', other: 'Other' };
  const out = [];

  // 1) 店 × 种族 closing 偏低 (样本 ≥ 5):
  //    < 60% 红 (严重); 60-70% 且比公司均低 ≥10pp 黄 (中度)。
  if (md && Array.isArray(md.matrix)) {
    const companyCr = (rd && rd.total && rd.total.closing_rate != null) ? rd.total.closing_rate : null;
    const cells = [];
    md.matrix.forEach(row => {
      ['chinese', 'malay', 'indian', 'other'].forEach(rk => {
        const c = row[rk];
        if (!c || (c.walkin || 0) < 5 || c.closing_rate == null) return;
        const cr = c.closing_rate;
        let sev = null;
        if (cr < 60) sev = 'red';
        else if (cr < 70 && companyCr != null && (companyCr - cr) >= 10) sev = 'amber';
        if (sev) cells.push({ store: row.store, race: rk, cr, walkin: c.walkin, sev });
      });
    });
    // 红优先, 再按成交率升序; 最多 5 张避免刷屏。
    cells.sort((a, b) => (a.sev === b.sev ? a.cr - b.cr : (a.sev === 'red' ? -1 : 1)))
      .slice(0, 5).forEach(c => {
        out.push({
          severity: c.sev,
          title: t('customer.anom.closing_low.title', { store: c.store, race: RACE_LABEL[c.race] }),
          detail: t('customer.anom.closing_low.detail', { store: c.store, race: RACE_LABEL[c.race], cr: c.cr.toFixed(1), n: fmtInt(c.walkin) })
                + (companyCr != null ? ' · ' + t('customer.anom.company_avg', { pct: companyCr.toFixed(1) }) : ''),
          recommended_action: t('customer.anom.closing_low.rec', { store: c.store }),
          recommended_assignee: c.store.toLowerCase() + '_manager',
          store: c.store,
        });
      });
  }

  // 2) 沉睡 / 流失高值会员 — churn n_high_value ≥ 50
  if (pd && pd.churn && pd.churn.summary && (pd.churn.summary.n_high_value || 0) >= 50) {
    const ch = pd.churn.summary;
    const thr = ch.high_value_threshold || 1000;
    const tops = (pd.churn.rows || []).filter(r => (r.amount || 0) >= thr).sort((a, b) => (b.amount || 0) - (a.amount || 0));
    const top3sum = tops.slice(0, 3).reduce((a, r) => a + (r.amount || 0), 0);
    const c0 = tops[0];
    out.push({
      severity: ch.n_high_value > 100 ? 'red' : 'amber',
      title: t('customer.anom.dormant_hv.title'),
      detail: t('customer.anom.dormant_hv.detail', { n: fmtInt(ch.n_high_value), months: (ch.cutoff_months || 6), top3: fmtRM(top3sum), lifetime: fmtRM(ch.lifetime_rm || 0) }),
      recommended_action: t('customer.anom.dormant_hv.rec') + (c0 ? ' ' + t('customer.anom.dormant_hv.rec_top', { name: (c0.name || c0.mc || '—'), rm: fmtInt(c0.amount || 0) }) : ''),
      recommended_assignee: 'marketing_lead',
    });
  }

  // 3) 年龄段 × 品类偏单一 (单一品类 > 30%) + 3b) 主流品类缺口 (=0)。
  if (ad && Array.isArray(ad.rows) && ad.rows.length) {
    const MAINSTREAM = ['Faucet', 'Water Closet', 'Kitchen Sink', 'Wash Basin', 'Appliances'];
    const byAge = {};
    ad.rows.forEach(r => {
      const a = r.age_bucket; if (!byAge[a]) byAge[a] = { total: 0, cats: {} };
      byAge[a].total += (+r.sales || 0);
      byAge[a].cats[r.category] = (byAge[a].cats[r.category] || 0) + (+r.sales || 0);
    });
    // 3) 偏单一 > 30% (Wiltek 品类分散, 40% 永不触发) — 取最集中 3 个龄段
    const flagged = [];
    Object.keys(byAge).forEach(a => {
      const b = byAge[a]; if (b.total <= 0) return;
      let topCat = null, topV = 0, secCat = null, secV = 0;
      Object.entries(b.cats).forEach(([cat, v]) => {
        if (v > topV) { secCat = topCat; secV = topV; topCat = cat; topV = v; }
        else if (v > secV) { secCat = cat; secV = v; }
      });
      const share = topV / b.total * 100;
      if (share > 30) flagged.push({ age: a, cat: topCat, share, sec: secCat });
    });
    flagged.sort((x, y) => y.share - x.share).slice(0, 3).forEach(f => {
      out.push({
        severity: 'amber',
        title: t('customer.anom.single_cat.title', { age: f.age }),
        detail: t('customer.anom.single_cat.detail', { age: f.age, cat: f.cat, pct: f.share.toFixed(0) }),
        recommended_action: f.sec ? t('customer.anom.single_cat.rec_sec', { sec: f.sec }) : t('customer.anom.single_cat.rec'),
      });
    });
    // 3b) 主流品类 (Top 5) 在某龄段 = 0 → 调查是否异常 (最多 3 张)
    const gaps = [];
    AGE_TIER_ORDER.forEach(a => {
      const b = byAge[a]; if (!b || b.total <= 0) return;
      MAINSTREAM.forEach(cat => { if (!(b.cats[cat] > 0)) gaps.push({ age: a, cat }); });
    });
    gaps.slice(0, 3).forEach(g => {
      out.push({
        severity: 'amber',
        title: t('customer.anom.cat_gap.title', { age: g.age, cat: g.cat }),
        detail: t('customer.anom.cat_gap.detail', { age: g.age, cat: g.cat }),
        recommended_action: t('customer.anom.cat_gap.rec'),
      });
    });
  }

  // 4) 种族 walk-in target 缺口 (<80%) — 仅在目标已设时触发
  if (rd && Array.isArray(rd.races)) {
    rd.races.forEach(r => {
      if (r.walkin_target != null && r.walkin_target_pct != null && r.walkin_target_pct < 80) {
        const gap = Math.max(0, Math.round((r.walkin_target || 0) - (r.walkin || 0)));
        out.push({
          severity: r.walkin_target_pct < 60 ? 'red' : 'amber',
          title: t('customer.anom.walkin_lag.title', { race: RACE_LABEL[r.race] }),
          detail: t('customer.anom.walkin_lag.detail', { race: RACE_LABEL[r.race], pct: r.walkin_target_pct.toFixed(0), actual: fmtInt(r.walkin), target: fmtInt(r.walkin_target) }),
          recommended_action: t('customer.anom.walkin_lag.rec', { gap: fmtInt(gap) }),
          recommended_assignee: 'marketing_lead',
        });
      }
    });
  }

  // 5) 8y+ 老客消费占比偏低 (会员占比 ≥15% 但销售占比 <10%)
  if (pd && pd.summary && pd.buckets_by_window && pd.buckets_by_window['12m']) {
    const total = pd.summary.total_members || 0;
    const b12 = pd.buckets_by_window['12m'];
    const eightY = b12.find(x => x.key === '8y+');
    const sumAmt = b12.reduce((a, x) => a + (+x.amt || 0), 0);
    if (eightY && total > 0 && sumAmt > 0) {
      const memShare = eightY.n / total * 100;
      const salesShare = (+eightY.amt || 0) / sumAmt * 100;
      if (memShare >= 15 && salesShare < memShare * 0.7) {
        out.push({
          severity: 'amber',
          title: '8y+ ' + t('customer.anom.loyal_low.title'),
          detail: t('customer.anom.loyal_low.detail', { memPct: memShare.toFixed(1), salesPct: salesShare.toFixed(1) }),
          recommended_action: t('customer.anom.loyal_low.rec'),
          recommended_assignee: 'marketing_lead',
        });
      }
    }
  }
  return out;
}

function renderCustomerActionPlan(s) {
  const anomalies = buildCustomerAnomalies(s);
  const anomCards = anomalies.map(a => {
    const sev = a.severity || 'amber';
    const seed = JSON.stringify({
      title: a.title, severity: sev, detail: a.detail,
      recommended_action: a.recommended_action,
      recommended_assignee: a.recommended_assignee,
      store: a.store || null,
      source_url: '?view=customers&month=' + state.month + (a.store ? '&branch=' + a.store : ''),
      source_data: a,
    }).replace(/"/g, '&quot;');
    return ''
      + '<div class="s4-action-card ' + sev + '">'
      +   '<div class="a-title">' + escapeHtml(a.title) + '</div>'
      +   '<div class="a-detail">' + escapeHtml(a.detail) + '</div>'
      +   (a.recommended_action ? '<div class="a-action-text">👉 ' + escapeHtml(a.recommended_action) + '</div>' : '')
      +   '<div class="a-controls"><button class="s4-btn primary" onclick="openAssignModal(' + seed + ')">→ ' + t('overview.btn.assign_arrow') + '</button></div>'
      + '</div>';
  }).join('');
  const anomBlock = anomCards
    ? '<div>' + anomCards + '</div>'
    : '<div class="s4-data-gap">' + t('customer.action.anomaly_empty') + '</div>';

  const actions = (s.data.actions && Array.isArray(s.data.actions.actions)) ? s.data.actions.actions : [];
  const sentCards = actions.map(a => renderS4SentActionCard(a)).join('');
  const sentBlock = sentCards
    ? '<div>' + sentCards + '</div>'
    : '<div class="s4-data-gap">' + t('customer.action.sent_empty') + '</div>';

  return ''
    + '<div class="s4-action-grid">'
    +   '<div><div class="s4-section-title" style="margin-top:0;font-size:16px">⚠ ' + t('overview.section.anomaly') + '</div>' + anomBlock + '</div>'
    +   '<div><div class="s4-section-title" style="margin-top:0;font-size:16px">📋 ' + t('customer.action.sent_title', { n: actions.length }) + '</div>' + sentBlock + '</div>'
    + '</div>';
}

// 种族 4 cards — data display (no status border)
// Phase 6f: vs-comparison span — ↑绿 / ↓红 / 持平(差<2%)灰 ↔. base 空/0 → —.
// 走廊客 walk-in 越多越好, 故 ↑ = 绿。
function histPctSpan(label, cur, base) {
  if (base == null || base === 0) return '<span>' + label + ' —</span>';
  const pct = (cur - base) / base * 100;
  const cls = pct > 2 ? 'crc-up' : pct < -2 ? 'crc-down' : 'crc-flat';
  const arrow = pct > 2 ? '↑' : pct < -2 ? '↓' : '↔';
  return '<span>' + label + ' <span class="' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span></span>';
}

// Phase 10B — Customer chart: 6 店成交率横条 (复用 matrix: Σ race purchases /
// total_walkin per store)。走廊客趋势已由 renderCustomerTrend 渲染, 不重复。
function renderCustomerCharts(s) {
  let html = '';
  const matrix = (s.data.matrix && s.data.matrix.data && s.data.matrix.data.matrix) || [];
  if (matrix.length) {
    const races = ['chinese', 'malay', 'indian', 'other'];
    const bars = matrix.map(m => {
      const walk = m.total_walkin || 0;
      let pur = 0; races.forEach(rk => { if (m[rk]) pur += (m[rk].purchases || 0); });
      const rate = walk > 0 ? Math.round(pur / walk * 1000) / 10 : 0;
      return { label: matrixStoreLabel ? matrixStoreLabel(m.store) : m.store, value: rate,
               color: rate >= 80 ? '#16A34A' : rate >= 60 ? '#D97706' : '#DC2626', store: m.store };
    }).filter(b => b.value > 0).sort((a, b) => b.value - a.value);
    if (bars.length) {
      html += '<div class="inv-section-title">🎯 ' + t('chart.store_closing') + '</div>'
        + '<div class="chart-card">' + svgBarChart({ rows: bars, width: 640, height: 220, valueFmt: v => v.toFixed(1) + '%' }) + '</div>';
    }
  }
  return html;
}

function renderCustomerRaceCards(s) {
  const resp = s.data.race || {};
  if (resp.degraded || !resp.data) {
    return '<div class="s4-data-gap">' + t('customer.race.gap') + '</div>';
  }
  const races = Array.isArray(resp.data.races) ? resp.data.races : [];
  const byRace = {}; races.forEach(r => byRace[r.race] = r);
  const cards = RACE_ORDER.map(rk => {
    const r = byRace[rk] || {};
    const meta = RACE_META[rk];
    const cr = r.closing_rate;
    const crColor = cr == null ? '#6B7280' : cr >= 80 ? '#16A34A' : cr >= 60 ? '#D97706' : '#DC2626';
    const barPct = Math.min(100, cr || 0);
    const tgtColor = r.walkin_target_pct == null ? '#6B7280'
      : r.walkin_target_pct >= 100 ? '#16A34A' : r.walkin_target_pct >= 80 ? '#D97706' : '#DC2626';
    const targetLine = (r.walkin_target != null)
      ? t('customer.race.target') + ' <strong>' + fmtInt(r.walkin_target) + '</strong> · ' + t('customer.race.progress') + ' <strong style="color:' + tgtColor + '">'
        + (r.walkin_target_pct != null ? r.walkin_target_pct.toFixed(0) + '%' : '—') + '</strong>'
      : '<span style="color:#9CA3AF">' + t('customer.race.target_unset') + '</span>';
    const hist = '<div class="crc-hist">'
      + histPctSpan(t('common.vs_prev'), r.walkin || 0, r.walkin_prev)
      + '<span>' + t('customer.vs_last_year') + ' —</span>'
      + histPctSpan(t('customer.vs_3mo_avg'), r.walkin || 0, r.walkin_3mo_avg)
      + '</div>';
    // Phase 10B 灯: 走廊客 target 完成率 ≥95 绿 / 80-95 黄 / <80 红; 无目标灰。
    const raceLight = heroLightColor(r.walkin_target_pct, 95, 80, false);
    return ''
      + '<div class="cust-race-card">'
      +   heroLightDot(raceLight)
      +   '<div class="crc-icon">' + meta.icon + '</div>'
      +   '<div class="crc-title">' + t(meta.labelKey) + '</div>'
      +   '<div class="crc-big">' + fmtInt(r.walkin || 0) + ' <span class="crc-unit">' + t('customer.unit.ppl') + '</span></div>'
      +   '<div class="crc-cr" style="color:' + crColor + '">' + (cr != null ? cr.toFixed(1) + '% ' + t('customer.closing') : '— ' + t('customer.closing')) + '</div>'
      +   '<div class="crc-bar"><span style="width:' + barPct + '%"></span></div>'
      +   '<div class="crc-meta">'
      +     t('customer.bought') + ' <strong>' + fmtInt(r.purchases || 0) + '</strong> ' + t('customer.unit.ppl') + ' · ' + t('customer.of_walkin') + ' ' + (r.walkin_pct != null ? r.walkin_pct.toFixed(1) + '%' : '—') + '<br>'
      +     'Revenue <strong>' + fmtRM(r.revenue || 0) + '</strong> (' + (r.revenue_pct != null ? r.revenue_pct.toFixed(1) + '%' : '—') + ')<br>'
      +     'Avg Basket <strong>' + (r.avg_basket != null ? fmtRMpr(r.avg_basket) : '—') + '</strong>'
      +   '</div>'
      +   '<div class="crc-target">' + targetLine + '</div>'
      +   '<div class="crc-foot"><hr class="crc-sep">' + hist + '</div>'
      + '</div>';
  }).join('');
  return '<div class="cust-race-grid">' + cards + '</div>';
}

// 6 店 × 4 种族 matrix — table, closing% color-coded
function renderCustomerStoreRaceMatrix(s) {
  const resp = s.data.matrix || {};
  if (resp.degraded || !resp.data) {
    return '<div class="s4-data-gap">' + t('customer.matrix.gap') + '</div>';
  }
  const matrix = Array.isArray(resp.data.matrix) ? resp.data.matrix : [];
  const sorted = matrix.slice().sort((a, b) => {
    const ia = MATRIX_STORE_ORDER.indexOf(a.store), ib = MATRIX_STORE_ORDER.indexOf(b.store);
    if (ia === -1 && ib === -1) return (a.store||'').localeCompare(b.store||'');
    if (ia === -1) return 1; if (ib === -1) return -1; return ia - ib;
  });
  const cell = (rc) => {
    if (!rc || (!rc.walkin && !rc.purchases)) return '<span style="color:var(--s4-text-light)">—</span>';
    const cr = rc.closing_rate;
    // color only when sample >= 5 walk-in
    let color = 'var(--s4-text-primary)';
    if (rc.walkin >= 5 && cr != null) {
      color = cr >= 80 ? 'var(--s4-green-text)' : cr >= 60 ? 'var(--s4-amber-text)' : 'var(--s4-red-text)';
    }
    // Phase 6f: tooltip 加 vs 上月 成交 (pp) + walk-in (%)。
    let tip = 'Revenue ' + fmtRM(rc.revenue) + ' · AOV ' + (rc.purchases > 0 ? fmtRMpr(rc.revenue / rc.purchases) : '—');
    if (rc.closing_prev != null && cr != null) {
      const dpp = cr - rc.closing_prev;
      tip += ' · ' + t('customer.matrix.tip_closing') + ' ' + (dpp >= 0 ? '+' : '') + dpp.toFixed(1) + 'pp';
    }
    if (rc.walkin_prev != null && rc.walkin_prev > 0) {
      const wd = (rc.walkin - rc.walkin_prev) / rc.walkin_prev * 100;
      tip += ' · ' + t('customer.matrix.tip_walkin') + ' ' + (wd >= 0 ? '+' : '') + wd.toFixed(0) + '%';
    }
    return '<span title="' + tip + '">'
      + fmtInt(rc.walkin) + ' → ' + fmtInt(rc.purchases)
      + (cr != null ? ' <span style="color:' + color + '">(' + cr.toFixed(0) + '%)</span>' : '')
      + '</span>';
  };
  const rows = sorted.map(m => ''
    + '<tr>'
    +   '<td><strong>' + escapeHtml(matrixStoreLabel(m.store)) + '</strong></td>'
    +   '<td>' + cell(m.chinese) + '</td>'
    +   '<td>' + cell(m.malay) + '</td>'
    +   '<td>' + cell(m.indian) + '</td>'
    +   '<td>' + cell(m.other) + '</td>'
    +   '<td class="num"><strong>' + fmtInt(m.total_walkin) + '</strong></td>'
    + '</tr>').join('');
  // company total row
  const tot = { ch: 0, my: 0, in_: 0, ot: 0, walk: 0 };
  sorted.forEach(m => {
    tot.ch += (m.chinese?.walkin || 0); tot.my += (m.malay?.walkin || 0);
    tot.in_ += (m.indian?.walkin || 0); tot.ot += (m.other?.walkin || 0);
    tot.walk += (m.total_walkin || 0);
  });
  const totRow = '<tr class="total-row" style="font-weight:700;background:var(--s4-amber-bg-soft)">'
    + '<td>' + t('customer.matrix.company_total') + '</td>'
    + '<td>' + fmtInt(tot.ch) + '</td><td>' + fmtInt(tot.my) + '</td>'
    + '<td>' + fmtInt(tot.in_) + '</td><td>' + fmtInt(tot.ot) + '</td>'
    + '<td class="num">' + fmtInt(tot.walk) + '</td></tr>';
  return ''
    + '<div class="s4-drill"><div class="s4-drill-body">'
    +   '<table><thead><tr>'
    +     '<th>' + t('customer.col.store') + '</th><th>Chinese</th><th>Malay</th><th>Indian</th><th>Other</th><th>' + t('customer.col.total_walkin') + '</th>'
    +   '</tr></thead><tbody>' + rows + totRow + '</tbody></table>'
    +   '<div class="muted" style="margin-top:8px;font-size:11px">' + t('customer.matrix.footnote') + '</div>'
    + '</div></div>';
}

// 客户名单 — tabs: 沉睡 VIP / 老客流失 / Top VIP. From customers_payload
// (top100 + churn.rows). Per-store filter dropdown. Mirrors V1 churn list +
// computeSleepingTop + VIP lifetime sort.
function renderCustomerLists(s) {
  const resp = s.data.payload || {};
  const pd = resp.data;
  if (resp.degraded || !pd) {
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">' + t('customer.lists.gap') + '</div></div></div>';
  }
  const top = pd.top100 || [];
  const churnRows = (pd.churn && pd.churn.rows) || [];
  const thr = (pd.churn && pd.churn.summary && pd.churn.summary.high_value_threshold) || 1000;

  // store filter options (union of top100 + churn branches)
  const storeSet = new Set();
  top.forEach(r => { if (r.branch) storeSet.add(r.branch); });
  churnRows.forEach(r => { if (r.branch) storeSet.add(r.branch); });
  const stores = sortStoresByCode(Array.from(storeSet));
  const matchStore = (b) => !custVipStore || b === custVipStore;
  const storeSel = '<select onchange="setCustVipStore(this.value)" style="height:30px;border:1px solid var(--s4-divider);border-radius:6px;padding:0 8px;font-size:13px;background:var(--s4-card-bg);color:var(--s4-text-primary)">'
    + '<option value=""' + (custVipStore === '' ? ' selected' : '') + '>' + t('customer.lists.all_stores') + '</option>'
    + stores.map(st => '<option value="' + st + '"' + (custVipStore === st ? ' selected' : '') + '>' + escapeHtml(matrixStoreLabel(st)) + '</option>').join('')
    + '</select>';

  const tabs = [
    { id: 'sleeping', label: t('customer.tab.dormant_vip') },
    { id: 'churn',    label: t('customer.tab.lapsed_loyal') },
    { id: 'vip',      label: t('customer.tab.top_vip') },
  ];
  const tabHtml = tabs.map(t =>
    '<button class="' + (custListTab === t.id ? 'active' : '') + '" onclick="setCustListTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');

  const CAP = 50;
  const capNote = (n) => n > CAP
    ? '<div class="muted" style="margin-top:8px;font-size:11px">' + t('customer.lists.cap_note', { cap: CAP, total: fmtInt(n) }) + '</div>'
    : '';
  const nameCell = (r) => '<td><div style="font-weight:600">' + escapeHtml(r.name || r.mc || '—') + '</div><div style="font-size:11px;color:#6B7280">' + escapeHtml(r.mc || '') + '</div></td>';
  const storeTag = (b) => '<td><strong>' + escapeHtml(b || '—') + '</strong></td>';

  let body;
  if (custListTab === 'sleeping') {
    const rows = top.filter(r => (r.m3_visits || 0) === 0 && matchStore(r.branch))
      .sort((a, b) => (b.lifetime_amt || 0) - (a.lifetime_amt || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">' + t('customer.lists.sleeping_empty') + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>' + t('customer.col.store') + '</th><th>' + t('customer.col.member') + '</th><th>' + t('customer.col.lifetime_rm') + '</th><th>' + t('customer.col.spend_6m') + '</th><th>' + t('customer.col.last') + '</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.lifetime_amt || 0) + '</td>'
            + '<td>' + fmtRM(r.m6_amt || 0) + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')
        + '</tbody></table>' + capNote(rows.length);
    }
  } else if (custListTab === 'churn') {
    const rows = churnRows.filter(r => (r.amount || 0) >= thr && matchStore(r.branch))
      .sort((a, b) => (b.amount || 0) - (a.amount || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">' + t('customer.lists.churn_empty', { thr: fmtInt(thr) }) + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>' + t('customer.col.store') + '</th><th>' + t('customer.col.member') + '</th><th>' + t('customer.col.lifetime_rm') + '</th><th>' + t('customer.col.silent') + '</th><th>' + t('customer.col.cust_type') + '</th><th>' + t('customer.col.last') + '</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.amount || 0) + '</td>'
            + '<td>' + (r.months_ago != null ? t('customer.cell.months', { n: r.months_ago }) : '—') + '</td>'
            + '<td>' + escapeHtml(r.cust_type || '—') + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')
        + '</tbody></table>' + capNote(rows.length);
    }
  } else { // vip
    const rows = top.filter(r => matchStore(r.branch))
      .sort((a, b) => (b.lifetime_amt || 0) - (a.lifetime_amt || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">' + t('customer.lists.vip_empty') + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>' + t('customer.col.store') + '</th><th>' + t('customer.col.member') + '</th><th>' + t('customer.col.lifetime_rm') + '</th><th>' + t('customer.col.visits_12m') + '</th><th>' + t('customer.col.cust_type') + '</th><th>' + t('customer.col.last') + '</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.lifetime_amt || 0) + '</td>'
            + '<td>' + fmtInt(r.ltm_visits || 0) + '</td>'
            + '<td>' + escapeHtml(r.cust_type || '—') + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')
        + '</tbody></table>' + capNote(rows.length);
    }
  }
  return '<div class="s4-drill">'
    + '<div class="s4-drill-tabs">' + tabHtml
    +   '<div style="margin-left:auto;display:flex;align-items:center;padding:6px 14px">' + storeSel + '</div>'
    + '</div>'
    + '<div class="s4-drill-body">' + body + '</div></div>';
}

// 会员年龄段 × 品类 cross-tab (第 3 层 · NEW) — from customer_age_category_crosstab.
// 横 = 4 龄段, 纵 = top 8 品类 (按总销售). 每格 = 本月销售 RM, 空 → —.
// 格底色按 sales 深浅 (绿色渐变), 一眼看出龄段×品类热点。Jym:「这群顾客买什么」。
function renderCustomerAgeCategoryCrosstab(s) {
  const resp = s.data.agecat || {};
  const pd = resp.data;
  const rowsRaw = (pd && pd.rows) || [];
  if (resp.degraded || !pd || pd.status === 'data_gap' || rowsRaw.length === 0) {
    const msg = (pd && pd.message) || resp.degraded_reason || t('customer.crosstab.no_data');
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">⚠ ' + escapeHtml(msg) + '</div></div></div>';
  }
  const ages = AGE_TIER_ORDER;
  // pivot: category -> {age: sales}; track category totals for top-8 select.
  const byCat = {};
  rowsRaw.forEach(r => {
    const cat = r.category || t('customer.crosstab.uncategorized');
    if (!byCat[cat]) byCat[cat] = { total: 0, cells: {} };
    byCat[cat].cells[r.age_bucket] = (byCat[cat].cells[r.age_bucket] || 0) + (+r.sales || 0);
    byCat[cat].total += (+r.sales || 0);
  });
  const cats = Object.keys(byCat).sort((a, b) => byCat[b].total - byCat[a].total).slice(0, 8);
  // max cell value (across displayed cats) for color depth.
  let maxCell = 0;
  cats.forEach(c => ages.forEach(a => { const v = byCat[c].cells[a] || 0; if (v > maxCell) maxCell = v; }));
  const cellBg = (v) => {
    if (!v || maxCell <= 0) return '';
    const alpha = 0.08 + 0.55 * (v / maxCell); // 0.08–0.63 green tint
    return 'background:rgba(31,95,74,' + alpha.toFixed(3) + ');' + (alpha > 0.4 ? 'color:#fff;' : '');
  };
  const head = '<tr><th>' + t('customer.col.category') + '</th>' + ages.map(a => '<th>' + a + '</th>').join('') + '<th>' + t('customer.col.total') + '</th></tr>';
  const body = cats.map(c => {
    const cells = ages.map(a => {
      const v = byCat[c].cells[a] || 0;
      return v > 0
        ? '<td style="' + cellBg(v) + '">' + fmtRM(v) + '</td>'
        : '<td style="color:var(--s4-text-light)">—</td>';
    }).join('');
    return '<tr><td><strong>' + escapeHtml(c) + '</strong></td>' + cells + '<td><strong>' + fmtRM(byCat[c].total) + '</strong></td></tr>';
  }).join('');
  // column totals row
  const colTot = ages.map(a => {
    let t = 0; cats.forEach(c => { t += byCat[c].cells[a] || 0; });
    return '<td><strong>' + fmtRM(t) + '</strong></td>';
  }).join('');
  const grand = cats.reduce((acc, c) => acc + byCat[c].total, 0);
  const totRow = '<tr class="total-row" style="font-weight:700;background:var(--s4-amber-bg-soft)"><td>' + t('customer.col.total') + '</td>' + colTot + '<td>' + fmtRM(grand) + '</td></tr>';
  return '<div class="s4-drill"><div class="s4-drill-body">'
    + '<table><thead>' + head + '</thead><tbody>' + body + totRow + '</tbody></table>'
    + '<div class="muted" style="margin-top:8px;font-size:11px">' + t('customer.crosstab.footnote') + '</div>'
    + '</div></div>';
}

// 12 月走廊客趋势 — single line (floatation monthly). From customer_trend RPC.
// RPC 返回 { rows:[{ym, walkin, ...}] }. 过滤掉 walkin=0 的早期月份
// (floatation 数据自 2026-01 起,之前为 0 → 折线会出现误导性悬崖)。
function renderCustomerTrend(s) {
  const tr = s.data.trend || {};
  const rows = ((tr.data && tr.data.rows) || []).filter(p => (p.walkin || 0) > 0);
  if (tr.degraded || rows.length === 0) {
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">' + t('customer.trend.gap') + '</div></div></div>';
  }
  return '<div class="s4-drill"><div class="s4-drill-body">'
    + svgLineChart({
        series: [{ name: 'Walk-in', color: '#1F5F4A', points: rows.map(p => ({ x: p.ym, y: p.walkin })) }],
        width: 900, height: 240, yFmt: fmtInt,
      })
    + '<div class="meta" style="font-size:12px;color:#6B7280;margin-top:8px">' + t('customer.trend.footnote') + '</div>'
    + '</div></div>';
}

/* ═══════════════════════════════════════════════════════════════════
   Phase 10A — 派派盒 (Action Inbox). Frontend-only: reuses
   /api/kpi?view=actions (RBAC: owner→all, manager→own) for reads, and
   /api/sync action_* modes via postAction() for writes. Assignee 不能直接
   拒绝 (只 接受 / 提议改→renegotiate / 完成); owner 视角只读。KPI/overdue/
   tabs 客户端算。
═══════════════════════════════════════════════════════════════════ */
async function fetchInbox(signal) {
  const j = await getJSON('/api/kpi?view=actions', signal);
  state.role = j.session_role || state.role;
  return j;
}
function inboxIsOverdue(a) {
  return (a.status === 'pending' || a.status === 'accepted')
    && a.ddl && a.ddl < new Date().toISOString().slice(0, 10);
}
function inboxDaysToDdl(a) {
  if (!a.ddl) return null;
  const ms = new Date(a.ddl + 'T00:00:00') - new Date(new Date().toISOString().slice(0, 10) + 'T00:00:00');
  return Math.round(ms / 86400000);
}
function renderInbox(s) {
  const isOwner = (s.role === 'owner');
  const title = '<h1 class="page-title">📥 ' + t('title.inbox') + '</h1>'
    + '<p class="page-sub">' + (isOwner ? t('inbox.owner_view') : t('inbox.assignee_view')) + '</p>';
  if (s.loading || !s.data) return title + '<div class="inv-empty">' + t('inbox.empty') + '</div>';
  const actions = (s.data.actions || []).map(a => ({ ...a, _overdue: inboxIsOverdue(a), _dtd: inboxDaysToDdl(a) }));
  const monthStart = new Date().toISOString().slice(0, 7) + '-01';
  const kpi = {
    pending:  actions.filter(a => a.status === 'pending').length,
    accepted: actions.filter(a => a.status === 'accepted').length,
    done_month: actions.filter(a => a.status === 'done' && a.done_at && a.done_at.slice(0, 10) >= monthStart).length,
    overdue:  actions.filter(a => a._overdue).length,
  };
  if (!state.inboxTab) state.inboxTab = isOwner ? 'all' : 'pending';
  const tabs = [
    { key: 'all',           n: actions.length },
    { key: 'pending',       n: kpi.pending },
    { key: 'accepted',      n: kpi.accepted },
    { key: 'renegotiating', n: actions.filter(a => a.status === 'renegotiating').length },
    { key: 'done',          n: actions.filter(a => a.status === 'done').length },
    { key: 'rejected',      n: actions.filter(a => a.status === 'rejected').length },
    { key: 'overdue',       n: kpi.overdue },
  ];
  const tabBar = '<div class="inbox-tabs">' + tabs.map(tab =>
    '<button class="inbox-tab-btn ' + (state.inboxTab === tab.key ? 'active' : '') + '" onclick="inboxSetTab(\'' + tab.key + '\')">'
    + t('inbox.tab.' + tab.key) + ' <span class="inbox-tab-count">' + tab.n + '</span></button>').join('') + '</div>';
  const filtered = state.inboxTab === 'all' ? actions
    : state.inboxTab === 'overdue' ? actions.filter(a => a._overdue)
    : actions.filter(a => a.status === state.inboxTab);
  return title + renderInboxKpi(kpi) + tabBar + renderInboxTable(filtered, isOwner);
}
function renderInboxKpi(kpi) {
  const cards = [
    { label: t('inbox.kpi.pending'),    value: kpi.pending,    icon: '🟠', color: '#D97706' },
    { label: t('inbox.kpi.accepted'),   value: kpi.accepted,   icon: '🔵', color: '#2563EB' },
    { label: t('inbox.kpi.done_month'), value: kpi.done_month, icon: '✅', color: '#16A34A' },
    { label: t('inbox.kpi.overdue'),    value: kpi.overdue,    icon: '🔴', color: '#DC2626' },
  ];
  return '<div class="inbox-kpi-row">' + cards.map(c =>
    '<div class="inbox-kpi-card" style="border-top:3px solid ' + c.color + '">'
    + '<div class="inbox-kpi-icon">' + c.icon + '</div>'
    + '<div class="inbox-kpi-label">' + escapeHtml(c.label) + '</div>'
    + '<div class="inbox-kpi-value" style="color:' + c.color + '">' + c.value + '</div></div>').join('') + '</div>';
}
function renderInboxTable(rows, isOwner) {
  if (!rows.length) return '<div class="inv-empty">' + t('inbox.empty') + '</div>';
  return '<table class="inbox-table"><thead><tr>'
    + '<th>' + t('inbox.col.title') + '</th><th>' + t('inbox.col.assignee') + '</th>'
    + '<th>' + t('inbox.col.module') + '</th><th>' + t('inbox.col.severity') + '</th>'
    + '<th>' + t('inbox.col.ddl') + '</th><th>' + t('inbox.col.status') + '</th>'
    + '<th>' + t('inbox.col.action') + '</th></tr></thead><tbody>'
    + rows.map(r => renderInboxRow(r, isOwner)).join('') + '</tbody></table>';
}
function renderInboxRow(r, isOwner) {
  const statusKey = r._overdue ? 'overdue' : r.status;
  const sevLabel = { red: '🔴', amber: '🟡', green: '🟢' }[r.severity] || '⚪';
  let ddl = '—';
  if (r.ddl) {
    ddl = r.ddl;
    if (r._overdue) ddl += ' <span style="color:#DC2626;font-size:11px">(' + t('inbox.ddl.overdue_days', { n: (-r._dtd) }) + ')</span>';
    else if (r._dtd != null && r._dtd <= 3) ddl += ' <span style="color:#D97706;font-size:11px">(' + r._dtd + 'd)</span>';
  }
  let btns = '<button class="inbox-btn view" onclick="inboxView(' + r.id + ')">' + t('inbox.btn.view') + '</button>';
  if (!isOwner) {
    if (r.status === 'pending') {
      btns = '<button class="inbox-btn accept" onclick="inboxAccept(' + r.id + ')">' + t('inbox.btn.accept') + '</button>'
           + '<button class="inbox-btn propose" onclick="inboxPropose(' + r.id + ')">' + t('inbox.btn.propose') + '</button>' + btns;
    } else if (r.status === 'accepted') {
      btns = '<button class="inbox-btn done" onclick="inboxDone(' + r.id + ')">' + t('inbox.btn.done') + '</button>' + btns;
    }
  }
  return '<tr' + (r._overdue ? ' class="inbox-row-overdue"' : '') + '>'
    + '<td><strong>' + escapeHtml(r.title || '—') + '</strong>'
    + (r.description ? '<br><span class="inbox-desc">' + escapeHtml(String(r.description).slice(0, 80)) + (String(r.description).length > 80 ? '…' : '') + '</span>' : '') + '</td>'
    + '<td>' + escapeHtml(r.assignee || '—') + '</td>'
    + '<td>' + escapeHtml(r.module || '—') + '</td>'
    + '<td>' + sevLabel + '</td>'
    + '<td>' + ddl + '</td>'
    + '<td>' + t('inbox.status.' + statusKey) + '</td>'
    + '<td class="inbox-action-cell">' + btns + '</td></tr>';
}
window.inboxSetTab = function(tab) { state.inboxTab = tab; renderView(); };
async function inboxRefresh() { await loadView(); }
window.inboxAccept = async function(id) {
  try { await postAction({ mode: 'action_accept', action_id: id }); showS4Toast('✓ ' + t('inbox.toast.accepted'), 'ok'); inboxRefresh(); }
  catch (e) { showS4Toast(t('inbox.toast.accept_fail', { err: e.message }), 'bad'); }
};
window.inboxDone = async function(id) {
  const note = prompt(t('inbox.confirm_done'));
  if (note == null) return;
  try { await postAction({ mode: 'action_done', action_id: id, done_note: note }); showS4Toast('✓ ' + t('inbox.toast.done'), 'ok'); inboxRefresh(); }
  catch (e) { showS4Toast(t('inbox.toast.done_fail', { err: e.message }), 'bad'); }
};
window.inboxPropose = async function(id) {
  const ddl = prompt(t('inbox.propose_ddl')); if (ddl === null) return;
  const amt = prompt(t('inbox.propose_amount')); if (amt === null) return;
  const note = prompt(t('inbox.propose_note')); if (note === null) return;
  try {
    await postAction({ mode: 'action_renegotiate', action_id: id,
      proposed_ddl: (ddl && /^\d{4}-\d{2}-\d{2}$/.test(ddl.trim())) ? ddl.trim() : null,
      proposed_amount: (amt && amt.trim() !== '' && !isNaN(Number(amt))) ? Number(amt) : null,
      proposed_note: note.trim() || null });
    showS4Toast('💬 ' + t('inbox.toast.proposed'), 'ok'); inboxRefresh();
  } catch (e) { showS4Toast(t('inbox.toast.propose_fail', { err: e.message }), 'bad'); }
};
window.inboxView = function(id) {
  const a = ((state.data && state.data.actions) || []).find(x => x.id === id);
  if (!a) return;
  const row = (k, v) => (v != null && v !== '') ? '<div style="margin-bottom:4px"><strong>' + k + ':</strong> ' + escapeHtml(String(v)) + '</div>' : '';
  const wrap = document.createElement('div');
  wrap.className = 's4-modal-backdrop';
  wrap.onclick = (e) => { if (e.target === wrap) wrap.remove(); };
  wrap.innerHTML = '<div class="s4-modal"><div class="s4-modal-header"><h2>' + escapeHtml(a.title || 'Action') + '</h2>'
    + '<button class="s4-btn text" onclick="this.closest(\'.s4-modal-backdrop\').remove()">✕</button></div>'
    + '<div class="s4-modal-body">'
    + row('Assignee', a.assignee) + row('Assigner', a.assigner) + row('Module', a.module)
    + row('Severity', a.severity) + row('DDL', a.ddl) + row('Status', a.status)
    + row('Created', a.created_at && String(a.created_at).slice(0, 16).replace('T', ' '))
    + row('Accepted', a.accepted_at && String(a.accepted_at).slice(0, 16).replace('T', ' '))
    + row('Done', a.done_at && String(a.done_at).slice(0, 16).replace('T', ' '))
    + (a.description ? '<div style="margin:8px 0"><strong>Description:</strong><br>' + escapeHtml(a.description) + '</div>' : '')
    + row('Amount', a.amount != null ? a.amount + ' ' + (a.amount_unit || '') : null)
    + (a.proposed_note ? row('Proposed', a.proposed_note + (a.proposed_ddl ? ' · ddl ' + a.proposed_ddl : '') + (a.proposed_amount != null ? ' · ' + a.proposed_amount : '')) : '')
    + row('Done note', a.done_note)
    + '</div></div>';
  document.body.appendChild(wrap);
};

function renderProducts(s) {

// + 12M 品类趋势 (若 RPC 返 charts.sales_12m_by_mg)。
function renderProductsCharts(d) {
  let html = '';
  const ts = (d.charts && d.charts.sales_12m_by_mg) || [];
  if (ts.length) {
    const byMg = {};
    ts.forEach(r => { (byMg[r.mg] = byMg[r.mg] || []).push({ x: String(r.ym).slice(5), y: r.amt }); });
    const palette = ['#0F172A', '#DC2626', '#D97706', '#16A34A', '#2563EB', '#94A3B8'];
    const series = Object.keys(byMg).map((mg, i) => ({ name: mg, color: palette[i % palette.length], points: byMg[mg] }));
    html += '<div class="inv-section-title">📈 ' + t('chart.cat_12m') + '</div>'
         + '<div class="chart-card">' + svgLineChart({ series, width: 900, height: 260, yFmt: fmtMoneyShort }) + '</div>';
  }
  const bands = d.price_bands || [];
  if (bands.length) {
    const bandColors = ['#94A3B8', '#0F172A', '#16A34A', '#D97706', '#DC2626'];
    const donut = svgPieChart({ slices: bands.map((b, i) => ({ label: b.band, value: b.sales_rm, color: bandColors[i % bandColors.length] })), width: 520, height: 240, valueFmt: fmtMoneyShort });
    html += '<div class="inv-section-title">💵 ' + t('chart.price_band_donut') + '</div>'
         + '<div class="chart-card">' + donut + '</div>';
  }
  const mgs = d.top_main_groups || [];
  if (mgs.length) {
    const bar = svgBarChart({ rows: mgs.slice(0, 10).map(m => ({ label: m.name, value: m.sales_rm, color: '#0F172A' })), width: 680, height: 280, valueFmt: fmtMoneyShort });
    html += '<div class="inv-section-title">🏷️ ' + t('chart.top_mg_bar') + '</div>'
         + '<div class="chart-card">' + bar + '</div>';
  }
  return html;
}

function renderProdHero(hero) {

function renderProdHeroCard(def, k) {
  let bigNum = '—', subLine = '';
  if (def.fmt === 'rm') { bigNum = fmtRM(k.amount_rm || 0); subLine = k.sku_count != null ? fmtInt(k.sku_count) + ' SKU' : ''; }
  else if (def.fmt === 'count_pct') { bigNum = fmtInt(k.count || 0); subLine = k.pct != null ? k.pct.toFixed(1) + '% of ' + fmtInt(k.total_sku || 0) : ''; }
  else if (def.fmt === 'category') { bigNum = escapeHtml(k.name || '—'); subLine = (k.pct != null ? k.pct.toFixed(1) + '%' : '—') + ' · ' + fmtRM(k.amount_rm || 0); }
  const momPct = k.mom_pct;
  let momColor = 'var(--s4-text-light)', momArrow = '↔';
  if (momPct != null && Math.abs(momPct) >= 2) {
    if (momPct > 0) { momArrow = '↑'; momColor = 'var(--s4-green-text)'; }
    else { momArrow = '↓'; momColor = 'var(--s4-red-text)'; }
  }
  const momLine = momPct != null
    ? t('prod.hero.vs_mom') + ' <strong style="color:' + momColor + '">' + momArrow + ' ' + Math.abs(momPct).toFixed(1) + '%</strong>'
    : t('prod.hero.vs_mom') + ' <strong style="color:var(--s4-text-light)">—</strong>';
  // Phase 10B 灯 (按 def.key 业务规则)
  let lightColor = 'gray';
  if (def.key === 'sales_total')      lightColor = heroLightColor(momPct, 5, -5, false);
  else if (def.key === 'active_sku')  lightColor = heroLightColor(k.pct, 20, 10, false);
  else if (def.key === 'top_main_group') lightColor = (k.pct == null) ? 'gray' : (k.pct >= 25 && k.pct <= 40 ? 'green' : k.pct > 40 ? 'amber' : 'red');
  else if (def.key === 'sales_per_sku') lightColor = heroLightColor(momPct, 5, -5, false);
  return '<div class="kpi-card prod-hero-card">'
    + heroLightDot(lightColor)
    + '<div class="kpi-icon">' + def.icon + '</div>'
    + '<div class="kpi-title">' + def.title + '</div>'
    + '<div class="kpi-actual">' + bigNum + '</div>'
    + '<div class="prod-hero-sub">' + escapeHtml(subLine || '') + '</div>'
    + '<div class="kpi-meta">' + momLine + '</div>'
    + '</div>';
}

window.prodExportTop20Csv = function() {
  const rows = window.__prodTop20 || [];
  if (!rows.length) return alert(t('inv.sku.no_data'));
  const keys = Object.keys(rows[0]);
  const csv = [keys.join(',')].concat(rows.map(r => keys.map(k => {
    const v = r[k]; if (v == null) return '';
    const x = String(v); return /[",\n]/.test(x) ? '"' + x.replace(/"/g, '""') + '"' : x;
  }).join(','))).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'products_top20_' + new Date().toISOString().slice(0, 10) + '.csv'; a.click();
};

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TODAY  (Stage B — 4-layer briefing)
   Layer 1: status light + Cash Runway
   Layer 2: Action Plan (placeholder until Stage C cross-view integration)
   Layer 3: 5-store snapshot table (mtd_amount / closing_rate / walk-in / basket)
   Layer 4: 6-domain health grid (placeholder — needs cross-view aggregation)
   Data: /api/today (status + stores).
═══════════════════════════════════════════════════════════════════ */
function renderToday(s) {
  const title = '<h1 class="page-title">Today</h1>'
              + '<p class="page-sub">Snapshot ' + s.month + ' · 4-layer briefing · /api/today</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="today-banner"><div class="today-light tone-unknown">…</div>'
      + '<div class="today-summary"><div class="skeleton h-line"></div><div class="skeleton h-line"></div></div>'
      + '<div class="today-runway"><div class="skeleton h-value"></div></div></div>'
      + '<div class="section-title">5-store snapshot</div>'
      + '<div class="card"><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>';
  }

  const j = s.data;
  const st = j.status || {};
  const stores = Array.isArray(j.stores) ? j.stores : [];
  const lightCls = st.light || 'unknown';
  const missing = Array.isArray(st.data_missing) ? st.data_missing : [];

  // ── Layer 1: Status light + Cash Runway ──────────────────────────
  const lightIcon = { ok: '🟢', warn: '🟡', bad: '🔴', unknown: '⚪' }[lightCls] || '⚪';
  const headlineMap = {
    ok:     ['Wiltek today: healthy', 'ok'],
    warn:   ['Wiltek today: heads up', 'warn'],
    bad:    ['Wiltek today: critical', 'bad'],
    unknown:['Wiltek today: data partial', ''],
  };
  const [headline, headlineCls] = headlineMap[lightCls] || headlineMap.unknown;
  const summarySub = missing.length
    ? 'Missing data: ' + missing.map(escapeHtml).join(', ')
    : 'All sources synced · status from /api/today';

  let runwayVal = 'pending', runwaySub = 'FMM cash data not yet loaded', runwayCls = '';
  if (st.cash_runway_months != null) {
    const m = +st.cash_runway_months;
    runwayVal = m.toFixed(1) + ' months';
    runwayCls = m > 6 ? 'ok' : m > 3 ? 'warn' : 'bad';
    runwaySub = 'Cash ' + fmtMoneyShort(st.cash_total) +
      (st.financial_balance_sheet_as_of ? ' · as of ' + st.financial_balance_sheet_as_of.slice(0, 10) : '');
  } else if (st.cash_total != null) {
    runwayVal = fmtMoneyShort(st.cash_total);
    runwaySub = 'Cash on hand · monthly burn pending';
  }

  const banner = ''
    + '<div class="today-banner">'
    +   '<div class="today-light tone-' + lightCls + '">' + lightIcon + '</div>'
    +   '<div class="today-summary">'
    +     '<div class="headline ' + headlineCls + '">' + headline + '</div>'
    +     '<div class="sub">' + summarySub + '</div>'
    +   '</div>'
    +   '<div class="today-runway">'
    +     '<div class="r-label">Cash runway</div>'
    +     '<div class="r-value ' + runwayCls + '">' + runwayVal + '</div>'
    +     '<div class="r-sub">' + runwaySub + '</div>'
    +   '</div>'
    + '</div>';

  // ── Layer 2: Action Plan (placeholder — needs cross-view aggregation) ─
  const actionPlan = ''
    + '<div class="section-title">Action Plan · top 3 today</div>'
    + '<div class="action-plan">'
    +   '<strong>Stage C feature.</strong> '
    +   'Action Plan derives the top 3 actions today from cross-view aggregation '
    +   '(receivables aging · stockout list · slow-mover spikes · ABCD migrations · churn risk). '
    +   'Each card needs problem + impact + jump-link. '
    +   'Skeleton lives here once the cross-view selector lands.'
    + '</div>';

  // ── Layer 3: 5-store snapshot ────────────────────────────────────
  const sortedStores = stores.slice().sort((a, b) => (a.store || '').localeCompare(b.store || ''));
  let storeRows = sortedStores.map(b => {
    const cr = b.closing_rate != null ? (+b.closing_rate).toFixed(1) + '%' : '—';
    const walk = b.walk_in_total != null ? fmtInt(b.walk_in_total) : '—';
    const basket = b.basket_estimate != null ? fmtRM(b.basket_estimate) : '—';
    const mtd = b.mtd_amount != null ? fmtRM(b.mtd_amount) : '—';
    const inv = b.mtd_invoices != null ? fmtInt(b.mtd_invoices) : '—';
    const anomCls = (b.closing_rate != null && b.closing_rate < 25) ? 'anom-bad'
                  : (b.closing_rate != null && b.closing_rate < 50) ? 'anom-mid' : 'anom-ok';
    const anomLbl = (b.closing_rate != null && b.closing_rate < 25) ? '🔴 low CR'
                  : (b.closing_rate != null && b.closing_rate < 50) ? '🟡 CR' : '✓';
    return '<tr>'
      + '<td><strong>' + escapeHtml(b.store || '') + '</strong></td>'
      + '<td>' + escapeHtml(b.name || '') + '</td>'
      + '<td class="num">' + mtd + '</td>'
      + '<td class="num">' + inv + '</td>'
      + '<td class="num">' + walk + '</td>'
      + '<td class="num">' + cr + '</td>'
      + '<td class="num">' + basket + '</td>'
      + '<td class="' + anomCls + '">' + anomLbl + '</td>'
      + '</tr>';
  }).join('');
  if (!storeRows) storeRows = '<tr><td colspan="8" class="muted" style="text-align:center;padding:14px">No store data in /api/today response</td></tr>';

  const storeTable = ''
    + '<div class="section-title">5-store snapshot · ' + s.month + (stores[0]?.floatation_as_of ? ' · floatation ' + stores[0].floatation_as_of : '') + '</div>'
    + '<table class="store-table">'
    +   '<thead><tr>'
    +     '<th>Store</th><th>Name</th>'
    +     '<th>MTD sales</th><th>Invoices</th>'
    +     '<th>Walk-in</th><th>Closing rate</th><th>Basket est.</th>'
    +     '<th>Anom</th>'
    +   '</tr></thead>'
    +   '<tbody>' + storeRows + '</tbody>'
    + '</table>';

  // ── Layer 4: 6-domain health (placeholder) ─────────────────────
  const domains = [
    { key: 'sales',     icon: '📊', name: 'Sales',     status: 'unknown', sub: 'Stage C: pull from /api/kpi sales' },
    { key: 'inventory', icon: '📦', name: 'Inventory', status: 'unknown', sub: 'Stage C: dead% from /api/inventory_dashboard' },
    { key: 'customers', icon: '👥', name: 'Customers', status: 'unknown', sub: 'Stage C: member churn from /api/kpi customers' },
    { key: 'products',  icon: '🏷️', name: 'Products',  status: 'unknown', sub: 'Stage C: ABCD migrations from /api/products' },
    { key: 'finance',   icon: '💰', name: 'Finance',   status: 'unknown', sub: 'Stage C: GP% from /api/today.status' },
    { key: 'hr',        icon: '👷', name: 'HR',        status: 'unknown', sub: 'Backlog: HR payroll sync pending' },
  ];
  const domainGrid = ''
    + '<div class="section-title">6-domain health (placeholder · Stage C)</div>'
    + '<div class="domain-grid">'
    +   domains.map(d => ''
        + '<div class="domain-card tone-na">'
        +   '<div class="d-icon">' + d.icon + '</div>'
        +   '<div class="d-name">' + d.name + '</div>'
        +   '<div class="d-sub">' + d.sub + '</div>'
        + '</div>').join('')
    + '</div>';

  return title + banner + actionPlan + storeTable + domainGrid;
}

/* ═══════════════════════════════════════════════════════════════════
   件4 (2026-05-25) — GTD Tracker, ported from Wiltek_MASTER.html.
   Monthly task + KPI tracker, per store. Data persists in Supabase via
   the existing /api/gtd (flat key→value map: <branch>::<kind>::<id>::<idx>).
   localStorage key 'wp_gtd_v2' caches/drafts (isolated from V1 'wp_gtd_v1').
   Task/KPI display names live in the i18n dict (gtd.task.* / gtd.kpi.*).
   ═══════════════════════════════════════════════════════════════════ */
const GTD_DEFAULT_TASKS = [
  { id: 'bunting',     note_en: 'Update store visual displays each month' },
  { id: 'sm_profile',  note_en: 'Refresh FB / IG profile + cover' },
  { id: 'gbp_photos',  note_en: 'Add fresh in-store photos' },
  { id: 'theme_deco',  note_en: 'Seasonal / promo theme setup' },
  { id: 'vital_stock', note_en: 'Top-seller stock cover review' },
  { id: 'wa_catalog',  note_en: 'Update product catalog' },
  { id: 'ccnn',        note_en: 'Cleanliness · Comfort · Newness · Niceness' },
  { id: 'bmm_share',   note_en: 'Brand merchandising memo to floor staff' },
  { id: 'training',    note_en: 'Roll out new product / process training' },
  { id: 'display_bm',  note_en: 'Compare display vs benchmark store' },
];
const GTD_DEFAULT_KPIS = [
  { id: 'sales_rm',      target: 80000, unit: 'RM' },
  { id: 'avg_basket_rm', target: 250,   unit: 'RM' },
  { id: 'walkin',        target: 350,   unit: '' },
  { id: 'closing_rate',  target: 70,    unit: '%' },
  { id: 'gbp_reviews',   target: 15,    unit: '' },
  { id: 'ccnn_pct',      target: 95,    unit: '%' },
  { id: 'sm_posts',      target: 10,    unit: '' },
  { id: 'discon_pct',    target: 10,    unit: '%' /* lower-is-better */ },
];
const GTD_MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const GTD_LS_KEY = 'wp_gtd_v2';
// zh month labels derived via dict suffix (keeps source Chinese-free for audit).
function gtdMonthLabels() {
  return (window.i18n.lang === 'zh')
    ? GTD_MONTHS.map((_, i) => (i + 1) + t('gtd.month_suffix'))
    : GTD_MONTHS;
}

function gtdActiveBranch() {
  // Managers pinned to own store (getEffectiveBranch); owner/staff default W01.
  return getEffectiveBranch() || 'W01';
}
function gtdLoadStore() {
  try { return JSON.parse(localStorage.getItem(GTD_LS_KEY) || '{}') || {}; }
  catch (_) { return {}; }
}
function gtdSaveStore(store) {
  try { localStorage.setItem(GTD_LS_KEY, JSON.stringify(store)); } catch (_) {}
}
function gtdGetCellValue(store, branch, kind, rowId, monthIdx) {
  return store[`${branch}::${kind}::${rowId}::${monthIdx}`];
}
function gtdSetCellValue(store, branch, kind, rowId, monthIdx, value) {
  const k = `${branch}::${kind}::${rowId}::${monthIdx}`;
  if (value === null || value === undefined || value === '') delete store[k];
  else store[k] = value;
}
function gtdGetTargetOverride(store, branch, kpiId) {
  return store[`${branch}::target::${kpiId}`];
}
function gtdSetTargetOverride(store, branch, kpiId, value) {
  const k = `${branch}::target::${kpiId}`;
  if (value === null || value === undefined || value === '') delete store[k];
  else store[k] = value;
}
function gtdKpiStatus(actual, target, kpiId) {
  if (actual === undefined || actual === null || actual === '' || isNaN(+actual)) return null;
  if (!target || isNaN(+target) || +target === 0) return null;
  const ratio = +actual / +target;
  const lowerIsBetter = (kpiId === 'discon_pct');
  if (lowerIsBetter) { if (ratio <= 1.0) return 'ok'; if (ratio <= 1.25) return 'near'; return 'bad'; }
  if (ratio >= 1.0) return 'ok'; if (ratio >= 0.8) return 'near'; return 'bad';
}

async function fetchGtd(signal) {
  // Hydrate from Supabase (/api/gtd) → merge into localStorage cache.
  try {
    const r = await fetch('/api/gtd?t=' + Date.now(), { cache: 'no-store', headers: authHeaders(), signal });
    const j = await r.json();
    if (j && j.ok) {
      const merged = Object.assign({}, gtdLoadStore(), j.store || {});
      gtdSaveStore(merged);
      return { ok: true, rows: j.rows, session_role: j.session_role };
    }
    return { ok: false, error: (j && j.error) || 'gtd fetch failed' };
  } catch (e) {
    if (e.name === 'AbortError') throw e;
    return { ok: false, error: String(e.message || e) };
  }
}

function renderGtd(s) {
  const months = gtdMonthLabels();
  const branch = gtdActiveBranch();
  const isOwnerRole = (state.role === 'owner');
  const header = '<div class="page-header"><div>'
    + '<h1 class="page-title">✅ ' + t('gtd.title') + '</h1>'
    + '<p class="page-sub">' + t('gtd.sub') + '</p></div></div>';
  if (s.loading) {
    return header + '<div class="gtd-toolbar"><span class="skeleton h-row" style="width:240px;height:28px"></span></div>';
  }
  const store = gtdLoadStore();
  const scope = t('gtd.scope', { branch }) + (isOwnerRole ? ' · Owner' : '');
  const toolbar = '<div class="gtd-toolbar">'
    + '<span class="gtd-scope">' + escapeHtml(scope) + '</span>'
    + '<button id="gtdSaveBtn" class="gtd-save-btn" type="button">💾 ' + t('gtd.btn.save') + '</button>'
    + '<span class="gtd-save-status" id="gtdSaveStatus"></span>'
    + '</div>';

  // Tasks table
  const taskHead = '<thead><tr><th>' + t('gtd.col.task') + '</th>'
    + months.map(m => '<th class="month">' + m + '</th>').join('')
    + '<th>' + t('gtd.col.note') + '</th></tr></thead>';
  const taskBody = GTD_DEFAULT_TASKS.map(task => {
    const cells = GTD_MONTHS.map((_, idx) => {
      const v = gtdGetCellValue(store, branch, 'task', task.id, idx) || '';
      const cls = v ? ('gtd-status-' + v) : '';
      const opts = ['', 'Done', 'Updated', 'Undone'].map(o =>
        '<option value="' + o + '"' + (o === v ? ' selected' : '') + '>' + (o || '—') + '</option>').join('');
      return '<td class="month"><select class="' + cls + '" data-gtd="task" data-row="' + task.id + '" data-month="' + idx + '">' + opts + '</select></td>';
    }).join('');
    return '<tr><td class="task-name">' + escapeHtml(t('gtd.task.' + task.id)) + '</td>'
      + cells + '<td class="note">' + escapeHtml(task.note_en || '') + '</td></tr>';
  }).join('');
  const tasksTable = '<div class="gtd-section-title">' + t('gtd.tasks_title') + '</div>'
    + '<div class="gtd-table-wrap"><table class="gtd-table">' + taskHead + '<tbody>' + taskBody + '</tbody></table></div>';

  // KPI table
  const kpiHead = '<thead><tr><th>KPI</th><th class="target-cell">' + t('gtd.col.target') + '</th>'
    + months.map(m => '<th class="month">' + m + '</th>').join('') + '</tr></thead>';
  const kpiBody = GTD_DEFAULT_KPIS.map(kpi => {
    const ovr = gtdGetTargetOverride(store, branch, kpi.id);
    const target = (ovr !== undefined && ovr !== '') ? +ovr : kpi.target;
    const cells = GTD_MONTHS.map((_, idx) => {
      const v = gtdGetCellValue(store, branch, 'kpi', kpi.id, idx);
      const status = gtdKpiStatus(v, target, kpi.id);
      const valStr = (v === undefined || v === null || v === '') ? '' : v;
      const cls = status ? ('gtd-status-cell kpi-' + status) : '';
      return '<td class="month ' + cls + '"><input type="number" step="any" data-gtd="kpi" data-row="' + kpi.id + '" data-month="' + idx + '" value="' + valStr + '"></td>';
    }).join('');
    const targetCell = isOwnerRole
      ? '<td class="target-cell"><input type="number" step="any" data-gtd="target" data-row="' + kpi.id + '" value="' + target + '"></td>'
      : '<td class="target-cell target-locked">🔒 ' + target + (kpi.unit || '') + '</td>';
    return '<tr><td class="kpi-name">' + escapeHtml(t('gtd.kpi.' + kpi.id)) + '</td>'
      + targetCell + cells + '</tr>';
  }).join('');
  const kpiTable = '<div class="gtd-section-title">' + t('gtd.kpis_title') + '</div>'
    + '<div class="gtd-table-wrap"><table class="gtd-table">' + kpiHead + '<tbody>' + kpiBody + '</tbody></table></div>';

  return '<div class="gtd-view">' + header + toolbar + tasksTable + kpiTable + '</div>';
}

/* GTD persistence — delegated listeners wired once. */
(function wireGtdV2() {
  if (window.__gtd_wired_v2) return;
  window.__gtd_wired_v2 = true;
  document.addEventListener('change', e => {
    const tgt = e.target;
    const kind = tgt && tgt.getAttribute && tgt.getAttribute('data-gtd');
    if (!kind) return;
    const branch = gtdActiveBranch();
    const store = gtdLoadStore();
    const row = tgt.getAttribute('data-row');
    if (kind === 'target') gtdSetTargetOverride(store, branch, row, tgt.value);
    else gtdSetCellValue(store, branch, kind, row, +tgt.getAttribute('data-month'), tgt.value);
    gtdSaveStore(store);
    if (state.view === 'gtd') renderView();   // re-render for status colours
  });
  document.addEventListener('click', e => {
    const btn = e.target.closest && e.target.closest('#gtdSaveBtn');
    if (!btn) return;
    const status = document.getElementById('gtdSaveStatus');
    if (status) status.textContent = t('gtd.saving');
    const branch = gtdActiveBranch();
    const store = gtdLoadStore();
    fetch('/api/gtd', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ branch, store }),
    }).then(r => r.json()).then(j => {
      if (j && j.ok) {
        if (j.store) gtdSaveStore(j.store);
        if (status) status.textContent = t('gtd.saved');
      } else if (status) {
        status.textContent = t('gtd.save_fail', { reason: (j && j.error) || 'unknown' });
      }
    }).catch(() => { if (status) status.textContent = t('gtd.save_unreachable'); });
  });
})();

/* ── Stub view (Finance) ─────────────────────────────────────────── */
function renderStubView(s) {
  return ''
    + '<h1 class="page-title">' + viewTitle(s.view) + '</h1>'

    + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   Orphan SKU modal — Stage C-orphan (2026-05-16)
   Click banner → list items + provide Sheet SM tab link + CSV export.
═══════════════════════════════════════════════════════════════════ */
const SHEET_SM_URL = 'https://docs.google.com/spreadsheets/d/1jzLdcCrckXjSrmyrYKQxjhyvq1v5zTp6hf9zUJDo5II/edit#gid=871820188';

function openOrphanModal() {
  const orphan = state.data && state.data.kpis && state.data.kpis.orphan_alert;
  if (!orphan || !Array.isArray(orphan.items)) return;
  const body = document.getElementById('orphanModalBody');
  const overlay = document.getElementById('orphanModal');
  if (!body || !overlay) return;
  const rows = orphan.items.map(it =>
    '<tr>'
    + '<td><code>' + escapeHtml(it.code || '') + '</code></td>'
    + '<td>' + escapeHtml(it.store || '') + '</td>'
    + '<td class="num">' + (it.qty != null ? fmtInt(it.qty) : '—') + '</td>'
    + '<td class="num">' + (it.cost != null ? fmtRMpr(it.cost) : '—') + '</td>'
    + '<td class="num"><strong>' + fmtRMpr(it.amount) + '</strong></td>'
    + '</tr>'
  ).join('');
  body.innerHTML = ''
    + '<p class="modal-sub">'
    +   '<strong>' + orphan.count + ' distinct SKU</strong> · '
    +   orphan.rows + ' inventory row' + (orphan.rows === 1 ? '' : 's') + ' · '
    +   t('modal.orphan.impact') + ' <strong>RM ' + (orphan.value_rm || 0).toLocaleString('en-US', { minimumFractionDigits: 2 }) + '</strong>'
    +   '<br>' + t('modal.orphan.add_codes_to') + ' '
    +   '<a href="' + SHEET_SM_URL + '" target="_blank" rel="noopener">Sheet SM tab ↗</a>'
    +   ' ' + t('modal.orphan.after_link')
    + '</p>'
    + '<table class="orphan-table">'
    +   '<thead><tr>'
    +     '<th>Item code</th>'
    +     '<th>Store</th>'
    +     '<th class="num">Qty</th>'
    +     '<th class="num">Unit cost</th>'
    +     '<th class="num">Amount</th>'
    +   '</tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>';
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
}

function closeOrphanModal() {
  const overlay = document.getElementById('orphanModal');
  if (!overlay) return;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
}

function exportOrphanCSV() {
  const orphan = state.data && state.data.kpis && state.data.kpis.orphan_alert;
  if (!orphan || !Array.isArray(orphan.items) || orphan.items.length === 0) return;
  const esc = (s) => {
    if (s == null) return '';
    const str = String(s);
    return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  };
  const lines = ['item_code,store,qty,unit_cost,amount,snapshot_date'];
  const snap = (state.data.kpis.snapshot_date || state.data.kpis.synthetic_snapshot_date || state.month + '-end');
  for (const it of orphan.items) {
    lines.push([
      esc(it.code), esc(it.store),
      it.qty != null ? it.qty : '',
      it.cost != null ? it.cost : '',
      it.amount != null ? it.amount : '',
      esc(snap),
    ].join(','));
  }
  const csv = lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wiltek-orphan-skus-' + snap + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

// Close modal on Esc + click outside.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeOrphanModal();
});
document.addEventListener('click', (e) => {
  const overlay = document.getElementById('orphanModal');
  if (overlay && overlay.classList.contains('open') && e.target === overlay) {
    closeOrphanModal();
  }
});

/* ═══════════════════════════════════════════════════════════════════
   Login flow — talks to /api/login (same endpoint V1 uses)
═══════════════════════════════════════════════════════════════════ */
async function doLogin(ev) {
  ev.preventDefault();
  const userEl = document.getElementById('loginUser');
  const pwEl   = document.getElementById('loginPw');
  const errEl  = document.getElementById('loginErr');
  const btnEl  = document.getElementById('loginBtn');
  const username = (userEl.value || '').trim().toLowerCase();
  const password = pwEl.value || '';
  if (!username || !password) { errEl.textContent = 'Username and password required.'; return false; }

  errEl.textContent = '';
  btnEl.disabled = true; btnEl.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ username, password }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok || !j.user) {
      errEl.textContent = (j && j.error === 'inactive')
        ? 'Account inactive — contact admin.'
        : 'Invalid username or password.';
      return false;
    }
    state.user = {
      username:     j.user.username,
      display_name: j.user.display_name || j.user.username,
      role:         j.user.role,
      store:        j.user.store,
    };
    state.role = (j.user.role === 'owner') ? 'owner'
              : (/_mgr$/.test(j.user.role) ? 'manager' : (j.user.role || 'manager'));
    if (state.role === 'manager' && j.user.store) state.branch = j.user.store;
    writeSession(state.user);
    enterApp();
    return false;
  } catch (e) {
    console.error('[V2] login error:', e);
    errEl.textContent = 'Network error — retry.';
    return false;
  } finally {
    btnEl.disabled = false; btnEl.textContent = 'Sign in';
  }
}

function doLogout() {
  clearSession();
  state.user = null;
  document.getElementById('app').classList.remove('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'true');
  document.getElementById('login').style.display = 'flex';
}

async function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'false');
  document.getElementById('userName').textContent = state.user.display_name;
  document.getElementById('userRole').textContent = state.user.role;
  // 件2 RBAC: branch picker shown to owner + staff (all-store roles); hidden for
  // store-pinned managers.
  document.getElementById('branchPicker').style.display = (state.role === 'manager') ? 'none' : '';
  // 件2 RBAC: hide nav pages the role can't see (finance/targets → owner only).
  applyRbacToNav(state.role);
  applyI18nNav();  // Phase 10A — bilingual nav labels + lang button text
  // Default-month fix (2026-06-17): resolve months from data BEFORE building
  // the picker so the default is the latest month in the DB, not a stale
  // hard-coded value. A month pinned in the URL (set by boot) still wins.
  const latestMonth = await loadMonths();
  if (!state.month) state.month = latestMonth;
  populateMonthPicker();
  // Bug 2 fix: populate branch picker immediately (from STORE_META + any
  // seeded codes) so it's visible before the first fetch resolves.
  populateBranchPicker();
  syncUrl();
  loadView();
}

/* ── Month picker ───────────────────────────────────────────────── */
function populateMonthPicker() {
  const sel = document.getElementById('monthPicker');
  if (!sel) return;
  sel.innerHTML = ALL_MONTHS.map(m => '<option value="' + m + '">' + m + '</option>').join('');
  if (!ALL_MONTHS.includes(state.month)) state.month = ALL_MONTHS[0];
  sel.value = state.month;
  sel.onchange = () => onMonthChange(sel.value);
}

/* ── Boot ──────────────────────────────────────────────────────── */
function boot() {
  // Wire branch picker
  const bp = document.getElementById('branchPicker');
  if (bp) bp.onchange = () => onBranchChange(bp.value);

  // Hydrate state from URL (overrides defaults)
  const u = readUrlState();
  if (u.view)   state.view   = u.view;
  if (u.month)  state.month  = u.month;
  if (u.branch) state.branch = u.branch;

  // Resume session if present
  const sess = readSession();
  if (sess && sess.username) {
    state.user = sess;
    state.role = (sess.role === 'owner') ? 'owner'
              : (/_mgr$/.test(sess.role || '') ? 'manager' : (sess.role || 'manager'));
    if (state.role === 'manager' && sess.store) state.branch = sess.store;
    enterApp();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
