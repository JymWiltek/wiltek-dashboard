function exportOrphanCSV() {
  const orphan = state.data && state.data.kpis && state.data.kpis.orphan_alert;
  if (!orphan || !Array.isArray(orphan.items) || orphan.items.length === 0) return;
  const esc = (s) => {
    if (s == null) return '';
    const str = String(s);
    return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  };
  const lines = ['item_code,store,qty,unit_cost,amount,snapshot_date'];
  const snap = (state.data.kpis.snapshot_date || state.data.kpis.synthetic_snapshot_date || state.month + '-end');
  for (const it of orphan.items) {
    lines.push([
      esc(it.code), esc(it.store),
      it.qty != null ? it.qty : '',
      it.cost != null ? it.cost : '',
      it.amount != null ? it.amount : '',
      esc(snap),
    ].join(','));
  }
  const csv = lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wiltek-orphan-skus-' + snap + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

// Close modal on Esc + click outside.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeOrphanModal();
});
document.addEventListener('click', (e) => {
  const overlay = document.getElementById('orphanModal');
  if (overlay && overlay.classList.contains('open') && e.target === overlay) {
    closeOrphanModal();
  }
});

/* ═══════════════════════════════════════════════════════════════════
   Login flow — talks to /api/login (same endpoint V1 uses)
═══════════════════════════════════════════════════════════════════ */
async function doLogin(ev) {
  ev.preventDefault();
  const userEl = document.getElementById('loginUser');
  const pwEl   = document.getElementById('loginPw');
  const errEl  = document.getElementById('loginErr');
  const btnEl  = document.getElementById('loginBtn');
  const username = (userEl.value || '').trim().toLowerCase();
  const password = pwEl.value || '';
  if (!username || !password) { errEl.textContent = 'Username and password required.'; return false; }

  errEl.textContent = '';
  btnEl.disabled = true; btnEl.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ username, password }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok || !j.user) {
      errEl.textContent = (j && j.error === 'inactive')
        ? 'Account inactive — contact admin.'
        : 'Invalid username or password.';
      return false;
    }
    state.user = {
      username:     j.user.username,
      display_name: j.user.display_name || j.user.username,
      role:         j.user.role,
      store:        j.user.store,
    };
    state.role = (j.user.role === 'owner') ? 'owner'
              : (/_mgr$/.test(j.user.role) ? 'manager' : (j.user.role || 'manager'));
    if (state.role !== 'owner' && j.user.store) state.branch = j.user.store;
    writeSession(state.user);
    enterApp();
    return false;
  } catch (e) {
    console.error('[V2] login error:', e);
    errEl.textContent = 'Network error — retry.';
    return false;
  } finally {
    btnEl.disabled = false; btnEl.textContent = 'Sign in';
  }
}

function doLogout() {
  clearSession();
  state.user = null;
  document.getElementById('app').classList.remove('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'true');
  document.getElementById('login').style.display = 'flex';
}

function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'false');
  document.getElementById('userName').textContent = state.user.display_name;
  document.getElementById('userRole').textContent = state.user.role;
  // hide branch picker for non-owners
  document.getElementById('branchPicker').style.display = (state.role === 'owner') ? '' : 'none';
  // Phase 2: ⚙️ targets sidebar link — owner only
  const navTargets = document.getElementById('navTargets');
  if (navTargets) navTargets.style.display = (state.role === 'owner') ? '' : 'none';
  populateMonthPicker();
  // Bug 2 fix: populate branch picker immediately (from STORE_META + any
  // seeded codes) so it's visible before the first fetch resolves.
  populateBranchPicker();
  syncUrl();
  loadView();
}

/* ── Month picker ───────────────────────────────────────────────── */
function populateMonthPicker() {
  const sel = document.getElementById('monthPicker');
  if (!sel) return;
  sel.innerHTML = ALL_MONTHS.map(m => '<option value="' + m + '">' + m + '</option>').join('');
  if (!ALL_MONTHS.includes(state.month)) state.month = ALL_MONTHS[0];
  sel.value = state.month;
  sel.onchange = () => onMonthChange(sel.value);
}

/* ── Boot ──────────────────────────────────────────────────────── */
function boot() {
  // Wire branch picker
  const bp = document.getElementById('branchPicker');
  if (bp) bp.onchange = () => onBranchChange(bp.value);

  // Hydrate state from URL (overrides defaults)
  const u = readUrlState();
  if (u.view)   state.view   = u.view;
  if (u.month)  state.month  = u.month;
  if (u.branch) state.branch = u.branch;

  // Resume session if present
  const sess = readSession();
  if (sess && sess.username) {
    state.user = sess;
    state.role = (sess.role === 'owner') ? 'owner'
              : (/_mgr$/.test(sess.role || '') ? 'manager' : (sess.role || 'manager'));
    if (state.role !== 'owner' && sess.store) state.branch = sess.store;
    enterApp();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
</body>
</html>
