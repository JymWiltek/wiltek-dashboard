/* ═══════════════════════════════════════════════════════════════════
   Phase 5 · Overview 4-KPI Hero Row (Part C)
   Sales / Walk-in / Closing Rate / Basket Size — airport-lounge grade.
   Data: state.data.overview.data.kpis (overview_kpi RPC). Degrades
   gracefully: if RPC missing, synthesize Sales card from /api/kpi sales
   + targets, others show "目标未设/数据待接".
═══════════════════════════════════════════════════════════════════ */
function renderOverviewKpiRow(s) {
  const ovResp = s.data.overview || null;
  const degraded = !ovResp || ovResp.degraded || !ovResp.data;
  const kpis = (ovResp && ovResp.data && ovResp.data.kpis) || null;

  // Card metadata
  const defs = [
    { key: 'sales',        icon: '💰', title: 'Sales',             fmt: 'rm'  },
    { key: 'walkin',       icon: '👥', title: 'Walk-in Customers', fmt: 'int' },
    { key: 'closing_rate', icon: '🎯', title: 'Closing Rate',      fmt: 'pct' },
    { key: 'basket_size',  icon: '🛍', title: 'Basket Size (AOV)',  fmt: 'rm'  },
  ];

  // Degraded fallback: build a Sales-only block from kpi+targets so the
  // first card still shows real numbers; the rest carry a notice.
  let fallbackKpis = null;
  if (degraded) {
    const d = s.data.kpi || {};
    const t = s.data.targets || {};
    const salesTgt = (t.summary && t.summary.sales_total) || null;
    const pct = (salesTgt && salesTgt > 0) ? +(d.sales / salesTgt * 100).toFixed(1) : null;
    const vsLm = (d.last_month_sales > 0) ? +((d.sales - d.last_month_sales) / d.last_month_sales * 100).toFixed(1) : null;
    fallbackKpis = {
      sales: {
        actual: d.sales, target: salesTgt, pct,
        shortfall: salesTgt != null ? salesTgt - d.sales : null,
        vs_last_month_pct: vsLm,
        status: pct == null ? 'gray' : pct >= 100 ? 'green' : pct >= 80 ? 'amber' : pct >= 50 ? 'red' : 'darkred',
      },
      walkin:       { actual: null, target: null, pct: null, status: 'gray', _note: 'overview RPC 未部署' },
      closing_rate: { actual: null, target: null, pct: null, status: 'gray', _note: 'overview RPC 未部署' },
      basket_size:  { actual: d.invoices > 0 ? +(d.sales / d.invoices).toFixed(2) : null, target: null, pct: null, status: 'gray', _note: 'basket target 未设' },
    };
  }

  const source = kpis || fallbackKpis || {};
  const banner = degraded
    ? '<div class="s4-data-gap" style="margin-bottom:12px"><strong>overview_kpi RPC 未部署</strong> · '
      + '<code>tools/migration_phase5_overview.sql</code> 待 apply · Sales 卡用 fallback, 其余待数据.</div>'
    : '';

  const cards = defs.map(def => {
    const k = source[def.key] || { status: 'gray' };
    return renderOverviewKpiCard(def, k);
  }).join('');

  return banner + '<div class="kpi-hero-row">' + cards + '</div>';
}

function renderOverviewKpiCard(def, k) {
  const status = k.status || 'gray';
  const statusColor = {
    green:   'var(--s4-green-text)',
    amber:   'var(--s4-amber-text)',
    red:     'var(--s4-red-text)',
    darkred: '#B91C1C',
    gray:    'var(--s4-text-light)',
  }[status] || 'var(--s4-text-light)';

  // Format actual per card type
  const fmtActual = (v) => {
    if (v == null) return '—';
    if (def.fmt === 'rm')  return fmtRM(v);
    if (def.fmt === 'int') return fmtInt(v);
    if (def.fmt === 'pct') return Number(v).toFixed(1) + '%';
    return String(v);
  };
  const fmtTargetVal = (v) => {
    if (v == null) return null;
    if (def.fmt === 'rm')  return fmtRM(v);
    if (def.fmt === 'int') return fmtInt(v);
    if (def.fmt === 'pct') return Number(v).toFixed(1) + '%';
    return String(v);
  };

  const pct = k.pct;
  const pctStr = pct != null ? pct.toFixed(1) + '%' : '—';
  const barPct = Math.min(100, Math.max(0, pct || 0));
  const dotIcon = status === 'green' ? '🟢' : status === 'amber' ? '🟡' : status === 'gray' ? '⚪' : '🔴';

  // Meta lines
  const targetStr = fmtTargetVal(k.target);
  const shortfall = k.shortfall;
  let gapLine = '';
  if (shortfall != null && def.fmt !== 'pct') {
    gapLine = shortfall > 0
      ? '缺口 <strong style="color:var(--s4-red-text)">-' + fmtActual(shortfall).replace('—','') + '</strong>'
      : '超 <strong style="color:var(--s4-green-text)">+' + fmtActual(Math.abs(shortfall)) + '</strong>';
  } else if (shortfall != null && def.fmt === 'pct') {
    gapLine = shortfall > 0
      ? '差 <strong style="color:var(--s4-red-text)">' + Number(shortfall).toFixed(1) + ' pp</strong>'
      : '超 <strong style="color:var(--s4-green-text)">' + Number(Math.abs(shortfall)).toFixed(1) + ' pp</strong>';
  }
  const vsLm = k.vs_last_month_pct;
  const vsLmLine = vsLm != null
    ? 'vs 上月 <strong style="color:' + (vsLm >= 0 ? 'var(--s4-green-text)' : 'var(--s4-red-text)') + '">'
      + (vsLm >= 0 ? '↑ ' : '↓ ') + Math.abs(vsLm).toFixed(1) + '%</strong>'
    : '';
  const noteLine = k._note ? '<span style="color:var(--s4-text-light)">' + escapeHtml(k._note) + '</span>' : '';

  return ''
    + '<div class="kpi-card" style="border-top-color:' + statusColor + '">'
    +   '<div class="kpi-icon">' + def.icon + '</div>'
    +   '<div class="kpi-title">' + def.title + '</div>'
    +   '<div class="kpi-actual">' + fmtActual(k.actual) + '</div>'
    +   '<div class="kpi-status-row">'
    +     '<span class="kpi-pct" style="color:' + statusColor + '">' + dotIcon + ' ' + pctStr + '</span>'
    +   '</div>'
    +   '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + barPct + '%;background:' + statusColor + '"></div></div>'
    +   '<div class="kpi-meta">'
    +     (targetStr ? '目标 <strong>' + targetStr + '</strong><br>' : (k._note ? '' : '目标未设<br>'))
    +     (gapLine ? gapLine + '<br>' : '')
    +     (vsLmLine ? vsLmLine : noteLine)
    +   '</div>'
    + '</div>';
}


// Phase 4 hotfix (Bug 3): when the RPC returns a pre-formatted detail
// string like "实际 RM 5299.00 / 目标 RM 20000.00 / 缺口 RM 14701.00",
// rewrite to Part E.5 spec: integer (no .00), thousand commas, · separator.
// Idempotent — already-clean strings stay clean.
function sanitizeRpcDetail(s) {
  if (!s) return '';
  return String(s)
    .replace(/(\d+)\.00\b/g, '$1')                // strip "5299.00" → "5299"
    .replace(/RM\s*(\d{4,})\b/g, function(_, n) {  // re-comma "RM 5299" → "RM 5,299"
      return 'RM ' + Number(n).toLocaleString('en-US');
    })
    .replace(/\s*\/\s*/g, ' · ');                  // " / " → " · "
}

function buildStoreAttribDetail(row) {
  if (!row) return '';
  const shortfall = row.shortfall;
  const gapStr = shortfall > 0
    ? '缺口 RM ' + Math.round(shortfall).toLocaleString('en-US')
    : '超 RM '   + Math.round(Math.abs(shortfall)).toLocaleString('en-US');
  return '实际 ' + fmtRM(row.actual)
       + ' · 目标 ' + fmtRM(row.target)
       + ' · ' + gapStr;
}

// Phase 5b (2026-05-20): Store Matrix sorts by store CODE (not pct) and
// shows store names. Order + names per Jym brief.
const MATRIX_STORE_ORDER = ['W01','W02','W03','W05','W07','W11','WCO'];
const MATRIX_STORE_NAME = {
  W01: 'W01 Pandan Indah',
  W02: 'W02 Ampang Waterfront',
  W03: 'W03 Wangsa Maju',
  W05: 'W05 Bangi Seksyen 7',
  W07: 'W07 Pandan Jaya',
  W11: 'W11 Midah Cheras',
  WCO: 'WCO HQ',
};
function matrixStoreLabel(code) {
  return MATRIX_STORE_NAME[code] || code;
}
function sortStoresByCode(stores) {
  return (stores || []).slice().sort((a, b) => {
    const ia = MATRIX_STORE_ORDER.indexOf(a.store);
    const ib = MATRIX_STORE_ORDER.indexOf(b.store);
    // Unknown codes go to the end, alpha order among themselves.
    if (ia === -1 && ib === -1) return (a.store || '').localeCompare(b.store || '');
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

function renderS4StoreMatrix(stores, anomalies) {
  // Map anomalies keyed by store to inject attribution text
  const anomByStore = {};
  for (const a of anomalies || []) if (a.store) anomByStore[a.store] = a;
  // Phase 5b: sort by store code (W01→W02→W03→W05→W07→W11→WCO), not pct.
  return sortStoresByCode(stores).map(row => {
    const sev = row.status === 'critical' ? 'red critical'
              : row.status === 'behind'   ? 'red'
              : row.status === 'exceeded' ? 'green'
              : 'amber';
    const dotCls = (row.status === 'exceeded') ? 'green'
                 : (row.status === 'critical' || row.status === 'behind') ? 'red' : 'amber';
    const pct = row.pct == null ? '—' : row.pct.toFixed(1) + '%';
    const barPct = Math.min(100, row.pct || 0);
    const shortfall = row.shortfall;
    const isOver = shortfall < 0;
    const anom = anomByStore[row.store];
    // Phase 5 hotfix Bug B (2026-05-20): removed the redundant 2nd amount
    // line "实际 RM X · 目标 RM Y · 缺口 RM Z" — the amounts column +
    // shortfall column already show all three. attrib no longer rendered.
    const btnLabel = row.status === 'exceeded' ? '复盘' : '派派';
    const recoSeed = anom ? {
      title: anom.title, severity: anom.severity, detail: anom.detail,
      recommended_action: anom.recommended_action,
      recommended_assignee: anom.recommended_assignee,
      recommended_amount: anom.recommended_amount,
      source_url: '?view=sales&month=' + state.month + '&branch=' + row.store,
      source_data: { actual: row.actual, target: row.target, pct: row.pct, store: row.store },
      store: row.store, amount: anom.recommended_amount,
    } : {
      title: row.store + ' ' + state.month,
      severity: row.status === 'exceeded' ? 'green' : (row.status === 'critical' ? 'red' : 'amber'),
      detail: 'store=' + row.store + ' actual=' + row.actual + ' target=' + row.target + ' pct=' + row.pct,
      source_url: '?view=sales&month=' + state.month + '&branch=' + row.store,
      source_data: { actual: row.actual, target: row.target, pct: row.pct, store: row.store },
      store: row.store,
      recommended_amount: Math.max(0, row.shortfall),
    };
    return ''
      + '<div class="s4-store-row ' + sev + '">'
      +   '<span class="dot ' + dotCls + '"></span>'
      +   '<div class="name">' + escapeHtml(matrixStoreLabel(row.store)) + '</div>'
      +   '<div class="bar"><span style="width:' + barPct + '%"></span></div>'
      +   '<div class="amounts"><strong>' + fmtRM(row.actual) + '</strong>'
      +     '<div class="target">/ ' + fmtRM(row.target) + ' · ' + fmtInt(row.invoices || 0) + ' 单 · AOV ' + (row.aov != null ? fmtRMpr(row.aov) : '—') + '</div></div>'
      +   '<div class="shortfall ' + (isOver ? 'green' : 'red') + '">' + (isOver ? '+RM ' : '-RM ') + Math.round(Math.abs(shortfall)).toLocaleString('en-US') + '</div>'
      +   '<div class="row-action"><button class="s4-btn primary" onclick=\'openAssignModal(' + JSON.stringify(recoSeed).replace(/"/g, '&quot;') + ')\'>' + btnLabel + '</button></div>'
      + '</div>';
  }).join('');
}
function renderS4StoreMatrixFallback(s) {
  // Use legacy /api/kpi sales by_branch + targets to synthesize rows
  const d = s.data.kpi || {};
  const t = s.data.targets || {};
  const summaryByStore = t.summary?.by_store || {};
  const SALES_STORES_FB = ['W01','W02','W03','W05','W07','WCO'];
  const rows = SALES_STORES_FB.map(b => {
    const branch = d.by_branch && d.by_branch[b] || { sales: 0, invoices: 0, units: 0 };
    const target = summaryByStore[b]?.sales || 0;
    const pct = target > 0 ? branch.sales / target * 100 : null;
    const status = target === 0 ? 'no_target'
                 : pct >= 100   ? 'exceeded'
                 : pct >= 85    ? 'approaching'
                 : pct >= 50    ? 'behind'
                 : 'critical';
    return { store: b, actual: branch.sales, target, pct, shortfall: target - branch.sales, status,
             invoices: branch.invoices, units: branch.units,
             aov: branch.invoices > 0 ? branch.sales / branch.invoices : null };
  }).sort((a, b) => (a.pct || 0) - (b.pct || 0));
  return renderS4StoreMatrix(rows, []);
}

// Phase 5b: drill historical-comparison cell. Given current value + a
// comparison baseline, returns "↑X.X%" (green) / "↓X.X%" (red) / "—"
// (when baseline null/0 — no fake per Jym brief).
function drillDeltaCell(cur, comp) {
  if (comp == null || comp === 0 || cur == null) return '<span style="color:var(--s4-text-light)">—</span>';
  const pct = (cur - comp) / Math.abs(comp) * 100;
  const cls = pct >= 0 ? 'var(--s4-green-text)' : 'var(--s4-red-text)';
  const arrow = pct >= 0 ? '↑' : '↓';
  return '<span style="color:' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span>';
}

// Phase 5c Fix C: when EVERY row's 3 comparison fields are null, the
// dimension has no usable history → show an amber banner explaining WHY
// (not a silent "—" everywhere). dim: 'customer' | 'supplier' | 'category'.
function histGapBanner(rows, dim) {
  if (!Array.isArray(rows) || rows.length === 0) return '';
  const anyHist = rows.some(r =>
    r.sales_prev != null || r.sales_last_year != null || r.sales_12mo_avg != null);
  if (anyHist) return '';
  const msg = {
    customer: '客户购买明细历史数据待 sync, 本月对比暂不可用。(customer_buy_lines 表仅 2026-04 1 个月。Apps Script sync 后自动启用。)',
    category: '品类历史数据不足, 本月对比暂不可用。(sales 表该品类无往月记录。)',
    supplier: 'OEM/Agency 历史数据不足, 本月对比暂不可用。',
  }[dim] || '历史数据不足, 本月对比暂不可用。';
  return '<div class="s4-data-gap" style="margin-bottom:12px">⚠ ' + escapeHtml(msg) + '</div>';
}

function renderS4Drill(s) {
  const tabs = [
    { id: 'trend12m', label: '12M 趋势' },
    { id: 'category', label: '品类' },
    { id: 'customer', label: '客型' },
    { id: 'supplier', label: 'OEM/Agency' },
    { id: 'priceband', label: '价格段' },
  ];
  const tabHtml = tabs.map(t =>
    '<button class="' + (salesDrillTab === t.id ? 'active' : '') + '" onclick="setSalesDrillTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');
  let body;
  if (salesDrillTab === 'trend12m') {
    const trend = s.data.trend;
    if (trend == null) {
      body = '<div class="muted">Loading 12M trend ~1-2s …</div>';
    } else if (Array.isArray(trend.series) && trend.series.length > 0) {
      const series = [{ name: '全公司', color: '#1F5F4A', points: trend.series.map(p => ({ x: p.ym, y: p.sales })) }];
      if (trend.branch_series && !s.branch) {
        const colors = ['#3B82F6','#F59E0B','#EF4444','#A855F7','#10B981','#8B5CF6'];
        let i = 0;
        for (const st of ['W01','W02','W03','W05','W07','WCO']) {
          if (trend.branch_series[st]) {
            series.push({ name: st, color: colors[i++ % colors.length],
              points: trend.branch_series[st].map(p => ({ x: p.ym, y: p.sales })) });
          }
        }
      }
      body = svgLineChart({ series, width: 900, height: 260, yFmt: fmtMoneyShort });
    } else {
      body = '<div class="s4-data-gap">/api/kpi?view=sales-trend 返空</div>';
    }
  } else if (salesDrillTab === 'priceband') {
    body = '<div class="s4-data-gap"><strong>价格段拆分</strong> · 需要 SKU 价格归类 · Sprint 6+ backlog.</div>';
  } else {
    // category / customer / supplier — lazy-loaded
    const cached = salesDrillCache[salesDrillTab];
    if (!cached) {
      body = '<div class="muted">Loading…</div>';
      // Kick off load (may already be loading via cache check; idempotent)
      if (!salesDrillCache[salesDrillTab + '__loading']) {
        salesDrillCache[salesDrillTab + '__loading'] = true;
        loadSalesDrill(salesDrillTab);
      }
    } else if (cached.degraded || cached.data?.status === 'data_gap') {
      const msg = cached.data?.message || cached.degraded_reason || cached.error || '数据缺失';
      body = '<div class="s4-data-gap"><strong>数据缺口</strong> · ' + escapeHtml(msg) + '</div>';
    } else if (cached.data?.status === 'ok') {
      if (salesDrillTab === 'category') {
        // Phase 5c: + vs 上月 / vs 去年同月 / vs 12M 均 (parity w/ customer/supplier)
        const rows = cached.data.rows || [];
        body = histGapBanner(rows, 'category')
             + '<table><thead><tr>'
             + '<th>品类</th><th>销售 RM</th><th>单数</th><th>件数</th><th>AOV</th>'
             + '<th>vs 上月</th><th>vs 去年同月</th><th>vs 12M 均</th>'
             + '</tr></thead><tbody>'
             + rows.map(r => '<tr>'
                 + '<td>' + escapeHtml(r.category) + '</td>'
                 + '<td>' + fmtRM(r.sales) + '</td>'
                 + '<td>' + fmtInt(r.invoices) + '</td>'
                 + '<td>' + fmtInt(r.units) + '</td>'
                 + '<td>' + (r.aov != null ? fmtRMpr(r.aov) : '—') + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
               + '</tr>').join('')
             + '</tbody></table>';
      } else if (salesDrillTab === 'customer') {
        // Phase 5b: + vs 上月 / vs 去年同月 / vs 12M 均 columns. RPC returns
        // rows[{cust_type, sales, rows, sales_prev, sales_last_year,
        // sales_12mo_avg}]. Null comparison → "—" (no fake).
        const rows = cached.data.rows || [];
        body = histGapBanner(rows, 'customer')
             + '<table><thead><tr>'
             + '<th>客型</th><th>本月销售 RM</th><th>明细行数</th>'
             + '<th>vs 上月</th><th>vs 去年同月</th><th>vs 12M 均</th>'
             + '</tr></thead><tbody>'
             + rows.map(r => '<tr>'
                 + '<td>' + escapeHtml(r.cust_type) + '</td>'
                 + '<td>' + fmtRM(r.sales) + '</td>'
                 + '<td>' + fmtInt(r.rows) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
               + '</tr>').join('')
             + '</tbody></table>';
      } else if (salesDrillTab === 'supplier') {
        // Phase 5b: rows[{bucket, sales, invoices, sales_prev,
        // sales_last_year, sales_12mo_avg}] + 3 comparison columns.
        // Backward-compat: if old shape (d.OEM/d.Local_Agency) present,
        // render that (no comparisons available).
        if (Array.isArray(cached.data.rows)) {
          const rows = cached.data.rows;
          let total = 0; rows.forEach(r => total += (+r.sales || 0));
          body = histGapBanner(rows, 'supplier')
               + '<table><thead><tr>'
               + '<th>来源</th><th>本月销售 RM</th><th>单数</th>'
               + '<th>vs 上月</th><th>vs 去年同月</th><th>vs 12M 均</th>'
               + '</tr></thead><tbody>'
               + rows.map(r => '<tr>'
                   + '<td>' + escapeHtml(r.bucket) + '</td>'
                   + '<td>' + fmtRM(r.sales) + '</td>'
                   + '<td>' + fmtInt(r.invoices) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
                 + '</tr>').join('')
               + '<tr><td><strong>Total</strong></td><td><strong>' + fmtRM(total) + '</strong></td><td>—</td><td>—</td><td>—</td><td>—</td></tr>'
               + '</tbody></table>';
        } else {
          const d = cached.data;
          body = '<table><thead><tr><th>来源</th><th>销售 RM</th><th>单数</th></tr></thead><tbody>'
               + '<tr><td>OEM (China)</td><td>' + fmtRM(d.OEM?.sales) + '</td><td>' + fmtInt(d.OEM?.invoices) + '</td></tr>'
               + '<tr><td>Local Agency (Malaysia)</td><td>' + fmtRM(d.Local_Agency?.sales) + '</td><td>' + fmtInt(d.Local_Agency?.invoices) + '</td></tr>'
               + '</tbody></table>';
        }
      } else {
        body = '<div class="muted">No data</div>';
      }
    } else {
      body = '<div class="muted">Loading…</div>';
    }
  }
  return ''
    + '<div class="s4-drill">'
    +   '<div class="s4-drill-tabs">' + tabHtml + '</div>'
    +   '<div class="s4-drill-body">' + body + '</div>'
    + '</div>';
}

function renderS4OwnerActionPlan(s, anomalies) {
  // Left: anomaly cards (with [→ 派派] prefilled)
  const anomCards = (anomalies || []).map(a => {
    const sev = a.severity || 'amber';
    // Phase 4 hotfix Bug 3: clean RPC's pre-formatted detail text.
    const cleanDetail = sanitizeRpcDetail(a.detail);
    const seed = JSON.stringify({
      title: a.title, severity: a.severity, detail: cleanDetail,
      recommended_action: a.recommended_action,
      recommended_assignee: a.recommended_assignee,
      recommended_amount: a.recommended_amount,
      store: a.store,
      source_url: '?view=sales&month=' + state.month + (a.store ? '&branch=' + a.store : ''),
      source_data: a,
    }).replace(/"/g, '&quot;');
    return ''
      + '<div class="s4-action-card ' + sev + '">'
      +   '<div class="a-title">' + escapeHtml(a.title) + '</div>'
      +   '<div class="a-detail">' + escapeHtml(cleanDetail) + '</div>'
      +   (a.recommended_action ? '<div class="a-action-text">👉 ' + escapeHtml(a.recommended_action) + '</div>' : '')
      +   '<div class="a-controls"><button class="s4-btn primary" onclick="openAssignModal(' + seed + ')">→ 派派</button></div>'
      + '</div>';
  }).join('');
  const anomBlock = anomCards
    ? '<div>' + anomCards + '</div>'
    : '<div class="s4-data-gap">本月暂无 high-severity 异常 ✓</div>';

  // Right: sent-out status (actions assigned by current user)
  const actions = (s.data.actions && Array.isArray(s.data.actions.actions)) ? s.data.actions.actions : [];
  const sentCards = actions.map(a => renderS4SentActionCard(a)).join('');
  const sentBlock = sentCards
    ? '<div>' + sentCards + '</div>'
    : '<div class="s4-data-gap">尚未派出任何 Action — 点上方 [⊕ 派派] 派第一条</div>';

  return ''
    + '<div class="s4-action-grid">'
    +   '<div><div class="s4-section-title" style="margin-top:0;font-size:16px">⚠ 异常 + 归因 (自动检测)</div>' + anomBlock + '</div>'
    +   '<div><div class="s4-section-title" style="margin-top:0;font-size:16px">📋 我派出去的 Action (' + actions.length + ')</div>' + sentBlock + '</div>'
    + '</div>';
}

function renderS4SentActionCard(a) {
  const sevCls = (a.severity || 'amber');
  const statusCls = 's4-action-status-' + (a.status || 'pending');
  const ddlStr = a.ddl ? ' · ddl ' + a.ddl : '';
  const amtStr = a.amount != null ? ' · RM ' + fmtInt(a.amount) : '';
  let buttons = '';
  if (a.status === 'renegotiating') {
    buttons = '<button class="s4-btn" onclick="approveRenegotiate(' + a.id + ', true)">批准</button>'
            + '<button class="s4-btn danger" onclick="approveRenegotiate(' + a.id + ', false)">驳回</button>';
  } else if (a.status === 'overdue') {
    buttons = '<button class="s4-btn">追问 (UI only)</button>'
            + '<button class="s4-btn danger" onclick="rejectAction(' + a.id + ')">关闭</button>';
  }
  const renegBox = (a.status === 'renegotiating' && a.proposed_note)
    ? '<div class="a-attrib"><strong>谈判申请:</strong> '
        + (a.proposed_ddl ? '改 ddl → ' + a.proposed_ddl : '')
        + (a.proposed_amount ? ' · 改金额 → RM ' + fmtInt(a.proposed_amount) : '')
        + ' · ' + escapeHtml(a.proposed_note) + '</div>'
    : '';
  const doneNoteBox = (a.status === 'done' && a.done_note)
    ? '<div class="a-attrib"><strong>完成备注:</strong> ' + escapeHtml(a.done_note) + '</div>'
    : '';
  return ''
    + '<div class="s4-action-card ' + sevCls + '">'
    +   '<div class="a-title">' + escapeHtml(a.title) + '</div>'
    +   '<div class="a-detail">→ ' + escapeHtml(a.assignee) + amtStr + ddlStr + '</div>'
    +   '<div class="a-detail"><span class="' + statusCls + '">状态: ' + (a.status || 'pending') + '</span></div>'
    +   renegBox + doneNoteBox
    +   (buttons ? '<div class="a-controls">' + buttons + '</div>' : '')
    + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   PART C — TIER 2 STORE MANAGER VIEW (renderSalesStoreV3)
   Sections: My Target · My Anomalies · My Action Plan · Peer Ranking
═══════════════════════════════════════════════════════════════════ */
function renderSalesStoreV3(s) {
  const myStore = (s.user && s.user.store) || '?';
  const header = ''
    + '<div class="s4-page-header">'
    +   '<div><h1 class="s4-title">Sales · 我的店 ' + myStore + '</h1>'
    +     '<div class="s4-sub">月份 ' + s.month + '</div></div>'
    + '</div>';

  if (s.loading || !s.data) {
    return '<div class="sales-v3">' + header
      + '<div class="s4-tier2-target"><div class="skeleton h-value" style="width:140px;height:36px"></div></div>'
      + '</div>';
  }

  const tier = (s.data.tier && s.data.tier.data) || null;
  const degraded = !!(s.data.tier && s.data.tier.degraded);
  let banner = '';
  if (degraded || !tier) {
    banner = '<div class="s4-data-gap" style="margin:14px 0"><strong>RPC sales_store_view 未部署</strong> · 见 <code>tools/migration_phase4_sales_v3.sql</code>. 下方 fallback 用 /api/kpi sales 渲染.</div>';
  }

  // ── My Target (Part C / Section 1)
  const myTarget = tier
    ? renderS4MyTarget(tier)
    : renderS4MyTargetFallback(s, myStore);

  // ── My Anomalies
  const myAnomalies = tier && Array.isArray(tier.anomalies) && tier.anomalies.length > 0
    ? '<div class="s4-action-grid" style="grid-template-columns:1fr"><div>' + tier.anomalies.map(a =>
        '<div class="s4-action-card ' + (a.severity || 'amber') + '">'
        + '<div class="a-title">' + escapeHtml(a.title) + '</div>'
        + '<div class="a-detail">' + escapeHtml(sanitizeRpcDetail(a.detail)) + '</div>'
        + '</div>').join('') + '</div></div>'
    : '<div class="s4-data-gap">本月暂无显著异常 ✓</div>';

  // ── My Action Plan (assigned by Jym)
  const actions = (s.data.actions && Array.isArray(s.data.actions.actions)) ? s.data.actions.actions : [];
  const assignedToMe = actions.filter(a => a.status !== 'done' && a.status !== 'rejected');
  const myAP = assignedToMe.length > 0
    ? '<div class="s4-action-grid" style="grid-template-columns:1fr"><div>'
        + assignedToMe.map(a => renderS4AssignedActionCard(a)).join('')
      + '</div></div>'
    : '<div class="s4-data-gap">老板暂无派给你的 Action ✓</div>';

  // ── Peer Ranking (pct + rank only, privacy enforced server-side)
  const peers = tier && Array.isArray(tier.peer_ranking) ? tier.peer_ranking : [];
  const peerRows = peers.map(p => {
    const isSelf = p.store === myStore;
    const dotCls = p.status === 'exceeded' ? 'green' : (p.status === 'critical' || p.status === 'behind' ? 'red' : 'amber');
    return '<div class="peer-row ' + (isSelf ? 'self' : '') + '">'
      + '<span class="rank">' + p.rank + '.</span>'
      + '<span class="dot ' + dotCls + '"></span>'
      + '<span><strong>' + p.store + '</strong>' + (isSelf ? '<span class="you-tag">你</span>' : '') + '</span>'
      + '<span class="pct">' + (p.pct != null ? p.pct.toFixed(1) + '%' : '—') + '</span>'
    + '</div>';
  }).join('');
  const peerBlock = peers.length > 0
    ? '<div class="s4-peer-ranking">' + peerRows + '</div>'
    : '<div class="s4-data-gap">Peer ranking 数据空</div>';

  return '<div class="sales-v3">'
    + header
    + banner
    + '<div class="s4-section-title">My Target · ' + s.month + '</div>'
    + myTarget
    + '<div class="s4-section-title">My Anomalies · 本月异常</div>'
    + myAnomalies
    + '<div class="s4-section-title">My Action Plan · 老板派给我的事</div>'
    + myAP
    + '<div class="s4-section-title">Peer Ranking · 6 店本月达标率 (隐私: 只看 % + 排名)</div>'
    + peerBlock
    + '</div>';
}

function renderS4MyTarget(tier) {
  const pct = tier.pct;
  const status = pct == null ? 'gray'
              : pct >= 100   ? 'green'
              : pct >= 85    ? 'amber'
              : 'red';
  const shortfall = tier.shortfall;
  return ''
    + '<div class="s4-tier2-target">'
    +   '<div class="label">本月目标</div>'
    +   '<div class="target-num">' + fmtRM(tier.target) + '</div>'
    +   '<div class="row2">'
    +     '<div><div class="label">我跑到</div>'
    +       '<div class="actual-num ' + status + '" style="color:' + (status === 'red' ? 'var(--s4-red-text)' : status === 'green' ? 'var(--s4-green-text)' : 'var(--s4-amber-text)') + '">'
    +       fmtRM(tier.actual) + (pct != null ? ' (' + pct.toFixed(1) + '%)' : '') + '</div>'
    +     '</div>'
    +     '<div><div class="label">缺口</div>'
    +       '<div class="gap-num ' + (shortfall > 0 ? 'red' : 'green') + '" style="color:' + (shortfall > 0 ? 'var(--s4-red-text)' : 'var(--s4-green-text)') + '">'
    +       (shortfall > 0 ? '-RM ' : '+RM ') + Math.round(Math.abs(shortfall)).toLocaleString('en-US') + '</div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="s4-hero-progress" style="margin-top:24px">'
    +     '<div class="bar"><span class="' + status + '" style="width:' + Math.min(100, pct || 0) + '%"></span></div>'
    +     '<div><span class="bar-meta-r">' + (pct != null ? pct.toFixed(1) + '%' : '—') + '</span></div>'
    +   '</div>'
    +   '<div class="row3">'
    +     '<div class="compare-row">vs 上月 ' + (tier.vs_last_month != null ? fmtRM(tier.vs_last_month) + ' · <span class="' + (tier.actual >= tier.vs_last_month ? 'delta-up' : 'delta-down') + '">' + (tier.actual >= tier.vs_last_month ? '↑' : '↓') + ' ' + Math.abs((tier.actual - tier.vs_last_month) / Math.max(1, tier.vs_last_month) * 100).toFixed(1) + '%</span>' : '—') + '</div>'
    +     '<div class="compare-row">vs 去年同月 ' + (tier.vs_last_year != null ? fmtRM(tier.vs_last_year) : '—') + '</div>'
    +     '<div class="compare-row">vs 6 月均 ' + (tier.vs_6mo_avg != null ? fmtRM(tier.vs_6mo_avg) : '—') + '</div>'
    +     '<div class="compare-row">本月单数 ' + fmtInt(tier.invoices) + ' · AOV (按单) ' + (tier.aov != null ? fmtRMpr(tier.aov) : '—') + '</div>'
    +   '</div>'
    + '</div>';
}
function renderS4MyTargetFallback(s, myStore) {
  const d = s.data.kpi || {};
  const t = s.data.targets || {};
  const myT = t.summary?.by_store?.[myStore]?.sales || 0;
  const branch = d.by_branch?.[myStore] || { sales: 0, invoices: 0 };
  return renderS4MyTarget({
    target: myT, actual: branch.sales,
    pct: myT > 0 ? branch.sales / myT * 100 : null,
    shortfall: myT - branch.sales,
    invoices: branch.invoices,
    aov: branch.invoices > 0 ? branch.sales / branch.invoices : null,
    vs_last_month: null, vs_last_year: null, vs_6mo_avg: null,
  });
}

function renderS4AssignedActionCard(a) {
  const sev = a.severity || 'amber';
  const statusCls = 's4-action-status-' + (a.status || 'pending');
  const ddlStr = a.ddl ? ' · ddl ' + a.ddl : '';
  const amtStr = a.amount != null ? ' · 目标 RM ' + fmtInt(a.amount) : '';
  let buttons = '';
  if (a.status === 'pending' || a.status === 'overdue') {
    buttons = '<button class="s4-btn primary" onclick="acceptAction(' + a.id + ')">Accept</button>'
            + '<button class="s4-btn" onclick="openRenegotiateModal(' + JSON.stringify(a).replace(/"/g, '&quot;') + ')">谈判</button>'
            + '<button class="s4-btn" onclick="openDoneModal(' + a.id + ')">Mark Done</button>';
  } else if (a.status === 'accepted') {
    buttons = '<button class="s4-btn primary" onclick="openDoneModal(' + a.id + ')">Mark Done</button>'
            + '<button class="s4-btn" onclick="openRenegotiateModal(' + JSON.stringify(a).replace(/"/g, '&quot;') + ')">谈判</button>';
  } else if (a.status === 'renegotiating') {
    buttons = '<div class="muted">等老板批准谈判申请…</div>';
  }
  return ''
    + '<div class="s4-action-card ' + sev + '">'
    +   '<div class="a-title">' + escapeHtml(a.title) + amtStr + ddlStr + '</div>'
    +   (a.description ? '<div class="a-detail">' + escapeHtml(a.description) + '</div>' : '')
    +   '<div class="a-detail"><span class="' + statusCls + '">状态: ' + (a.status || 'pending') + '</span></div>'
    +   (buttons ? '<div class="a-controls">' + buttons + '</div>' : '')
    + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TARGETS · ⚙️ 目标设定 (owner only)
   - month picker (uses global state.month, updated via header picker)
   - 10 × 2 grid: store × (sales / footfall) target_value editable
   - auto-fill buttons: copy last month / last × 1.05
   - save → POST /api/targets/upsert (sync.js mode=targets_upsert, owner)
═══════════════════════════════════════════════════════════════════ */

// Editor state — mutable in-memory until save. Resets on data load.
const targetsEditor = {
  ymLoaded: null,
  dirty: false,
  byStore: {},  // store -> { sales: number|null, footfall: number|null }
  saving: false,
  lastSaveStatus: null, // { ok: bool, message: string }
};

function loadTargetsIntoEditor(targetsResp) {
  targetsEditor.ymLoaded = targetsResp.ym;
  targetsEditor.dirty = false;
  targetsEditor.byStore = {};
  for (const code of TARGET_STORE_ORDER) {
    targetsEditor.byStore[code] = { sales: null, footfall: null };
  }
  const summary = (targetsResp && targetsResp.summary && targetsResp.summary.by_store) || {};
  for (const code of Object.keys(summary)) {
    if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = { sales: null, footfall: null };
    if (summary[code].sales    != null) targetsEditor.byStore[code].sales    = +summary[code].sales || 0;
    if (summary[code].footfall != null) targetsEditor.byStore[code].footfall = +summary[code].footfall || 0;
  }
}

function renderTargets(s) {
  // Owner-only gate (also enforced backend-side; UI hides the link from non-owners).
  if (s.role !== 'owner') {
    return '<h1 class="page-title">⚙️ 目标设定</h1>'
         + '<div class="error-panel"><div class="msg"><strong>店长无权限</strong>。owner only.</div></div>';
  }
  if (s.loading || !s.data) {
    return '<h1 class="page-title">⚙️ 目标设定</h1>'
         + '<p class="page-sub">' + s.month + ' · 加载中…</p>'
         + '<div class="skeleton h-row"></div><div class="skeleton h-row"></div>';
  }
  // Sync editor with loaded data (if we've switched months or first load)
  if (targetsEditor.ymLoaded !== s.data.ym) {
    loadTargetsIntoEditor(s.data);
  }

  const fallback = s.data.fallback_used
    ? '<div class="targets-fallback-note">本月 (' + s.data.ym + ') 未设目标 · 表中显 <strong>' + s.data.fallback_from + '</strong> 的目标作为参照 · 编辑保存后会建立 ' + s.data.ym + ' 自己的目标</div>'
    : (s.data.targets.length === 0
       ? '<div class="targets-fallback-note">本月 (' + s.data.ym + ') 未设目标 · 上月也未设 · 表全空, 填入数字后保存</div>'
       : '');

  // Build grid rows
  const rows = TARGET_STORE_ORDER.map(code => {
    const meta = TARGET_STORES[code];
    const cur  = targetsEditor.byStore[code] || { sales: null, footfall: null };
    const histClass = meta.group === 'historical' ? 'historical' : '';
    const note = meta.group === 'historical'
      ? '历史店 — 通常填 0' : (code === 'WCO' ? 'HQ 开单' : '主力店');
    return ''
      + '<tr class="' + histClass + '">'
      +   '<td class="store-cell">' + escapeHtml(meta.name) + '</td>'
      +   '<td><input type="number" min="0" step="100" class="target-input" '
      +       'data-store="' + code + '" data-type="sales" '
      +       'value="' + (cur.sales != null ? cur.sales : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td><input type="number" min="0" step="1" class="target-input" '
      +       'data-store="' + code + '" data-type="footfall" '
      +       'value="' + (cur.footfall != null ? cur.footfall : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td class="note">' + note + '</td>'
      + '</tr>';
  }).join('');

  // Summary computations
  const salesTot = Object.values(targetsEditor.byStore)
    .reduce((a, v) => a + (+v.sales || 0), 0);
  const footTot = Object.values(targetsEditor.byStore)
    .reduce((a, v) => a + (+v.footfall || 0), 0);

  const saveLabel = targetsEditor.saving ? 'Saving…' : (targetsEditor.dirty ? 'Save changes' : 'No unsaved changes');
  const saveStatus = targetsEditor.lastSaveStatus
    ? '<span class="targets-save-status ' + (targetsEditor.lastSaveStatus.ok ? 'ok' : 'bad') + '">'
        + escapeHtml(targetsEditor.lastSaveStatus.message) + '</span>'
    : '';

  return ''
    + '<h1 class="page-title">⚙️ 目标设定</h1>'
    + '<p class="page-sub">月份 ' + s.data.ym
    + ' · 10 店 × 2 类型 (销售 / 客流) · 默认 (没设) 自动延用上月</p>'
    + fallback
    + '<div class="targets-toolbar">'
    +   '<span class="group-label">快速填充:</span>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'copy_last\')">复制上月目标</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'last_x_105\')">上月 × 1.05</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'clear\')">清空</button>'
    +   '<button type="button" class="primary" '
    +     'onclick="saveTargets()" '
    +     (targetsEditor.dirty && !targetsEditor.saving ? '' : 'disabled')
    +     '>' + saveLabel + '</button>'
    +   saveStatus
    + '</div>'
    + '<table class="targets-grid">'
    +   '<thead><tr><th>店</th><th>销售目标 (RM)</th><th>客流目标 (人)</th><th>备注</th></tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '<div class="targets-summary">'
    +   '<div class="summary-cell"><div class="label">销售目标合计 (10 店)</div>'
    +     '<div class="value">' + fmtRM(salesTot) + '</div></div>'
    +   '<div class="summary-cell"><div class="label">客流目标合计 (10 店)</div>'
    +     '<div class="value">' + fmtInt(footTot) + ' 人</div></div>'
    + '</div>';
}

function onTargetEdit(input) {
  const store = input.getAttribute('data-store');
  const type  = input.getAttribute('data-type');
  const val   = input.value === '' ? null : Number(input.value);
  if (!targetsEditor.byStore[store]) targetsEditor.byStore[store] = { sales: null, footfall: null };
  targetsEditor.byStore[store][type] = (val == null || isNaN(val)) ? null : val;
  if (!input.classList.contains('dirty')) input.classList.add('dirty');
  if (!targetsEditor.dirty) {
    targetsEditor.dirty = true;
    targetsEditor.lastSaveStatus = null;
    // Re-enable save button without full re-render (cheap toggle)
    const btn = document.querySelector('.targets-toolbar button.primary');
    if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
  }
  // Update summary values inline (cheap reach)
  const summaryCells = document.querySelectorAll('.targets-summary .summary-cell .value');
  if (summaryCells.length >= 2) {
    const salesTot = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.sales || 0), 0);
    const footTot  = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.footfall || 0), 0);
    summaryCells[0].textContent = fmtRM(salesTot);
    summaryCells[1].textContent = fmtInt(footTot) + ' 人';
  }
}
window.onTargetEdit = onTargetEdit;

function applyTargetsTemplate(kind) {
  // Need last-month targets for "copy_last" / "last_x_105". We have them
  // either as s.data.targets (when fallback_used=true) or via a fresh fetch.
  // Simpler: always re-fetch last month's targets via /api/kpi?view=targets.
  const ymPrev = ymLastMonth(state.month);
  if (kind === 'clear') {
    for (const code of TARGET_STORE_ORDER) {
      targetsEditor.byStore[code] = { sales: null, footfall: null };
    }
    targetsEditor.dirty = true;
    renderView();
    return;
  }
  fetch('/api/kpi?' + new URLSearchParams({ view: 'targets', month: ymPrev }).toString(), {
    cache: 'no-store', headers: authHeaders(),
  })
    .then(r => r.json())
    .then(j => {
      const by = (j && j.summary && j.summary.by_store) || {};
      const factor = (kind === 'last_x_105') ? 1.05 : 1.0;
      for (const code of TARGET_STORE_ORDER) {
        const meta = TARGET_STORES[code];
        if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = { sales: null, footfall: null };
        const src = by[code] || {};
        // Historical stores stay 0 if Jym originally set 0 last month.
        targetsEditor.byStore[code].sales    = (src.sales    != null) ? Math.round(src.sales    * factor) : (meta.group === 'historical' ? 0 : null);
        targetsEditor.byStore[code].footfall = (src.footfall != null) ? Math.round(src.footfall * factor) : (meta.group === 'historical' ? 0 : null);
      }
      targetsEditor.dirty = true;
      renderView();
    })
    .catch(e => {
      targetsEditor.lastSaveStatus = { ok: false, message: '上月目标载入失败: ' + e.message };
      renderView();
    });
}
window.applyTargetsTemplate = applyTargetsTemplate;

async function saveTargets() {
  if (targetsEditor.saving) return;
  targetsEditor.saving = true;
  targetsEditor.lastSaveStatus = { ok: true, message: 'Saving…' };
  renderView();
  // Build payload — skip nulls (don't write blank rows).
  const targets = [];
  for (const code of TARGET_STORE_ORDER) {
    const v = targetsEditor.byStore[code] || {};
    if (v.sales    != null) targets.push({ store: code, target_type: 'sales',    target_value: +v.sales });
    if (v.footfall != null) targets.push({ store: code, target_type: 'footfall', target_value: +v.footfall });
  }
  if (targets.length === 0) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: '没数字可保存 — 至少填一格' };
    renderView();
    return;
  }
  try {
    const r = await fetch('/api/sync', {
      method: 'POST', cache: 'no-store',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        mode: 'targets_upsert',
        ym: state.month,
        targets,
      }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) {
      throw new Error(j.error || ('HTTP ' + r.status));
    }
    targetsEditor.saving = false;
    targetsEditor.dirty  = false;
    targetsEditor.lastSaveStatus = {
      ok: true,
      message: 'Saved ' + j.rows_upserted + ' rows' + (j.rows_skipped ? ' · ' + j.rows_skipped + ' skipped' : ''),
    };
    // Reload from server to confirm.
    loadView();
  } catch (e) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: 'Save failed: ' + e.message };
    renderView();
  }
}
window.saveTargets = saveTargets;

/* ═══════════════════════════════════════════════════════════════════
   RENDER · INVENTORY  (Stage B)
   8 cards = 4 KPI (health/order_gap/stockout/oem-vs-agency)
            + 4 alerts (po_calendar/transfer/liquidation/po_anomalies).
   Data: /api/inventory_dashboard (kpis + alerts in parallel).
   byte-match V1 Stage 3 + Stage 4 — same endpoint, same numbers.
═══════════════════════════════════════════════════════════════════ */
function renderInventory(s) {
  // Stage C-orphan (2026-05-16): top-of-page banner when Sheet has SKUs
  // missing from items master. Click → modal with full list + CSV export.
  // Per Notion 3620a2d3110081c7a7a0c0173eab6780 — never silent, always
  // amber tone (not gray — this is an action item, not a passive caveat).
  const orphan = (s.data && s.data.kpis && s.data.kpis.orphan_alert) || null;
  const orphanBanner = (orphan && orphan.count > 0)
    ? '<div class="orphan-banner" onclick="openOrphanModal()" role="button" tabindex="0">'
    +   '<div class="ob-icon">⚠️</div>'
    +   '<div class="ob-text">'
    +     '<strong>' + orphan.count + ' SKU</strong> missing master data'
    +     ' · 影响 RM ' + (orphan.value_rm || 0).toLocaleString('en-US', { minimumFractionDigits: 2 })
    +     ' · Sheet Raw CS 有这些 code 但 SM master 没有, items 表已 placeholder'
    +     ' · 添加到 Sheet SM tab 后 cron 自动 propagate'
    +   '</div>'
    +   '<div class="ob-cta">查看明细 →</div>'
    + '</div>'
    : '';

  const title = orphanBanner
              + '<h1 class="page-title">Inventory</h1>'
              + '<p class="page-sub">Snapshot ' + s.month
              + (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · Company-wide')
              + ' · 4 KPI + 4 alerts · /api/inventory_dashboard</p>';

  if (s.loading || !s.data) {
    return title + '<div class="cards-grid">'
      + skeletonCard('① Inventory health')
      + skeletonCard('② Order gap')
      + skeletonCard('③ Stockout risk')
      + skeletonCard('④ OEM vs Agency')
      + '</div>'
      + '<div class="section-title">Action alerts</div>'
      + '<div class="cards-grid">'
      + skeletonCard('① OEM PO calendar')
      + skeletonCard('② Transfer engine')
      + skeletonCard('③ Liquidation')
      + skeletonCard('④ PO anomalies')
      + '</div>';
  }

  const k = s.data.kpis || {};
  const a = s.data.alerts || {};
  const asOf = k.snapshot_date ? 'snapshot ' + k.snapshot_date : '';
  const ymPrev = k.ym_prev || '—';
  // Stage C-synth (2026-05-16): when the snapshot is flagged synthetic in
  // inventory_snapshots.is_synthetic, hide MoM comparisons (no real prior
  // month to compare against) and surface a clear honest label per Notion
  // SOP 3620a2d3110081bc8deef3944a4b8fe4. First real month-end snapshot
  // expected 2026-05-31; until then the 2026-03-31 / 2026-04-30 rows are
  // synthetic baselines.
  const isSynthetic = !!k.is_synthetic;

  // ── KPI 1: Inventory health (5-class breakdown + MoM) ─────────
  const h = k.health || {};
  const hClasses = h.classes || {};
  const order = ['Active', 'Slow', 'Misplaced', 'Dead', 'Discontinued'];
  // Class rows: hide MoM badge when synthetic (no comparable prior month).
  const hRows = order.map(cls => {
    const r = hClasses[cls] || { amount: 0, pct: 0, mom_amount: 0, mom_pct: null };
    const trailer = isSynthetic ? '' : momBadge(r.mom_amount, r.mom_pct);
    return kpiRow(cls,
      fmtMoneyShort(r.amount) + ' (' + fmtPctSign(r.pct) + ')' + trailer);
  }).join('');
  const deadAmt = ((hClasses.Dead && hClasses.Dead.amount) || 0) + ((hClasses.Discontinued && hClasses.Discontinued.amount) || 0);
  const deadPct = h.total_stock ? (deadAmt / h.total_stock * 100) : 0;
  const k1Class = deadPct > 30 ? 'danger' : deadPct > 20 ? 'warn' : '';
  const k1Sub = isSynthetic
    ? '5-class distribution · MoM hidden (synthetic baseline)'
    : '5-class distribution (MoM vs ' + ymPrev + ')';
  // K1 wrapper — when synthetic, append a gray honest banner directly
  // below the headline number, before the 5-class breakdown.
  const syntheticBanner = isSynthetic
    ? '<div class="synthetic-banner">⚠️ synthetic baseline · 真月底快照从 2026-05-31 起</div>'
    : '';
  const c1 = ''
    + '<div class="card">'
    +   '<div class="label">① Inventory health</div>'
    +   '<div class="value num' + (k1Class ? ' ' + k1Class : '') + '">' + fmtMoneyShort(h.total_stock || 0) + '</div>'
    +   syntheticBanner
    +   '<div class="month-tag">' + k1Sub + '</div>'
    +   '<div class="kpi-rows">' + hRows + '</div>'
    +   (asOf ? '<div class="as-of">' + asOf + '</div>' : '')
    + '</div>';

  // ── KPI 2: Order gap (PO vs Sales consumed) ───────────────────
  const og = k.order_gap || {};
  const gapNum = +(og.gap || 0);
  const gapStr = (gapNum >= 0 ? '+' : '-') + fmtMoneyShort(Math.abs(gapNum));
  const gapClass = gapNum < 0 ? 'danger' : 'ok';
  const abcd = og.abcd_distribution || {};
  const abcdStr = ['A', 'B', 'C', 'D'].map(g => g + '=' + (abcd[g] || 0)).join(' / ');
  const c2 = kpiCard('② Order gap (' + (k.ym_curr || '—') + ')',
    gapStr,
    'PO ' + fmtMoneyShort(og.po_curr_amt) + ' · Sales ' + fmtMoneyShort(og.sales_consumed_curr),
    kpiRow('Next-month projection', fmtMoneyShort(og.next_month_projection)) +
    kpiRow('ABCD distribution', abcdStr),
    'baseline: last-month sales × 1.05',
    gapClass);

  // ── KPI 3: Stockout SKU alert (OEM/Agency split) ──────────────
  const so = k.stockout || {};
  const oemSo = so.OEM || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 51 };
  const agcSo = so.Agency || { already_out: 0, at_risk_14d: 0, at_risk_30d: 0, lead_days: 8 };
  const soTotal = (oemSo.already_out || 0) + (agcSo.already_out || 0);
  const soClass = soTotal > 0 ? 'danger' : '';
  const c3 = kpiCard('③ Stockout SKU alert',
    soTotal + ' SKU out',
    'split by source · lead-time differs OEM/Agency',
    kpiRow('OEM (China · ' + oemSo.lead_days + 'd)',
      oemSo.already_out + ' out / ' + oemSo.at_risk_14d + ' 14d / ' + oemSo.at_risk_30d + ' 30d') +
    kpiRow('Agency (MY · ' + agcSo.lead_days + 'd)',
      agcSo.already_out + ' out / ' + agcSo.at_risk_14d + ' 14d / ' + agcSo.at_risk_30d + ' 30d'),
    asOf, soClass);

  // ── KPI 4: OEM vs Agency ──────────────────────────────────────
  const ova = k.oem_vs_agency || {};
  const oem = ova.OEM || {};
  const agc = ova.Agency || {};
  const totVal = (oem.stock_value || 0) + (agc.stock_value || 0);
  const c4 = kpiCard('④ OEM vs Agency',
    fmtMoneyShort(totVal),
    'Stock value + dead-rate by source',
    kpiRow('OEM stock', fmtMoneyShort(oem.stock_value) + ' · dead ' + fmtPctSign(oem.dead_rate_pct)) +
    kpiRow('Agency stock', fmtMoneyShort(agc.stock_value) + ' · dead ' + fmtPctSign(agc.dead_rate_pct)) +
    kpiRow('Lead time', 'OEM ' + (oem.lead_days || 51) + 'd · Agency ' + (agc.lead_days || 8) + 'd'),
    'hard-coded lead · per-SKU pending po_grn multi-mo history');

  // ── Alert 1: OEM PO calendar ──────────────────────────────────
  const po = a.po_calendar || {};
  const poRows = (po.by_eta_month || []).slice(0, 4).map(m =>
    aRow(escapeHtml(m.eta_ym) + ' (' + escapeHtml(m.source || '—') + ')',
      (m.open_pos || 0) + ' POs · ' + fmtMoneyShort(m.po_amt))
  ).join('') || aRow('No open POs', '');
  const a1Tone = (po.open_total || 0) > 0 ? 'warn' : 'ok';
  const al1 = alertCard('① OEM PO calendar',
    (po.open_total || 0) + ' open',
    fmtMoneyShort(po.open_amt) + ' in-transit · lead OEM=51d / Agency=8d',
    a1Tone, poRows);

  // ── Alert 2: Transfer engine (Misplaced) ──────────────────────
  const xfer = a.transfer_engine || {};
  const xferRows = (xfer.top20 || []).slice(0, 5).map(t =>
    aRow(escapeHtml(t.item_code) + ' ' + t.from_store + '→' + t.to_store,
      (t.transfer_qty_est || 0) + ' pcs · ' + fmtMoneyShort(t.transfer_value_est))
  ).join('') || aRow('No transfer opportunities', '');
  const a2Tone = (xfer.total_opportunities || 0) > 0 ? 'ok' : 'na';
  const al2 = alertCard('② Transfer engine (Misplaced)',
    (xfer.total_opportunities || 0) + ' opps',
    'Release est. ' + fmtMoneyShort(xfer.total_value_est) + ' · top 5 ↓',
    a2Tone, xferRows);

  // ── Alert 3: Liquidation ──────────────────────────────────────
  const liq = a.liquidation || {};
  const tier = liq.by_tier || {};
  const tier365 = tier.tier_365_plus || { n: 0, amt: 0 };
  const tier180 = tier.tier_180_365 || { n: 0 };
  const tier90 = tier.tier_90_180 || { n: 0 };
  const a3Tone = (liq.total_locked_value || 0) > 100000 ? 'bad'
              : (liq.total_locked_value || 0) > 10000  ? 'warn' : 'ok';
  const al3 = alertCard('③ Liquidation candidates (Dead/Disc)',
    (liq.total_candidates || 0) + ' SKU',
    'Capital locked ' + fmtMoneyShort(liq.total_locked_value),
    a3Tone,
    aRow('365d+', tier365.n + ' (' + fmtMoneyShort(tier365.amt) + ')') +
    aRow('180-365d', tier180.n + '') +
    aRow('90-180d', tier90.n + '') +
    aRow('Discount rec.', '365d+ 50% · 180-365 25% · 90-180 10%'));

  // ── Alert 4: PO anomalies ─────────────────────────────────────
  const anom = a.po_anomalies || {};
  const overd = anom.overdue_po || { count: 0 };
  const deficit = anom.grn_deficit || { count: 0 };
  const drift = anom.price_drift || { count: 0 };
  const anomTotal = (overd.count || 0) + (deficit.count || 0) + (drift.count || 0);
  const a4Tone = anomTotal > 0 ? 'warn' : 'ok';
  const al4 = alertCard('④ Purchase anomalies',
    anomTotal + ' issues',
    null, a4Tone,
    aRow('Overdue PO (>60d)', overd.count || 0) +
    aRow('GRN < PO', deficit.count || 0) +
    aRow('Unit price drift >20%', drift.count || 0));

  return title
    + '<div class="cards-grid">' + c1 + c2 + c3 + c4 + '</div>'
    + '<div class="section-title">Action alerts · ' + (a.snapshot_date || asOf) + '</div>'
    + '<div class="cards-grid">' + al1 + al2 + al3 + al4 + '</div>';
}

// 会员年龄分段 4 cards — replaces PR#55 4-KPI hero. From customers_payload
// buckets_by_window: 12m → 会员数/复购率/12M 客单价; 1m → 本月消费.
function renderCustomerAgeTiers(s) {
  const resp = s.data.payload || {};
  const pd = resp.data;
  if (resp.degraded || !pd) {
    return '<div class="s4-data-gap">customers_payload 未返回数据 — 会员分段不可用。' + escapeHtml(resp.degraded_reason || '') + '</div>';
  }
  const b12 = (pd.buckets_by_window && pd.buckets_by_window['12m']) || [];
  const b1  = (pd.buckets_by_window && pd.buckets_by_window['1m'])  || [];
  const by12 = {}; b12.forEach(x => by12[x.key] = x);
  const by1  = {}; b1.forEach(x => by1[x.key] = x);
  const total = (pd.summary && pd.summary.total_members) || b12.reduce((a, x) => a + (x.n || 0), 0);
  const cards = AGE_TIER_ORDER.map(k => {
    const r = by12[k] || { n: 0, amt: 0, aov: 0, repeat_pct: null };
    const m = by1[k]  || { amt: 0 };
    const sharePct = total > 0 ? (r.n / total * 100) : 0;
    return ''
      + '<div class="kpi-card" style="border-top-color:var(--brand)">'
      +   '<div class="kpi-icon">' + AGE_TIER_ICON[k] + '</div>'
      +   '<div class="kpi-title">' + k + ' 会员</div>'
      +   '<div class="kpi-actual">' + fmtInt(r.n) + ' <span style="font-size:14px;color:#6B7280;font-weight:400">人</span></div>'
      +   '<div class="kpi-status-row"><span class="kpi-pct" style="color:var(--s4-text-primary);font-size:16px">占会员 ' + sharePct.toFixed(1) + '%</span></div>'
      +   '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + Math.min(100, sharePct) + '%;background:var(--brand)"></div></div>'
      +   '<div class="kpi-meta">'
      +     '本月消费 <strong>' + fmtRM(m.amt) + '</strong><br>'
      +     '复购率 <strong>' + (r.repeat_pct != null ? Number(r.repeat_pct).toFixed(1) + '%' : '—') + '</strong> (≥2 单)<br>'
      +     '12M 客单价 <strong>' + (r.aov != null ? fmtRM(r.aov) : '—') + '</strong>'
      +   '</div>'
      + '</div>';
  }).join('');
  return '<div class="kpi-hero-row">' + cards + '</div>';
}

// 今日 3 件事 — real Customer Action Plan (沉睡 VIP / 老客流失 / 种族转化偏低).
// Replaces PR#55 placeholder. Auto-picked from payload + race data.
function custActionCard(title, tone, interp, action) {
  return ''
    + '<div class="s4-action-card ' + tone + '">'
    +   '<div class="a-title">' + title + '</div>'
    +   '<div class="a-detail">' + interp + '</div>'
    +   '<div class="a-action-text">建议:' + action + '</div>'
    + '</div>';
}
function renderCustomerActionPlan(s) {
  const pd = (s.data.payload && s.data.payload.data) || null;
  const rd = (s.data.race && s.data.race.data) || null;
  const cards = [];
  if (pd) {
    // 1) 沉睡 VIP — 高值会员近 3 月 0 单 (top100, m3_visits===0)
    const sleeping = (pd.top100 || [])
      .filter(r => (r.m3_visits || 0) === 0)
      .sort((a, b) => (b.lifetime_amt || 0) - (a.lifetime_amt || 0));
    if (sleeping.length) {
      const s0 = sleeping[0];
      const sumLt = sleeping.reduce((a, r) => a + (r.lifetime_amt || 0), 0);
      const tone = sleeping.length > 30 ? 'red' : sleeping.length > 10 ? 'amber' : 'green';
      cards.push(custActionCard('😴 沉睡 VIP 顾客', tone,
        '近 3 月 0 单的高值会员 ' + fmtInt(sleeping.length) + ' 位 · 终身合计 ' + fmtRM(sumLt),
        '优先回访头号 ' + escapeHtml(s0.name || s0.mc || '—') + ' (' + escapeHtml(s0.branch || '—') + ' · 终身 ' + fmtRM(s0.lifetime_amt || 0) + ')'));
    }
    // 2) 老客流失 — 高值老客 6 月+ 没回 (churn.summary)
    const ch = pd.churn && pd.churn.summary;
    if (ch && (ch.n_high_value || 0) > 0) {
      const thr = ch.high_value_threshold || 1000;
      const c0 = (pd.churn.rows || [])
        .filter(r => (r.amount || 0) >= thr)
        .sort((a, b) => (b.amount || 0) - (a.amount || 0))[0];
      const tone = ch.n_high_value > 100 ? 'red' : ch.n_high_value > 30 ? 'amber' : 'green';
      cards.push(custActionCard('⚠ 老客流失预警', tone,
        fmtInt(ch.n_high_value) + ' 位高值老客 ' + (ch.cutoff_months || 6) + ' 月+ 没回 · 终身合计 ' + fmtRM(ch.lifetime_rm || 0),
        c0 ? ('先打 ' + escapeHtml(c0.name || c0.mc || '—') + ' (' + escapeHtml(c0.branch || '—') + ' · 终身 ' + fmtRM(c0.amount || 0) + ' · ' + (c0.months_ago != null ? c0.months_ago + ' 月前' : '?') + ')') : '打开「老客流失」名单逐个回访'));
    }
  }
  // 3) 种族转化偏低 — walk-in 够多但成交率低于公司均值
  if (rd && Array.isArray(rd.races)) {
    const companyCr = (rd.total && rd.total.closing_rate != null) ? rd.total.closing_rate : 70;
    const cand = rd.races
      .filter(r => (r.walkin || 0) >= 50 && r.closing_rate != null && r.closing_rate < companyCr)
      .sort((a, b) => a.closing_rate - b.closing_rate)[0];
    if (cand) {
      const meta = RACE_META[cand.race] || { label: cand.race, icon: '🌏' };
      const tone = cand.closing_rate < 50 ? 'red' : 'amber';
      cards.push(custActionCard(meta.icon + ' ' + meta.label + ' 转化偏低', tone,
        '客流 ' + fmtInt(cand.walkin) + ' 但成交率仅 ' + cand.closing_rate.toFixed(1) + '% (公司 ' + companyCr.toFixed(1) + '%)',
        '复盘该族客群接待/选品 · 本月 Revenue 仅 ' + fmtRM(cand.revenue || 0)));
    }
  }
  if (!cards.length) {
    return '<div class="s4-data-gap">本月无紧急客户事项 (沉睡 / 流失 / 转化均健康),或 customers_payload 数据未就绪。</div>';
  }
  const top3 = cards.slice(0, 3);
  return '<div class="s4-action-grid" style="grid-template-columns:repeat(' + top3.length + ',1fr)">' + top3.join('') + '</div>';
}

// 种族 4 cards — data display (no status border)
function renderCustomerRaceCards(s) {
  const resp = s.data.race || {};
  if (resp.degraded || !resp.data) {
    return '<div class="s4-data-gap">customer_by_race RPC 未部署 · 待 migration apply</div>';
  }
  const races = Array.isArray(resp.data.races) ? resp.data.races : [];
  const byRace = {}; races.forEach(r => byRace[r.race] = r);
  const cards = RACE_ORDER.map(rk => {
    const r = byRace[rk] || { walkin: 0, purchases: 0, closing_rate: null, revenue: 0, revenue_pct: null, avg_basket: null, walkin_pct: null, walkin_target: null, walkin_target_pct: null };
    const meta = RACE_META[rk];
    const cr = r.closing_rate;
    const barPct = Math.min(100, cr || 0);
    // Phase 6b: 走廊客 target line (null → 「目标待设」, no fabricated numbers).
    const targetLine = (r.walkin_target != null)
      ? '<br>走廊客目标 <strong>' + fmtInt(r.walkin_target) + '</strong> · 进度 '
        + (r.walkin_target_pct != null
            ? '<strong style="color:' + (r.walkin_target_pct >= 100 ? 'var(--s4-green-text)' : r.walkin_target_pct >= 80 ? 'var(--s4-amber-text)' : 'var(--s4-red-text)') + '">' + r.walkin_target_pct.toFixed(0) + '%</strong>'
            : '—')
      : '<br><span style="color:var(--s4-text-light)">走廊客目标待设</span>';
    return ''
      + '<div class="kpi-card" style="border-top-color:var(--s4-text-light)">'
      +   '<div class="kpi-icon">' + meta.icon + '</div>'
      +   '<div class="kpi-title">' + meta.label + '</div>'
      +   '<div class="kpi-actual">' + fmtInt(r.walkin) + ' <span style="font-size:14px;color:var(--s4-text-meta);font-weight:400">人</span></div>'
      +   '<div class="kpi-status-row"><span class="kpi-pct" style="color:var(--s4-text-primary)">' + (cr != null ? cr.toFixed(1) + '%' : '—') + ' 成交</span></div>'
      +   '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + barPct + '%;background:var(--brand)"></div></div>'
      +   '<div class="kpi-meta">'
      +     '购买 <strong>' + fmtInt(r.purchases) + '</strong> 人 · 占客流 ' + (r.walkin_pct != null ? r.walkin_pct.toFixed(1) + '%' : '—') + '<br>'
      +     'Revenue <strong>' + fmtRM(r.revenue) + '</strong> (' + (r.revenue_pct != null ? r.revenue_pct.toFixed(1) + '%' : '—') + ')<br>'
      +     'Avg Basket <strong>' + (r.avg_basket != null ? fmtRMpr(r.avg_basket) : '—') + '</strong>'
      +     targetLine
      +   '</div>'
      + '</div>';
  }).join('');
  return '<div class="kpi-hero-row">' + cards + '</div>';
}

// 6 店 × 4 种族 matrix — table, closing% color-coded
function renderCustomerStoreRaceMatrix(s) {
  const resp = s.data.matrix || {};
  if (resp.degraded || !resp.data) {
    return '<div class="s4-data-gap">customer_store_race_matrix RPC 未部署 · 待 migration apply</div>';
  }
  const matrix = Array.isArray(resp.data.matrix) ? resp.data.matrix : [];
  const sorted = matrix.slice().sort((a, b) => {
    const ia = MATRIX_STORE_ORDER.indexOf(a.store), ib = MATRIX_STORE_ORDER.indexOf(b.store);
    if (ia === -1 && ib === -1) return (a.store||'').localeCompare(b.store||'');
    if (ia === -1) return 1; if (ib === -1) return -1; return ia - ib;
  });
  const cell = (rc) => {
    if (!rc || (!rc.walkin && !rc.purchases)) return '<span style="color:var(--s4-text-light)">—</span>';
    const cr = rc.closing_rate;
    // color only when sample >= 5 walk-in
    let color = 'var(--s4-text-primary)';
    if (rc.walkin >= 5 && cr != null) {
      color = cr >= 80 ? 'var(--s4-green-text)' : cr >= 60 ? 'var(--s4-amber-text)' : 'var(--s4-red-text)';
    }
    return '<span title="Revenue ' + fmtRM(rc.revenue) + ' · AOV ' + (rc.purchases > 0 ? fmtRMpr(rc.revenue / rc.purchases) : '—') + '">'
      + fmtInt(rc.walkin) + ' → ' + fmtInt(rc.purchases)
      + (cr != null ? ' <span style="color:' + color + '">(' + cr.toFixed(0) + '%)</span>' : '')
      + '</span>';
  };
  const rows = sorted.map(m => ''
    + '<tr>'
    +   '<td><strong>' + escapeHtml(matrixStoreLabel(m.store)) + '</strong></td>'
    +   '<td>' + cell(m.chinese) + '</td>'
    +   '<td>' + cell(m.malay) + '</td>'
    +   '<td>' + cell(m.indian) + '</td>'
    +   '<td>' + cell(m.other) + '</td>'
    +   '<td class="num"><strong>' + fmtInt(m.total_walkin) + '</strong></td>'
    + '</tr>').join('');
  // company total row
  const tot = { ch: 0, my: 0, in_: 0, ot: 0, walk: 0 };
  sorted.forEach(m => {
    tot.ch += (m.chinese?.walkin || 0); tot.my += (m.malay?.walkin || 0);
    tot.in_ += (m.indian?.walkin || 0); tot.ot += (m.other?.walkin || 0);
    tot.walk += (m.total_walkin || 0);
  });
  const totRow = '<tr class="total-row" style="font-weight:700;background:var(--s4-amber-bg-soft)">'
    + '<td>公司合计</td>'
    + '<td>' + fmtInt(tot.ch) + '</td><td>' + fmtInt(tot.my) + '</td>'
    + '<td>' + fmtInt(tot.in_) + '</td><td>' + fmtInt(tot.ot) + '</td>'
    + '<td class="num">' + fmtInt(tot.walk) + '</td></tr>';
  return ''
    + '<div class="s4-drill"><div class="s4-drill-body">'
    +   '<table><thead><tr>'
    +     '<th>店</th><th>Chinese</th><th>Malay</th><th>Indian</th><th>Other</th><th>Total 客流</th>'
    +   '</tr></thead><tbody>' + rows + totRow + '</tbody></table>'
    +   '<div class="muted" style="margin-top:8px;font-size:11px">格式: 客流 → 购买 (成交率%) · 绿≥80% 黄60-79% 红<60% · 样本<5 不上色 · hover 看 Revenue/AOV</div>'
    + '</div></div>';
}

// 客户名单 — tabs: 沉睡 VIP / 老客流失 / Top VIP. From customers_payload
// (top100 + churn.rows). Per-store filter dropdown. Mirrors V1 churn list +
// computeSleepingTop + VIP lifetime sort.
function renderCustomerLists(s) {
  const resp = s.data.payload || {};
  const pd = resp.data;
  if (resp.degraded || !pd) {
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">customers_payload 未返回数据 — 客户名单不可用。</div></div></div>';
  }
  const top = pd.top100 || [];
  const churnRows = (pd.churn && pd.churn.rows) || [];
  const thr = (pd.churn && pd.churn.summary && pd.churn.summary.high_value_threshold) || 1000;

  // store filter options (union of top100 + churn branches)
  const storeSet = new Set();
  top.forEach(r => { if (r.branch) storeSet.add(r.branch); });
  churnRows.forEach(r => { if (r.branch) storeSet.add(r.branch); });
  const stores = sortStoresByCode(Array.from(storeSet));
  const matchStore = (b) => !custVipStore || b === custVipStore;
  const storeSel = '<select onchange="setCustVipStore(this.value)" style="height:30px;border:1px solid var(--s4-divider);border-radius:6px;padding:0 8px;font-size:13px;background:var(--s4-card-bg);color:var(--s4-text-primary)">'
    + '<option value=""' + (custVipStore === '' ? ' selected' : '') + '>全部店</option>'
    + stores.map(st => '<option value="' + st + '"' + (custVipStore === st ? ' selected' : '') + '>' + escapeHtml(matrixStoreLabel(st)) + '</option>').join('')
    + '</select>';

  const tabs = [
    { id: 'sleeping', label: '😴 沉睡 VIP' },
    { id: 'churn',    label: '⚠ 老客流失' },
    { id: 'vip',      label: '⭐ Top VIP' },
  ];
  const tabHtml = tabs.map(t =>
    '<button class="' + (custListTab === t.id ? 'active' : '') + '" onclick="setCustListTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');

  const CAP = 50;
  const capNote = (n) => n > CAP
    ? '<div class="muted" style="margin-top:8px;font-size:11px">只显示前 ' + CAP + ' 条,共 ' + fmtInt(n) + ' 条。</div>'
    : '';
  const nameCell = (r) => '<td><div style="font-weight:600">' + escapeHtml(r.name || r.mc || '—') + '</div><div style="font-size:11px;color:#6B7280">' + escapeHtml(r.mc || '') + '</div></td>';
  const storeTag = (b) => '<td><strong>' + escapeHtml(b || '—') + '</strong></td>';

  let body;
  if (custListTab === 'sleeping') {
    const rows = top.filter(r => (r.m3_visits || 0) === 0 && matchStore(r.branch))
      .sort((a, b) => (b.lifetime_amt || 0) - (a.lifetime_amt || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">无沉睡 VIP (近 3 月 0 单的高值会员)' + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>店</th><th>会员</th><th>终身 RM</th><th>近 6 月消费</th><th>上次</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.lifetime_amt || 0) + '</td>'
            + '<td>' + fmtRM(r.m6_amt || 0) + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')
        + '</tbody></table>' + capNote(rows.length);
    }
  } else if (custListTab === 'churn') {
    const rows = churnRows.filter(r => (r.amount || 0) >= thr && matchStore(r.branch))
      .sort((a, b) => (b.amount || 0) - (a.amount || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">无高值流失老客 (终身 ≥ RM ' + fmtInt(thr) + ',6 月+ 没回)' + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>店</th><th>会员</th><th>终身 RM</th><th>沉默</th><th>客型</th><th>上次</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.amount || 0) + '</td>'
            + '<td>' + (r.months_ago != null ? r.months_ago + ' 月' : '—') + '</td>'
            + '<td>' + escapeHtml(r.cust_type || '—') + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')
        + '</tbody></table>' + capNote(rows.length);
    }
  } else { // vip
    const rows = top.filter(r => matchStore(r.branch))
      .sort((a, b) => (b.lifetime_amt || 0) - (a.lifetime_amt || 0));
    if (!rows.length) {
      body = '<div class="s4-data-gap">无 VIP 数据' + (custVipStore ? ' · ' + escapeHtml(matrixStoreLabel(custVipStore)) : '') + '。</div>';
    } else {
      body = '<table><thead><tr><th>店</th><th>会员</th><th>终身 RM</th><th>12M 访问</th><th>客型</th><th>上次</th></tr></thead><tbody>'
        + rows.slice(0, CAP).map(r => '<tr>' + storeTag(r.branch) + nameCell(r)
            + '<td>' + fmtRM(r.lifetime_amt || 0) + '</td>'
            + '<td>' + fmtInt(r.ltm_visits || 0) + '</td>'
            + '<td>' + escapeHtml(r.cust_type || '—') + '</td>'
            + '<td>' + escapeHtml(r.last || '—') + '</td></tr>').join('')

    }
  }
  return '<div class="s4-drill">'
    + '<div class="s4-drill-tabs">' + tabHtml
    +   '<div style="margin-left:auto;display:flex;align-items:center;padding:6px 14px">' + storeSel + '</div>'
    + '</div>'
    + '<div class="s4-drill-body">' + body + '</div></div>';
}

// 客型 × 会员龄段 cross-tab — from customers_payload cross_by_window['12m'].
// Each cell: 会员数 + 12 月消费 RM. Mirrors V1 ciCrossTable.
function renderCustomerCrossTab(s) {
  const resp = s.data.payload || {};
  const pd = resp.data;
  if (resp.degraded || !pd || !pd.cross_by_window) {
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">customers_payload 无 cross_by_window 数据。</div></div></div>';
  }
  const cross = pd.cross_by_window['12m'] || {};
  const types = pd.types || ['Walk-in', 'Contractor', 'Interior Designer', 'Other'];
  const ages = AGE_TIER_ORDER;
  const rows = types.map(tp => {
    const cells = ages.map(a => {
      const c = (cross[tp] && cross[tp][a]) || { n: 0, amt: 0 };
      return '<td>' + fmtInt(c.n) + '<br><span style="font-size:11px;color:#6B7280">' + fmtRM(c.amt) + '</span></td>';
    }).join('');
    return '<tr><td><strong>' + escapeHtml(tp) + '</strong></td>' + cells + '</tr>';
  }).join('');
  return '<div class="s4-drill"><div class="s4-drill-body">'
    + '<table><thead><tr><th>客型</th>' + ages.map(a => '<th>' + a + '</th>').join('') + '</tr></thead><tbody>' + rows + '</tbody></table>'
    + '<div class="muted" style="margin-top:8px;font-size:11px">每格: 会员数 + 12 月消费 RM</div>'
    + '</div></div>';
}

// 12 月走廊客趋势 — single line (floatation monthly). From customer_trend RPC.
// RPC 返回 { rows:[{ym, walkin, ...}] }. 过滤掉 walkin=0 的早期月份
// (floatation 数据自 2026-01 起,之前为 0 → 折线会出现误导性悬崖)。
function renderCustomerTrend(s) {
  const tr = s.data.trend || {};
  const rows = ((tr.data && tr.data.rows) || []).filter(p => (p.walkin || 0) > 0);
  if (tr.degraded || rows.length === 0) {
    return '<div class="s4-drill"><div class="s4-drill-body"><div class="s4-data-gap">customer_trend RPC 未部署或无数据。</div></div></div>';
  }
  return '<div class="s4-drill"><div class="s4-drill-body">'
    + svgLineChart({
        series: [{ name: 'Walk-in', color: '#1F5F4A', points: rows.map(p => ({ x: p.ym, y: p.walkin })) }],
        width: 900, height: 240, yFmt: fmtInt,
      })
    + '<div class="meta" style="font-size:12px;color:#6B7280;margin-top:8px">月度走廊客 (floatation 月颗粒,自 2026-01 起有记录)。</div>'

}

/* ═══════════════════════════════════════════════════════════════════

   Layer 1: status light + Cash Runway
   Layer 2: Action Plan (placeholder until Stage C cross-view integration)
   Layer 3: 5-store snapshot table (mtd_amount / closing_rate / walk-in / basket)
   Layer 4: 6-domain health grid (placeholder — needs cross-view aggregation)

═══════════════════════════════════════════════════════════════════ */
function renderToday(s) {
  const title = '<h1 class="page-title">Today</h1>'
              + '<p class="page-sub">Snapshot ' + s.month + ' · 4-layer briefing · /api/today</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="today-banner"><div class="today-light tone-unknown">…</div>'
      + '<div class="today-summary"><div class="skeleton h-line"></div><div class="skeleton h-line"></div></div>'
      + '<div class="today-runway"><div class="skeleton h-value"></div></div></div>'
      + '<div class="section-title">5-store snapshot</div>'
      + '<div class="card"><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>';
  }

  const j = s.data;
  const st = j.status || {};
  const stores = Array.isArray(j.stores) ? j.stores : [];
  const lightCls = st.light || 'unknown';
  const missing = Array.isArray(st.data_missing) ? st.data_missing : [];

  // ── Layer 1: Status light + Cash Runway ──────────────────────────
  const lightIcon = { ok: '🟢', warn: '🟡', bad: '🔴', unknown: '⚪' }[lightCls] || '⚪';
  const headlineMap = {
    ok:     ['Wiltek today: healthy', 'ok'],
    warn:   ['Wiltek today: heads up', 'warn'],
    bad:    ['Wiltek today: critical', 'bad'],
    unknown:['Wiltek today: data partial', ''],
  };
  const [headline, headlineCls] = headlineMap[lightCls] || headlineMap.unknown;
  const summarySub = missing.length
    ? 'Missing data: ' + missing.map(escapeHtml).join(', ')
    : 'All sources synced · status from /api/today';

  let runwayVal = 'pending', runwaySub = 'FMM cash data not yet loaded', runwayCls = '';
  if (st.cash_runway_months != null) {
    const m = +st.cash_runway_months;
    runwayVal = m.toFixed(1) + ' months';
    runwayCls = m > 6 ? 'ok' : m > 3 ? 'warn' : 'bad';
    runwaySub = 'Cash ' + fmtMoneyShort(st.cash_total) +
      (st.financial_balance_sheet_as_of ? ' · as of ' + st.financial_balance_sheet_as_of.slice(0, 10) : '');
  } else if (st.cash_total != null) {
    runwayVal = fmtMoneyShort(st.cash_total);
    runwaySub = 'Cash on hand · monthly burn pending';
  }

  const banner = ''
    + '<div class="today-banner">'
    +   '<div class="today-light tone-' + lightCls + '">' + lightIcon + '</div>'
    +   '<div class="today-summary">'
    +     '<div class="headline ' + headlineCls + '">' + headline + '</div>'
    +     '<div class="sub">' + summarySub + '</div>'
    +   '</div>'
    +   '<div class="today-runway">'
    +     '<div class="r-label">Cash runway</div>'
    +     '<div class="r-value ' + runwayCls + '">' + runwayVal + '</div>'
    +     '<div class="r-sub">' + runwaySub + '</div>'
    +   '</div>'
    + '</div>';

  // ── Layer 2: Action Plan (placeholder — needs cross-view aggregation) ─
  const actionPlan = ''
    + '<div class="section-title">Action Plan · top 3 today</div>'
    + '<div class="action-plan">'
    +   '<strong>Stage C feature.</strong> '
    +   'Action Plan derives the top 3 actions today from cross-view aggregation '
    +   '(receivables aging · stockout list · slow-mover spikes · ABCD migrations · churn risk). '
    +   'Each card needs problem + impact + jump-link. '
    +   'Skeleton lives here once the cross-view selector lands.'
    + '</div>';

  // ── Layer 3: 5-store snapshot ────────────────────────────────────
  const sortedStores = stores.slice().sort((a, b) => (a.store || '').localeCompare(b.store || ''));
  let storeRows = sortedStores.map(b => {
    const cr = b.closing_rate != null ? (+b.closing_rate).toFixed(1) + '%' : '—';
    const walk = b.walk_in_total != null ? fmtInt(b.walk_in_total) : '—';
    const basket = b.basket_estimate != null ? fmtRM(b.basket_estimate) : '—';
    const mtd = b.mtd_amount != null ? fmtRM(b.mtd_amount) : '—';
    const inv = b.mtd_invoices != null ? fmtInt(b.mtd_invoices) : '—';
    const anomCls = (b.closing_rate != null && b.closing_rate < 25) ? 'anom-bad'
                  : (b.closing_rate != null && b.closing_rate < 50) ? 'anom-mid' : 'anom-ok';
    const anomLbl = (b.closing_rate != null && b.closing_rate < 25) ? '🔴 low CR'
                  : (b.closing_rate != null && b.closing_rate < 50) ? '🟡 CR' : '✓';
    return '<tr>'
      + '<td><strong>' + escapeHtml(b.store || '') + '</strong></td>'
      + '<td>' + escapeHtml(b.name || '') + '</td>'
      + '<td class="num">' + mtd + '</td>'
      + '<td class="num">' + inv + '</td>'
      + '<td class="num">' + walk + '</td>'
      + '<td class="num">' + cr + '</td>'
      + '<td class="num">' + basket + '</td>'
      + '<td class="' + anomCls + '">' + anomLbl + '</td>'
      + '</tr>';
  }).join('');
  if (!storeRows) storeRows = '<tr><td colspan="8" class="muted" style="text-align:center;padding:14px">No store data in /api/today response</td></tr>';

  const storeTable = ''
    + '<div class="section-title">5-store snapshot · ' + s.month + (stores[0]?.floatation_as_of ? ' · floatation ' + stores[0].floatation_as_of : '') + '</div>'
    + '<table class="store-table">'
    +   '<thead><tr>'
    +     '<th>Store</th><th>Name</th>'
    +     '<th>MTD sales</th><th>Invoices</th>'
    +     '<th>Walk-in</th><th>Closing rate</th><th>Basket est.</th>'
    +     '<th>Anom</th>'
    +   '</tr></thead>'
    +   '<tbody>' + storeRows + '</tbody>'
    + '</table>';

  // ── Layer 4: 6-domain health (placeholder) ─────────────────────
  const domains = [
    { key: 'sales',     icon: '📊', name: 'Sales',     status: 'unknown', sub: 'Stage C: pull from /api/kpi sales' },
    { key: 'inventory', icon: '📦', name: 'Inventory', status: 'unknown', sub: 'Stage C: dead% from /api/inventory_dashboard' },
    { key: 'customers', icon: '👥', name: 'Customers', status: 'unknown', sub: 'Stage C: member churn from /api/kpi customers' },
    { key: 'products',  icon: '🏷️', name: 'Products',  status: 'unknown', sub: 'Stage C: ABCD migrations from /api/products' },
    { key: 'finance',   icon: '💰', name: 'Finance',   status: 'unknown', sub: 'Stage C: GP% from /api/today.status' },
    { key: 'hr',        icon: '👷', name: 'HR',        status: 'unknown', sub: 'Backlog: HR payroll sync pending' },
  ];
  const domainGrid = ''
    + '<div class="section-title">6-domain health (placeholder · Stage C)</div>'
    + '<div class="domain-grid">'
    +   domains.map(d => ''
        + '<div class="domain-card tone-na">'
        +   '<div class="d-icon">' + d.icon + '</div>'
        +   '<div class="d-name">' + d.name + '</div>'
        +   '<div class="d-sub">' + d.sub + '</div>'
        + '</div>').join('')
    + '</div>';

  return title + banner + actionPlan + storeTable + domainGrid;
}

  const overlay = document.getElementById('orphanModal');

  overlay.setAttribute('aria-hidden', 'true');
