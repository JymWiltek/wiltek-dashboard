/* ═══════════════════════════════════════════════════════════════════
   Phase 5 · Overview 4-KPI Hero Row (Part C)
   Sales / Walk-in / Closing Rate / Basket Size — airport-lounge grade.
   Data: state.data.overview.data.kpis (overview_kpi RPC). Degrades
   gracefully: if RPC missing, synthesize Sales card from /api/kpi sales
   + targets, others show "目标未设/数据待接".
═══════════════════════════════════════════════════════════════════ */
// Per-store rows from the sales-owner tier payload (same source Store
// Performance renders). Used as the BUG-1 backfill when the overview_kpi MV
// lags behind a sync. Returns [] if unavailable.
function ovStores(s) {
  return (s && s.data && s.data.tier && s.data.tier.data && Array.isArray(s.data.tier.data.stores))
    ? s.data.tier.data.stores : [];
}

function renderOverviewKpiRow(s) {
  const ovResp = s.data.overview || null;
  const degraded = !ovResp || ovResp.degraded || !ovResp.data;
  const kpis = (ovResp && ovResp.data && ovResp.data.kpis) || null;

  // Card metadata
  const defs = [
    { key: 'sales',        icon: '💰', title: t('overview.hero.sales'),   fmt: 'rm'  },
    { key: 'walkin',       icon: '👥', title: t('overview.hero.walkin'),  fmt: 'int' },
    { key: 'closing_rate', icon: '🎯', title: t('overview.hero.closing'), fmt: 'pct' },
    { key: 'basket_size',  icon: '🛍', title: t('overview.hero.basket'),  fmt: 'rm'  },
  ];

  // Degraded fallback: build a Sales-only block from kpi+targets so the
  // first card still shows real numbers; the rest carry a notice.
  let fallbackKpis = null;
  if (degraded) {
    const d = s.data.kpi || {};
    const t = s.data.targets || {};
    const salesTgt = (t.summary && t.summary.sales_total) || null;
    const pct = (salesTgt && salesTgt > 0) ? +(d.sales / salesTgt * 100).toFixed(1) : null;
    const vsLm = (d.last_month_sales > 0) ? +((d.sales - d.last_month_sales) / d.last_month_sales * 100).toFixed(1) : null;
    fallbackKpis = {
      sales: {
        actual: d.sales, target: salesTgt, pct,
        shortfall: salesTgt != null ? salesTgt - d.sales : null,
        vs_last_month_pct: vsLm,
        status: pct == null ? 'gray' : pct >= 100 ? 'green' : pct >= 80 ? 'amber' : pct >= 50 ? 'red' : 'darkred',
      },
      walkin:       { actual: null, target: null, pct: null, status: 'gray', _note: window.t('overview.kpi.note_rpc_undeployed') },
      closing_rate: { actual: null, target: null, pct: null, status: 'gray', _note: window.t('overview.kpi.note_rpc_undeployed') },
      basket_size:  { actual: d.invoices > 0 ? +(d.sales / d.invoices).toFixed(2) : null, target: null, pct: null, status: 'gray', _note: window.t('overview.kpi.note_basket_no_target') },
    };
  }

  // BUG-1 fix (2026-06-18): overview_kpi reads mv_sales_kpi_monthly, which can
  // lag a sync (latest month missing from the MV → SALES & BASKET actuals come
  // back null and blank as "—", while Store Performance / Products read the
  // sales table directly and show the real number). When the RM heroes blank
  // but per-store rows exist, backfill from those same per-store actuals
  // (sales-owner / Store Performance source), honouring the selected branch.
  // Self-healing: once the MV catches up, kpis.sales.actual is non-null and
  // this branch is skipped → byte-identical to today on healthy months.
  if (kpis && kpis.sales && kpis.sales.actual == null) {
    const stores = (ovStores(s) || []);
    const eb = getEffectiveBranch();
    const scoped = eb ? stores.filter(r => r.store === eb) : stores;
    let fbSales = 0, fbInv = 0, hasRows = false;
    for (const r of scoped) {
      if (r && r.actual != null) { fbSales += Number(r.actual); hasRows = true; }
      if (r && r.invoices != null) { fbInv += Number(r.invoices); }
    }
    if (hasRows) {
      const statusFor = (pct) => pct == null ? 'gray' : pct >= 100 ? 'green' : pct >= 80 ? 'amber' : pct >= 50 ? 'red' : 'darkred';
      const sTgt = kpis.sales.target;
      const sPct = (sTgt && sTgt > 0) ? +(fbSales / sTgt * 100).toFixed(1) : null;
      kpis.sales = Object.assign({}, kpis.sales, {
        actual: fbSales, pct: sPct,
        shortfall: sTgt != null ? +(sTgt - fbSales).toFixed(2) : null,
        status: statusFor(sPct), _fallback: true,
      });
      const fbBasket = fbInv > 0 ? +(fbSales / fbInv).toFixed(2) : null;
      if (kpis.basket_size && kpis.basket_size.actual == null && fbBasket != null) {
        const bTgt = kpis.basket_size.target;
        const bPct = (bTgt && bTgt > 0) ? +(fbBasket / bTgt * 100).toFixed(1) : null;
        kpis.basket_size = Object.assign({}, kpis.basket_size, {
          actual: fbBasket, pct: bPct,
          shortfall: bTgt != null ? +(bTgt - fbBasket).toFixed(2) : null,
          status: statusFor(bPct), _fallback: true,
        });
      }
    }
  }

  const source = kpis || fallbackKpis || {};
  const banner = degraded
    ? '<div class="s4-data-gap" style="margin-bottom:12px"><strong>' + t('overview.kpi.overview_rpc_undeployed') + '</strong> · '
      + '<code>tools/migration_phase5_overview.sql</code>' + t('overview.kpi.overview_rpc_pending') + '</div>'
    : '';

  const cards = defs.map(def => {
    const k = source[def.key] || { status: 'gray' };
    return renderOverviewKpiCard(def, k);
  }).join('');

  return banner + '<div class="kpi-hero-row">' + cards + '</div>';
}

function renderOverviewKpiCard(def, k) {
  const status = k.status || 'gray';
  const statusColor = {
    green:   'var(--s4-green-text)',
    amber:   'var(--s4-amber-text)',
    red:     'var(--s4-red-text)',
    darkred: '#B91C1C',
    gray:    'var(--s4-text-light)',
  }[status] || 'var(--s4-text-light)';

  // Format actual per card type
  const fmtActual = (v) => {
    if (v == null) return '—';
    if (def.fmt === 'rm')  return fmtRM(v);
    if (def.fmt === 'int') return fmtInt(v);
    if (def.fmt === 'pct') return Number(v).toFixed(1) + '%';
    return String(v);
  };
  const fmtTargetVal = (v) => {
    if (v == null) return null;
    if (def.fmt === 'rm')  return fmtRM(v);
    if (def.fmt === 'int') return fmtInt(v);
    if (def.fmt === 'pct') return Number(v).toFixed(1) + '%';
    return String(v);
  };

  const pct = k.pct;
  const pctStr = pct != null ? pct.toFixed(1) + '%' : '—';
  const barPct = Math.min(100, Math.max(0, pct || 0));
  const dotIcon = status === 'green' ? '🟢' : status === 'amber' ? '🟡' : status === 'gray' ? '⚪' : '🔴';

  // Meta lines
  const targetStr = fmtTargetVal(k.target);
  const shortfall = k.shortfall;
  let gapLine = '';
  if (shortfall != null && def.fmt !== 'pct') {
    gapLine = shortfall > 0
      ? t('overview.kpi.gap') + ' <strong style="color:var(--s4-red-text)">-' + fmtActual(shortfall).replace('—','') + '</strong>'
      : t('overview.kpi.over') + ' <strong style="color:var(--s4-green-text)">+' + fmtActual(Math.abs(shortfall)) + '</strong>';
  } else if (shortfall != null && def.fmt === 'pct') {
    gapLine = shortfall > 0
      ? t('overview.kpi.behind_pp') + ' <strong style="color:var(--s4-red-text)">' + Number(shortfall).toFixed(1) + ' pp</strong>'
      : t('overview.kpi.over') + ' <strong style="color:var(--s4-green-text)">' + Number(Math.abs(shortfall)).toFixed(1) + ' pp</strong>';
  }
  const vsLm = k.vs_last_month_pct;
  const vsLmLine = vsLm != null
    ? t('common.vs_prev') + ' <strong style="color:' + (vsLm >= 0 ? 'var(--s4-green-text)' : 'var(--s4-red-text)') + '">'
      + (vsLm >= 0 ? '↑ ' : '↓ ') + Math.abs(vsLm).toFixed(1) + '%</strong>'
    : '';
  const noteLine = k._note ? '<span style="color:var(--s4-text-light)">' + escapeHtml(k._note) + '</span>' : '';

  return ''
    + '<div class="kpi-card" style="border-top-color:' + statusColor + '">'
    +   heroLightDot(status)   // Phase 10B 灯 (复用 RPC 已算的 status)
    +   '<div class="kpi-icon">' + def.icon + '</div>'
    +   '<div class="kpi-title">' + def.title + '</div>'
    +   '<div class="kpi-actual">' + fmtActual(k.actual) + '</div>'
    +   '<div class="kpi-status-row">'
    +     '<span class="kpi-pct" style="color:' + statusColor + '">' + dotIcon + ' ' + pctStr + '</span>'
    +   '</div>'
    +   '<div class="kpi-bar"><div class="kpi-bar-fill" style="width:' + barPct + '%;background:' + statusColor + '"></div></div>'
    +   '<div class="kpi-meta">'
    +     (targetStr ? t('overview.kpi.target') + ' <strong>' + targetStr + '</strong><br>' : (k._note ? '' : t('overview.kpi.target_unset') + '<br>'))
    +     (gapLine ? gapLine + '<br>' : '')
    +     (vsLmLine ? vsLmLine : noteLine)
    +   '</div>'
    + '</div>';
}


// Phase 4 hotfix (Bug 3): when the RPC returns a pre-formatted detail
// string like "实际 RM 5299.00 / 目标 RM 20000.00 / 缺口 RM 14701.00",
// rewrite to Part E.5 spec: integer (no .00), thousand commas, · separator.
// Idempotent — already-clean strings stay clean.
function sanitizeRpcDetail(s) {
  if (!s) return '';
  return String(s)
    .replace(/(\d+)\.00\b/g, '$1')                // strip "5299.00" → "5299"
    .replace(/RM\s*(\d{4,})\b/g, function(_, n) {  // re-comma "RM 5299" → "RM 5,299"
      return 'RM ' + Number(n).toLocaleString('en-US');
    })
    .replace(/\s*\/\s*/g, ' · ');                  // " / " → " · "
}

function buildStoreAttribDetail(row) {
  if (!row) return '';
  const shortfall = row.shortfall;
  const gapStr = shortfall > 0
    ? t('overview.attrib.gap') + ' ' + Math.round(shortfall).toLocaleString('en-US')
    : t('overview.attrib.over') + ' '   + Math.round(Math.abs(shortfall)).toLocaleString('en-US');
  return t('overview.attrib.actual') + ' ' + fmtRM(row.actual)
       + ' · ' + t('overview.attrib.target') + ' ' + fmtRM(row.target)
       + ' · ' + gapStr;
}

// Phase 5b (2026-05-20): Store Matrix sorts by store CODE (not pct) and
// shows store names. Order + names per Jym brief.
const MATRIX_STORE_ORDER = ['W01','W02','W03','W05','W07','W11','WCO'];
const MATRIX_STORE_NAME = {
  W01: 'W01 Pandan Indah',
  W02: 'W02 Ampang Waterfront',
  W03: 'W03 Wangsa Maju',
  W05: 'W05 Bangi Seksyen 7',
  W07: 'W07 Pandan Jaya',
  W11: 'W11 Midah Cheras',
  WCO: 'WCO HQ',
};
function matrixStoreLabel(code) {
  return MATRIX_STORE_NAME[code] || code;
}
function sortStoresByCode(stores) {
  return (stores || []).slice().sort((a, b) => {
    const ia = MATRIX_STORE_ORDER.indexOf(a.store);
    const ib = MATRIX_STORE_ORDER.indexOf(b.store);
    // Unknown codes go to the end, alpha order among themselves.
    if (ia === -1 && ib === -1) return (a.store || '').localeCompare(b.store || '');
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
}

function renderS4StoreMatrix(stores, anomalies) {
  // Map anomalies keyed by store to inject attribution text
  const anomByStore = {};
  for (const a of anomalies || []) if (a.store) anomByStore[a.store] = a;
  // Phase 5b: sort by store code (W01→W02→W03→W05→W07→W11→WCO), not pct.
  const s4StoreRowHtml = (row) => {
    const sev = row.status === 'critical' ? 'red critical'
              : row.status === 'behind'   ? 'red'
              : row.status === 'exceeded' ? 'green'
              : 'amber';
    const dotCls = (row.status === 'exceeded') ? 'green'
                 : (row.status === 'critical' || row.status === 'behind') ? 'red' : 'amber';
    const pct = row.pct == null ? '—' : row.pct.toFixed(1) + '%';
    const barPct = Math.min(100, row.pct || 0);
    const shortfall = row.shortfall;
    const isOver = shortfall < 0;
    const anom = anomByStore[row.store];
    // Phase 5 hotfix Bug B (2026-05-20): removed the redundant 2nd amount
    // line "实际 RM X · 目标 RM Y · 缺口 RM Z" — the amounts column +
    // shortfall column already show all three. attrib no longer rendered.
    const btnLabel = row.status === 'exceeded' ? t('overview.btn.review') : t('overview.btn.assign');
    const recoSeed = anom ? {
      title: anom.title, severity: anom.severity, detail: anom.detail,
      recommended_action: anom.recommended_action,
      recommended_assignee: anom.recommended_assignee,
      recommended_amount: anom.recommended_amount,
      source_url: '?view=sales&month=' + state.month + '&branch=' + row.store,
      source_data: { actual: row.actual, target: row.target, pct: row.pct, store: row.store },
      store: row.store, amount: anom.recommended_amount,
    } : {
      title: row.store + ' ' + state.month,
      severity: row.status === 'exceeded' ? 'green' : (row.status === 'critical' ? 'red' : 'amber'),
      detail: 'store=' + row.store + ' actual=' + row.actual + ' target=' + row.target + ' pct=' + row.pct,
      source_url: '?view=sales&month=' + state.month + '&branch=' + row.store,
      source_data: { actual: row.actual, target: row.target, pct: row.pct, store: row.store },
      store: row.store,
      recommended_amount: Math.max(0, row.shortfall),
    };
    return ''
      + '<div class="s4-store-row ' + sev + '">'
      +   '<span class="dot ' + dotCls + '"></span>'
      +   '<div class="name">' + escapeHtml(matrixStoreLabel(row.store)) + '</div>'
      +   '<div class="bar"><span style="width:' + barPct + '%"></span></div>'
      +   '<div class="amounts"><strong>' + fmtRM(row.actual) + '</strong>'
      +     '<div class="target">/ ' + fmtRM(row.target) + ' · ' + fmtInt(row.invoices || 0) + ' ' + t('overview.matrix.unit') + ' · AOV ' + (row.aov != null ? fmtRMpr(row.aov) : '—') + '</div></div>'
      +   '<div class="shortfall ' + (isOver ? 'green' : 'red') + '">' + (isOver ? '+RM ' : '-RM ') + Math.round(Math.abs(shortfall)).toLocaleString('en-US') + '</div>'
      +   '<div class="row-action"><button class="s4-btn primary" onclick=\'openAssignModal(' + JSON.stringify(recoSeed).replace(/"/g, '&quot;') + ')\'>' + btnLabel + '</button></div>'
      + '</div>';
  };
  // PR-B: rank only live operating stores. Closed/HQ codes (W11/WCO/...) drop
  // to a collapsed "non-store" bucket — still rendered (assign button +
  // amounts) so their revenue is drillable, plus a CSV export. Company total
  // is the hero (sums ALL stores) and is NOT affected by this list split.
  const sorted  = sortStoresByCode(stores);
  const live    = sorted.filter(r => isLiveStore(r.store));
  const nonLive = sorted.filter(r => !isLiveStore(r.store));
  window.__nonStoreRows = nonLive;   // consumed by s4ExportNonStoreCsv()
  const liveHtml = live.map(s4StoreRowHtml).join('');
  if (!nonLive.length) return liveHtml;
  const nonLiveSales = nonLive.reduce((a, r) => a + (+r.actual || 0), 0);
  const bucket = '<details class="s4-nonstore-bucket" style="margin-top:10px">'
    + '<summary style="cursor:pointer;color:var(--s4-text-light);font-size:13px;padding:6px 0">'
    +   escapeHtml(t('overview.matrix.nonstore_bucket', { n: nonLive.length, sales: fmtRM(nonLiveSales) }))
    +   ' <button class="inv-csv-btn" onclick="event.preventDefault();s4ExportNonStoreCsv()">📥 ' + t('overview.matrix.nonstore_csv') + '</button>'
    + '</summary>'
    + nonLive.map(s4StoreRowHtml).join('')
    + '</details>';
  return liveHtml + bucket;
}
window.s4ExportNonStoreCsv = function() {
  const rows = window.__nonStoreRows || [];
  if (!rows.length) return;
  const cols = ['store', 'actual', 'target', 'pct', 'invoices', 'aov', 'status'];
  const csv = [cols.join(',')].concat(rows.map(r => cols.map(k => {
    const v = r[k]; if (v == null) return '';
    const str = String(v); return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  }).join(','))).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wiltek-nonstore-' + (state.month || '') + '.csv';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
};
function renderS4StoreMatrixFallback(s) {
  // Use legacy /api/kpi sales by_branch + targets to synthesize rows
  const d = s.data.kpi || {};
  const t = s.data.targets || {};
  const summaryByStore = t.summary?.by_store || {};
  const SALES_STORES_FB = ['W01','W02','W03','W05','W07','WCO'];
  const rows = SALES_STORES_FB.map(b => {
    const branch = d.by_branch && d.by_branch[b] || { sales: 0, invoices: 0, units: 0 };
    const target = summaryByStore[b]?.sales || 0;
    const pct = target > 0 ? branch.sales / target * 100 : null;
    const status = target === 0 ? 'no_target'
                 : pct >= 100   ? 'exceeded'
                 : pct >= 85    ? 'approaching'
                 : pct >= 50    ? 'behind'
                 : 'critical';
    return { store: b, actual: branch.sales, target, pct, shortfall: target - branch.sales, status,
             invoices: branch.invoices, units: branch.units,
             aov: branch.invoices > 0 ? branch.sales / branch.invoices : null };
  }).sort((a, b) => (a.pct || 0) - (b.pct || 0));
  return renderS4StoreMatrix(rows, []);
}

// Phase 5b: drill historical-comparison cell. Given current value + a
// comparison baseline, returns "↑X.X%" (green) / "↓X.X%" (red) / "—"
// (when baseline null/0 — no fake per Jym brief).
function drillDeltaCell(cur, comp) {
  if (comp == null || comp === 0 || cur == null) return '<span style="color:var(--s4-text-light)">—</span>';
  const pct = (cur - comp) / Math.abs(comp) * 100;
  const cls = pct >= 0 ? 'var(--s4-green-text)' : 'var(--s4-red-text)';
  const arrow = pct >= 0 ? '↑' : '↓';
  return '<span style="color:' + cls + '">' + arrow + ' ' + Math.abs(pct).toFixed(1) + '%</span>';
}

// Phase 5c Fix C: when EVERY row's 3 comparison fields are null, the
// dimension has no usable history → show an amber banner explaining WHY
// (not a silent "—" everywhere). dim: 'customer' | 'supplier' | 'category'.
function histGapBanner(rows, dim) {
  if (!Array.isArray(rows) || rows.length === 0) return '';
  const anyHist = rows.some(r =>
    r.sales_prev != null || r.sales_last_year != null || r.sales_12mo_avg != null);
  if (anyHist) return '';
  const msg = {
    customer: t('overview.histgap.customer'),
    category: t('overview.histgap.category'),
    supplier: t('overview.histgap.supplier'),
  }[dim] || t('overview.histgap.default');
  return '<div class="s4-data-gap" style="margin-bottom:12px">⚠ ' + escapeHtml(msg) + '</div>';
}

function renderS4Drill(s) {
  const tabs = [
    { id: 'trend12m', label: t('overview.drill.tab.trend12m') },
    { id: 'category', label: t('overview.drill.tab.category') },
    { id: 'customer', label: t('overview.drill.tab.customer') },
    { id: 'supplier', label: 'OEM/Agency' },
    { id: 'priceband', label: t('overview.drill.tab.priceband') },
  ];
  const tabHtml = tabs.map(t =>
    '<button class="' + (salesDrillTab === t.id ? 'active' : '') + '" onclick="setSalesDrillTab(\'' + t.id + '\')">' + t.label + '</button>'
  ).join('');
  let body;
  if (salesDrillTab === 'trend12m') {
    const trend = s.data.trend;
    if (trend == null) {
      body = '<div class="muted">Loading 12M trend ~1-2s …</div>';
    } else if (Array.isArray(trend.series) && trend.series.length > 0) {
      const series = [{ name: t('overview.drill.company'), color: '#1F5F4A', points: trend.series.map(p => ({ x: p.ym, y: p.sales })) }];
      if (trend.branch_series && !s.branch) {
        const colors = ['#3B82F6','#F59E0B','#EF4444','#A855F7','#10B981','#8B5CF6'];
        let i = 0;
        for (const st of ['W01','W02','W03','W05','W07','WCO']) {
          if (trend.branch_series[st]) {
            series.push({ name: st, color: colors[i++ % colors.length],
              points: trend.branch_series[st].map(p => ({ x: p.ym, y: p.sales })) });
          }
        }
      }
      body = svgLineChart({ series, width: 900, height: 260, yFmt: fmtMoneyShort });
    } else {
      body = '<div class="s4-data-gap">' + t('overview.drill.trend_empty') + '</div>';
    }
  } else if (salesDrillTab === 'priceband') {
    body = '<div class="s4-data-gap"><strong>' + t('overview.drill.priceband_title') + '</strong>' + t('overview.drill.priceband_gap') + '</div>';
  } else {
    // category / customer / supplier — lazy-loaded
    const cached = salesDrillCache[salesDrillTab];
    if (!cached) {
      body = '<div class="muted">Loading…</div>';
      // Kick off load (may already be loading via cache check; idempotent)
      if (!salesDrillCache[salesDrillTab + '__loading']) {
        salesDrillCache[salesDrillTab + '__loading'] = true;
        loadSalesDrill(salesDrillTab);
      }
    } else if (cached.degraded || cached.data?.status === 'data_gap') {
      const msg = cached.data?.message || cached.degraded_reason || cached.error || t('overview.drill.data_missing');
      body = '<div class="s4-data-gap"><strong>' + t('overview.drill.data_gap') + '</strong> · ' + escapeHtml(msg) + '</div>';
    } else if (cached.data?.status === 'ok') {
      if (salesDrillTab === 'category') {
        // Phase 5c: + vs 上月 / vs 去年同月 / vs 12M 均 (parity w/ customer/supplier)
        const rows = cached.data.rows || [];
        body = histGapBanner(rows, 'category')
             + '<table><thead><tr>'
             + '<th>' + t('overview.drill.col.category') + '</th><th>' + t('overview.drill.col.sales_rm') + '</th><th>' + t('overview.drill.col.invoices') + '</th><th>' + t('overview.drill.col.units') + '</th><th>AOV</th>'
             + '<th>' + t('overview.drill.col.vs_prev') + '</th><th>' + t('overview.drill.col.vs_last_year') + '</th><th>' + t('overview.drill.col.vs_12mo') + '</th>'
             + '</tr></thead><tbody>'
             + rows.map(r => '<tr>'
                 + '<td>' + escapeHtml(r.category) + '</td>'
                 + '<td>' + fmtRM(r.sales) + '</td>'
                 + '<td>' + fmtInt(r.invoices) + '</td>'
                 + '<td>' + fmtInt(r.units) + '</td>'
                 + '<td>' + (r.aov != null ? fmtRMpr(r.aov) : '—') + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
               + '</tr>').join('')
             + '</tbody></table>';
      } else if (salesDrillTab === 'customer') {
        // Phase 5b: + vs 上月 / vs 去年同月 / vs 12M 均 columns. RPC returns
        // rows[{cust_type, sales, rows, sales_prev, sales_last_year,
        // sales_12mo_avg}]. Null comparison → "—" (no fake).
        const rows = cached.data.rows || [];
        body = histGapBanner(rows, 'customer')
             + '<table><thead><tr>'
             + '<th>' + t('overview.drill.col.cust_type') + '</th><th>' + t('overview.drill.col.month_sales_rm') + '</th><th>' + t('overview.drill.col.detail_rows') + '</th>'
             + '<th>' + t('overview.drill.col.vs_prev') + '</th><th>' + t('overview.drill.col.vs_last_year') + '</th><th>' + t('overview.drill.col.vs_12mo') + '</th>'
             + '</tr></thead><tbody>'
             + rows.map(r => '<tr>'
                 + '<td>' + escapeHtml(r.cust_type) + '</td>'
                 + '<td>' + fmtRM(r.sales) + '</td>'
                 + '<td>' + fmtInt(r.rows) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                 + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
               + '</tr>').join('')
             + '</tbody></table>';
      } else if (salesDrillTab === 'supplier') {
        // Phase 5b: rows[{bucket, sales, invoices, sales_prev,
        // sales_last_year, sales_12mo_avg}] + 3 comparison columns.
        // Backward-compat: if old shape (d.OEM/d.Local_Agency) present,
        // render that (no comparisons available).
        if (Array.isArray(cached.data.rows)) {
          const rows = cached.data.rows;
          let total = 0; rows.forEach(r => total += (+r.sales || 0));
          body = histGapBanner(rows, 'supplier')
               + '<table><thead><tr>'
               + '<th>' + t('overview.drill.col.source') + '</th><th>' + t('overview.drill.col.month_sales_rm') + '</th><th>' + t('overview.drill.col.invoices') + '</th>'
               + '<th>' + t('overview.drill.col.vs_prev') + '</th><th>' + t('overview.drill.col.vs_last_year') + '</th><th>' + t('overview.drill.col.vs_12mo') + '</th>'
               + '</tr></thead><tbody>'
               + rows.map(r => '<tr>'
                   + '<td>' + escapeHtml(r.bucket) + '</td>'
                   + '<td>' + fmtRM(r.sales) + '</td>'
                   + '<td>' + fmtInt(r.invoices) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_prev) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_last_year) + '</td>'
                   + '<td>' + drillDeltaCell(r.sales, r.sales_12mo_avg) + '</td>'
                 + '</tr>').join('')
               + '<tr><td><strong>Total</strong></td><td><strong>' + fmtRM(total) + '</strong></td><td>—</td><td>—</td><td>—</td><td>—</td></tr>'
               + '</tbody></table>';
        } else {
          const d = cached.data;
          body = '<table><thead><tr><th>' + t('overview.drill.col.source') + '</th><th>' + t('overview.drill.col.sales_rm') + '</th><th>' + t('overview.drill.col.invoices') + '</th></tr></thead><tbody>'
               + '<tr><td>OEM (China)</td><td>' + fmtRM(d.OEM?.sales) + '</td><td>' + fmtInt(d.OEM?.invoices) + '</td></tr>'
               + '<tr><td>Local Agency (Malaysia)</td><td>' + fmtRM(d.Local_Agency?.sales) + '</td><td>' + fmtInt(d.Local_Agency?.invoices) + '</td></tr>'
               + '</tbody></table>';
        }
      } else {
        body = '<div class="muted">No data</div>';
      }
    } else {
      body = '<div class="muted">Loading…</div>';
    }
  }
  return ''
    + '<div class="s4-drill">'
    +   '<div class="s4-drill-tabs">' + tabHtml + '</div>'
    +   '<div class="s4-drill-body">' + body + '</div>'
    + '</div>';
}

function renderS4SentActionCard(a) {
  const sevCls = (a.severity || 'amber');
  const statusCls = 's4-action-status-' + (a.status || 'pending');
  const ddlStr = a.ddl ? ' · ddl ' + a.ddl : '';
  const amtStr = a.amount != null ? ' · RM ' + fmtInt(a.amount) : '';
  let buttons = '';
  if (a.status === 'renegotiating') {
    buttons = '<button class="s4-btn" onclick="approveRenegotiate(' + a.id + ', true)">' + t('overview.sent.btn.approve') + '</button>'
            + '<button class="s4-btn danger" onclick="approveRenegotiate(' + a.id + ', false)">' + t('overview.sent.btn.reject') + '</button>';
  } else if (a.status === 'overdue') {
    buttons = '<button class="s4-btn">' + t('overview.sent.btn.follow_up') + '</button>'
            + '<button class="s4-btn danger" onclick="rejectAction(' + a.id + ')">' + t('overview.sent.btn.close') + '</button>';
  }
  const renegBox = (a.status === 'renegotiating' && a.proposed_note)
    ? '<div class="a-attrib"><strong>' + t('overview.sent.reneg_request') + '</strong> '
        + (a.proposed_ddl ? t('overview.sent.reneg_ddl') + a.proposed_ddl : '')
        + (a.proposed_amount ? ' · ' + t('overview.sent.reneg_amount') + fmtInt(a.proposed_amount) : '')
        + ' · ' + escapeHtml(a.proposed_note) + '</div>'
    : '';

    ? '<div class="a-attrib"><strong>' + t('overview.sent.done_note') + '</strong> ' + escapeHtml(a.done_note) + '</div>'

/* ═══════════════════════════════════════════════════════════════════
   PART C — TIER 2 STORE MANAGER VIEW (renderSalesStoreV3)
   Sections: My Target · My Anomalies · My Action Plan · Peer Ranking
═══════════════════════════════════════════════════════════════════ */
function renderSalesStoreV3(s) {
  const myStore = (s.user && s.user.store) || '?';
  const header = ''
    + '<div class="s4-page-header">'
    +   '<div><h1 class="s4-title">' + t('today.title.my_store') + ' ' + myStore + '</h1>'
    +     '<div class="s4-sub">' + t('today.sub.month') + ' ' + s.month + '</div></div>'
    + '</div>';

  if (s.loading || !s.data) {
    return '<div class="sales-v3">' + header
      + '<div class="kpi-hero-row">'
      +   '<div class="kpi-card"><div class="skeleton h-value" style="height:32px"></div></div>'.repeat(4)
      + '</div></div>';
  }

  const tier = (s.data.tier && s.data.tier.data) || null;
  const degraded = !!(s.data.tier && s.data.tier.degraded);
  let banner = '';
  if (degraded || !tier) {
    banner = '<div class="s4-data-gap" style="margin:14px 0"><strong>' + t('today.banner.rpc_undeployed') + '</strong>' + t('today.banner.rpc_fallback') + '<code>tools/migration_phase4_sales_v3.sql</code>' + t('today.banner.rpc_fallback_tail') + '</div>';
  }

  // ── My Anomalies
  const myAnomalies = tier && Array.isArray(tier.anomalies) && tier.anomalies.length > 0
    ? '<div class="s4-action-grid" style="grid-template-columns:1fr"><div>' + tier.anomalies.map(a =>
        '<div class="s4-action-card ' + (a.severity || 'amber') + '">'
        + '<div class="a-title">' + escapeHtml(a.title) + '</div>'
        + '<div class="a-detail">' + escapeHtml(sanitizeRpcDetail(a.detail)) + '</div>'
        + '</div>').join('') + '</div></div>'
    : '<div class="s4-data-gap">' + t('today.anomaly.empty') + '</div>';

  // ── My Action Plan (assigned by Jym)
  const actions = (s.data.actions && Array.isArray(s.data.actions.actions)) ? s.data.actions.actions : [];
  const assignedToMe = actions.filter(a => a.status !== 'done' && a.status !== 'rejected');
  const myAP = assignedToMe.length > 0
    ? '<div class="s4-action-grid" style="grid-template-columns:1fr"><div>'
        + assignedToMe.map(a => renderS4AssignedActionCard(a)).join('')
      + '</div></div>'
    : '<div class="s4-data-gap">' + t('today.action.empty') + '</div>';

  // ── Peer Ranking (pct + rank only, privacy enforced server-side)
  const peers = tier && Array.isArray(tier.peer_ranking) ? tier.peer_ranking : [];
  const peerRows = peers.map(p => {
    const isSelf = p.store === myStore;
    const dotCls = p.status === 'exceeded' ? 'green' : (p.status === 'critical' || p.status === 'behind' ? 'red' : 'amber');
    return '<div class="peer-row ' + (isSelf ? 'self' : '') + '">'
      + '<span class="rank">' + p.rank + '.</span>'
      + '<span class="dot ' + dotCls + '"></span>'
      + '<span><strong>' + p.store + '</strong>' + (isSelf ? '<span class="you-tag">' + t('today.peer.you') + '</span>' : '') + '</span>'
      + '<span class="pct">' + (p.pct != null ? p.pct.toFixed(1) + '%' : '—') + '</span>'
    + '</div>';
  }).join('');
  const peerBlock = peers.length > 0
    ? '<div class="s4-peer-ranking">' + peerRows + '</div>'
    : '<div class="s4-data-gap">' + t('today.peer.empty') + '</div>';

  // 件1 (2026-05-25): 4-KPI hero (Sales/Walk-in/Closing/AOV) scoped to own
  // store — full parity with owner. Replaces the single My-Target card.
  // Reuses renderOverviewKpiRow (reads s.data.overview, now manager-scoped).
  const kpiHero = renderOverviewKpiRow(s);

  return '<div class="sales-v3">'
    + header
    + banner
    + kpiHero
    + '<div class="s4-section-title">' + t('today.section.anomaly') + '</div>'
    + myAnomalies
    + '<div class="s4-section-title">' + t('today.section.action') + '</div>'
    + myAP
    + '<div class="s4-section-title">' + t('today.section.peer') + t('today.peer.privacy') + '</div>'
    + peerBlock
    + '</div>';
}

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TARGETS · ⚙️ 目标设定 (owner only)
   - month picker (uses global state.month, updated via header picker)
   - 10 × 2 grid: store × (sales / footfall) target_value editable
   - auto-fill buttons: copy last month / last × 1.05
   - save → POST /api/targets/upsert (sync.js mode=targets_upsert, owner)
═══════════════════════════════════════════════════════════════════ */

// Editor state — mutable in-memory until save. Resets on data load.
const targetsEditor = {
  ymLoaded: null,
  dirty: false,
  byStore: {},  // store -> { sales: number|null, footfall: number|null }
  saving: false,
  lastSaveStatus: null, // { ok: bool, message: string }
};

function blankTargetRow() {
  return { sales: null, footfall: null, walkin_chinese: null, walkin_malay: null, walkin_indian: null, walkin_other: null };
}

function loadTargetsIntoEditor(targetsResp) {
  targetsEditor.ymLoaded = targetsResp.ym;
  targetsEditor.dirty = false;
  targetsEditor.byStore = {};
  for (const code of TARGET_STORE_ORDER) {
    targetsEditor.byStore[code] = blankTargetRow();
  }
  const summary = (targetsResp && targetsResp.summary && targetsResp.summary.by_store) || {};
  for (const code of Object.keys(summary)) {
    if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = blankTargetRow();
    if (summary[code].sales    != null) targetsEditor.byStore[code].sales    = +summary[code].sales || 0;
    if (summary[code].footfall != null) targetsEditor.byStore[code].footfall = +summary[code].footfall || 0;
    // Phase 6f: race walk-in targets (backend by_store carries any target_type).
    for (const c of RACE_TARGET_COLS) {
      if (summary[code][c.key] != null) targetsEditor.byStore[code][c.key] = +summary[code][c.key] || 0;
    }
  }
}

function renderTargets(s) {
  // Owner-only gate (also enforced backend-side; UI hides the link from non-owners).
  if (s.role !== 'owner') {
    return '<h1 class="page-title">⚙️ ' + t('targets.title') + '</h1>'
         + '<div class="error-panel"><div class="msg"><strong>' + t('targets.no_permission') + '</strong>。owner only.</div></div>';
  }
  if (s.loading || !s.data) {
    return '<h1 class="page-title">⚙️ ' + t('targets.title') + '</h1>'
         + '<p class="page-sub">' + s.month + ' · ' + t('targets.loading') + '</p>'
         + '<div class="skeleton h-row"></div><div class="skeleton h-row"></div>';
  }
  // Sync editor with loaded data (if we've switched months or first load)
  if (targetsEditor.ymLoaded !== s.data.ym) {
    loadTargetsIntoEditor(s.data);
  }

  const fallback = s.data.fallback_used
    ? '<div class="targets-fallback-note">' + t('targets.fallback.reference', { ym: s.data.ym }) + '<strong>' + s.data.fallback_from + '</strong>' + t('targets.fallback.reference_tail', { ym: s.data.ym }) + '</div>'
    : (s.data.targets.length === 0
       ? '<div class="targets-fallback-note">' + t('targets.fallback.all_empty', { ym: s.data.ym }) + '</div>'
       : '');

  // Build grid rows — PR-B: only live operating stores get targets (HQ/closed
  // codes have no sales target). Non-live target rows removed from the editor.
  const rows = TARGET_STORE_ORDER.filter(isLiveStore).map(code => {
    const meta = TARGET_STORES[code];
    const cur  = targetsEditor.byStore[code] || { sales: null, footfall: null };
    const histClass = meta.group === 'historical' ? 'historical' : '';
    const note = meta.group === 'historical'
      ? t('targets.note.historical') : (code === 'WCO' ? t('targets.note.hq') : t('targets.note.main'));
    return ''
      + '<tr class="' + histClass + '">'
      +   '<td class="store-cell">' + escapeHtml(t('store.name.' + code, meta.name)) + '</td>'
      +   '<td><input type="number" min="0" step="100" class="target-input" '
      +       'data-store="' + code + '" data-type="sales" '
      +       'value="' + (cur.sales != null ? cur.sales : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td><input type="number" min="0" step="1" class="target-input" '
      +       'data-store="' + code + '" data-type="footfall" '
      +       'value="' + (cur.footfall != null ? cur.footfall : '') + '" '
      +       'oninput="onTargetEdit(this)" /></td>'
      +   '<td class="note">' + note + '</td>'
      + '</tr>';
  }).join('');

  // Summary computations — PR-B: sum only the live store rows shown above
  // (non-live codes are no longer editable target rows).
  const liveTargetCodes = TARGET_STORE_ORDER.filter(isLiveStore);
  const salesTot = liveTargetCodes
    .reduce((a, code) => a + (+((targetsEditor.byStore[code] || {}).sales) || 0), 0);
  const footTot = liveTargetCodes
    .reduce((a, code) => a + (+((targetsEditor.byStore[code] || {}).footfall) || 0), 0);

  // Phase 6f — Race Walk-in Targets 表 (6 主力店 × 4 种族 + 公司层自动加总)
  const raceRows = RACE_TARGET_STORES.filter(isLiveStore).map(code => {
    const meta = TARGET_STORES[code];
    const cur  = targetsEditor.byStore[code] || blankTargetRow();
    let rowTot = 0;
    const inputs = RACE_TARGET_COLS.map(c => {
      const v = cur[c.key];
      rowTot += (+v || 0);
      return '<td><input type="number" min="0" step="1" class="target-input" '
        + 'data-store="' + code + '" data-type="' + c.key + '" '
        + 'value="' + (v != null ? v : '') + '" oninput="onTargetEdit(this)" /></td>';
    }).join('');
    return '<tr><td class="store-cell">' + escapeHtml(meta ? meta.name : code) + '</td>'
      + inputs + '<td class="num" id="race-rowtot-' + code + '"><strong>' + fmtInt(rowTot) + '</strong></td></tr>';
  }).join('');
  const coTot = {}; RACE_TARGET_COLS.forEach(c => coTot[c.key] = 0);
  RACE_TARGET_STORES.filter(isLiveStore).forEach(code => {
    const cur = targetsEditor.byStore[code] || {};
    RACE_TARGET_COLS.forEach(c => { coTot[c.key] += (+cur[c.key] || 0); });
  });
  const coAll = RACE_TARGET_COLS.reduce((a, c) => a + coTot[c.key], 0);
  const coRow = '<tr class="targets-co-row"><td class="store-cell">' + t('targets.race.co_row') + '</td>'
    + RACE_TARGET_COLS.map(c => '<td class="num" id="race-cotot-' + c.key + '"><strong>' + fmtInt(coTot[c.key]) + '</strong></td>').join('')
    + '<td class="num" id="race-cotot-all"><strong>' + fmtInt(coAll) + '</strong></td></tr>';
  const raceSection = ''
    + '<h2 class="targets-subhead">' + t('targets.race.subhead') + '</h2>'
    + '<p class="page-sub">' + t('targets.race.sub') + '</p>'
    + '<table class="targets-grid race-targets">'
    +   '<thead><tr><th>' + t('targets.race.col_store') + '</th>' + RACE_TARGET_COLS.map(c => '<th class="num">' + c.label + '</th>').join('') + '<th class="num">' + t('targets.race.col_total') + '</th></tr></thead>'
    +   '<tbody>' + raceRows + coRow + '</tbody>'
    + '</table>';

  const saveLabel = targetsEditor.saving ? t('targets.save.saving') : (targetsEditor.dirty ? t('targets.save.has_changes') : t('targets.save.no_changes'));
  const saveStatus = targetsEditor.lastSaveStatus
    ? '<span class="targets-save-status ' + (targetsEditor.lastSaveStatus.ok ? 'ok' : 'bad') + '">'
        + escapeHtml(targetsEditor.lastSaveStatus.message) + '</span>'
    : '';

  return ''
    + '<h1 class="page-title">⚙️ ' + t('targets.title') + '</h1>'
    + '<p class="page-sub">' + t('today.sub.month') + ' ' + s.data.ym
    + ' · ' + t('targets.page.sub') + '</p>'
    + fallback
    + '<div class="targets-toolbar">'
    +   '<span class="group-label">' + t('targets.toolbar.quickfill') + '</span>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'copy_last\')">' + t('targets.toolbar.copy_last') + '</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'last_x_105\')">' + t('targets.toolbar.last_x_105') + '</button>'
    +   '<button type="button" onclick="applyTargetsTemplate(\'clear\')">' + t('targets.toolbar.clear') + '</button>'
    +   '<button type="button" class="primary" '
    +     'onclick="saveTargets()" '
    +     (targetsEditor.dirty && !targetsEditor.saving ? '' : 'disabled')
    +     '>' + saveLabel + '</button>'
    +   saveStatus
    + '</div>'
    + '<table class="targets-grid">'
    +   '<thead><tr><th>' + t('targets.col.store') + '</th><th>' + t('targets.col.sales_target') + '</th><th>' + t('targets.col.footfall_target') + '</th><th>' + t('targets.col.note') + '</th></tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>'
    + raceSection
    + '<div class="targets-summary">'
    +   '<div class="summary-cell"><div class="label">' + t('targets.summary.sales_total') + '</div>'
    +     '<div class="value">' + fmtRM(salesTot) + '</div></div>'
    +   '<div class="summary-cell"><div class="label">' + t('targets.summary.footfall_total') + '</div>'
    +     '<div class="value">' + fmtInt(footTot) + ' ' + t('targets.summary.ppl') + '</div></div>'
    + '</div>';
}

function onTargetEdit(input) {
  const store = input.getAttribute('data-store');
  const type  = input.getAttribute('data-type');
  const val   = input.value === '' ? null : Number(input.value);
  if (!targetsEditor.byStore[store]) targetsEditor.byStore[store] = blankTargetRow();
  targetsEditor.byStore[store][type] = (val == null || isNaN(val)) ? null : val;
  if (!input.classList.contains('dirty')) input.classList.add('dirty');
  if (!targetsEditor.dirty) {
    targetsEditor.dirty = true;
    targetsEditor.lastSaveStatus = null;
    // Re-enable save button without full re-render (cheap toggle)
    const btn = document.querySelector('.targets-toolbar button.primary');
    if (btn) { btn.disabled = false; btn.textContent = 'Save changes'; }
  }
  // Update summary values inline (cheap reach)
  const summaryCells = document.querySelectorAll('.targets-summary .summary-cell .value');
  if (summaryCells.length >= 2) {
    const salesTot = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.sales || 0), 0);
    const footTot  = Object.values(targetsEditor.byStore).reduce((a, v) => a + (+v.footfall || 0), 0);
    summaryCells[0].textContent = fmtRM(salesTot);
    summaryCells[1].textContent = t('targets.summary.people', { n: fmtInt(footTot) });
  }
  // Phase 6f: race walk-in edits → recompute per-row + company auto totals inline.
  if (type && type.indexOf('walkin_') === 0) updateRaceTargetTotals();
}
window.onTargetEdit = onTargetEdit;

// Phase 6f — live SUMIF for race walk-in table (per-row 总 + 公司层 row).
function updateRaceTargetTotals() {
  const co = {}; RACE_TARGET_COLS.forEach(c => co[c.key] = 0);
  RACE_TARGET_STORES.forEach(code => {
    const cur = targetsEditor.byStore[code] || {};
    let rowTot = 0;
    RACE_TARGET_COLS.forEach(c => { const v = +cur[c.key] || 0; co[c.key] += v; rowTot += v; });
    const el = document.getElementById('race-rowtot-' + code);
    if (el) el.innerHTML = '<strong>' + fmtInt(rowTot) + '</strong>';
  });
  let all = 0;
  RACE_TARGET_COLS.forEach(c => {
    const el = document.getElementById('race-cotot-' + c.key);
    if (el) el.innerHTML = '<strong>' + fmtInt(co[c.key]) + '</strong>';
    all += co[c.key];
  });
  const allEl = document.getElementById('race-cotot-all');
  if (allEl) allEl.innerHTML = '<strong>' + fmtInt(all) + '</strong>';
}

function applyTargetsTemplate(kind) {
  // Need last-month targets for "copy_last" / "last_x_105". We have them
  // either as s.data.targets (when fallback_used=true) or via a fresh fetch.
  // Simpler: always re-fetch last month's targets via /api/kpi?view=targets.
  const ymPrev = ymLastMonth(state.month);
  if (kind === 'clear') {
    for (const code of TARGET_STORE_ORDER) {
      targetsEditor.byStore[code] = blankTargetRow();
    }
    targetsEditor.dirty = true;
    renderView();
    return;
  }
  fetch('/api/kpi?' + new URLSearchParams({ view: 'targets', month: ymPrev }).toString(), {
    cache: 'no-store', headers: authHeaders(),
  })
    .then(r => r.json())
    .then(j => {
      const by = (j && j.summary && j.summary.by_store) || {};
      const factor = (kind === 'last_x_105') ? 1.05 : 1.0;
      for (const code of TARGET_STORE_ORDER) {
        const meta = TARGET_STORES[code];
        if (!targetsEditor.byStore[code]) targetsEditor.byStore[code] = blankTargetRow();
        const src = by[code] || {};
        // Historical stores stay 0 if Jym originally set 0 last month.
        targetsEditor.byStore[code].sales    = (src.sales    != null) ? Math.round(src.sales    * factor) : (meta.group === 'historical' ? 0 : null);
        targetsEditor.byStore[code].footfall = (src.footfall != null) ? Math.round(src.footfall * factor) : (meta.group === 'historical' ? 0 : null);
        // Phase 6f: also carry race walk-in targets through the template.
        for (const c of RACE_TARGET_COLS) {
          targetsEditor.byStore[code][c.key] = (src[c.key] != null) ? Math.round(src[c.key] * factor) : null;
        }
      }
      targetsEditor.dirty = true;
      renderView();
    })
    .catch(e => {
      targetsEditor.lastSaveStatus = { ok: false, message: t('targets.tmpl.load_failed') + e.message };
      renderView();
    });
}
window.applyTargetsTemplate = applyTargetsTemplate;

async function saveTargets() {
  if (targetsEditor.saving) return;
  targetsEditor.saving = true;
  targetsEditor.lastSaveStatus = { ok: true, message: 'Saving…' };
  renderView();
  // Build payload — skip nulls (don't write blank rows).
  const targets = [];
  for (const code of TARGET_STORE_ORDER) {
    const v = targetsEditor.byStore[code] || {};
    if (v.sales    != null) targets.push({ store: code, target_type: 'sales',    target_value: +v.sales });
    if (v.footfall != null) targets.push({ store: code, target_type: 'footfall', target_value: +v.footfall });
    // Phase 6f: race walk-in targets (only the 6 race stores carry these).
    for (const c of RACE_TARGET_COLS) {
      if (v[c.key] != null) targets.push({ store: code, target_type: c.key, target_value: +v[c.key] });
    }
  }
  if (targets.length === 0) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: t('targets.save.nothing') };
    renderView();
    return;
  }
  try {
    const r = await fetch('/api/sync', {
      method: 'POST', cache: 'no-store',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({
        mode: 'targets_upsert',
        ym: state.month,
        targets,
      }),
    });
    const j = await r.json();
    if (!r.ok || !j.ok) {
      throw new Error(j.error || ('HTTP ' + r.status));
    }
    targetsEditor.saving = false;
    targetsEditor.dirty  = false;
    targetsEditor.lastSaveStatus = {
      ok: true,
      message: 'Saved ' + j.rows_upserted + ' rows' + (j.rows_skipped ? ' · ' + j.rows_skipped + ' skipped' : ''),
    };
    // Reload from server to confirm.
    loadView();
  } catch (e) {
    targetsEditor.saving = false;
    targetsEditor.lastSaveStatus = { ok: false, message: 'Save failed: ' + e.message };
    renderView();
  }
}
window.saveTargets = saveTargets;

// ── Phase 7b: 经营判断卡 (顶部, 5 问 5 答 + 综合判断) ──
function renderInvJudgement(j) {
  if (!j || j.degraded || !j.verdict) return '';
  const v = j.verdict || {};
  const verdictColor = { red: '#DC2626', amber: '#D97706', green: '#16A34A' }[v.level] || '#6B7280';
  const verdictIcon = { red: '🔴', amber: '🟡', green: '🟢' }[v.level] || '⚪';
  const dirIcon = { up: '↑', down: '↓', same: '→', unknown: '—' }[v.direction] || '—';
  const dirColor = { up: '#16A34A', down: '#DC2626', same: '#6B7280', unknown: '#6B7280' }[v.direction] || '#6B7280';

  // 件4 (2026-05-25): compose ALL judgement prose bilingually FE-side from the
  // RPC's structured numbers (the RPC zh strings are kept but ignored here) so
  // switching to EN leaves zero Chinese. byte-match: numbers come straight from RPC.
  const rl = j.red_lines || {};
  const ansLabel = (lvl) => ({ red: t('inv.judge.ans.yes'), amber: t('inv.judge.ans.mid'), green: t('inv.judge.ans.no') }[lvl] || '');
  const q1d = j.q1_overstock || {}, q2d = j.q2_understock || {}, q4d = j.q4_dead || {}, q5c = j.q5_core || {};
  const aNoStock = (q5c.a_no_stock != null) ? q5c.a_no_stock : (((rl.a_no_stock_count || {}).value) || 0);
  const q1pct = ((((rl.misplaced_pct || {}).value) || 0) + (((rl.company_dead_pct || {}).value) || 0)).toFixed(1);
  const q1rm  = (q1d.misplaced_rm || 0) + (q4d.dead_rm || 0);

  const q1 = qBlock(t('inv.judge.q1'), {
    level: q1d.level, answer: ansLabel(q1d.level),
    headline: t('inv.judge.q1.headline', { pct: q1pct, rm: fmtInt(q1rm) }),
    detail: t('inv.judge.q1.detail'),
  }, []);
  const q2 = qBlock(t('inv.judge.q2'), {
    level: q2d.level, answer: ansLabel(q2d.level),
    headline: t('inv.judge.q2.headline', { n: aNoStock }),
  }, [
    { label: '📋 ' + t('inv.judge.btn.view_list'), action: () => invJumpToSkuTab('a_no_stock') },
    { label: '📤 ' + t('inv.judge.btn.assign_purchase'), action: () => invJudgeAssign(j.q2_understock) },
  ]);
  const q3 = qBlock(t('inv.judge.q3'), {
    level: 'amber', answer: '',
    headline: t('inv.judge.q3.headline', { n: aNoStock }),
    detail: q3Top10Detail((j.q3_what_to_order || {}).top10),
  }, [{ label: '📋 ' + t('inv.judge.btn.view_top10'), action: () => invJumpToSkuTab('a_no_stock') }]);
  const q4 = qBlock(t('inv.judge.q4'), {
    level: q4d.level, answer: '',
    headline: t('inv.judge.q4.headline', { sku: fmtInt(q4d.dead_sku || 0), rm: fmtRM(q4d.dead_rm || 0) }),
    detail: q4d.worst_store ? t('inv.judge.q4.detail', { store: q4d.worst_store, pct: q4d.worst_store_pct }) : '',
  }, [
    { label: '📋 ' + t('inv.judge.btn.dead_list'), action: () => invJumpToSkuTab('dead_top50') },
    { label: '📋 ' + t('inv.judge.btn.disc_list'), action: () => invJumpToSkuTab('discontinued_top50') },
    { label: '📤 ' + t('inv.judge.btn.assign_clearance'), action: () => invJudgeAssign(j.q4_dead) },
  ]);
  const q5 = qBlock(t('inv.judge.q5'), {
    level: q5c.level, answer: '',
    headline: t('inv.judge.q5.headline', { total: fmtInt(q5c.a_total_sku || 0), nostock: (q5c.a_no_stock || 0) }),
    detail: t('inv.judge.q5.detail'),
  }, [{ label: '📋 ' + t('inv.judge.btn.view_a_all'), action: () => invJumpToSkuTab('a_class_all') }]);

  // Bilingual verdict label + direction (RPC v.label / v.direction_label are zh-only).
  const verdictLabel = ({ red: t('inv.judge.verdict.poor'), amber: t('inv.judge.verdict.fair'), green: t('inv.judge.verdict.good') }[v.level]) || (v.label || '—');
  const dirLabel = ({ down: t('inv.judge.dir.worse'), up: t('inv.judge.dir.better'), same: t('inv.judge.dir.same'), unknown: t('inv.judge.dir.unknown') }[v.direction]) || (v.direction_label || '—');

  return ''
    + '<div class="inv-judgement-card">'
    +   '<div class="judge-head">'
    +     '<div class="judge-title">📋 ' + escapeHtml(j.snapshot_date || '') + ' ' + t('inv.judge.title') + '</div>'
    +     '<div class="judge-verdict" style="color:' + verdictColor + '">'
    +       verdictIcon + ' ' + t('inv.judge.overall') + ': <strong>' + escapeHtml(verdictLabel) + '</strong>'
    +       ' · ' + t('common.vs_prev') + ' <span style="color:' + dirColor + '">' + dirIcon + ' ' + escapeHtml(dirLabel) + '</span>'
    +       ' (<strong>' + (v.red_lines_triggered != null ? v.red_lines_triggered : 0) + '</strong> ' + t('inv.judge.red_lines_triggered')
    +       (v.red_lines_prev > 0 ? t('inv.judge.red_lines_prev', { n: v.red_lines_prev }) : '') + ')'
    +     '</div>'
    +     (j.is_synthetic ? '<div class="judge-synth">⚠️ ' + t('inv.judge.synth') + '</div>' : '')
    +   '</div>'
    +   '<div class="judge-q-list">' + q1 + q2 + q3 + q4 + q5 + '</div>'
    + '</div>';
}
function qBlock(question, ans, buttons) {
  if (!ans) return '';
  const dotColor = { red: '#DC2626', amber: '#D97706', green: '#16A34A' }[ans.level] || '#6B7280';
  const dot = { red: '🔴', amber: '🟡', green: '🟢' }[ans.level] || '⚪';
  if (!window.__invJudgeBtns) window.__invJudgeBtns = {};
  const btnsHtml = (buttons && buttons.length)
    ? '<div class="judge-q-btns">' + buttons.map((b, i) => {
        const key = invButtonKey(question, i);
        window.__invJudgeBtns[key] = b.action;
        return '<button class="judge-q-btn" data-bk="' + key + '">' + escapeHtml(b.label) + '</button>';
      }).join('') + '</div>'
    : '';
  return ''
    + '<div class="judge-q">'
    +   '<div class="judge-q-head">'
    +     '<span class="judge-q-q">' + escapeHtml(question) + '</span>'
    +     (ans.answer ? '<span class="judge-q-a" style="color:' + dotColor + '">' + dot + ' ' + escapeHtml(ans.answer) + '</span>' : '')
    +   '</div>'
    +   '<div class="judge-q-headline">' + escapeHtml(ans.headline || '') + '</div>'
    +   (ans.detail ? '<div class="judge-q-detail">' + escapeHtml(ans.detail) + '</div>' : '')
    +   btnsHtml
    + '</div>';
}
function invButtonKey(q, i) { return q.replace(/\W/g, '_').slice(0, 20) + '_' + i; }
function q3Top10Detail(top10) {
  if (!top10 || !top10.length) return t('inv.judge.q3.list_ready');
  return t('inv.judge.q3.top3_prefix') + ': ' + top10.slice(0, 3).map(r => r.item_code).join(', ') + ' …';
}
window.invJumpToSkuTab = function(tab) {
  if (typeof window.invShowSkuTab === 'function') window.invShowSkuTab(tab);
  const body = document.getElementById('invSkuTabBody');
  if (body) {
    body.scrollIntoView({ behavior: 'smooth', block: 'start' });
    body.classList.add('inv-flash');
    setTimeout(() => body.classList.remove('inv-flash'), 1500);
  }
};
window.invJudgeAssign = function(ans) {
  if (!ans) return;
  if (typeof window.openAssignModal === 'function') {
    window.openAssignModal({

      detail: ans.detail || ans.headline || '',

      source_url: '?view=inventory&month=' + state.month,
      source_data: ans,
    });
  } else { alert(t('modal.assign.not_loaded')); }
};

if (!window.__invJudgeDelegated) {

}

// Phase 10B — Inventory: 6 店死货 RM 横条 (复用 matrix_main6, 无新后端)
function renderInventoryCharts(matrix) {
  if (!matrix || !matrix.length) return '';
  const rows = matrix.slice()

// Phase 10B — Hero 状态灯 helper. invert=true 表示数字越低越好。
function heroLightColor(value, gThresh, aThresh, invert) {
  if (value == null) return 'gray';
  if (invert) { if (value <= gThresh) return 'green'; if (value <= aThresh) return 'amber'; return 'red'; }
  if (value >= gThresh) return 'green';
  if (value >= aThresh) return 'amber';
  return 'red';
}
function heroLightDot(color) {
  return '<span class="hero-light-dot">' + ({ green: '🟢', amber: '🟡', red: '🔴', gray: '⚪' }[color] || '⚪') + '</span>';
}

function renderInvHero(hero, isSynth) {

function renderInvHeroCard(def, k, isSynth) {
  const momPct = k.mom_pct, momAmt = k.mom_amount;
  let momColor = 'var(--s4-text-light)', momArrow = '↔';
  if (momPct != null && Math.abs(momPct) >= 2) {
    if (momPct > 0) { momArrow = '↑'; momColor = def.invert ? 'var(--s4-red-text)' : 'var(--s4-green-text)'; }
    else            { momArrow = '↓'; momColor = def.invert ? 'var(--s4-green-text)' : 'var(--s4-red-text)'; }
  }
  const amountStr = k.amount == null ? '—' : fmtRM(k.amount);
  const skuLine = k.sku != null ? fmtInt(k.sku) + ' SKU' : '';
  const pctLine = (def.subSuffix && k.pct_of_total != null) ? Number(k.pct_of_total).toFixed(1) + def.subSuffix : '';
  const momLine = momPct != null
    ? t('common.vs_prev') + ' <strong style="color:' + momColor + '">' + momArrow + ' ' + Math.abs(momPct).toFixed(1) + '%</strong>'
    : t('common.vs_prev') + ' <strong style="color:var(--s4-text-light)">—</strong>';
  const momAmtLine = (momAmt != null && momAmt !== 0)
    ? '<span style="color:var(--s4-text-light);font-size:11px"> (' + (momAmt > 0 ? '+' : '') + fmtRM(momAmt) + ')</span>'
    : '';
  // Phase 10B 灯: invert 卡 (库存/死货/缓销) ↓≥10% 绿; active ↑≥10% 绿。
  const lightColor = momPct == null ? 'gray'
    : (def.invert ? heroLightColor(momPct, -10, 10, true) : heroLightColor(momPct, 10, -10, false));
  return ''
    + '<div class="kpi-card inv-hero-card">'
    +   heroLightDot(lightColor)
    +   (isSynth ? '<span class="inv-synth-badge">SYNTH</span>' : '')
    +   '<div class="kpi-icon">' + def.icon + '</div>'
    +   '<div class="kpi-title">' + def.title + '</div>'
    +   '<div class="kpi-actual">' + amountStr + '</div>'
    +   '<div class="inv-hero-sub">'
    +     (skuLine ? '<span>' + skuLine + '</span>' : '')
    +     (pctLine ? '<span class="inv-hero-pct">' + pctLine + '</span>' : '')
    +   '</div>'
    +   '<div class="kpi-meta">' + momLine + momAmtLine + '</div>'

window.invShowSkuTab = function(key) {
  window.__invActiveTab = key;
  document.querySelectorAll('.inv-tab-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === key));
  const body = document.getElementById('invSkuTabBody');
  if (body) body.innerHTML = invSkuTabTable(key);
};
window.invExportSkuCsv = function() {
  const key = window.__invActiveTab || 'dead_top50';
  const rows = (window.__invSkuLists && window.__invSkuLists[key]) || [];
  if (!rows.length) { alert(t('inv.sku.no_data_tab')); return; }
  const keys = Object.keys(rows[0]);
  const csv = [keys.join(',')].concat(rows.map(r => keys.map(k => {
    const v = r[k]; if (v == null) return '';
    const str = String(v); return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  }).join(','))).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'inventory_' + key + '_' + (new Date().toISOString().slice(0, 10)) + '.csv';
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 100);
};
