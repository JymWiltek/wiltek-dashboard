/* ═══════════════════════════════════════════════════════════════════
   RENDER · PRODUCTS  (Stage B)
   3 KPI from /api/products (Velocity ABCD / Top 20 migrations / Strategic Push)
   + 4 alerts (mostly placeholder — V1 same; need stock context).
═══════════════════════════════════════════════════════════════════ */
function renderProducts(s) {
  const title = '<h1 class="page-title">Products</h1>'
              + '<p class="page-sub">Snapshot ' + s.month
              + (s.branch ? ' · <strong>' + s.branch + '</strong>' : ' · Company-wide')
              + ' · 3 KPI + 4 alerts · /api/products</p>';

  if (s.loading || !s.data) {
    return title + '<div class="cards-grid">'
      + skeletonCard('① SKU Velocity')
      + skeletonCard('② Top 20 migrations')
      + skeletonCard('③ Strategic Push')
      + '</div>'
      + '<div class="section-title">Action alerts</div>'
      + '<div class="cards-grid">'
      + skeletonCard('① Stockout risk')
      + skeletonCard('② Slow-mover drain')
      + skeletonCard('③ SKU tier migration')
      + skeletonCard('④ Designer/Contractor pref')
      + '</div>';
  }

  const j = s.data;
  const v = j.velocity || {};
  const mig = j.migrations || {};
  const sp = j.strategic_push || {};
  const cls = v.classes || {};
  const asOf = 'snapshot ' + (j.snapshot || '—') + (j.prev_snapshot ? ' (vs ' + j.prev_snapshot + ')' : '');

  // ── KPI 1: SKU Velocity (ABCD 90d) ────────────────────────────
  const abcdRows = ['A', 'B', 'C', 'D'].map(t => {
    const c = cls[t] || { n: 0, amt: 0, pct: 0 };
    return kpiRow(t + ' tier', c.n + ' SKU · ' + fmtMoneyShort(c.amt) + ' (' + (c.pct || 0) + '%)');
  }).join('');
  const c1 = kpiCard('① SKU Velocity (ABCD · 90d)',
    (v.total_sku || 0) + ' SKU',
    (v.total_active || 0) + ' active · A=top10% / B=20% / C=40% / D=30%',
    abcdRows, asOf);

  // ── KPI 2: Top 20 migrations ──────────────────────────────────
  const migRows = (mig.top20 || []).slice(0, 6).map(x =>
    kpiRow(escapeHtml(x.item_code) + ' · ' + escapeHtml(x.brand || '—'),
      escapeHtml(x.migration || '') + ' · ' + fmtMoneyShort(x.amt_90d))
  ).join('') || kpiRow('No significant cross-tier migrations', '');
  const c2 = kpiCard('② Top 20 anomaly migrations',
    (mig.count || 0) + '',
    'A→C/D warning · D→A/B opportunity · C→A breakout (top 6 ↓)',
    migRows);

  // ── KPI 3: Strategic Push ─────────────────────────────────────
  const spRows = (sp.items || []).map(x =>
    kpiRow(escapeHtml(x.item_code) + ' · ' + escapeHtml(x.brand || '—'),
      'opened ' + (x.days_since_open || 0) + 'd ago · ' + fmtMoneyShort(x.amt_90d))
  ).join('') || kpiRow('No new A-tier SKUs in last 60 days', '');
  const c3 = kpiCard('③ Strategic Push (placeholder)',
    (sp.count || 0) + '',
    escapeHtml(sp.note || 'Strategic_Push field pending in Item Master'),
    spRows);

  // ── Alerts (V1 same — most pending) ───────────────────────────
  const al1 = alertCard('① Stockout risk', null,
    '<14d SKUs · split by OEM/Agency lead time · in /api/inventory_dashboard', 'na', null);
  const al2 = alertCard('② Slow-mover capital drain', null,
    'Locked-up SKUs by tier · merges into /api/inventory_dashboard liquidation', 'na', null);
  const al3Rows = (mig.top20 || []).filter(x =>
    (x.migration || '').includes('A→') || (x.migration || '').includes('→D')
  ).slice(0, 4).map(x =>
    aRow(escapeHtml(x.item_code), escapeHtml(x.migration))
  ).join('');
  const al3 = alertCard('③ SKU tier migration',
    al3Rows ? (mig.top20 || []).filter(x =>
      (x.migration || '').includes('A→') || (x.migration || '').includes('→D')).length + ' moves' : null,
    al3Rows ? 'Top 4 A-tier drops or D-tier rises' : 'No critical tier moves vs ' + (j.prev_snapshot || '—'),
    al3Rows ? 'warn' : 'ok', al3Rows);
  const al4 = alertCard('④ Designer / Contractor SKU pref', null,
    'Per-cust-type per-SKU map pending · cust_type on /api/customers', 'na', null);

  return title
    + '<div class="cards-grid">' + c1 + c2 + c3 + '</div>'
    + '<div class="section-title">Action alerts</div>'
    + '<div class="cards-grid">' + al1 + al2 + al3 + al4 + '</div>';

/* ═══════════════════════════════════════════════════════════════════
   RENDER · TODAY  (Stage B — 4-layer briefing)
   Layer 1: status light + Cash Runway
   Layer 2: Action Plan (placeholder until Stage C cross-view integration)
   Layer 3: 5-store snapshot table (mtd_amount / closing_rate / walk-in / basket)
   Layer 4: 6-domain health grid (placeholder — needs cross-view aggregation)
   Data: /api/today (status + stores).
═══════════════════════════════════════════════════════════════════ */
function renderToday(s) {
  const title = '<h1 class="page-title">Today</h1>'
              + '<p class="page-sub">Snapshot ' + s.month + ' · 4-layer briefing · /api/today</p>';

  if (s.loading || !s.data) {
    return title
      + '<div class="today-banner"><div class="today-light tone-unknown">…</div>'
      + '<div class="today-summary"><div class="skeleton h-line"></div><div class="skeleton h-line"></div></div>'
      + '<div class="today-runway"><div class="skeleton h-value"></div></div></div>'
      + '<div class="section-title">5-store snapshot</div>'
      + '<div class="card"><div class="skeleton h-row"></div><div class="skeleton h-row"></div><div class="skeleton h-row"></div></div>';
  }

  const j = s.data;
  const st = j.status || {};
  const stores = Array.isArray(j.stores) ? j.stores : [];
  const lightCls = st.light || 'unknown';
  const missing = Array.isArray(st.data_missing) ? st.data_missing : [];

  // ── Layer 1: Status light + Cash Runway ──────────────────────────
  const lightIcon = { ok: '🟢', warn: '🟡', bad: '🔴', unknown: '⚪' }[lightCls] || '⚪';
  const headlineMap = {
    ok:     ['Wiltek today: healthy', 'ok'],
    warn:   ['Wiltek today: heads up', 'warn'],
    bad:    ['Wiltek today: critical', 'bad'],
    unknown:['Wiltek today: data partial', ''],
  };
  const [headline, headlineCls] = headlineMap[lightCls] || headlineMap.unknown;
  const summarySub = missing.length
    ? 'Missing data: ' + missing.map(escapeHtml).join(', ')
    : 'All sources synced · status from /api/today';

  let runwayVal = 'pending', runwaySub = 'FMM cash data not yet loaded', runwayCls = '';
  if (st.cash_runway_months != null) {
    const m = +st.cash_runway_months;
    runwayVal = m.toFixed(1) + ' months';
    runwayCls = m > 6 ? 'ok' : m > 3 ? 'warn' : 'bad';
    runwaySub = 'Cash ' + fmtMoneyShort(st.cash_total) +
      (st.financial_balance_sheet_as_of ? ' · as of ' + st.financial_balance_sheet_as_of.slice(0, 10) : '');
  } else if (st.cash_total != null) {
    runwayVal = fmtMoneyShort(st.cash_total);
    runwaySub = 'Cash on hand · monthly burn pending';
  }

  const banner = ''
    + '<div class="today-banner">'
    +   '<div class="today-light tone-' + lightCls + '">' + lightIcon + '</div>'
    +   '<div class="today-summary">'
    +     '<div class="headline ' + headlineCls + '">' + headline + '</div>'
    +     '<div class="sub">' + summarySub + '</div>'
    +   '</div>'
    +   '<div class="today-runway">'
    +     '<div class="r-label">Cash runway</div>'
    +     '<div class="r-value ' + runwayCls + '">' + runwayVal + '</div>'
    +     '<div class="r-sub">' + runwaySub + '</div>'
    +   '</div>'
    + '</div>';

  // ── Layer 2: Action Plan (placeholder — needs cross-view aggregation) ─
  const actionPlan = ''
    + '<div class="section-title">Action Plan · top 3 today</div>'
    + '<div class="action-plan">'
    +   '<strong>Stage C feature.</strong> '
    +   'Action Plan derives the top 3 actions today from cross-view aggregation '
    +   '(receivables aging · stockout list · slow-mover spikes · ABCD migrations · churn risk). '
    +   'Each card needs problem + impact + jump-link. '
    +   'Skeleton lives here once the cross-view selector lands.'
    + '</div>';

  // ── Layer 3: 5-store snapshot ────────────────────────────────────
  const sortedStores = stores.slice().sort((a, b) => (a.store || '').localeCompare(b.store || ''));
  let storeRows = sortedStores.map(b => {
    const cr = b.closing_rate != null ? (+b.closing_rate).toFixed(1) + '%' : '—';
    const walk = b.walk_in_total != null ? fmtInt(b.walk_in_total) : '—';
    const basket = b.basket_estimate != null ? fmtRM(b.basket_estimate) : '—';
    const mtd = b.mtd_amount != null ? fmtRM(b.mtd_amount) : '—';
    const inv = b.mtd_invoices != null ? fmtInt(b.mtd_invoices) : '—';
    const anomCls = (b.closing_rate != null && b.closing_rate < 25) ? 'anom-bad'
                  : (b.closing_rate != null && b.closing_rate < 50) ? 'anom-mid' : 'anom-ok';
    const anomLbl = (b.closing_rate != null && b.closing_rate < 25) ? '🔴 low CR'
                  : (b.closing_rate != null && b.closing_rate < 50) ? '🟡 CR' : '✓';
    return '<tr>'
      + '<td><strong>' + escapeHtml(b.store || '') + '</strong></td>'
      + '<td>' + escapeHtml(b.name || '') + '</td>'
      + '<td class="num">' + mtd + '</td>'
      + '<td class="num">' + inv + '</td>'
      + '<td class="num">' + walk + '</td>'
      + '<td class="num">' + cr + '</td>'
      + '<td class="num">' + basket + '</td>'
      + '<td class="' + anomCls + '">' + anomLbl + '</td>'
      + '</tr>';
  }).join('');
  if (!storeRows) storeRows = '<tr><td colspan="8" class="muted" style="text-align:center;padding:14px">No store data in /api/today response</td></tr>';

  const storeTable = ''
    + '<div class="section-title">5-store snapshot · ' + s.month + (stores[0]?.floatation_as_of ? ' · floatation ' + stores[0].floatation_as_of : '') + '</div>'
    + '<table class="store-table">'
    +   '<thead><tr>'
    +     '<th>Store</th><th>Name</th>'
    +     '<th>MTD sales</th><th>Invoices</th>'
    +     '<th>Walk-in</th><th>Closing rate</th><th>Basket est.</th>'
    +     '<th>Anom</th>'
    +   '</tr></thead>'
    +   '<tbody>' + storeRows + '</tbody>'
    + '</table>';

  // ── Layer 4: 6-domain health (placeholder) ─────────────────────
  const domains = [
    { key: 'sales',     icon: '📊', name: 'Sales',     status: 'unknown', sub: 'Stage C: pull from /api/kpi sales' },
    { key: 'inventory', icon: '📦', name: 'Inventory', status: 'unknown', sub: 'Stage C: dead% from /api/inventory_dashboard' },
    { key: 'customers', icon: '👥', name: 'Customers', status: 'unknown', sub: 'Stage C: member churn from /api/kpi customers' },
    { key: 'products',  icon: '🏷️', name: 'Products',  status: 'unknown', sub: 'Stage C: ABCD migrations from /api/products' },
    { key: 'finance',   icon: '💰', name: 'Finance',   status: 'unknown', sub: 'Stage C: GP% from /api/today.status' },
    { key: 'hr',        icon: '👷', name: 'HR',        status: 'unknown', sub: 'Backlog: HR payroll sync pending' },
  ];
  const domainGrid = ''
    + '<div class="section-title">6-domain health (placeholder · Stage C)</div>'
    + '<div class="domain-grid">'
    +   domains.map(d => ''
        + '<div class="domain-card tone-na">'
        +   '<div class="d-icon">' + d.icon + '</div>'
        +   '<div class="d-name">' + d.name + '</div>'
        +   '<div class="d-sub">' + d.sub + '</div>'
        + '</div>').join('')
    + '</div>';

  return title + banner + actionPlan + storeTable + domainGrid;
}

    + '<td class="num">' + (it.qty != null ? fmtInt(it.qty) : '—') + '</td>'
    + '<td class="num">' + (it.cost != null ? fmtRMpr(it.cost) : '—') + '</td>'
    + '<td class="num"><strong>' + fmtRMpr(it.amount) + '</strong></td>'
    + '</tr>'
  ).join('');
  body.innerHTML = ''
    + '<p class="modal-sub">'
    +   '<strong>' + orphan.count + ' distinct SKU</strong> · '
    +   orphan.rows + ' inventory row' + (orphan.rows === 1 ? '' : 's') + ' · '
    +   '影响 <strong>RM ' + (orphan.value_rm || 0).toLocaleString('en-US', { minimumFractionDigits: 2 }) + '</strong>'
    +   '<br>添加这些 code 到 '
    +   '<a href="' + SHEET_SM_URL + '" target="_blank" rel="noopener">Sheet SM tab ↗</a>'
    +   ' 后, 下次 cron sync 自动 propagate metadata, alert 清除.'
    + '</p>'
    + '<table class="orphan-table">'
    +   '<thead><tr>'
    +     '<th>Item code</th>'
    +     '<th>Store</th>'
    +     '<th class="num">Qty</th>'
    +     '<th class="num">Unit cost</th>'
    +     '<th class="num">Amount</th>'
    +   '</tr></thead>'
    +   '<tbody>' + rows + '</tbody>'
    + '</table>';
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden', 'false');
}

function closeOrphanModal() {
  const overlay = document.getElementById('orphanModal');
  if (!overlay) return;
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden', 'true');
}

function exportOrphanCSV() {
  const orphan = state.data && state.data.kpis && state.data.kpis.orphan_alert;
  if (!orphan || !Array.isArray(orphan.items) || orphan.items.length === 0) return;
  const esc = (s) => {
    if (s == null) return '';
    const str = String(s);
    return /[",\n]/.test(str) ? '"' + str.replace(/"/g, '""') + '"' : str;
  };
  const lines = ['item_code,store,qty,unit_cost,amount,snapshot_date'];
  const snap = (state.data.kpis.snapshot_date || state.data.kpis.synthetic_snapshot_date || state.month + '-end');
  for (const it of orphan.items) {
    lines.push([
      esc(it.code), esc(it.store),
      it.qty != null ? it.qty : '',
      it.cost != null ? it.cost : '',
      it.amount != null ? it.amount : '',
      esc(snap),
    ].join(','));
  }
  const csv = lines.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'wiltek-orphan-skus-' + snap + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 0);
}

// Close modal on Esc + click outside.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeOrphanModal();
});
document.addEventListener('click', (e) => {
  const overlay = document.getElementById('orphanModal');
  if (overlay && overlay.classList.contains('open') && e.target === overlay) {
    closeOrphanModal();
  }
});

/* ═══════════════════════════════════════════════════════════════════
   Login flow — talks to /api/login (same endpoint V1 uses)
═══════════════════════════════════════════════════════════════════ */
async function doLogin(ev) {
  ev.preventDefault();
  const userEl = document.getElementById('loginUser');
  const pwEl   = document.getElementById('loginPw');
  const errEl  = document.getElementById('loginErr');
  const btnEl  = document.getElementById('loginBtn');
  const username = (userEl.value || '').trim().toLowerCase();
  const password = pwEl.value || '';
  if (!username || !password) { errEl.textContent = 'Username and password required.'; return false; }

  errEl.textContent = '';
  btnEl.disabled = true; btnEl.textContent = 'Signing in…';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      cache: 'no-store',
      body: JSON.stringify({ username, password }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.ok || !j.user) {
      errEl.textContent = (j && j.error === 'inactive')
        ? 'Account inactive — contact admin.'
        : 'Invalid username or password.';
      return false;
    }
    state.user = {
      username:     j.user.username,
      display_name: j.user.display_name || j.user.username,
      role:         j.user.role,
      store:        j.user.store,
    };
    state.role = (j.user.role === 'owner') ? 'owner'
              : (/_mgr$/.test(j.user.role) ? 'manager' : (j.user.role || 'manager'));
    if (state.role !== 'owner' && j.user.store) state.branch = j.user.store;
    writeSession(state.user);
    enterApp();
    return false;
  } catch (e) {
    console.error('[V2] login error:', e);
    errEl.textContent = 'Network error — retry.';
    return false;
  } finally {
    btnEl.disabled = false; btnEl.textContent = 'Sign in';
  }
}

function doLogout() {
  clearSession();
  state.user = null;
  document.getElementById('app').classList.remove('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'true');
  document.getElementById('login').style.display = 'flex';
}

function enterApp() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('app').setAttribute('aria-hidden', 'false');
  document.getElementById('userName').textContent = state.user.display_name;
  document.getElementById('userRole').textContent = state.user.role;
  // hide branch picker for non-owners
  document.getElementById('branchPicker').style.display = (state.role === 'owner') ? '' : 'none';
  // Phase 2: ⚙️ targets sidebar link — owner only
  const navTargets = document.getElementById('navTargets');
  if (navTargets) navTargets.style.display = (state.role === 'owner') ? '' : 'none';
  populateMonthPicker();
  // Bug 2 fix: populate branch picker immediately (from STORE_META + any
  // seeded codes) so it's visible before the first fetch resolves.
  populateBranchPicker();
  syncUrl();
  loadView();
}

/* ── Month picker ───────────────────────────────────────────────── */
function populateMonthPicker() {
  const sel = document.getElementById('monthPicker');
  if (!sel) return;
  sel.innerHTML = ALL_MONTHS.map(m => '<option value="' + m + '">' + m + '</option>').join('');
  if (!ALL_MONTHS.includes(state.month)) state.month = ALL_MONTHS[0];
  sel.value = state.month;
  sel.onchange = () => onMonthChange(sel.value);
}

/* ── Boot ──────────────────────────────────────────────────────── */
function boot() {
  // Wire branch picker
  const bp = document.getElementById('branchPicker');
  if (bp) bp.onchange = () => onBranchChange(bp.value);

  // Hydrate state from URL (overrides defaults)
  const u = readUrlState();
  if (u.view)   state.view   = u.view;
  if (u.month)  state.month  = u.month;
  if (u.branch) state.branch = u.branch;

  // Resume session if present
  const sess = readSession();
  if (sess && sess.username) {
    state.user = sess;
    state.role = (sess.role === 'owner') ? 'owner'
              : (/_mgr$/.test(sess.role || '') ? 'manager' : (sess.role || 'manager'));
    if (state.role !== 'owner' && sess.store) state.branch = sess.store;
    enterApp();
  }
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}
</script>
